- id: "L22404-Q01"
  topic_code: "L22404"
  item_code: "k-anonymity"
  difficulty: 1
  question: "在匿名化（anonymization）技術中，若每一組準識別欄位（quasi-identifiers）組合至少出現 3 筆紀錄，最適合稱為何者？"
  options:
    a: "3-匿名性（3-anonymity）"
    b: "2-多樣性（2-diversity）"
    c: "t-相近性（t-Closeness）"
    d: "假名化（pseudonymization）"
  correct: "a"
  explanation:
    why_correct: "k-anonymity 的定義就是每個準識別欄位組合至少對應 k 筆紀錄；至少 3 筆即為 3-anonymity。"
    why_not_b: "l-diversity 關注的是敏感屬性的多樣性，不是等價類的人數。很多考生看到數字就誤以為任何隱私模型都能直接套用。"
    why_not_c: "t-Closeness 比較的是敏感值分布與整體分布的距離，不是單純計數。"
    why_not_d: "pseudonymization 是以代碼取代直接識別資訊，但資料仍可能回推個人，與 k-anonymity 的群組保護概念不同。"
  keywords:
    - "k-anonymity"
    - "quasi-identifiers"
    - "anonymization"
  exam_trap: false

- id: "L22404-Q02"
  topic_code: "L22404"
  item_code: "l-diversity"
  difficulty: 1
  question: "下列何者最能說明為何僅有 k-匿名性（k-anonymity）仍可能洩漏敏感資訊（sensitive attribute）？"
  options:
    a: "因為 k-anonymity 一定要求加密（encryption）"
    b: "因為同一等價類中的敏感值可能過度同質（homogeneity）"
    c: "因為 k-anonymity 只適用於影像資料"
    d: "因為 k-anonymity 會自動加入差分隱私雜訊"
  correct: "b"
  explanation:
    why_correct: "若同一等價類內的敏感值都相同，即使無法直接識別個人，仍能推知其敏感屬性，這正是 l-diversity 要補強的問題。"
    why_not_a: "k-anonymity 與是否加密無必然關係；匿名化和加密是不同控制手段。"
    why_not_c: "k-anonymity 常用於表格型資料，並非只適用影像。"
    why_not_d: "差分隱私是另一套隱私保護框架，不會因為做到 k-anonymity 就自動產生。"
  keywords:
    - "l-diversity"
    - "homogeneity attack"
    - "sensitive attribute"
  exam_trap: true

- id: "L22404-Q03"
  topic_code: "L22404"
  item_code: "t-closeness"
  difficulty: 1
  question: "t-相近性（t-Closeness）主要希望控制下列哪一種風險？"
  options:
    a: "資料傳輸未使用 TLS 1.3"
    b: "角色權限設定過寬"
    c: "等價類中的敏感值分布與整體分布差異過大"
    d: "裝置端模型更新太大"
  correct: "c"
  explanation:
    why_correct: "t-Closeness 的核心是要求各等價類中的敏感值分布，不能與整體資料集分布差距太大，以降低屬性推論風險。"
    why_not_a: "TLS 1.3 是傳輸加密議題，不是匿名化分布保護模型。"
    why_not_b: "角色權限屬存取控制，和 t-closeness 的統計分布要求不同。"
    why_not_d: "模型更新幅度屬聯邦學習訓練議題，不是 t-closeness 的目標。"
  keywords:
    - "t-closeness"
    - "distribution matching"
    - "attribute disclosure"
  exam_trap: false

- id: "L22404-Q04"
  topic_code: "L22404"
  item_code: "dp-budget"
  difficulty: 1
  question: "在差分隱私（Differential Privacy, DP）中，常用符號 ε（epsilon）最直接代表下列何者？"
  options:
    a: "資料表欄位數"
    b: "聯邦學習輪數"
    c: "加密金鑰長度"
