    why_correct: "k-anonymity 只處理識別風險，當敏感值同質時仍需 l-diversity 等補強，或進一步重組群組。"
    why_not_b: "這忽略了 homogeneity attack，是典型考試陷阱。"
    why_not_c: "傳輸加密不能消除資料公開後的屬性推論風險。"
    why_not_d: "RBAC 只限制內部誰可看，不處理已發布資料的結構性風險。"
  keywords:
    - "k-anonymity"
    - "l-diversity"
    - "government open data"
  exam_trap: true

- id: "L22404-Q34"
  topic_code: "L22404"
  item_code: "t-closeness"
  difficulty: 5
  question: "某醫院公開研究資料時，希望避免外界從特定等價類別判斷『某區域患者大多屬高風險罕病』，即使該群組已滿足 k-anonymity 且也有數種疾病值。若從模型選擇角度判斷，下列何者最能直接回應此需求？"
  options:
    a: "改做垂直聯邦學習（Vertical FL）"
    b: "採 t-接近性（t-closeness），限制各群組疾病分布接近全體分布"
    c: "只把病歷號碼改成假名即可"
    d: "僅以 AES-256 加密發布檔案"
  correct: "b"
  explanation:
    why_correct: "題目要防的是群組分布洩漏，而非只有識別或同質性問題；t-closeness 最直接。"
    why_not_a: "Vertical FL 是訓練架構，不是資料發布匿名化控制。"
    why_not_c: "假名化降低直接識別風險，但群組分布仍可能暴露敏感資訊。"
    why_not_d: "檔案加密只保護未授權存取，資料一旦分享給合法接收者，分布風險仍在。"
  keywords:
    - "t-closeness"
    - "distribution disclosure"
    - "hospital research data"
  exam_trap: false

- id: "L22404-Q35"
  topic_code: "L22404"
  item_code: "laplace-gaussian"
  difficulty: 5
  question: "某團隊要對外發布『多維統計向量』，並明確採用（ε, δ）-Differential Privacy；同時另一組產品經理卻提議改用 Laplace 只是因為「比較常聽到」。若要兼顧機制適配性與表達精準度，何者最合理？"
  options:
    a: "任何情況都應先選 Laplace，因為它最有名"
    b: "不需要看輸出型態，直接改用 k-anonymity 即可"
