  correct: "d"
  explanation:
    why_correct: "ε 是 DP 中衡量隱私損失強弱的核心參數；通常 ε 越小，隱私保護越強。"
    why_not_a: "欄位數與 ε 沒有直接定義關係。"
    why_not_b: "訓練輪數可能影響總隱私消耗，但 ε 本身不是輪數。"
    why_not_c: "金鑰長度屬加密強度概念，不是 DP 參數。"
  keywords:
    - "Differential Privacy"
    - "epsilon"
    - "privacy budget"
  exam_trap: false

- id: "L22404-Q05"
  topic_code: "L22404"
  item_code: "laplace-gaussian"
  difficulty: 1
  question: "若要對單一數值查詢結果（numeric count query）加入雜訊，教材中最常搭配的差分隱私機制為何？"
  options:
    a: "拉普拉斯機制（Laplace mechanism）"
    b: "安全聚合（secure aggregation）"
    c: "同態加密（homomorphic encryption）"
    d: "縱向聯邦學習（Vertical Federated Learning, VFL）"
  correct: "a"
  explanation:
    why_correct: "對單一數值查詢，Laplace mechanism 是最典型的差分隱私作法之一，會依敏感度與 ε 加入雜訊。"
    why_not_b: "secure aggregation 是保護多方更新值不被單獨看見，不是查詢輸出加噪。"
    why_not_c: "同態加密保護運算過程，但不保證 DP 的輸出隱私。"
    why_not_d: "縱向聯邦學習描述資料切分方式，不是雜訊機制。"
  keywords:
    - "Laplace mechanism"
    - "numeric query"
    - "Differential Privacy"
  exam_trap: false

- id: "L22404-Q06"
  topic_code: "L22404"
  item_code: "homomorphic-encryption"
  difficulty: 1
  question: "若題目強調『不解密原始資料仍可進行運算（compute on encrypted data）』，最可能對應哪一項技術？"
  options:
    a: "雜湊（hashing）"
    b: "同態加密（Homomorphic Encryption）"
    c: "k-匿名性（k-anonymity）"
    d: "資料本地化（data localization）"
  correct: "b"
  explanation:
    why_correct: "Homomorphic Encryption 的核心特性就是在密文上直接進行運算，最後解密得到對應結果。"
    why_not_a: "hashing 適合做完整性檢查或不可逆摘要，無法在摘要上進行一般計算。"
    why_not_c: "k-anonymity 是匿名化模型，不提供密文運算能力。"
    why_not_d: "資料本地化是資料儲存位置要求，不是運算技術。"
  keywords:
    - "Homomorphic Encryption"
    - "compute on encrypted data"
    - "privacy-preserving computation"
  exam_trap: false

- id: "L22404-Q07"
  topic_code: "L22404"
  item_code: "federated-learning"
  difficulty: 1
  question: "在聯邦學習（Federated Learning, FL）的基本架構中，哪一項通常留在裝置端（on-device）而不集中上傳？"
  options:
    a: "全站 TLS 憑證"
    b: "聚合後的全域模型權重"
    c: "原始訓練資料（raw training data）"
    d: "中央協調伺服器日誌"
  correct: "c"
  explanation:
    why_correct: "FL 的核心是資料不離開本地端，裝置只回傳模型更新或梯度等資訊，而非原始資料。"
    why_not_a: "TLS 憑證屬基礎設施設定，不是 FL 想保留在裝置端的資料本體。"
    why_not_b: "全域模型通常由伺服器聚合後再下發各端。"
    why_not_d: "伺服器日誌本來就位於中央端，與 FL 的資料最小化概念不同。"
  keywords:
    - "Federated Learning"
    - "on-device"
    - "raw training data"
  exam_trap: false

