    why_not_b: "即使有 TLS，集中蒐集影像仍違反資料不集中條件。"
    why_not_c: "匿名化影像後直接集中仍可能有風險，且不符合題目希望保留本地治理的需求。"
    why_not_d: "帳號權限管理無法取代跨院訓練架構與更新隱私保護。"
