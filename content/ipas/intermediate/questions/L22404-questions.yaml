    d: "改用 RBAC，避免外部存取就不必考慮 DP"
  correct: "c"
  explanation:
    why_correct: "若問題已明示多維向量與 approximate DP，Gaussian mechanism 的描述通常更貼切。"
    why_not_a: "知名度不是機制選擇原則；需看查詢型態與隱私定義。"
    why_not_b: "k-anonymity 與輸出擾動型 DP 屬不同框架，不能直接互換。"
    why_not_d: "控制外部存取不等於可安全發布統計結果。"
