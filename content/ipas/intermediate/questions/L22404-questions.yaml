- id: "L22404-Q09"
  topic_code: "L22404"
  item_code: "secure-aggregation"
  difficulty: 2
  question: "關於安全聚合（secure aggregation），下列敘述何者正確？"
  options:
    a: "伺服器可取得各參與者的個別梯度，只是不能下載原始資料"
    b: "目標是讓伺服器主要看到聚合結果，而非每個裝置的個別更新"
    c: "它等同於 TLS 1.3，因此只要有 HTTPS 就已滿足"
    d: "它只用於資料庫靜態加密（encryption at rest）"
  correct: "b"
  explanation:
    why_correct: "secure aggregation 的目標是讓中央端只看見聚合後的更新，降低單一參與者模型更新被還原或推論的風險。"
    why_not_a: "若能看見個別梯度，仍可能遭受梯度洩漏攻擊，這正是 secure aggregation 要避免的。"
    why_not_c: "TLS 保護傳輸通道，但不會隱藏伺服器端可見的個別明文更新。"
    why_not_d: "靜態加密保護儲存資料，與多方更新聚合不是同一層次問題。"
  keywords:
    - "secure aggregation"
    - "gradient privacy"
    - "Federated Learning"
  exam_trap: true

