- id: "L22404-Q39"
  topic_code: "L22404"
  item_code: "gdpr-25-32"
  difficulty: 5
  question: "某跨境 SaaS 服務同時面臨兩項要求：一是新功能預設不得開啟行銷追蹤，二是處理中的個資要有加密、韌性、復原與定期測試。若要分別對應 GDPR 與組織治理框架，下列何者最合理？"
  options:
    a: "兩者都只靠 ISO/IEC 27701:2025 即可，不需區分條文義務"
    b: "前者屬 Art. 25，後者屬 Art. 32；ISO/IEC 27701 可作為隱私管理制度的補充框架"
    c: "前者屬 Art. 32，後者屬 Art. 25；27701 只適用台灣個資法"
    d: "兩者都只要做 pseudonymization 即可"
  correct: "b"
  explanation:
    why_correct: "Art. 25 管設計與預設隱私，Art. 32 管處理安全；27701 則可作為制度化治理的支撐。"
    why_not_a: "管理標準不能取代法條本身的義務判讀。"
    why_not_c: "這把兩條文的核心重點顛倒，且 27701 也非只適用台灣。"
    why_not_d: "假名化只是可能的控制之一，無法涵蓋完整要求。"
  keywords:
