- id: "L22404-Q36"
  topic_code: "L22404"
  item_code: "homomorphic-encryption"
  difficulty: 5
  question: "一家金融機構要與外部風控供應商合作建模，限制條件為：原始客戶資料不得離開本行、供應商不可見明文、但仍需在受保護資料上執行部分風險分數計算。若只能優先選一個最貼近需求的技術，下列何者最佳？"
  options:
    a: "只做 GDPR Art. 25 文件化即可"
    b: "只做 secure aggregation 即可，因為它能保護所有型態的外部計算"
    c: "只做 pseudonymization 即可，因為代碼化後就不算個資"
    d: "同態加密（Homomorphic Encryption）"
  correct: "d"
  explanation:
    why_correct: "題目核心是外部方不可見明文且仍需執行運算，HE 最貼近這個約束組合。"
    why_not_a: "文件化重要，但不能取代實際技術保護。"
    why_not_b: "secure aggregation 主要解決多方更新聚合，不等於一般密文外包計算。"
    why_not_c: "pseudonymization 仍可能回連個人，也不支援密文運算。"
  keywords:
    - "Homomorphic Encryption"
    - "financial risk modeling"
    - "encrypted analytics"
  exam_trap: false

- id: "L22404-Q37"
  topic_code: "L22404"
  item_code: "federated-learning"
  difficulty: 5
  question: "三家醫院要共同訓練肺部影像模型。條件為：病患影像不能集中、中央伺服器不應看見各院個別更新、且希望保留既有各院本地資料治理。下列方案何者最完整？"
  options:
    a: "聯邦學習（Federated Learning）搭配安全聚合（secure aggregation）"
    b: "集中式蒐集所有影像後再用 TLS 傳輸"
    c: "僅做 3-anonymity 後上傳全部影像"
    d: "只用 RBAC 限制研究員帳號"
  correct: "a"
  explanation:
