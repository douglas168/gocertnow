  - id: "L21202-Q26"
    topic_code: "L21202"
    item_code: "L21202"
    difficulty: 4
    question: "某電商規劃導入推薦系統 AI，本週內需召開一場跨部門會議拍板「自建 vs 外購（方案 A/B）」。規劃師該在這場會議採用 RACI 還是 DACI？為什麼？"
    options:
      a: "用 RACI：因為要釐清每週誰執行、誰覆核，確保任務不漏接"
      b: "用 DACI：因為這是一場多部門決策會議，需要明確的 Driver 推動、Approver 拍板，避免『會而不議、議而不決』"
      c: "兩者擇一皆可，沒差別"
      d: "兩者都不用，直接由 CEO 裁示即可"
    correct: "b"
    explanation:
      why_correct: "AI 方案 A/B 拍板型會議應採 DACI：Driver 推動會議、Approver 最終拍板、Contributor 提供資訊、Informed 被告知。口訣：『每週任務分工用 RACI；方案 A/B 拍板會議用 DACI』。本題情境是一次性決策會議而非穩態執行分工，DACI 更契合。"
      why_not_a: "RACI 適合穩態執行分工（每週誰做什麼），放到拍板會議容易出現 R 與 A 混淆、會議拖延。"
      why_not_c: "兩者情境適用性不同，不可互換；誤把兩者視為同義是常見陷阱。"
      why_not_d: "跳過結構化工具直接由 CEO 裁示，會失去跨部門意見收斂的機會，也不符合 L21202 規劃師的角色。"
    keywords:
      - "RACI"
      - "DACI"
      - "決策會議"
      - "情境題"
    exam_trap: true

