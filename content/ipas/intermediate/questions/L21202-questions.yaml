    item_code: "L21202"
    difficulty: 4
    question: "某傳產企業 CEO 想了解公司目前的 AI 導入程度究竟在『哪個水平』，並據此規劃未來 3 年投資藍圖。規劃師應建議採用下列哪個框架為主要診斷工具，並說明理由？"
    options:
      a: "Gartner AI Maturity Model：以五級成熟度（Awareness→Active→Operational→Systemic→Transformational）直接對應組織 AI 成熟度的當前位置，最適合『診斷現況 + 設定進階目標』"
      b: "CMMI：以 Ad-hoc→Managed→Defined→Quantitative→Optimizing 五級評估軟體工程能力，是 AI 導入成熟度的業界標準"
      c: "Microsoft CAF：以 Strategy→Plan→Ready→Adopt→Govern→Manage 六大方法論，可直接給出一個成熟度分數"
      d: "不需任何框架，直接問 CEO 想聽到哪一級的結論即可"
    correct: "a"
    explanation:
      why_correct: "Gartner AI Maturity Model 的五級是針對『組織 AI 成熟度診斷』設計，能直接落點當前水平並指出下一級需要補的能力；對這類『我們現在在哪、下一步去哪』的問題最契合。"
      why_not_b: "CMMI 是軟體工程能力成熟度，不是 AI 組織成熟度；套到 AI 導入會失焦。"
      why_not_c: "Microsoft CAF 是 lifecycle 方法論（做什麼階段要做什麼事），不是用來給成熟度分數的診斷工具。"
      why_not_d: "規劃師應以結構化框架做客觀診斷，迎合上意是反模式。"
    keywords:
      - "Gartner AI Maturity"
      - "CMMI"
      - "Microsoft CAF"
      - "成熟度診斷"
    exam_trap: true

  - id: "L21202-Q28"
    topic_code: "L21202"
    item_code: "L21202"
    difficulty: 4
    question: "某公司把 100% 的 AI 預算全部投入『單一旗艦模型的訓練與調校』，幾乎沒有預算花在資料基礎建設與運維治理上。依教材 §3.5.2 的 70/20/10 定義，此做法最大的規劃風險為？"
    options:
      a: "有利於集中火力，因此比 70/20/10 更能提高成功率"
      b: "違反 §3.5.2 70/20/10（70% 基礎設施 + 20% 模型 + 10% 運維治理）定義：基礎設施（資料/算力/平台）與運維治理被忽略，模型縱使訓練成功，也會因資料品質差、缺監控與稽核而無法在真實環境穩定運作"
      c: "無法通過 ISO 9001 稽核"
      d: "雲端費用必然暴漲"
    correct: "b"
    explanation:
      why_correct: "§3.5.2 將 70/20/10 定義為基礎設施 / 模型 / 運維治理。把 100% 押在模型，等於抽掉 70% 的基礎設施與 10% 的治理，模型即使做得好也會因為資料品質、平台整合、監控稽核缺位而無法落地。"
      why_not_a: "70/20/10 的核心是風險分散 + 資源配比，單押單一技術並不會提高整體成功率，反而放大基礎設施與治理缺口風險。"
      why_not_c: "ISO 9001 是品質管理標準，與 70/20/10 分配比例沒有直接關聯。"
      why_not_d: "雲端費用高低取決於用量與架構，不是單一專案就必然暴漲；題目問的是配比失衡的結構性風險。"
    keywords:
      - "70/20/10"
      - "infra/model/ops"
      - "資源分配"
    exam_trap: false

  - id: "L21202-Q29"
    topic_code: "L21202"
    item_code: "L21202"
    difficulty: 4
    question: "某 SaaS 公司導入 AI 客戶流失預測，北極星指標是『年續約率』，最大的風險是『預測誤警造成客服騷擾客戶』。以下哪個 KPI 配置雖然都能數到 3+2+1 的整數，但哪一組更貼近『對齊北極星 + 收斂真正的風險』？"
    options:
      a: "operational = precision / recall / F1；business = 月活躍數 / 新註冊數；risk = 雲端帳單超支警示。看似 3+2+1，但 business 與 risk 都沒對準續約率和誤警這兩條主線"
      b: "operational = precision / recall / 推論 P95 延遲；business = 年續約率 / 高價值客戶續約率；risk = 誤警（FP）對客服 NPS 的影響。3+2+1 的每一格都對準北極星與題目指出的最大風險"
      c: "只用一個年續約率指標，其他都不量測"
      d: "資料科學家的 commit 數 × 3、模型實驗次數 × 2、論文投稿數 × 1"
    correct: "b"
    explanation:
      why_correct: "3+2+1 不只是湊數字，每一格都要對準業務的北極星與最大風險。本題北極星是年續約率、最大風險是誤警騷擾客戶；選項 b 的 business 對準續約率、risk 對準誤警對 NPS 影響，才是真正的 3+2+1 精神。"
      why_not_a: "數量上看似 3+2+1，但 business 指標（月活/註冊）沒對到北極星（續約率），risk 指標（雲端超支）也沒收斂真正的風險（誤警騷擾）；結構對、方向錯。"
      why_not_c: "只量一個北極星，缺少 operational 與 risk 的安全網，AI 穩定性失守時會沒有早期訊號。"
      why_not_d: "工程活動量（commit / 投稿）與客戶價值無關，湊出 3+2+1 整數也無意義。"
    keywords:
