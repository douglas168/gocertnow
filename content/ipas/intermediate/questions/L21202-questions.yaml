  - id: "L21202-Q16"
    topic_code: "L21202"
    item_code: "L21202"
    difficulty: 2
    question: "關於 OKR 與 KPI 在 AI 導入規劃中的關係，下列敘述何者最正確？"
    options:
      a: "OKR 取代 KPI，擇一使用即可"
      b: "KPI 屬財務層指標，OKR 屬技術層指標"
      c: "OKR 是季度報告，KPI 是年度報告"
      d: "OKR 定義階段性挑戰方向，KPI 衡量穩態營運績效，兩者互補"
    correct: "d"
    explanation:
      why_correct: "OKR 聚焦挑戰型目標（quarterly stretch），KPI 監控穩態績效；AI 導入常上層用 OKR、下層用 KPI。"
      why_not_a: "兩者互補，非替代關係。"
      why_not_b: "OKR/KPI 不以財務/技術切分，兩者可跨層級定義。"
      why_not_c: "兩者週期皆可配置，以報告頻率區分是誤解。"
    keywords:
      - "OKR"
      - "KPI"
    exam_trap: false

