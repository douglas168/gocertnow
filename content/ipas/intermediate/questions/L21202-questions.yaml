    item_code: "L21202"
    difficulty: 5
    question: "高管下達雙重約束：『2 週內必須提出完整 AI 導入提案』，但同時『全公司的資料盤點尚未完成』。規劃師應如何回應最能兼顧時程與風險控管？"
