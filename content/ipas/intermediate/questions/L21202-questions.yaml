      why_not_a: "承諾所有數字卻建立在未盤點的資料上，是把不確定性隱藏在提案裡，之後任何一個假設破裂都會連鎖爆炸。"
      why_not_b: "平行啟動全部用例違反資源分配原則，且在資料未盤點時會放大失敗面積。"
      why_not_d: "直接拒絕高管排程等於失去規劃師的協商角色；適當做法是重新設計提案結構，而不是改變交付期。"
