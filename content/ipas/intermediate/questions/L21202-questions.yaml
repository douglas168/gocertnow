    item_code: "L21202"
    difficulty: 5
    question: "某銀行要導入 AI 反詐騙。約束：(1) 須符合金管會監理沙盒規範，(2) 誤殺正常交易（false positive）率 ≤ 0.5%，(3) 18 個月內擴展至全行。下列規劃何者最優？"
    options:
      a: "先以信用卡線上交易子集做 Pilot（6 個月）→ 通過沙盒與 FP 指標後再擴展至全行（12 個月）；規劃階段保留 15% governance budget 供稽核與合規審查；RACI 的 A（Accountable）= 風險管理部主管或業務單位主管，法遵（Compliance）任 C（Consulted）"
      b: "直接全行同步上線，靠事後調整閾值；RACI 中 A 由法遵主管擔任"
