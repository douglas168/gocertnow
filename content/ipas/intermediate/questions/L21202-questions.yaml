  - id: "L21202-Q33"
    topic_code: "L21202"
    item_code: "L21202"
    difficulty: 5
    question: "Uber Eats 台灣要導入 AI 配送時間預測。約束：(1) 上線後 P95 預測誤差 ≤ 3 分鐘，(2) 首年總預算 ≤ 1,500 萬元，(3) 必須在 6 個月內達成 Pilot gate。下列何方案最合理？"
    options:
      a: "招募 10 位資料科學家從零研發 Transformer，先做 12 個月 R&D 再談上線"
      b: "採 Buy-then-Build：以雲端 forecasting 服務（如 Vertex AI Forecasting）快速建立 baseline，Pilot 雙北外送熱區驗證 P95 指標，後半年再評估自研替代；以 §3.5.2 70/20/10（70% 基礎設施資料/平台/整合、20% 模型、10% 運維治理）配置年度預算"
      c: "直接全台上線生成式 LLM 預測，跳過 Pilot"
      d: "先以既有規則引擎全台上線，再於營運中逐步蒐集資料優化模型"
    correct: "b"
    explanation:
      why_correct: "三約束（時程 6 個月、預算 1,500 萬、P95 ≤ 3 分鐘）同時緊箍，只有 Buy-then-Build 能兼顧：Buy 快速入場滿足時程；雲端 forecasting 以 OpEx 管控預算；雙北熱區 Pilot 聚焦驗證 P95。這是『時程／預算／驗證策略』三重約束下的決策題，而非 70/20/10 定義題。"
      why_not_a: "12 個月 R&D 直接撞破 6 個月 Pilot gate 時程約束，且人力與研發成本會超出 1,500 萬預算。"
      why_not_c: "跳過 Pilot 全台上線違反風險收斂紀律；生成式 LLM 也非延遲預測的首選架構。"
      why_not_d: "規則引擎全台上線看似省時，但在雙北外送熱區這種高變動場域會嚴重偏誤，P95 ≤ 3 分鐘難達標；且『先上線再蒐資料』等於把驗證責任推給正式用戶，違反 AI 導入的 Pilot gate 紀律。"
