# L21202 AI導入規劃 — 練習題庫 (40題)
# 難度分布: D1×8, D2×8, D3×8, D4×8, D5×8
# 覆蓋: 需求分析/方案設計/目標設置/資源分配/5-phase/RACI/Pilot-PoC-MVP/導入框架/AI-specific/邊界

questions:
  # ============================================================
  # Difficulty 1 — Remember (8題)
  # ============================================================
  - id: "L21202-Q01"
    topic_code: "L21202"
    item_code: "L21202"
    difficulty: 1
    question: "iPAS 中級 L21202「AI 導入規劃」官方四大關鍵字為何？"
    options:
      a: "需求分析、目標設置、資源分配、技術應用方案設計"
      b: "風險識別、合規檢核、倫理審查、資料治理"
      c: "模型訓練、超參數調校、部署監控、版本管理"
      d: "投資報酬率、回收期、淨現值、敏感度分析"
    correct: "a"
    explanation:
      why_correct: "iPAS 115 年度簡章中級 L21202 明列「需求分析、目標設置、資源分配、技術應用方案設計」為四大關鍵字。"
      why_not_b: "這些屬於 L21203 風險管理的關鍵字，常被誤認為規劃範圍。"
      why_not_c: "這些屬於 L21302 部署與維運，不在 L21202 規劃階段的考點。"
      why_not_d: "這些屬於 L21201 評估的財務分析工具，L21202 以評估結果為輸入、不再重算。"
    keywords:
      - "四大關鍵字"
      - "L21202"
    exam_trap: true

  - id: "L21202-Q02"
    topic_code: "L21202"
    item_code: "L21202"
    difficulty: 1
    question: "SMART 原則中的 M 代表下列何者？"
    options:
      a: "Motivational（激勵性）"
      b: "Measurable（可衡量）"
      c: "Mandatory（強制性）"
      d: "Multidimensional（多維度）"
    correct: "b"
    explanation:
      why_correct: "SMART = Specific / Measurable / Achievable / Relevant / Time-bound，M 為 Measurable 可衡量。"
      why_not_a: "激勵性非 SMART 指標的組成要素，屬於 OKR 精神但非字母對應。"
      why_not_c: "強制性不在 SMART 架構，混淆了目標強度與可衡量性。"
      why_not_d: "多維度屬績效儀表板設計語彙，非 SMART 字母定義。"
    keywords:
      - "SMART"
      - "目標設置"
    exam_trap: false

  - id: "L21202-Q03"
    topic_code: "L21202"
    item_code: "L21202"
    difficulty: 1
    question: "RACI 矩陣中的 R 與 A 各自代表何種角色？"
    options:
      a: "R = Reporter 回報者；A = Approver 核准者"
      b: "R = Resource 資源；A = Activity 活動"
      c: "R = Responsible 執行者；A = Accountable 最終負責人"
      d: "R = Reviewer 審閱者；A = Author 作者"
    correct: "c"
    explanation:
      why_correct: "RACI 中 R 為 Responsible（實際動手做），A 為 Accountable（唯一最終負責人，通常只有一位）。"
      why_not_a: "Reporter/Approver 較接近 DACI 中 I（Informed）/A（Approver）而非 RACI。"
      why_not_b: "Resource/Activity 屬專案管理詞彙但與 RACI 字母定義無關。"
      why_not_d: "Reviewer/Author 不是 RACI 的定義，常見於文件審閱流程誤植。"
    keywords:
      - "RACI"
      - "Responsible"
      - "Accountable"
    exam_trap: true

  - id: "L21202-Q04"
    topic_code: "L21202"
    item_code: "L21202"
    difficulty: 1
    question: "北極星指標（North Star Metric）在 AI 導入規劃中的主要用途為何？"
    options:
      a: "衡量模型在驗證集上的準確率"
      b: "量化雲端 GPU 的每小時成本"
      c: "列舉所有需要部署的技術元件"
      d: "作為組織長期願景的單一最重要指標，用以對齊各層級目標"
    correct: "d"
    explanation:
      why_correct: "北極星指標為一個最能反映產品長期核心價值的指標，用以對齊策略層級目標。"
      why_not_a: "模型準確率是技術 KPI，屬 3+2+1 中的 operational metric，非 North Star。"
      why_not_b: "成本指標屬資源規劃衡量項，不是北極星的角色。"
      why_not_c: "技術元件清單屬方案設計產出，非目標設置指標。"
    keywords:
      - "North Star Metric"
      - "北極星指標"
    exam_trap: false

  - id: "L21202-Q05"
    topic_code: "L21202"
    item_code: "L21202"
    difficulty: 1
    question: "Gartner AI Maturity Model 五級成熟度由低到高依序為？"
    options:
      a: "Awareness → Active → Operational → Systemic → Transformational"
      b: "Ad-hoc → Managed → Defined → Quantitative → Optimizing"
      c: "Collect → Organize → Analyze → Infuse → Govern"
      d: "Tactical → Strategic → Transformational → Sustainable → Visionary"
    correct: "a"
    explanation:
      why_correct: "Gartner 的五級 AI 成熟度依序為 Awareness / Active / Operational / Systemic / Transformational。"
      why_not_b: "這是 CMMI 軟體能力成熟度五級，不是 Gartner AI 模型。"
      why_not_c: "這是 IBM AI Ladder 四階段（Collect/Organize/Analyze/Infuse），非 Gartner。"
      why_not_d: "Tactical/Strategic/Transformational 是 Google AI Adoption Framework 的三階段，非五級。"
    keywords:
      - "Gartner AI Maturity"
    exam_trap: true

  - id: "L21202-Q06"
    topic_code: "L21202"
    item_code: "L21202"
    difficulty: 1
    question: "IBM AI Ladder 的四階段依序為？"
    options:
      a: "Plan → Design → Build → Run"
      b: "Data → Model → Deploy → Monitor"
      c: "Collect → Organize → Analyze → Infuse"
      d: "Explore → Experiment → Evaluate → Expand"
    correct: "c"
    explanation:
      why_correct: "IBM AI Ladder 主張「沒有資料梯度就沒有 AI 梯度」，四階為 Collect（蒐集）→ Organize（整理）→ Analyze（分析）→ Infuse（融入）。"
      why_not_a: "Plan/Design/Build/Run 是一般 IT 生命週期命名，非 IBM AI Ladder。"
      why_not_b: "Data/Model/Deploy/Monitor 是 MLOps 生命週期，屬 L21302 範圍。"
      why_not_d: "Explore/Experiment/Evaluate/Expand 接近 PoC→Pilot→Scale 階段，但不是 IBM 官方命名。"
    keywords:
      - "IBM AI Ladder"
    exam_trap: false

  - id: "L21202-Q07"
    topic_code: "L21202"
    item_code: "L21202"
    difficulty: 1
    question: "在 AI 導入規劃中，「3+2+1 KPI 規則」指下列何種組合？"
    options:
      a: "3 個技術、2 個人力、1 個時程指標"
      b: "3 個短期、2 個中期、1 個長期指標"
      c: "3 個領先、2 個落後、1 個複合指標"
      d: "3 個 operational、2 個 business、1 個 risk 指標"
    correct: "d"
    explanation:
      why_correct: "3+2+1 為業界常見啟發式：3 個 operational、2 個 business、1 個 risk 指標，避免指標偏食。記憶鉤：先看系統跑得穩不穩（3 operational），再看業務有沒有賺（2 business），最後看會不會出事（1 risk）。"
      why_not_a: "技術/人力/時程是資源分配類別而非 KPI 型態。"
      why_not_b: "時間軸分層是 OKR 節奏而非 3+2+1 的設計意圖。"
      why_not_c: "領先/落後指標屬平衡計分卡語彙，非 3+2+1 規則。"
    keywords:
      - "3+2+1 KPI"
    exam_trap: false

  - id: "L21202-Q08"
    topic_code: "L21202"
    item_code: "L21202"
    difficulty: 1
    question: "中級 AI 導入規劃的「5-phase adoption roadmap」一般順序為何？"
    options:
      a: "蒐集 → 整理 → 分析 → 部署 → 監控"
      b: "需求分析 → 方案設計 → 資源規劃 → 試點 → 擴展"
      c: "策略 → 採購 → 招募 → 訓練 → 交付"
      d: "PoC → MVP → Alpha → Beta → GA"
    correct: "b"
    explanation:
      why_correct: "教材採用線性五階：需求分析 → 方案設計 → 資源規劃 → 試點（Pilot）→ 擴展（Scale），每階段有 gate criteria。"
      why_not_a: "這是 IBM AI Ladder + 監控，混合了不同方法論。"
      why_not_c: "接近採購/HR 流程，不具 AI 規劃專屬性。"
      why_not_d: "PoC→MVP→GA 是產品版本節奏，不等於組織導入五階段。"
    keywords:
      - "5-phase roadmap"
    exam_trap: false

  # ============================================================
  # Difficulty 2 — Understand (8題)
  # ============================================================
  - id: "L21202-Q09"
    topic_code: "L21202"
    item_code: "L21202"
    difficulty: 2
    question: "為什麼 AI 專案需要在擴展（Scale）之前先做試點（Pilot），而一般 IT 專案常可直接全面上線？"
    options:
      a: "因為 AI 具資料與模型不確定性，須以受控範圍驗證假設後再放大"
      b: "因為試點不需預算只須小團隊即可"
      c: "因為 AI 法規規定必須試點"
      d: "因為 AI 不相容於舊系統，必須先試點再重寫"
    correct: "a"
    explanation:
      why_correct: "AI 表現受訓練資料分布、真實流程 feedback 影響，試點可在可控範圍驗證假設、收集真實資料再決定是否擴展。"
      why_not_b: "試點仍需預算與跨職能人力，不是省錢理由。"
      why_not_c: "目前台灣無強制試點法規，選項為過度推論。"
      why_not_d: "系統相容性是部署議題，不是 Pilot 必要性的主因。"
    keywords:
      - "Pilot"
      - "模型不確定性"
    exam_trap: false

  - id: "L21202-Q10"
    topic_code: "L21202"
    item_code: "L21202"
    difficulty: 2
    question: "在需求分析階段，「業務目標 → 流程 → 決策點 → 資料 → 技術」這個映射鏈的主要意義為何？"
    options:
      a: "強迫從技術選型倒推業務需求"
      b: "確保 AI 技術是為了可衡量的業務決策與資料條件而選，而非為技術而技術"
      c: "讓資料科學家主導業務決策"
      d: "保證一次涵蓋所有 AI 類型（判別/生成/傳統 ML）"
    correct: "b"
    explanation:
      why_correct: "需求分析的核心是由業務目標往下推導至技術，避免「我們要導入 AI 然後想用在哪」的倒因為果。"
      why_not_a: "鏈條方向是由業務往下不是由技術倒推。"
      why_not_c: "資料科學家是技術提供者，業務決策仍由業務負責人決定。"
      why_not_d: "涵蓋所有 AI 類型不是需求分析的目的，而是方案設計時的技術選擇。"
    keywords:
      - "需求分析"
      - "business-to-tech mapping"
    exam_trap: false

  - id: "L21202-Q11"
    topic_code: "L21202"
    item_code: "L21202"
    difficulty: 2
    question: "為什麼在 AI 導入規劃中，「資源分配」不能只等於「編列預算」？"
    options:
      a: "因為主要成本都已內含在雲端訂閱費中，故不必另外規劃資料與算力"
      b: "因為預算規劃屬於財務部職權，規劃師不應介入"
      c: "因為雲端服務已包含所有資源，毋須分別規劃"
      d: "因為 AI 資源包含錢、人、算力、資料、時間五個面向（錢人算料時），任一不足都會卡關"
    correct: "d"
    explanation:
      why_correct: "教材以「錢、人、算力、資料、時間」五向量總結 AI 資源分配；單獨預算無法反映資料清洗 2-8 週或人才稀缺等限制。"
      why_not_a: "只看雲端帳單而忽略資源向量 是常見誤解；資料取得、標註、算力峰值、人員訓練均需獨立編列，不會全部內含在訂閱費中。"
      why_not_b: "導入規劃師須整合各資源向量，財務僅是其中一環。"
      why_not_c: "雲端供應商不替您解決資料品質、人才、時間等內部資源缺口。"
    keywords:
      - "資源分配"
      - "錢人算料時"
    exam_trap: true

  - id: "L21202-Q12"
    topic_code: "L21202"
    item_code: "L21202"
    difficulty: 2
    question: "規劃師在編列 AI 導入預算時，若未將『上線後的模型監控、再訓練、重新標註』納入多年期 OpEx，最可能造成下列哪一種規劃失誤？"
    options:
      a: "AI 專案一次部署即可永久使用，無後續成本"
      b: "AI 只需要軟體授權費，算力是免費的"
      c: "上線一段時間後模型效能自然衰退，卻因預算未編列而無資源進行再訓練與標註，導致業務指標下滑卻只能被動關案"
      d: "AI 導入後可大幅降低一線人力，因此維運與標註人力可不列入長期規劃"
    correct: "c"
    explanation:
      why_correct: "規劃階段若把 AI 視為一次性 CAPEX、未在多年期預算中預留再訓練／標註／監控 OpEx，模型退化時將無資源搶救；這是規劃師常見的預算錯誤，而非技術偵測問題。"
      why_not_a: "把 AI 視為一次部署永久使用的 CAPEX，正是題目要警示的規劃誤區，非正解。"
      why_not_b: "算力（尤其雲端 GPU 推論）本身就是主要持續成本之一，忽略它也是預算失誤的一種，但題目問的是『維運/再訓練未編列』的具體後果。"
      why_not_d: "AI 導入後仍需維運、標註、審核人力，規劃時把這些人力預算砍到零，會使模型上線後無人可以補標註／覆核，同屬預算失誤。"
    keywords:
      - "持續性成本"
      - "預算規劃"
      - "OpEx"
    exam_trap: false

  - id: "L21202-Q13"
    topic_code: "L21202"
    item_code: "L21202"
    difficulty: 2
    question: "「MVP（Minimum Viable Product）」在 AI 導入脈絡下最貼切的定義為何？"
    options:
      a: "以最小功能集合、向真實使用者交付端對端價值以驗證假設的產品版本"
      b: "只展示技術原型、不給真實使用者用的實驗"
      c: "每日最多可服務的使用者數"
      d: "模型最小可接受準確率"
    correct: "a"
    explanation:
      why_correct: "MVP 重點在真實使用者 × 端對端價值 × 最小範圍，用於驗證業務假設。"
      why_not_b: "這個描述接近 PoC（Proof of Concept），不是 MVP。"
      why_not_c: "使用者容量屬於負載規格，與 MVP 定義無關。"
      why_not_d: "準確率門檻屬模型評估指標，與 MVP 概念不同層級。"
    keywords:
      - "MVP"
      - "Minimum Viable Product"
    exam_trap: true

