- id: "L22203-Q34"
  topic_code: "L22203"
  item_code: "L22203"
  difficulty: 5
  question: "某分析需求要找出『每位客戶本次購買金額與下一次購買金額的差異』，並保留所有交易列以便後續再做篩選。哪種方案最符合需求？"
  options:
    a: "使用 GROUP BY customer_id 搭配 MAX(amount)"
    b: "使用 LEAD(amount) OVER (PARTITION BY customer_id ORDER BY purchase_time)"
    c: "使用 DISTINCT customer_id, amount"
    d: "使用 Hadoop replication factor = 3"
  correct: "b"
  explanation:
    why_correct: "LEAD() 能取同一客戶排序後的下一筆金額，又因為是視窗函數，所以可保留每筆交易列。"
    why_not_a: "MAX(amount) 只會得到每組最大值，不會提供下一筆交易金額。"
    why_not_b: "此選項正確。"
    why_not_c: "DISTINCT 只是去重，不會產生前後列比較資訊。"
    why_not_d: "replication factor 是 HDFS 容錯設定，與此分析需求無關。"
  keywords:
    - "LEAD"
    - "視窗函數"
    - "customer analytics"
  exam_trap: false

- id: "L22203-Q35"
  topic_code: "L22203"
  item_code: "L22203"
  difficulty: 5
  question: "閱讀需求與程式片段：`events.filter(col(\"type\") == \"click\").groupBy(window(col(\"ts\"), \"1 minute\"), col(\"user_id\")).count()`。若目標是建立 1 分鐘滾動觀測的點擊監測，並沿用 Spark DataFrame/SQL 語意，哪個評估最合理？"
  options:
    a: "不適合，因為 groupBy 後就不能做串流"
    b: "不適合，因為 DataFrame API 只能做批次不能做 micro-batch"
    c: "適合，這是 Structured Streaming 常見的視窗聚合模式，可用於近即時統計"
    d: "不適合，因為 count() 不會在 Spark 觸發執行"
  correct: "c"
  explanation:
    why_correct: "這是典型 Structured Streaming 的時間窗聚合寫法：先過濾 click，再依時間窗與 user_id 聚合計數，符合近即時監測需求；此處的 window() 指的是串流時間窗，與 SQL 的 ROW_NUMBER() 等視窗函數不是同一語境，且需搭配 writeStream 啟動計算。"
    why_not_a: "串流同樣可以做 groupBy 與時間窗聚合。"
    why_not_b: "Structured Streaming 就是以 DataFrame / SQL 語意建構，且常以 micro-batch 執行。"
    why_not_c: "此選項正確。"
    why_not_d: "在查詢執行層面，聚合與輸出動作仍會驅動實際計算，不是因為用了 count 就不會執行。"
  keywords:
    - "Structured Streaming"
    - "時間窗聚合"
    - "PySpark"
  exam_trap: false
