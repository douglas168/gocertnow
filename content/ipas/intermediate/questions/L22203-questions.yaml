- id: "L22203-Q01"
  topic_code: "L22203"
  item_code: "L22203"
  difficulty: 1
  question: "在 Hadoop Distributed File System（HDFS）中，常見的預設 block size 與 replication factor 分別為何？"
  options:
    a: "128 MB 與 3"
    b: "64 MB 與 2"
    c: "256 MB 與 1"
    d: "512 MB 與 5"
  correct: "a"
  explanation:
    why_correct: "HDFS 在 Hadoop 3.x 常見教學與官方文件脈絡下，預設 block size 為 128 MB，replication factor 常見預設為 3。這是中級考試最常見的數字題。"
    why_not_a: "此選項正確。"
    why_not_b: "64 MB 是較舊 Hadoop 時代常見記憶數字，容易被沿用；replication factor 2 也不符合常見預設值。"
    why_not_c: "256 MB 可能出現在調校後環境，但不是本題常見預設；replication factor 1 會降低容錯性。"
    why_not_d: "512 MB 與 5 都屬於較激進或特定情境設定，不是中級考試應記住的基準值。"
  keywords:
    - "HDFS"
    - "block size"
    - "replication factor"
  exam_trap: true

- id: "L22203-Q02"
  topic_code: "L22203"
  item_code: "L22203"
  difficulty: 1
  question: "在 Hadoop MapReduce 中，標準處理流程（MapReduce pipeline）的正確順序為何？"
  options:
    a: "Shuffle → Map → Reduce"
    b: "Map → Shuffle → Reduce"
    c: "Reduce → Map → Shuffle"
    d: "Map → Reduce → Shuffle"
  correct: "b"
  explanation:
    why_correct: "MapReduce 的核心流程是先由 Map 產生中介鍵值，再經過 Shuffle and Sort 將相同 key 聚集並排序，最後由 Reduce 彙總輸出。"
    why_not_a: "Shuffle 必須在 Map 之後才有中介資料可重新分派，因此不能排在最前面。"
    why_not_b: "此選項正確。"
    why_not_c: "Reduce 依賴 Shuffle 後的 key 分組結果，不可能先執行。"
    why_not_d: "很多考生把 Reduce 誤認為緊接在 Map 後面，但實際上中間一定有 Shuffle/Sort 階段。"
  keywords:
    - "MapReduce"
    - "Shuffle"
    - "Reduce"
  exam_trap: true

- id: "L22203-Q03"
  topic_code: "L22203"
  item_code: "L22203"
  difficulty: 1
  question: "在 Apache Spark 中，哪一個抽象層（abstraction）具有 schema，且可由 Catalyst optimizer 進行額外最佳化？"
  options:
    a: "RDD"
    b: "DStream"
    c: "DataFrame"
    d: "Broadcast variable"
  correct: "c"
  explanation:
    why_correct: "DataFrame 是具名欄位與 schema 的分散式資料集，Spark SQL engine 可利用結構資訊與 Catalyst optimizer 進行查詢最佳化。"
    why_not_a: "RDD 是較底層的分散式資料抽象，但沒有像 DataFrame 那樣的結構化 schema 最佳化優勢。"
    why_not_b: "DStream 屬於較舊的 Spark Streaming API，不是本題問的 Spark SQL 結構化抽象。"
    why_not_c: "此選項正確。"
    why_not_d: "Broadcast variable 是共享唯讀變數機制，不是資料表抽象。"
  keywords:
    - "Spark"
    - "DataFrame"
    - "Catalyst optimizer"
  exam_trap: false

- id: "L22203-Q04"
  topic_code: "L22203"
  item_code: "L22203"
  difficulty: 1
  question: "在 Spark 的延遲求值（Lazy Evaluation）中，哪一類操作通常會真正觸發執行（execution）？"
  options:
    a: "transformation，例如 filter()"
    b: "transformation，例如 select()"
    c: "transformation，例如 withColumn()"
    d: "action，例如 count()"
  correct: "d"
  explanation:
    why_correct: "Spark 會先記錄轉換（transformation）形成執行計畫，直到遇到 action，如 count()、collect()、show()，才真正觸發計算。"
    why_not_a: "filter() 只是 transformation，常見誤解是看到條件運算就以為已經執行。"
    why_not_b: "select() 只是在邏輯計畫中挑選欄位，不會單獨觸發工作。"
    why_not_c: "withColumn() 也是 transformation，只有在後續 action 出現時才會被執行。"
    why_not_d: "此選項正確。"
  keywords:
    - "Spark"
    - "延遲求值"
    - "action"
  exam_trap: true

- id: "L22203-Q05"
  topic_code: "L22203"
  item_code: "L22203"
  difficulty: 1
  question: "關於 ETL（Extract, Transform, Load）與 ELT（Extract, Load, Transform），哪一項敘述正確描述兩者的流程方向？"
  options:
    a: "ETL 先轉換後載入；ELT 先載入後轉換"
    b: "ETL 與 ELT 都是先載入後轉換，只是工具不同"
    c: "ETL 與 ELT 都是先轉換後載入，只是儲存位置不同"
    d: "ELT 一定不做轉換，只做載入"
  correct: "a"
  explanation:
    why_correct: "ETL 的關鍵在於先做轉換（Transform）再載入；ELT 則是先 load 到 warehouse 或 lakehouse，再在目標端做轉換。"
    why_not_a: "此選項正確。"
    why_not_b: "這把 ETL 與 ELT 混成同一流程，是最常見的基本概念錯誤。"
    why_not_c: "若都先轉換後載入，就不再是 ELT。"
    why_not_d: "ELT 仍然會轉換，只是轉換發生在載入之後。"
  keywords:
    - "ETL"
    - "ELT"
    - "dbt"
  exam_trap: true

- id: "L22203-Q06"
  topic_code: "L22203"
  item_code: "L22203"
  difficulty: 1
  question: "相較於 SQL 的 GROUP BY，視窗函數（Window Function）最典型的特性是什麼？"
  options:
    a: "一定比 GROUP BY 快"
    b: "會保留原始資料列，再附加計算結果"
    c: "只能用在排序，不能做聚合"
    d: "會把每個 partition 壓縮成一列"
  correct: "b"
  explanation:
    why_correct: "視窗函數會在不折疊原始資料列的前提下，對資料列附加排名、前後列值或聚合結果。"
    why_not_a: "效能取決於資料與執行計畫，不能直接說視窗函數一定較快。"
    why_not_b: "此選項正確。"
    why_not_c: "聚合視窗函數如 SUM() OVER(...) 就能做聚合，只是不折疊列。"
    why_not_d: "把資料壓縮成較少列是 GROUP BY 的典型效果，不是視窗函數。"
  keywords:
    - "SQL"
    - "視窗函數"
    - "GROUP BY"
  exam_trap: true

- id: "L22203-Q07"
  topic_code: "L22203"
  item_code: "L22203"
  difficulty: 1
  question: "若排名資料有同分（tie），哪一個 SQL 視窗函數（Window Function）會在並列後保留名次空缺？"
  options:
    a: "ROW_NUMBER()"
    b: "DENSE_RANK()"
    c: "LAG()"
    d: "RANK()"
  correct: "d"
  explanation:
    why_correct: "RANK() 在並列時會給相同名次，後續名次會跳號，例如 1, 2, 2, 4。"
    why_not_a: "ROW_NUMBER() 遇到同分時仍會強制給每列不同序號，而不是像 RANK() / DENSE_RANK() 那樣保留相同排名。"
    why_not_b: "DENSE_RANK() 同樣處理並列，但不會跳號，因此常和 RANK() 混淆。"
    why_not_c: "LAG() 用來取前一列值，不是排名函數。"
    why_not_d: "此選項正確。"
  keywords:
    - "RANK"
    - "DENSE_RANK"
    - "ROW_NUMBER"
  exam_trap: true

- id: "L22203-Q08"
  topic_code: "L22203"
  item_code: "L22203"
  difficulty: 2
  question: "關於 Hadoop Distributed File System（HDFS）的敘述，哪一項正確？"
  options:
    a: "NameNode 主要負責儲存每個 block 的實際資料內容"
    b: "DataNode 主要負責維護檔案系統 metadata 與 namespace"
    c: "HDFS 的 block 預設一定小於一般檔案系統 block，目的是減少網路傳輸"
    d: "Client 寫入檔案時，block 可依 replication factor 複製到多個 DataNode"
  correct: "d"
  explanation:
    why_correct: "Client 寫入 HDFS 檔案時，資料會依 replication factor 寫入多個 DataNode；這是 HDFS 容錯設計的核心概念。"
    why_not_a: "這是常見誤解：NameNode 管理 metadata，不負責存放 block 內容。"
    why_not_b: "DataNode 儲存資料 block，不維護 HDFS namespace；那是 NameNode 的工作。"
    why_not_c: "HDFS block 通常比一般檔案系統 block 大很多，目的是降低 metadata 負擔與提升大檔處理效率。"
    why_not_d: "此選項正確。Client 寫入時會依 replication factor 透過 DataNode pipeline 完成複本寫入。"
  keywords:
    - "HDFS"
    - "NameNode"
    - "DataNode"
  exam_trap: true

- id: "L22203-Q09"
  topic_code: "L22203"
  item_code: "L22203"
  difficulty: 2
  question: "關於 MapReduce 中的 Shuffle 階段（Shuffle phase），哪一項理解最正確？"
  options:
    a: "Shuffle 會把 Mapper 輸出的相同 key 重新分組並送往對應 Reducer"
    b: "Shuffle 只在 Reduce 完成後才發生，用來整理最終輸出"
    c: "Shuffle 是 YARN 的資源分配流程，不屬於 MapReduce 本身"
    d: "Shuffle 的功能等同 HDFS replication"
  correct: "a"
  explanation:
    why_correct: "Shuffle 的核心是中介資料的重新分派、分組與排序，讓相同 key 的資料進入同一個 Reducer。"
    why_not_a: "此選項正確。"
    why_not_b: "很多人把 Shuffle 誤認為最後整理結果的步驟，但它發生在 Map 與 Reduce 之間。"
    why_not_c: "YARN 管資源，Shuffle 是 MapReduce 資料流的一部分，兩者角色不同。"
    why_not_d: "HDFS replication 是儲存層容錯機制，Shuffle 是計算層資料重分配。"
  keywords:
    - "MapReduce"
    - "Shuffle"
    - "Reducer"
  exam_trap: true

- id: "L22203-Q10"
  topic_code: "L22203"
  item_code: "L22203"
  difficulty: 2
  question: "關於 Spark RDD 與 DataFrame 的比較，哪一項敘述正確？"
  options:
    a: "RDD 一定比 DataFrame 更容易被 Catalyst optimizer 最佳化"
    b: "DataFrame 因具有 schema，可讓 Spark SQL engine 做額外最佳化"
    c: "DataFrame 不支援欄位操作，只能逐筆處理"
    d: "RDD 是專為 SQL 視窗函數設計的高階 API"
  correct: "b"
  explanation:
    why_correct: "DataFrame 暴露結構資訊給 Spark SQL engine，因此可套用 Catalyst optimizer 與相關執行最佳化。"
    why_not_a: "Catalyst 主要服務於 Spark SQL/DataFrame/Dataset 這類結構化查詢，不是 RDD 的強項。"
    why_not_b: "此選項正確。"
    why_not_c: "DataFrame 的強項正是欄位式 API，如 select、filter、groupBy。"
    why_not_d: "RDD 是較底層抽象，不是專為 SQL 視窗語意設計。"
  keywords:
