- id: "L22203-Q17"
  topic_code: "L22203"
  item_code: "L22203"
  difficulty: 3
  question: "某工程師建立了 Spark DataFrame：`df2 = df.filter(...).select(...)`，之後程式結束前完全沒有呼叫 `show()`、`count()`、`write()`。最合理的判斷是什麼？"
  options:
    a: "Spark 仍會立刻完成所有轉換，因為 DataFrame 是 eager execution"
    b: "Spark 多半只建立邏輯計畫，未必真正執行計算"
    c: "Spark 只會執行 filter，不會執行 select"
    d: "Spark 會自動轉成 Structured Streaming 作業"
  correct: "b"
  explanation:
    why_correct: "在延遲求值（Lazy Evaluation）下，若沒有 action，Spark 通常只建立轉換記錄鏈（Spark 稱為 lineage）與 logical plan，不會真正啟動 job 執行。"
    why_not_a: "這是把 Spark 當成 pandas 類 eager 模式，是常見誤區。"
    why_not_b: "此選項正確。"
    why_not_c: "Spark 不會只執行一半 transformation；整體計畫會等 action 時一起評估。"
    why_not_d: "是否為串流取決於讀取與 API 使用，不會因為沒 action 就自動變成 Structured Streaming。"
  keywords:
    - "Spark"
    - "延遲求值"
    - "logical plan"
  exam_trap: true

- id: "L22203-Q18"
  topic_code: "L22203"
  item_code: "L22203"
  difficulty: 3
