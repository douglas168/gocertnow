- id: "L22203-Q11"
  topic_code: "L22203"
  item_code: "L22203"
  difficulty: 2
  question: "關於 Spark 的 transformation 與 action，哪一項敘述正確？"
  options:
    a: "show() 屬於 transformation，因為只顯示結果"
    b: "groupBy() 屬於 action，因為會分群"
    c: "filter() 與 select() 都屬於 transformation，通常不會單獨觸發計算"
    d: "count() 屬於 transformation，因為它會產生新數值"
  correct: "c"
  explanation:
    why_correct: "filter()、select()、groupBy() 這些會建立邏輯計畫，屬於轉換（transformation）；真正執行通常由後續 action 觸發。"
    why_not_a: "show() 會要求 Spark 取出結果顯示，因此是 action，而非 transformation。"
    why_not_b: "groupBy() 只是定義分群邏輯，仍需後續 agg() 與 action 觸發。"
    why_not_c: "此選項正確。"
    why_not_d: "count() 會回傳列數並觸發執行，是典型 action。"
  keywords:
    - "transformation"
    - "action"
    - "延遲求值"
  exam_trap: true

- id: "L22203-Q12"
  topic_code: "L22203"
  item_code: "L22203"
  difficulty: 2
  question: "關於 ETL / ELT 與 dbt（data build tool）的關係，哪一項敘述最恰當？"
  options:
    a: "dbt 主要代表先在來源系統完成轉換，因此屬於典型 ETL"
    b: "dbt 完全不涉及轉換，只負責資料匯入"
    c: "dbt 只能搭配 Hadoop HDFS，不能用於雲端資料倉儲"
    d: "dbt 常被用於 ELT 流程中的 transform layer，在資料載入倉儲後再建模"
  correct: "d"
  explanation:
    why_correct: "dbt 常見定位是在資料已載入倉儲後，再以 SQL 模型完成轉換與建模，因此非常符合 ELT 的 transform layer。"
    why_not_a: "dbt 常見定位是 warehouse 內轉換，不是傳統先轉後載的 ETL。"
    why_not_b: "dbt 的核心就是 SQL-based transformation 與模型建構。"
    why_not_c: "這是錯誤限制。dbt 主要就是服務現代雲端資料倉儲與 lakehouse 生態。"
    why_not_d: "此選項正確。dbt 很典型地落在現代 ELT 的轉換層。"
