    - "ELT"
    - "dbt"
  exam_trap: false

- id: "L22203-Q13"
  topic_code: "L22203"
  item_code: "L22203"
  difficulty: 2
  question: "閱讀下列 SQL：`SELECT dept, emp, salary, AVG(salary) OVER (PARTITION BY dept) AS dept_avg FROM t;` 關於結果的敘述何者正確？"
  options:
    a: "結果會每個部門只剩一列，因為 AVG 會自動做 GROUP BY"
    b: "必須加上 GROUP BY dept, emp, salary 才能執行"
    c: "每一列員工資料會被保留，並附加所屬部門平均薪資"
    d: "這其實等同 LAG(salary)"
  correct: "c"
  explanation:
    why_correct: "AVG(...) OVER (PARTITION BY dept) 是聚合視窗函數，會保留原始列，並對每列附加該部門的平均值。"
    why_not_a: "這把視窗函數誤認為 GROUP BY；視窗函數不會折疊成每組一列。"
    why_not_b: "使用視窗函數不必像一般聚合查詢那樣強制加 GROUP BY。"
    why_not_c: "此選項正確。"
    why_not_d: "LAG 是取前一列值，與部門平均薪資完全不同。"
  keywords:
    - "視窗函數"
    - "PARTITION BY"
    - "AVG OVER"
  exam_trap: true

- id: "L22203-Q14"
  topic_code: "L22203"
  item_code: "L22203"
  difficulty: 2
  question: "若某部門依績效分數排序後結果為 95、92、92、88，對這四列套用 `DENSE_RANK()`，其名次最可能為何？"
