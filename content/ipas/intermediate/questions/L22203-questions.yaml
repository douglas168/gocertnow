  question: "閱讀下列 PySpark DataFrame 鏈式操作（chained operations）：`df.filter(col(\"score\") >= 60).groupBy(\"dept\").agg(avg(\"score\").alias(\"avg_score\"))`。若輸入資料有 100 列、3 個部門，且只有 80 列分數達 60，結果最可能有幾列？"
