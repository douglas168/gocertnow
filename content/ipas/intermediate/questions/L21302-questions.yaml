- id: "L21302-Q11"
  topic_code: "L21302"
  item_code: "L21302-效能監控"
  difficulty: 2
  question: "下列哪一個指標最適合用來監測資料漂移（Data Drift）而非系統資源使用率？"
  options:
    a: "CPU 使用率"
    b: "記憶體使用率"
    c: "容器重啟次數"
