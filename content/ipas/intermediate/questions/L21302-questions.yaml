  correct: "c"
  explanation:
    why_correct: "Autoscaling 的核心是依負載或觀測指標調整容量，目標通常是維持 latency、availability 等 SLO。"
    why_not_a: "實務上可依 requests、concurrency、CPU 等多種訊號，不限於 CPU。"
    why_not_b: "許多雲平台的 online endpoint 都支援 autoscaling，這是常考重點。"
    why_not_d: "Autoscaling 解決容量，不等於解決單點故障、區域故障等容錯議題。"
  keywords:
