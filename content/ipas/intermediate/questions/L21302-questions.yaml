- id: "L21302-Q17"
  topic_code: "L21302"
  item_code: "L21302-部署技術"
  difficulty: 3
  question: "某台灣電商要在結帳頁即時計算詐欺風險分數，要求 300 毫秒內回應，且尖峰時段流量波動大。此時最合適的部署方式為何？"
  options:
    a: "使用即時推論（Real-time Inference）API endpoint，並搭配 autoscaling"
    b: "每天凌晨執行一次 batch inference，將結果預先寫入資料庫"
    c: "只輸出離線報表給風控人員人工判讀"
    d: "先做 shadow deployment，不需要正式線上服務"
  correct: "a"
  explanation:
    why_correct: "題幹同時要求低延遲與應對流量波動，最直接的方案是 real-time endpoint 加 autoscaling。"
    why_not_b: "批次結果無法反映結帳當下交易特徵，會錯過即時攔截需求。"
    why_not_c: "人工離線判讀不符合 300 毫秒內回應的服務條件。"
