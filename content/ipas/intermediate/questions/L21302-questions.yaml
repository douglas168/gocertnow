- id: "L21302-Q12"
  topic_code: "L21302"
  item_code: "L21302-更新管理"
  difficulty: 2
  question: "關於金絲雀部署（Canary Deployment）與 A/B 測試（A/B Testing）的差異，下列何者最正確？"
  options:
    a: "Canary 著重逐步降低發版風險，A/B 著重比較不同方案的效果差異"
    b: "Canary 一定不需流量控制，A/B 一定需要"
    c: "A/B testing 只能用在前端頁面，不能用在模型版本"
    d: "兩者都表示新版本只接收旁路影子流量，不影響正式結果"
  correct: "a"
  explanation:
    why_correct: "Canary 的主要目的是安全發布，A/B 的主要目的是評估效果，雖然兩者都可能使用 traffic split，但目標不同。"
    why_not_b: "兩者都常依賴流量切分機制，差異不在是否控制流量，而在發布目的。"
    why_not_c: "模型版本同樣可做 A/B testing，例如比較轉換率、CTR 或人工覆核通過率。"
    why_not_d: "只收旁路副本而不影響正式結果是 shadow deployment，不是 canary 或典型 A/B。"
  keywords:
    - "canary-deployment"
    - "ab-testing"
    - "traffic-split"
  exam_trap: true

- id: "L21302-Q13"
