    why_not_c: "離線回測無法觀察真實線上延遲與實際客戶互動結果。"
    why_not_d: "改成 batch inference 不能滿足金融授信線上決策場景。"
  keywords:
    - "canary-deployment"
    - "rollback"
    - "risk-control"
  exam_trap: false

- id: "L21302-Q34"
  topic_code: "L21302"
  item_code: "L21302-效能監控"
  difficulty: 5
  question: "某推薦系統的 p95 latency、CPU 與 error rate 都維持在 SLO 內，但轉換率連續兩週下降，且 PSI 顯示部分關鍵特徵分布偏移。下列哪一個處置最合理？"
  options:
    a: "判定系統健康，因此不需處理"
    b: "啟動模型監控調查與再訓練（Retrain）評估，而不只看基礎設施指標"
    c: "直接關閉所有監控告警，以免誤報"
    d: "先把 autoscaling 上限提高即可"
  correct: "b"
  explanation:
    why_correct: "系統層指標正常，但業務成效與 drift 指標異常，表示需要從模型與資料層面調查，必要時進行 retrain。"
    why_not_a: "這忽略了 model monitoring 與 business KPI，正是實務上常見盲點。"
    why_not_c: "關閉告警會掩蓋問題，而不是解決問題。"
    why_not_d: "擴容只能改善容量問題，無法處理資料分布改變造成的效果下降。"
  keywords:
    - "PSI"
    - "retrain"
    - "business-KPI"
  exam_trap: true

- id: "L21302-Q35"
  topic_code: "L21302"
  item_code: "L21302-雲端環境"
  difficulty: 5
  question: "某企業要建立跨雲 MLOps 治理，需求包括：統一追蹤模型版本、保留部署前後狀態資訊、支援回滾；同時教材仍會考傳統 stage 名詞。哪種做法最能同時兼顧考試與現行實務？"
  options:
    a: "完全依賴雲端 VM 檔名命名規則，不使用 registry"
    b: "只選單一雲平台自有命名，不保留版本 metadata"
    c: "以 MLflow Model Registry 管理版本，理解 None、Staging、Production、Archived 概念，並補充 aliases/tags 的現行做法"
    d: "把所有模型輸出成 PDF 報告留存即可"
  correct: "c"
  explanation:
    why_correct: "MLflow 有跨平台特性，且題幹明示需兼顧傳統 stage 與現行 aliases/tags，這是最完整的治理方案。"
    why_not_a: "只靠檔名無法提供正式的版控、狀態與回滾治理。"
    why_not_b: "沒有 metadata 與版本資訊，很難支撐稽核與部署追溯。"
