- id: "L21302-Q36"
  topic_code: "L21302"
  item_code: "L21302-穩定性可用性"
  difficulty: 5
  question: "某客服語音模型必須滿足 24x7 服務、尖峰時自動擴容、單一節點故障不影響對外 API，且需用可量測目標管理。哪一組設計最完整？"
  options:
    a: "只提升模型準確率，不處理服務層"
    b: "只設定 SLA 文件，不設 SLO、冗餘或 autoscaling"
    c: "將推論改為每晚 batch job，避免即時故障"
    d: "設定 SLO，部署冗餘實例與 fault tolerance，並以 autoscaling 維持 latency/availability"
  correct: "d"
  explanation:
    why_correct: "題幹同時涉及可量測目標、容量伸縮與容錯，必須把 SLO、冗餘、fault tolerance 與 autoscaling 一起設計。"
    why_not_a: "高準確率無法取代高可用服務架構。"
    why_not_b: "只有 SLA 文件沒有內部操作目標與技術措施，落地性不足。"
    why_not_c: "batch job 無法滿足 24x7 即時客服服務。"
  keywords:
    - "SLO"
    - "fault-tolerance"
    - "autoscaling"
  exam_trap: false

- id: "L21302-Q37"
  topic_code: "L21302"
  item_code: "L21302-部署技術"
  difficulty: 5
  question: "某團隊要同時達成三個目標：1. 線上交易需低延遲推論；2. 每晚還要重算全站會員分群；3. 部署環境需可移植到 Docker/Kubernetes。哪個方案最合理？"
  options:
    a: "全部改成單一 batch job，避免架構複雜"
    b: "全部改成單一 real-time API，連夜間重算也走同步請求"
    c: "以容器化（Containerisation）封裝模型，線上場景用 real-time serving，夜間重算用 batch inference"
    d: "只保留模型訓練腳本，不做正式部署"
  correct: "c"
  explanation:
    why_correct: "題幹同時有即時與大批量需求，最佳作法是同一模型工件以容器化交付，分別服務 real-time 與 batch 場景。"
    why_not_a: "全批次化會犧牲交易場景所需的即時性。"
    why_not_b: "把夜間大量重算全部塞進同步 API 會造成成本與服務壓力不合理。"
    why_not_d: "沒有正式部署就無法滿足線上與夜間作業需求。"
  keywords:
    - "containerisation"
    - "batch-inference"
    - "real-time-serving"
  exam_trap: false

- id: "L21302-Q38"
  topic_code: "L21302"
  item_code: "L21302-測試驗證"
  difficulty: 5
  question: "某公司準備把新模型從 Staging 推到正式環境。需求是：先確認程式模組正確、再驗證與資料庫/認證服務整合、最後在不影響客戶的情況下比對真實流量結果。哪個測試流程最合理？"
  options:
    a: "只做 load test 即可"
    b: "Unit test → Integration test → Shadow testing"
    c: "A/B testing → Unit test → Batch replay"
    d: "先全量上線，再依監控結果決定是否補測"
  correct: "b"
  explanation:
    why_correct: "先單元測試確保模組邏輯，再做整合測試確認串接，最後以 shadow testing 驗證真實流量而不影響使用者，流程完整且風險最低。"
    why_not_a: "Load test 很重要，但不足以取代功能正確性與真實流量旁路驗證。"
    why_not_c: "A/B 會直接影響部分使用者，不適合作為題幹要求的最後驗證步驟。"
    why_not_d: "先全量上線再補測，與穩健發布原則相反。"
  keywords:
    - "unit-test"
    - "integration-test"
    - "shadow-testing"
  exam_trap: false

- id: "L21302-Q39"
  topic_code: "L21302"
  item_code: "L21302-架構設計"
  difficulty: 5
  question: "某企業要設計完整 MLOps 閉環，要求能追蹤版本、觀察線上 drift、在效果下降時自動觸發再訓練（Retrain），並能安全重新部署。哪個設計最符合這些要求？"
  options:
    a: "只保留訓練筆記，人工記錄版本"
    b: "Train → Registry → Serving → Monitor → Retrain，並結合版本控管與部署策略"
    c: "Train → Serving，等出問題再手動處理"
    d: "Monitor → Train → Registry，部署流程可省略"
  correct: "b"
  explanation:
    why_correct: "題幹要求完整閉環，必須包含訓練、版本管理、部署、監控與 retrain，且各段需要相互串接。"
    why_not_a: "人工筆記無法支撐正式版控、監控觸發與安全部署。"
    why_not_c: "少了 registry、monitor 與 retrain 治理，無法形成閉環。"
    why_not_d: "先 monitor 再訓練不符合生命週期，也缺少 serving 的正式落地。"
  keywords:
    - "MLOps-pipeline"
    - "retrain"
    - "deployment-strategy"
  exam_trap: false

