    why_correct: "MLflow 傳統 registry stages 共有四個：None（新版本預設初始狀態）、Staging、Production、Archived；Training 不在其中，故為正確答案。"
    why_not_a: "Staging 是典型預備上線階段，屬於傳統 stage 名詞之一。"
    why_not_b: "Production 是正式服務階段，和版本核准、部署流程高度相關。"
    why_not_c: "Archived 用來表示已退役或不再使用的版本，仍是傳統 stage 名詞之一。"
  keywords:
    - "MLflow"
    - "model-registry"
    - "stages"
  exam_trap: false

- id: "L21302-Q07"
  topic_code: "L21302"
  item_code: "L21302-測試驗證"
  difficulty: 1
  question: "下列哪一種測試最主要用來驗證模型服務在高併發請求下的延遲（Latency）與吞吐量（Throughput）表現？"
  options:
    a: "單元測試（Unit Test）"
    b: "整合測試（Integration Test）"
    c: "負載測試（Load Test）"
    d: "影子測試（Shadow Testing）"
  correct: "c"
  explanation:
    why_correct: "Load test 會模擬高流量與併發情境，直接觀察 latency、throughput、error rate 等服務指標。"
    why_not_a: "單元測試聚焦單一函式或模組邏輯，無法代表系統容量。"
    why_not_b: "整合測試檢查模組協作是否正常，但不一定覆蓋壓力與容量邊界。"
    why_not_d: "影子測試重點是真流量旁路比對新舊輸出，不是用來量測高併發下的容量邊界。"
  keywords:
    - "load-test"
    - "latency"
    - "throughput"
  exam_trap: false

- id: "L21302-Q08"
