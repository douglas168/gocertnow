  correct: "d"
  explanation:
    why_correct: "PSI 常用於比較線上資料與基準資料分布差異，是 data drift 偵測的重要量化指標。"
    why_not_a: "CPU 反映系統負載，不直接代表輸入資料分布是否偏移。"
    why_not_b: "記憶體高可能代表流量變大或實作問題，但不等於特徵分布改變。"
    why_not_c: "容器重啟次數是平台穩定性訊號，不是模型資料健康指標。"
  keywords:
    - "PSI"
    - "data-drift"
    - "monitoring"
