  item_code: "L21302-穩定性可用性"
  difficulty: 2
  question: "關於自動擴縮（Autoscaling）的敘述，下列何者正確？"
  options:
    a: "Autoscaling 的唯一依據只能是 CPU 使用率"
    b: "Autoscaling 只能用在 batch inference，不能用在線上端點"
