  item_code: "L21302-部署技術"
  difficulty: 2
  question: "關於即時推論（Real-time Inference）與批次推論（Batch Inference）的敘述，下列何者正確？"
  options:
    a: "Batch inference 一定比 real-time inference 更適合需要低延遲回應的 API"
    b: "Real-time inference 通常以 API endpoint 提供低延遲回應，batch inference 則偏向非同步大量處理"
