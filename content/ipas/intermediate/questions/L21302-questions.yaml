    why_not_a: "低延遲 API 恰好是 real-time inference 的主場，而不是 batch。"
    why_not_c: "差異來自工作負載與服務模式，不是平台品牌名稱。"
    why_not_d: "Latency 是 real-time inference 最重要的 KPI 之一，忽略它會直接違反服務目標。"
