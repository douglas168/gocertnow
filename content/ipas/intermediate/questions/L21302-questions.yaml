  item_code: "L21302-部署技術"
  difficulty: 1
  question: "在模型部署中，容器化（Containerisation）最直接的主要好處是什麼？"
  options:
    a: "自動保證模型準確率提升"
    b: "把訓練資料自動轉為標註資料"
