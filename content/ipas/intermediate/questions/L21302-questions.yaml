    why_not_a: "容器化處理的是交付與執行環境，不會直接改善模型效果。"
    why_not_b: "資料標註屬資料工程或人工流程，與 containerisation 無直接對應。"
    why_not_c: "容器化常搭配 API serving，但不代表不需要對外介面設計。"
  keywords:
