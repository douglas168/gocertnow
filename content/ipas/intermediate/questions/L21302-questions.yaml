- id: "L21302-Q01"
  topic_code: "L21302"
  item_code: "L21302-架構設計"
  difficulty: 1
  question: "在標準 MLOps 流程中，哪一個順序最符合模型生命週期：訓練（Train）→ 模型登錄（Registry）→ 服務提供（Serving）→ 監控（Monitor）→ 再訓練（Retrain）？"
  options:
    a: "Train → Registry → Serving → Monitor → Retrain"
    b: "Registry → Train → Serving → Retrain → Monitor"
    c: "Train → Serving → Registry → Monitor → Retrain"
    d: "Train → Monitor → Registry → Serving → Retrain"
  correct: "a"
  explanation:
    why_correct: "這是最典型的 MLOps pipeline。模型先訓練，再進入 registry 進行版本管理與核准，之後進入服務提供（Serving）階段，透過監控觀察效能與漂移，最後再觸發 retrain。"
    why_not_b: "很多考生把 registry 當成資料儲存區，但 registry 管的是已產出的模型版本，不會在訓練前先出現。"
    why_not_c: "先進入 Serving 再 registry 會失去正式版控與可追溯性，這正是考題常用來測試流程觀念的陷阱。"
    why_not_d: "monitor 必須建立在模型已上線服務後，否則無法蒐集實際推論表現與線上資料分布。"
  keywords:
    - "MLOps"
    - "model-registry"
    - "lifecycle"
  exam_trap: true

- id: "L21302-Q02"
  topic_code: "L21302"
  item_code: "L21302-部署技術"
  difficulty: 1
  question: "下列哪一種情境最適合採用批次推論（Batch Inference）而非即時推論（Real-time Inference）？"
  options:
    a: "客服聊天機器人需在 1 秒內回應客戶"
    b: "每天凌晨對 300 萬筆交易資料進行詐欺風險評分"
    c: "電商首頁需即時計算個人化推薦"
    d: "工廠設備異常需在事件發生後立即告警"
  correct: "b"
  explanation:
    why_correct: "大量資料、可排程、非同步且不要求即時回應，是 batch inference 的典型情境。"
    why_not_a: "聊天機器人屬低延遲互動場景，考點在於 real-time endpoint 而非批次作業。"
    why_not_c: "個人化推薦若直接影響使用者當下畫面，通常需要線上 API serving，而不是等批次結果。"
    why_not_d: "異常告警強調即時性，若用 batch 會錯過應變時機，這是常見的選型誤判。"
  keywords:
    - "batch-inference"
    - "real-time-inference"
    - "deployment"
  exam_trap: true

- id: "L21302-Q03"
  topic_code: "L21302"
  item_code: "L21302-效能監控"
  difficulty: 1
  question: "若線上輸入資料的分布與訓練資料明顯不同，但目標標籤（Label）定義本身沒有改變，這最接近哪一種漂移：資料漂移（Data Drift）或概念漂移（Concept Drift）？"
  options:
    a: "資料漂移（Data Drift）"
    b: "標註比例偏移"
    c: "概念漂移（Concept Drift）"
    d: "模型洩漏（Model Leakage）"
  correct: "a"
  explanation:
    why_correct: "Data drift 指輸入特徵的統計分布改變，未必代表輸入與標籤的關係已經改變。"
    why_not_b: "標註比例偏移著重標籤占比改變；題幹強調的是輸入資料分布，而非標籤比例。"
    why_not_c: "很多人一看到模型表現下降就選 concept drift，但題幹明說標籤定義與關係沒有改變，重點在輸入分布變化。"
    why_not_d: "Model leakage 發生在訓練資料洩漏未來資訊，不是線上資料分布改變。"
  keywords:
    - "data-drift"
    - "concept-drift"
    - "monitoring"
  exam_trap: true

- id: "L21302-Q04"
  topic_code: "L21302"
  item_code: "L21302-更新管理"
  difficulty: 1
  question: "下列哪一種部署策略最符合影子部署（Shadow Deployment）？"
  options:
    a: "新版本直接取代舊版本，若失敗再手動回滾"
    b: "將 10% 正式流量導向新版本並逐步增加"
    c: "依使用者群組把流量平均分給兩個版本比較轉換率"
    d: "正式回應仍由舊版本提供，同步複製流量給新版本做旁路比對"
  correct: "d"
  explanation:
    why_correct: "Shadow deployment 的核心是新版本接收真實流量副本，但不影響正式輸出，可安全比較預測結果與系統行為。"
    why_not_a: "這比較接近直接切換加 rollback，不是 shadow。"
    why_not_b: "10% 小流量逐步放量是 canary deployment，常與 shadow 混淆。"
    why_not_c: "依群組比較成效是 A/B testing，目的是實驗效果，不是旁路安全驗證。"
  keywords:
    - "shadow-deployment"
    - "canary"
    - "ab-testing"
  exam_trap: true

- id: "L21302-Q05"
  topic_code: "L21302"
  item_code: "L21302-穩定性可用性"
  difficulty: 1
  question: "服務等級協議（SLA）與服務等級目標（SLO）的關係，下列何者最正確？"
  options:
    a: "SLA 是內部營運目標，SLO 是對客戶的罰則承諾"
    b: "SLA 與 SLO 完全相同，只是不同公司用詞"
    c: "SLA 通常是對外承諾，SLO 是內部可量測的服務目標"
    d: "SLO 只能描述模型準確率，不能描述延遲（Latency）"
  correct: "c"
  explanation:
    why_correct: "SLO 是團隊管理服務品質的內部目標，SLA 則常是對客戶或合約的外部承諾。"
    why_not_a: "這是最常見的顛倒型錯誤，考題很常拿來測基本 SRE 名詞。"
    why_not_b: "兩者密切相關，但層級不同；SLA 通常建立在 SLO 之上。"
    why_not_d: "SLO 很常用於 latency、availability、error rate 等系統指標，不只準確率。"
  keywords:
    - "SLA"
    - "SLO"
    - "SRE"
  exam_trap: true

- id: "L21302-Q06"
  topic_code: "L21302"
  item_code: "L21302-雲端環境"
  difficulty: 1
  question: "在 MLflow 模型登錄（Model Registry）的傳統名詞中，哪一個不是常見的 stage？"
  options:
