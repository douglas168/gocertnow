- id: "L22303-Q01"
  topic_code: "L22303"
  item_code: "L22303-資訊呈現原則"
  difficulty: 1
  question: "依據 Edward Tufte 的觀點，data-ink ratio 指的是什麼？"
  options:
    a: "圖表中用來呈現資料的墨水比例，比例越高通常越能避免不必要裝飾"
    b: "圖表中顏色種類占全部視覺元素的比例"
    c: "資料筆數占座標軸標籤數量的比例"
    d: "互動式圖表中提示框 hover 資訊占畫面比例"
  correct: "a"
  explanation:
    why_correct: "data-ink ratio 強調圖中真正用來表達資料的視覺元素比例，核心精神是減少不必要裝飾，讓資訊更清楚。"
    why_not_a: "正確答案。"
    why_not_c: "資料筆數與標籤數量沒有形成 Tufte 定義中的核心比例，這是學生把『資訊量』誤當成 data-ink ratio。"
    why_not_d: "hover 是互動設計概念，不是 Tufte 在靜態資訊設計中提出的 data-ink ratio 定義。"
  keywords:
    - "data-ink ratio"
    - "Tufte"
    - "chart junk"
  exam_trap: true

- id: "L22303-Q02"
  topic_code: "L22303"
  item_code: "L22303-資訊呈現原則"
  difficulty: 1
  question: "下列何者屬於 pre-attentive attribute（前注意屬性），能讓讀者在極短時間內先注意到差異？"
  options:
    a: "長段註解文字（annotation text）"
    b: "顏色 hue 與位置 position"
    c: "圖表標題字數"
    d: "資料來源附註的格式"
  correct: "b"
  explanation:
    why_correct: "顏色與位置都是典型的 pre-attentive attributes，人眼可以快速察覺差異，適合突出重點。"
    why_not_a: "註解文字需要閱讀，不屬於前注意處理；學生常把『能提供資訊』誤認成『能瞬間感知』。"
    why_not_c: "標題字數不屬於視覺編碼通道，無法快速表現資料差異。"
    why_not_d: "資料來源附註偏文件完整性，不是資料點的視覺屬性。"
  keywords:
    - "pre-attentive attributes"
    - "color"
    - "position"
  exam_trap: false

- id: "L22303-Q03"
  topic_code: "L22303"
  item_code: "L22303-圖表類型選擇"
  difficulty: 1
  question: "bar chart（長條圖）與 histogram（直方圖）最核心的差異為何？"
  options:
    a: "長條圖只能顯示百分比，直方圖只能顯示次數"
    b: "長條圖一定水平排列，直方圖一定垂直排列"
    c: "長條圖通常比較類別資料，直方圖通常呈現連續數值分布"
    d: "長條圖只能用於 Excel，直方圖只能用於 Python"
  correct: "c"
  explanation:
    why_correct: "長條圖用於比較類別間的數值，直方圖則把連續數值分箱（bin）後看分布，是考試最常見的陷阱。"
    why_not_a: "兩者都可呈現次數、比例或其他聚合值，差異不在於只能顯示哪一種數值。"
    why_not_d: "這是把工具與圖表概念混為一談，任何主流視覺化工具都可畫這兩種圖。"
  keywords:
    - "bar chart"
    - "histogram"
    - "distribution"
  exam_trap: true

- id: "L22303-Q04"
  topic_code: "L22303"
  item_code: "L22303-圖表類型選擇"
  difficulty: 1
  question: "若想觀察兩個連續變數之間的關係（relationship），最適合優先使用哪一種圖表？"
  options:
    a: "Pie chart（圓餅圖）"
    b: "Heatmap（熱圖）"
    c: "Line chart（折線圖）"
    d: "Scatter plot（散布圖）"
  correct: "d"
  explanation:
    why_correct: "散布圖最適合檢查兩個連續變數之間是否有正相關、負相關、群聚或離群值。"
    why_not_a: "圓餅圖用於部分占整體，不適合分析兩個連續變數的關係。"
    why_not_b: "熱圖適合矩陣式類別 × 類別或數值聚合，不是直接觀察兩個連續變數相關性的首選。"
    why_not_c: "折線圖強調順序或時間變化，若沒有明確序列軸，容易造成錯誤解讀。"
  keywords:
    - "scatter plot"
    - "relationship"
    - "continuous variable"
  exam_trap: false

