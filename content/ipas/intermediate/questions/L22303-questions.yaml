- id: "L22303-Q35"
  topic_code: "L22303"
  item_code: "L22303-工具比較"
  difficulty: 5
  question: |-
    閱讀下列程式碼後，判斷圖表類型與最可能的分析目的：

    ```python
    import plotly.express as px
    df = px.data.iris()
    fig = px.scatter(df, x="sepal_width", y="sepal_length", color="species")
    fig.show()
    ```

    何者最合理？
  options:
    a: "Histogram；觀察單一變數分布"
    b: "Line chart；觀察時間趨勢"
    c: "Scatter plot；觀察兩個連續變數關係，並用顏色區分類別"
    d: "Heatmap；觀察矩陣強度"
  correct: "c"
  explanation:
    why_correct: "`px.scatter()` 明確是散布圖，x 與 y 為兩個連續變數，`color=\"species\"` 則進一步標示類別群組。"
    why_not_a: "直方圖只看單變數分布，與題目兩軸設定不符。"
    why_not_b: "題目沒有時間軸，無法判讀為趨勢圖。"
    why_not_d: "heatmap 通常需要矩陣或格點強度資料，不符合此程式碼。"
  keywords:
    - "code interpretation"
    - "plotly"
    - "scatter plot"
  exam_trap: false
