    why_not_a: "正確答案。"
    why_not_c: "Seaborn 偏高階統計視覺化，雖可搭配互動環境使用，但核心定位不是原生互動式網頁圖表。"
    why_not_d: "Matplotlib 偏靜態、可細緻控制的基礎繪圖庫，不是互動式能力最強的首選。"
