    d: "在頁尾增加資料來源說明"
  correct: "b"
  explanation:
    why_correct: "高對比顏色能利用 pre-attentive processing 快速把異常值從其他點中分離出來。"
    why_not_a: "所有點同色會降低辨識差異，這是忽略『相對差異』的重要陷阱。"
    why_not_c: "標題格式不屬於資料點的視覺編碼。"
    why_not_d: "頁尾說明對資料點辨識幾乎沒有即時幫助。"
  keywords:
    - "pre-attentive attributes"
    - "outlier"
    - "color contrast"
  exam_trap: false

- id: "L22303-Q10"
  topic_code: "L22303"
  item_code: "L22303-圖表類型選擇"
  difficulty: 2
  question: "某教師要呈現全班考試分數的分布（distribution），並觀察是否偏態（skewness）。相較於 bar chart，為何 histogram 更合適？"
  options:
    a: "因為 histogram 專門比較不同班級這類類別資料"
    b: "因為 histogram 將連續分數分箱（binning），可看出集中、離散與偏態"
    c: "因為 histogram 一定比任何其他圖更節省空間"
    d: "因為 histogram 只能顯示平均數，不受極端值影響"
  correct: "b"
  explanation:
    why_correct: "分數是連續數值，histogram 透過 bins 呈現分布形狀，能看集中區、尾部與偏態。"
    why_not_a: "班級這種離散類別比較才較像 bar chart 情境。"
    why_not_c: "空間效率不是主要判準，重點是資料型態與分析目的。"
    why_not_d: "histogram 不是平均數圖，而且仍可能反映極端值影響。"
  keywords:
    - "histogram"
    - "distribution"
    - "binning"
  exam_trap: true

