- id: "L22303-Q08"
  topic_code: "L22303"
  item_code: "L22303-資訊呈現原則"
  difficulty: 2
  question: "某張圖加入大量陰影、立體效果與裝飾圖示，但資料本身沒有增加。依資訊呈現原則（information presentation principles），這最可能帶來什麼問題？"
  options:
    a: "提升資料密度（data density），使趨勢更容易判讀"
    b: "增加 chart junk，讓讀者把注意力放在裝飾而非資料"
    c: "讓類別比較自動變成時間序列分析"
    d: "保證圖表對色弱使用者更友善"
  correct: "b"
  explanation:
    why_correct: "過多裝飾會形成 chart junk，降低 data-ink ratio，讓視覺焦點偏離真正的資料訊息。"
    why_not_a: "裝飾增加的是視覺噪音，不是有效資料密度；學生常把『看起來豐富』誤認成『資訊更多』。"
    why_not_c: "圖表裝飾不會改變資料型態與分析方法。"
    why_not_d: "立體效果與陰影通常反而降低可讀性，並不會自動改善無障礙。"
  keywords:
    - "chart junk"
    - "data density"
    - "data-ink ratio"
  exam_trap: true

- id: "L22303-Q09"
  topic_code: "L22303"
  item_code: "L22303-資訊呈現原則"
  difficulty: 2
  question: "在強調單一異常值（outlier）時，哪一種 pre-attentive attribute 的使用最能讓讀者先注意到該資料點？"
  options:
    a: "把所有資料點改成相同灰色"
    b: "把異常值改成高對比顏色，其他點維持低彩度"
