    d: "Histogram（直方圖）"
  correct: "c"
  explanation:
    why_correct: "`sns.boxplot()` 明確表示要畫箱線圖，可用來比較不同類別的分布摘要。"
    why_not_a: "熱圖通常用於矩陣資料或二維強度分布，不會用 `boxplot()`。"
    why_not_b: "提琴圖通常使用 `sns.violinplot()`。"
    why_not_d: "直方圖通常使用 `sns.histplot()` 或 `plt.hist()`。"
