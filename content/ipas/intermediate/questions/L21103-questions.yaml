- id: "L21103-Q27"
  topic_code: "L21103"
  item_code: "L21103"
  difficulty: 4
  question: "工程師觀察 diffusion 訓練時發現 loss 長時間不下降。已知 forward process 為固定噪聲排程、reverse process 為 U-Net 可學習去噪。該問題最可能出在哪一個過程？為什麼？"
  options:
    a: "出在 forward process；因為 forward 是學到的降噪過程，參數配置錯誤會使 loss 卡住"
    b: "出在 reverse process；因為 forward 是固定無參數的加噪 schedule（固定 Gaussian），不會影響訓練 loss；唯一可學習的 U-Net 去噪網路出問題（學習率、架構容量、條件注入）才會讓 loss 不下降"
    c: "兩者皆有可能，因為兩者皆含可學習參數"
    d: "出在 Discriminator 判別失敗；diffusion 需要 D 來判斷去噪品質"
  correct: "b"
  explanation:
    why_correct: "DDPM 明確定義：forward q(x_t|x_{t-1}) 為固定 β_t 噪聲排程無參數，**不存在可訓練變數**，因此 loss 不下降絕不可能來自 forward；唯一可學習的是 reverse p_θ（U-Net），所以問題必然在此——檢查學習率、U-Net 容量、條件注入（cross-attention）、損失縮放等。此為 symptom-to-cause 的經典推理。"
    why_not_a: "方向完全相反，forward 無參數無法「學壞」；這是研究筆記標註的 #1 Diffusion 陷阱。"
    why_not_c: "forward 不含可學習參數，此選項混淆了 DDPM 定義。"
    why_not_d: "Diffusion 架構不含 Discriminator，那是 GAN 的組件。"
  keywords:
    - "Forward"
    - "Reverse"
    - "Diffusion"
  exam_trap: true

