# L21103 生成式AI技術與應用 — 練習題庫 (40 題)
# 難度分佈: D1×8, D2×8, D3×8, D4×8, D5×8
# 答案分佈: a=10, b=10, c=9, d=11 (Fix F 將 Q06 由 c 改為 d，允許 ±1 偏移)
