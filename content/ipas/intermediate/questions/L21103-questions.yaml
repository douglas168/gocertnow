# 覆蓋區: GAN / Diffusion / Transformer / BERT-GPT-T5 / Pretrain-SFT-RLHF / Metrics / 架構情境 / Confused-Pairs

- id: "L21103-Q01"
  topic_code: "L21103"
  item_code: "L21103"
  difficulty: 1
  question: "在生成對抗網路（GAN, Generative Adversarial Network）中，「生成器（Generator）」的主要任務為何？"
  options:
    a: "判斷輸入樣本是真實資料還是生成資料"
    b: "接收隨機噪聲（noise z）並產生仿真樣本"
    c: "計算真實資料分布的機率密度函數"
    d: "對生成樣本進行標籤分類"
  correct: "b"
  explanation:
    why_correct: "Goodfellow 2014 原論文中，Generator G 定義為 G: z → x_fake，輸入隨機噪聲 z，輸出偽造樣本，目標是讓 D 無法分辨真偽。"
    why_not_a: "判斷真假是判別器（Discriminator）的任務，此選項混淆了 G 與 D 的角色——這是 GAN 最常見的陷阱。"
    why_not_c: "GAN 不顯式估計機率密度，這是 GAN 與 VAE 的關鍵差異。"
    why_not_d: "GAN 不做監督式分類；分類是 D 的副產品而非 G 的任務。"
  keywords:
    - "GAN"
    - "Generator"
    - "生成器"
  exam_trap: true

- id: "L21103-Q02"
  topic_code: "L21103"
  item_code: "L21103"
  difficulty: 1
  question: "Diffusion Model 的「正向過程（Forward Process）」具有下列哪項特性？"
  options:
    a: "由神經網路學習參數"
    b: "需要文字條件（text condition）引導"
    c: "以固定噪聲排程（fixed noise schedule）逐步加噪，不含可學習參數"
    d: "由判別器評估噪聲品質"
  correct: "c"
  explanation:
    why_correct: "DDPM（Ho 2020）定義 forward process q(x_t|x_{t-1}) 為固定高斯噪聲排程，沒有任何可學習參數，純屬數學定義。"
    why_not_a: "被學習的是 reverse process（去噪），不是 forward。這是 Diffusion 考題最常見的陷阱。"
    why_not_b: "文字條件只在 classifier-free guidance 或 Stable Diffusion 的 reverse 階段出現，forward 與條件無關。"
    why_not_d: "Diffusion 不使用判別器，這是 GAN 的概念被誤植。"
  keywords:
    - "Diffusion"
    - "Forward Process"
    - "固定噪聲"
  exam_trap: true

- id: "L21103-Q03"
  topic_code: "L21103"
  item_code: "L21103"
  difficulty: 1
  question: "Transformer 自注意力機制（Self-Attention）的核心計算公式為下列何者？"
  options:
    a: "Attention(Q,K,V) = softmax(QK^T / √d_k) · V"
    b: "Attention(Q,K,V) = tanh(Q + K) · V"
    c: "Attention(Q,K,V) = sigmoid(QV^T) · K"
    d: "Attention(Q,K,V) = softmax(QK^T) · V（漏掉 √d_k 縮放）"
  correct: "a"
  explanation:
    why_correct: "Vaswani 2017《Attention Is All You Need》定義 Scaled Dot-Product Attention 即此公式；除以 √d_k 為了防止維度放大時 softmax 飽和。"
    why_not_b: "tanh 與相加運算是 RNN / LSTM 的閘門設計，非 Transformer attention。"
    why_not_c: "sigmoid 輸出非機率分布（總和不為 1），無法做 attention 加權。"
    why_not_d: "這正是 Vaswani 2017 前人已知會造成 softmax 梯度飽和的錯誤版本——d_k 大時點積變異數隨維度增長，未經 √d_k 縮放會使 softmax 趨於 one-hot，梯度趨近 0 導致訓練停滯。看似只差一個縮放因子，實為強力干擾選項。"
  keywords:
    - "Self-Attention"
    - "自注意力"
    - "Transformer"
  exam_trap: false

- id: "L21103-Q04"
  topic_code: "L21103"
  item_code: "L21103"
  difficulty: 1
  question: "BERT 與 GPT 的訓練方向性（directionality）主要差異為何？"
  options:
    a: "BERT 是單向訓練，GPT 是雙向訓練"
    b: "BERT 是雙向訓練（bidirectional），GPT 是單向訓練（unidirectional）"
    c: "BERT 與 GPT 皆為雙向訓練"
    d: "BERT 與 GPT 皆為單向訓練"
  correct: "b"
  explanation:
    why_correct: "BERT 為 encoder-only 雙向 Masked LM；GPT 為 decoder-only 單向（因果遮罩）next-token prediction。此為 114/05 CCChen 現場回報考題，逐字出題。"
    why_not_a: "方向性相反，為最常見的反向混淆。"
    why_not_c: "GPT 採因果遮罩只能看左側，不可能雙向。"
    why_not_d: "BERT 的 MLM 預訓練目標需同時看左右 context，否則失去其設計意義。"
  keywords:
    - "BERT"
    - "GPT"
    - "雙向"
    - "單向"
  exam_trap: true

- id: "L21103-Q05"
  topic_code: "L21103"
  item_code: "L21103"
  difficulty: 1
  question: "現代大型語言模型（LLM）訓練流程中，下列哪項是最常見的三階段順序？"
  options:
    a: "SFT → Pretrain → RLHF"
    b: "Pretrain → RLHF → SFT"
    c: "RLHF → Pretrain → SFT"
    d: "Pretrain → SFT → RLHF"
  correct: "d"
  explanation:
    why_correct: "標準 pipeline：先 Pretrain（自監督學語言知識）→ SFT（監督式微調教格式與指令跟隨）→ RLHF（人類偏好對齊）。Llama、GPT、Claude 皆採此序。"
    why_not_a: "SFT 需先有預訓練好的基礎模型才有微調意義。"
    why_not_b: "RLHF 需要已完成 SFT 的模型作為起點，不可跳過 SFT。"
    why_not_c: "未經預訓練無法進行任何對齊，RLHF 絕不會最先。"
  keywords:
    - "Pretrain"
    - "SFT"
    - "RLHF"
  exam_trap: false

- id: "L21103-Q06"
  topic_code: "L21103"
  item_code: "L21103"
  difficulty: 1
  question: "某團隊生成了 10,000 張貓的圖，想用 FID 評估品質。下列關於 FID 使用的陳述，**哪一個是錯的**？"
  options:
    a: "FID 越低代表生成分布與真實資料分布越接近"
    b: "FID 不能評估「單張圖的品質」，只能評估「整個資料集的分布距離」"
    c: "FID 通常搭配 Inception 特徵做統計距離計算"
    d: "任意一張生成的貓圖只要夠清晰，FID 就會低"
  correct: "d"
  explanation:
    why_correct: "FID 是「集合對集合」的分布距離（Fréchet distance on Inception features），必須有大量樣本才能估算生成分布與真實分布的高斯統計量。單張圖清晰度與 FID 無直接關係——若 10,000 張圖全長得像同一隻貓（mode collapse），每張都清晰但 FID 仍會很高。此為研究筆記標註的 FID 主陷阱。"
    why_not_a: "正確陳述：FID 越低代表兩個高斯分布的距離越小，越接近真實資料分布。"
    why_not_b: "正確陳述：FID 本質是集合層級指標，需要一組生成樣本與一組真實樣本才能計算，不能對單張圖打分。"
    why_not_c: "正確陳述：標準 FID 使用 Inception-v3 pool3 層特徵計算兩個多變量高斯分布的 Fréchet 距離。"
  keywords:
    - "FID"
    - "生成評估"
    - "集合分布"
  exam_trap: true

- id: "L21103-Q07"
  topic_code: "L21103"
  item_code: "L21103"
  difficulty: 1
  question: "下列哪個變體屬於 GAN 家族？"
  options:
    a: "StyleGAN"
    b: "DDPM"
    c: "BERT"
    d: "T5"
  correct: "a"
  explanation:
    why_correct: "StyleGAN（NVIDIA 2018）為 style-based 生成器的 GAN 變體，專攻高解析度人臉合成。"
    why_not_b: "DDPM 是 Denoising Diffusion Probabilistic Models，屬 Diffusion 家族。"
    why_not_c: "BERT 是 encoder-only Transformer，用於 NLP 理解。"
    why_not_d: "T5 為 encoder-decoder Transformer，屬 seq2seq 模型。"
  keywords:
    - "StyleGAN"
    - "GAN 變體"
  exam_trap: false

- id: "L21103-Q08"
  topic_code: "L21103"
  item_code: "L21103"
  difficulty: 1
  question: "Transformer 為何需要加入位置編碼（Positional Encoding）？"
  options:
    a: "為了減少模型參數量"
    b: "因為自注意力計算本身對位置不敏感（permutation-invariant），需額外注入序列順序資訊"
    c: "為了防止梯度消失"
    d: "為了加速推論速度"
  correct: "b"
  explanation:
    why_correct: "Self-attention 是 permutation-invariant（排列不變）：交換輸入位置不影響計算結果，因此必須額外注入位置資訊，否則模型無法分辨 '我愛你' 與 '你愛我'。"
    why_not_a: "位置編碼反而增加而非減少參數或維度。"
    why_not_c: "梯度消失由 residual connection + LayerNorm 處理，與位置編碼無關。"
    why_not_d: "位置編碼不改變推論速度。"
  keywords:
    - "Positional Encoding"
    - "位置編碼"
    - "permutation-invariant"
  exam_trap: false

- id: "L21103-Q09"
  topic_code: "L21103"
  item_code: "L21103"
  difficulty: 2
  question: "關於 GAN 的訓練目標（min-max 賽局），下列敘述何者正確？"
  options:
    a: "Generator 與 Discriminator 都最小化同一個損失函數"
    b: "兩者皆最大化交叉熵損失"
    c: "Generator 最大化自身輸出機率，Discriminator 最小化自身損失"
    d: "Discriminator 最大化正確分類機率，Generator 最小化 Discriminator 正確分類機率（即盡量騙過 D）"
  correct: "d"
  explanation:
    why_correct: "Goodfellow min-max: min_G max_D V(D,G)。D 最大化正確分類，G 最小化 D 的正確率，形成對抗賽局，Nash 均衡於 p_g = p_data。"
    why_not_a: "若目標相同即非對抗；對抗性是 GAN 的核心定義。"
    why_not_b: "兩者若同向最大化就不是對抗，這是 min-max 最常被誤解的陷阱。"
    why_not_c: "將 max/min 對象寫反；G 的目標是「最小化被識破」。"
  keywords:
    - "min-max"
    - "對抗訓練"
    - "GAN"
  exam_trap: true

- id: "L21103-Q10"
  topic_code: "L21103"
  item_code: "L21103"
  difficulty: 2
  question: "下列何者最準確描述「Mode Collapse（模式崩潰）」現象？"
  options:
    a: "判別器損失無法下降"
    b: "訓練資料被過度記憶（overfitting）"
    c: "模型權重變為 NaN"
    d: "生成器只產生極少種類的樣本，失去多樣性，即使能騙過判別器"
  correct: "d"
  explanation:
    why_correct: "Mode collapse 指 Generator 學到少數能騙過 D 的模式即收斂，放棄涵蓋真實資料分布其他模式，導致生成樣本多樣性消失。"
    why_not_a: "D 損失停滯是另一個症狀（不收斂），與 mode collapse 不同。"
    why_not_b: "過擬合是監督式學習的記憶訓練集，不等於生成多樣性喪失。"
    why_not_c: "NaN 是數值不穩定，屬訓練發散問題。"
  keywords:
    - "Mode Collapse"
    - "模式崩潰"
    - "GAN 失敗模式"
  exam_trap: true

- id: "L21103-Q11"
  topic_code: "L21103"
  item_code: "L21103"
  difficulty: 2
  question: "關於 Stable Diffusion（潛在擴散模型, Latent Diffusion）的說法，下列何者正確？"
  options:
    a: "直接在 512×512 像素空間進行擴散運算"
    b: "以 GAN 作為核心生成器"
    c: "使用 VAE 將影像壓縮為低維潛在向量（latent），在 latent space 執行 U-Net 去噪，最後再解碼回像素"
    d: "不需要任何文字編碼器即可進行文生圖"
  correct: "c"
  explanation:
    why_correct: "Rombach 2022 提出 Latent Diffusion：VAE encoder 壓縮 → U-Net 在 latent 做 diffusion → VAE decoder 還原，計算量約減 50×。"
    why_not_a: "原始 DDPM 才是 pixel-space，Stable Diffusion 的關鍵創新就是移到 latent。"
    why_not_b: "Stable Diffusion 核心是 U-Net denoiser + VAE，與 GAN 無關。"
    why_not_d: "文字條件透過 CLIP ViT-L/14 text encoder 經 cross-attention 注入 U-Net，缺文字編碼器無法文生圖。"
  keywords:
    - "Latent Diffusion"
    - "Stable Diffusion"
    - "VAE"
  exam_trap: true

- id: "L21103-Q12"
  topic_code: "L21103"
  item_code: "L21103"
  difficulty: 2
  question: "關於多頭注意力（Multi-Head Attention）的設計動機，下列敘述何者最正確？"
  options:
    a: "讓 h 個平行的注意力頭從不同子空間學習不同類型的關係（如語法、語義、指代），再拼接整合"
    b: "為了減少參數量與節省運算"
    c: "為了強制每個 head 學習完全相同的表徵"
    d: "取代 Feed-Forward Network 的功能"
  correct: "a"
  explanation:
    why_correct: "Multi-head 將 Q/K/V 投影到 h 個子空間平行計算，各 head 可關注不同關係（句法、語意、長距依賴等），最後 concat + linear 融合。"
    why_not_b: "Multi-head 參數量與單頭相當或略多，並非為了節省。"
    why_not_c: "若所有 head 學相同表徵就失去多頭意義，設計上透過不同初始化鼓勵差異化。"
    why_not_d: "FFN 與 attention 為 Transformer block 的兩個互補子層，功能不同無法取代。"
  keywords:
    - "Multi-Head Attention"
    - "多頭注意力"
  exam_trap: false

- id: "L21103-Q13"
  topic_code: "L21103"
  item_code: "L21103"
  difficulty: 2
  question: "對於「Encoder-Decoder」架構（如 T5、BART）的描述，下列何者正確？"
  options:
    a: "僅適合分類任務"
    b: "Encoder 雙向處理輸入，Decoder 以 cross-attention 讀取 encoder 輸出並自回歸生成；擅長 seq2seq 任務如翻譯、摘要"
    c: "與 Decoder-only 完全等價，只是命名不同"
    d: "無法處理文字輸入"
  correct: "b"
  explanation:
    why_correct: "T5/BART 的 encoder 雙向理解輸入，decoder 以 cross-attention 讀 encoder 表徵同時做 masked self-attention 自回歸解碼，適合翻譯、摘要、問答生成。"
    why_not_a: "分類是 encoder-only（BERT）擅長，encoder-decoder 主攻生成。"
    why_not_c: "Decoder-only 沒有獨立 encoder，無 cross-attention 到另一序列，兩者架構明顯不同。"
    why_not_d: "T5 本名 Text-to-Text Transfer Transformer，全是文字任務。"
  keywords:
    - "Encoder-Decoder"
    - "T5"
    - "BART"
  exam_trap: false

- id: "L21103-Q14"
  topic_code: "L21103"
  item_code: "L21103"
  difficulty: 2
  question: "關於 LLM 的「SFT（Supervised Fine-Tuning, 監督式微調）」階段，下列敘述何者正確？"
  options:
    a: "使用人類偏好配對資料訓練獎勵模型"
    b: "從零開始學習語言本身"
    c: "使用精選的「指令 + 回應」配對資料，讓模型學會遵循指令格式與任務要求"
    d: "僅使用未標註的大規模網路文本"
  correct: "c"
  explanation:
    why_correct: "SFT 用人工精選 (instruction, response) 配對資料對預訓練模型做監督式微調，教模型回應格式與指令跟隨（instruction-following）。"
    why_not_a: "獎勵模型（RM）是 RLHF 階段的組件，非 SFT。"
    why_not_b: "「從零學語言」是 Pretrain 的目標。"
    why_not_d: "未標註大規模文本是 Pretrain 的資料特徵，SFT 使用小量精標資料。"
  keywords:
    - "SFT"
    - "監督式微調"
  exam_trap: true

- id: "L21103-Q15"
  topic_code: "L21103"
  item_code: "L21103"
  difficulty: 2
  question: "關於 Perplexity（困惑度, PPL）的描述，下列何者正確？"
  options:
    a: "PPL = exp(平均交叉熵)；值越低代表模型對測試文本的預測越準確"
    b: "值越高代表語言模型越好"
    c: "PPL 是影像生成模型的評估指標"
    d: "PPL 僅適用分類任務"
  correct: "a"
  explanation:
    why_correct: "PPL 可直觀理解為「模型在每個位置等效從幾個 token 中選擇」；平均交叉熵越小，PPL 越低，預測越確定。"
    why_not_b: "方向相反；PPL 越高代表模型越不確定。"
    why_not_c: "影像生成用 FID、CLIP score，非 PPL。"
    why_not_d: "分類用 accuracy/F1，PPL 是語言模型專用指標。"
  keywords:
    - "Perplexity"
    - "困惑度"
    - "PPL"
  exam_trap: false

- id: "L21103-Q16"
  topic_code: "L21103"
  item_code: "L21103"
  difficulty: 2
  question: "關於 Self-Attention 中「除以 √d_k」的原因，下列何者最正確？"
  options:
    a: "為了將注意力權重限制在 0 到 1 之間"
    b: "為了強制 Q 與 K 正交"
    c: "為了加速矩陣乘法"
    d: "當 key/query 維度 d_k 變大時，點積值的變異數變大，softmax 容易飽和梯度消失；除以 √d_k 穩定梯度"
  correct: "d"
  explanation:
    why_correct: "Vaswani 2017 指出：d_k 大時 Q·K^T 變異數隨 d_k 增長，進 softmax 產生極端值使梯度趨近 0；除以 √d_k 讓變異數回到 O(1)，保持訓練穩定。"
    why_not_a: "限制到 [0,1] 是 softmax 的功能，不是 √d_k 縮放。"
    why_not_b: "Q 與 K 來自學習投影，本質不會強制正交。"
    why_not_c: "縮放不改變乘法複雜度。"
  keywords:
    - "Scaled Dot-Product"
    - "√d_k"
  exam_trap: false

- id: "L21103-Q17"
  topic_code: "L21103"
  item_code: "L21103"
  difficulty: 3
