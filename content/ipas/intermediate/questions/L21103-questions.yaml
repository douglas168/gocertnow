    why_correct: "先區分兩類指標：**模型品質指標**（PPL = 流暢度；人工評估 = 可用性/說服力/事實準確性；FID = 影像集合分布距離；CLIP score = 文字對齊）vs **產品營運指標**（A/B 測轉化率、點擊率）。本題要求同時覆蓋兩類：情境圖用 FID（品質/多樣性）+ CLIP score（文字對齊）；文案用 PPL（流暢度）+ 人工 A/B（實際轉化效果）。考試情境如為「判斷模型本身是否好」，首選人工評估與 PPL/FID 配合；A/B 測試是實務延伸，常用於上線後比較多版本的真實業務效果。"
    why_not_a: "BLEU 為語言指標、FID 為影像指標，兩者對錯反了。"
    why_not_b: "IS 已過時且不衡量文字；且無法評估文案。"
    why_not_c: "生成任務非分類，Accuracy 不適用。"
  keywords:
    - "FID"
    - "CLIP score"
    - "PPL"
    - "指標選擇"
  exam_trap: false

- id: "L21103-Q31"
  topic_code: "L21103"
  item_code: "L21103"
  difficulty: 4
  question: "關於「Transformer 為何能夠並行訓練，而傳統 RNN/LSTM 難以並行」的根本原因，下列何者最正確？"
  options:
    a: "Transformer 使用 ReLU，RNN 使用 sigmoid"
    b: "Self-attention 一次性看到整個序列，每個位置的計算互相獨立；RNN 必須逐時步序列計算，時間步間有依賴"
    c: "Transformer 沒有位置資訊，因此不需等序列"
    d: "RNN 計算量較大所以無法平行"
  correct: "b"
  explanation:
    why_correct: "RNN 的 h_t 依賴 h_{t-1}，迫使序列化計算；self-attention 以矩陣運算同時計算所有位置的 Q/K/V 與注意力分數，天然支援 GPU 平行，Vaswani 2017 明確指出此優勢。"
    why_not_a: "啟動函數差異不是平行性根因。"
    why_not_c: "位置編碼恰好是為了補回順序資訊，與平行能力無直接因果。"
    why_not_d: "計算量多寡不等於是否可平行；關鍵是依賴關係。"
  keywords:
    - "平行訓練"
    - "Self-Attention"
    - "RNN"
  exam_trap: false

- id: "L21103-Q32"
