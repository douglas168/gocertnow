- id: "L22401-Q18"
  topic_code: "L22401"
  item_code: "L22401-演算法追蹤"
  difficulty: 3
  question: "某訓練迴圈 pseudocode 為：`for epoch in 1..E: grad=0; for each sample in dataset: grad += g(sample); update(theta, grad)`。若每個 epoch 只在最後更新一次參數，此做法最接近哪一種？"
