- id: "L22401-Q35"
  topic_code: "L22401"
  item_code: "L22401-分散式訓練架構"
  difficulty: 5
  question: "某團隊主張：「只要是 Big Data，就一定需要 Distributed Training。」若依本單元觀點進行評估，哪一項回應最完整？"
  options:
    a: "正確，Big Data 與 Distributed Training 是必然對應關係"
    b: "正確，只要資料大就不能用 mini-batch 或 out-of-core"
    c: "不一定；是否需要分散式應視資料規模、到達速度、模型大小與單機資源限制綜合判斷"
    d: "不一定；但唯一判準只有資料欄位數是否超過 100"
  correct: "c"
  explanation:
    why_correct: "Big Data 不等於一定要 distributed。若單機仍可透過 mini-batch、out-of-core 或 incremental learning 有效處理，就未必需要上分散式。"
    why_not_a: "這是絕對化錯誤，也是本題指定的常見迷思。"
    why_not_b: "mini-batch 與 out-of-core 正是面對大資料時的重要策略。"
    why_not_d: "是否分散式不可能只看欄位數。"
  keywords:
