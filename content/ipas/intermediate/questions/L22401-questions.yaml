- id: "L22401-Q01"
  topic_code: "L22401"
  item_code: "L22401-5V特性"
  difficulty: 1
  question: "在大數據 5V（Volume/Velocity/Variety/Veracity/Value）中，最直接反映「資料量大到單機記憶體可能放不下」的是哪一項？"
  options:
    a: "Volume"
    b: "Velocity"
    c: "Veracity"
    d: "Value"
  correct: "a"
  explanation:
    why_correct: "Volume 指資料規模本身很大，常直接帶來儲存、記憶體與訓練時間壓力，因此會影響是否要採 mini-batch、out-of-core 或 distributed training。"
    why_not_b: "Velocity 是資料到達速度快，不一定代表總量大；考生常把『即時資料很多』與『整體資料量大』混為一談。"
    why_not_c: "Veracity 著重資料真實性、噪音與可信度，不是容量問題。"
    why_not_d: "Value 是資料能否產生商業價值，偏決策層面，不是技術上的容量限制。"
  keywords:
    - "5V"
    - "Volume"
    - "memory constraint"
  exam_trap: false

- id: "L22401-Q02"
  topic_code: "L22401"
  item_code: "L22401-批次與線上學習"
  difficulty: 1
  question: "下列何者最符合線上學習（Online Learning / Incremental Learning）的特徵？"
  options:
    a: "每次一定要用全部歷史資料重新訓練"
    b: "模型可隨新到達資料逐步更新"
    c: "只能在分散式叢集上執行"
    d: "一定比 mini-batch SGD 更準確"
  correct: "b"
  explanation:
    why_correct: "Online / Incremental Learning 的核心是資料到一批更新一批，甚至逐筆更新，適合資料持續流入或無法一次放入記憶體的情境。"
    why_not_a: "那是典型 batch retraining 思維，不是 incremental 更新。"
    why_not_c: "線上學習可以在單機或分散式環境進行；常見誤解是把『線上』誤解成『上線服務』或『分散式平台』。"
    why_not_d: "準確度取決於資料與調參，不能一概而論。"
  keywords:
    - "online learning"
    - "incremental learning"
    - "streaming data"
  exam_trap: true

- id: "L22401-Q03"
  topic_code: "L22401"
  item_code: "L22401-分散式ML框架"
  difficulty: 1
  question: "在分散式機器學習（Distributed Machine Learning）框架辨識題中，哪一個最常被用來描述 Spark 上的可擴展機器學習函式庫？"
  options:
    a: "TensorBoard"
    b: "NumPy"
    c: "Spark MLlib"
    d: "OpenCV"
  correct: "c"
  explanation:
    why_correct: "Spark MLlib 是 Apache Spark 生態中用於 scalable machine learning 的代表性函式庫，常見於大數據情境的 recognition-level 題目。"
    why_not_a: "TensorBoard 主要是視覺化與監控工具，不是 Spark 的分散式 ML 函式庫。"
    why_not_b: "NumPy 是單機數值運算基礎套件，不是 Spark 上的 distributed ML framework。"
    why_not_d: "OpenCV 側重電腦視覺，不是 Spark 分散式機器學習的標準答案。"
  keywords:
    - "Spark MLlib"
    - "distributed ML"
    - "Apache Spark"
  exam_trap: false

- id: "L22401-Q04"
  topic_code: "L22401"
  item_code: "L22401-資料並行與模型並行"
  difficulty: 1
  question: "若同一個模型副本（model replica）部署在多個 worker，各自處理不同資料分片後再同步梯度，這最典型屬於哪一種平行化方式？"
  options:
    a: "Model Parallelism"
    b: "Feature Selection"
    c: "Federated Learning"
    d: "Data Parallelism"
  correct: "d"
  explanation:
    why_correct: "Data Parallelism 是將資料切分給多個 worker，而每個 worker 持有完整模型副本，再進行梯度同步或參數更新。"
    why_not_a: "Model Parallelism 是把模型本身拆到不同裝置，不是把相同模型複製多份。"
    why_not_b: "Feature Selection 是特徵篩選方法，與運算平行化架構不同。"
    why_not_c: "Federated Learning 涉及資料不出端側的訓練協作，本題沒有這個條件。"
  keywords:
    - "data parallelism"
    - "gradient synchronization"
    - "worker"
  exam_trap: false

- id: "L22401-Q05"
  topic_code: "L22401"
  item_code: "L22401-維度災難"
  difficulty: 1
  question: "所謂維度災難（Curse of Dimensionality），核心是指哪一種現象？"
  options:
    a: "維度增加後，距離與鄰近性概念變得較不穩定，許多方法效果下降"
    b: "資料筆數增加後，所有模型都必然過擬合"
    c: "特徵越多，模型訓練一定越快"
    d: "高維資料只能用監督式學習"
  correct: "a"
  explanation:
    why_correct: "在高維空間中，樣本彼此距離差異可能趨於不明顯，造成距離型或密度型方法難以有效判別鄰近結構。"
    why_not_b: "過擬合與樣本數、模型複雜度、正則化等都有關，並非資料多就必然過擬合。"
    why_not_c: "特徵越多通常代表計算與記憶體成本更高，不會保證更快。"
    why_not_d: "高維資料也可用於非監督式方法，只是某些方法會受維度災難影響。"
  keywords:
    - "curse of dimensionality"
    - "high dimension"
    - "distance concentration"
  exam_trap: false

- id: "L22401-Q06"
  topic_code: "L22401"
  item_code: "L22401-資料稀疏性與不平衡"
  difficulty: 1
  question: "在大規模 one-hot encoding 情境下，最常見的資料表示問題是什麼？"
  options:
    a: "資料自動變成平衡資料（balanced data）"
    b: "產生高維且稀疏（sparse）的向量表示"
    c: "所有特徵都會變成連續值"
    d: "可完全消除維度災難"
  correct: "b"
  explanation:
    why_correct: "one-hot encoding 會把類別特徵展成大量 0 與少量 1 的向量，因此常形成高維 sparse vectors，增加記憶體與計算負擔。"
    why_not_a: "one-hot 是特徵表示法，與類別分布是否平衡沒有直接關係。"
    why_not_c: "one-hot 反而是離散類別轉成二元向量，不會自動變成連續特徵。"
    why_not_d: "高維 sparse 表示常使高維問題更明顯，不是消除它。"
  keywords:
    - "sparsity"
    - "one-hot encoding"
    - "sparse vector"
  exam_trap: false

- id: "L22401-Q07"
  topic_code: "L22401"
  item_code: "L22401-分散式訓練架構"
  difficulty: 1
  question: "在分散式訓練（Distributed Training）中，Parameter Server architecture 的主要角色是什麼？"
  options:
    a: "把資料自動轉成 Data Lake"
    b: "只負責視覺化模型結果"
    c: "集中管理或聚合模型參數更新"
    d: "把所有特徵都刪除到只剩 10 維"
  correct: "c"
  explanation:
    why_correct: "Parameter Server 的核心概念是由伺服器節點持有或聚合參數，worker 端計算梯度後再與參數伺服器同步。"
    why_not_a: "Data Lake 是資料儲存架構，不是參數同步機制。"
    why_not_b: "視覺化不是 Parameter Server 的主要任務。"
    why_not_d: "降維與參數伺服器是完全不同層次的概念。"
  keywords:
    - "parameter server"
    - "distributed training"
    - "parameter synchronization"
  exam_trap: false

- id: "L22401-Q08"
  topic_code: "L22401"
  item_code: "L22401-5V特性"
  difficulty: 2
  question: "關於大數據的 Velocity 與機器學習（Machine Learning）設計，下列敘述何者正確？"
  options:
    a: "Velocity 高代表資料一定不需要清理"
    b: "Velocity 高時，一定只能使用 full-batch training"
    c: "Velocity 只影響儲存空間，不影響模型更新策略"
    d: "Velocity 高時，常需要考慮 online / incremental learning 或 streaming pipeline"
  correct: "d"
  explanation:
    why_correct: "當資料持續快速流入時，模型與前處理流程往往需要能逐步更新，而非等所有資料累積完再統一重訓。"
    why_not_a: "資料來得快不代表資料品質好，反而可能更需要即時清理與監控。"
    why_not_b: "full-batch 通常不適合高速度流式資料。"
    why_not_c: "Velocity 直接影響資料攝取頻率、延遲需求與模型更新節奏。"
  keywords:
    - "Velocity"
    - "online learning"
    - "streaming pipeline"
  exam_trap: false

- id: "L22401-Q09"
  topic_code: "L22401"
  item_code: "L22401-批次與線上學習"
  difficulty: 2
  question: "比較批次訓練（Batch Training）與小批次隨機梯度下降（Mini-batch SGD），下列何者正確？"
  options:
    a: "Mini-batch 每次更新只使用部分樣本，不必一次讀入全部資料"
    b: "Batch Training 一定比 Mini-batch 更省記憶體"
    c: "Mini-batch 一定比 full-batch 更快且更準"
    d: "兩者都不能在 GPU 上執行"
  correct: "a"
  explanation:
    why_correct: "Mini-batch 的設計就是每次抽取部分資料估計梯度，因此在記憶體壓力與運算吞吐間取得折衷。"
    why_not_b: "full-batch 常需要一次處理完整資料，記憶體需求通常較高。"
    why_not_c: "這是常見誤解。Mini-batch 常較實務可行，但速度與準確度不保證在所有情況都優於 full-batch。"
    why_not_d: "兩者都可在 GPU 上執行。"
  keywords:
    - "batch training"
    - "mini-batch SGD"
    - "memory usage"
  exam_trap: true

- id: "L22401-Q10"
  topic_code: "L22401"
  item_code: "L22401-分散式訓練架構"
  difficulty: 2
  question: "關於集中式訓練（Centralized Training）與分散式訓練（Distributed Training）的比較，下列何者正確？"
  options:
    a: "資料量大時，集中式訓練一定無法使用"
    b: "分散式訓練就是聯邦學習（Federated Learning）"
    c: "集中式訓練完全不需要考慮 I/O 與記憶體瓶頸"
    d: "分散式訓練通常是為了突破單機在計算、記憶體或訓練時間上的限制"
  correct: "d"
  explanation:
    why_correct: "Distributed Training 的主要動機是擴展計算與儲存能力，處理單機難以負荷的資料規模或模型規模。"
    why_not_a: "資料量大不代表一定要分散式；若資料仍能在單機有效處理，集中式仍可能較簡單。"
    why_not_b: "聯邦學習是分散式的一種特殊情境，強調資料不出端側，不能直接畫上等號。"
    why_not_c: "單機同樣可能受 I/O、RAM 與訓練時間限制。"
  keywords:
    - "centralized training"
    - "distributed training"
    - "scalability"
  exam_trap: true

- id: "L22401-Q11"
  topic_code: "L22401"
  item_code: "L22401-資料並行與模型並行"
  difficulty: 2
  question: "若單一模型（single model）太大，無法完整放入單一 GPU 記憶體，較可能考慮哪一種平行化方式？"
  options:
    a: "Data Cleaning"
    b: "Bagging"
    c: "Model Parallelism"
    d: "Online Serving"
  correct: "c"
  explanation:
    why_correct: "當模型本身太大時，需把不同層或不同張量切到多個裝置上，這是 Model Parallelism 的典型使用時機。"
    why_not_a: "清理資料不能解決模型放不進裝置記憶體的問題。"
    why_not_b: "Bagging 是集成學習方法，不是裝置層級的模型切分策略。"
    why_not_d: "Online Serving 指上線推論服務，不是訓練時的平行化方法。"
  keywords:
    - "model parallelism"
    - "GPU memory"
    - "large model"
  exam_trap: false

- id: "L22401-Q12"
  topic_code: "L22401"
  item_code: "L22401-資料稀疏性與不平衡"
  difficulty: 2
  question: "在類別不平衡（Class Imbalance）很嚴重的資料集上，下列哪一項理解較正確？"
  options:
    a: "只要總資料筆數很大，就不必管 minority class"
    b: "Accuracy 通常最能反映 minority class 的實際辨識能力"
    c: "只要使用分散式訓練，類別不平衡就會自動消失"
    d: "Mini-batch 可能抽不到足夠 minority class，需注意取樣與評估指標"
  correct: "d"
  explanation:
    why_correct: "在高度不平衡資料中，某些 mini-batch 幾乎沒有少數類，會使模型偏向多數類，因此常需採重抽樣、class weighting 或改用 precision/recall 等指標。"
    why_not_a: "總量大不代表各類別都充足，少數類仍可能被淹沒。"
    why_not_b: "Accuracy 在不平衡資料上常有誤導性。"
    why_not_c: "分散式訓練解決的是可擴展性，不會自動修正資料分布。"
  keywords:
    - "class imbalance"
    - "minority class"
    - "evaluation metric"
  exam_trap: false

