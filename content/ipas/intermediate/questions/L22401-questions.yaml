    c: "Veracity 愈高代表資料更新頻率愈快"
    d: "Veracity 與模型效果無關，只與硬體有關"
  correct: "a"
  explanation:
    why_correct: "Veracity 著重資料是否可信、是否含噪音或標註偏差，這會直接影響訓練品質與泛化能力。"
    why_not_b: "這描述比較接近 Variety，而不是 Veracity。"
    why_not_c: "更新頻率快對應的是 Velocity。"
    why_not_d: "資料真實性對模型品質高度相關，不只是硬體問題。"
