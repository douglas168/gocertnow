    why_not_a: "這正是名詞混淆造成的錯誤。"
    why_not_c: "shuffle 常見於訓練資料隨機化。"
    why_not_d: "batch size 是訓練超參數，不代表推論 API。"
  keywords:
    - "online learning"
    - "mini-batch"
    - "terminology trap"
