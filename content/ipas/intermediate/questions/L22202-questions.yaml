    why_not_c: "warehouse 不能自動解決 online/offline feature 一致性。"
    why_not_d: "此選項正確，是多概念整合後最完整的答案。"
  keywords:
    - "feature store"
    - "dataset versioning"
    - "時間旅行"
    - "auditability"
  exam_trap: false

- id: "L22202-Q32"
  topic_code: "L22202"
  item_code: "L22202-跨綱比較"
  difficulty: 5
  question: "某公司說：『我們已經把所有 CSV 都放進 object storage，所以已經完成 data lakehouse。』若以中級考試角度判斷，哪個反駁最精確？"
  options:
    a: "不精確，因為 lakehouse 還需要 table format / metadata、治理與較可靠的更新一致性，不只是檔案堆放"
    b: "完全正確，lakehouse 的唯一條件就是 object storage"
    c: "不正確，因為 lakehouse 一定不能用 parquet 或 open format"
    d: "不正確，因為 lakehouse 只適合 OLTP，不適合分析"
  correct: "a"
  explanation:
    why_correct: "lakehouse 的核心不是存放位置，而是讓 lake 上資料更可管理、可查詢、可演進、可追溯。"
    why_not_a: "此選項正確，精準點出 lakehouse 與『純檔案堆放』的差異。"
    why_not_b: "這正是題目要辨識的常見誤解。"
    why_not_c: "lakehouse 常見做法恰好是建立在 parquet 等開放格式上。"
    why_not_d: "lakehouse 主要就是為分析、AI/ML 與治理整合而發展。"
  keywords:
    - "lakehouse"
    - "table format"
    - "metadata layer"
    - "object storage"
  exam_trap: true

- id: "L22202-Q33"
  topic_code: "L22202"
  item_code: "L22202-儲存機制"
  difficulty: 5
  question: "閱讀下列 SQL，若目的是找出『有訂單的客戶姓名與其訂單數』，哪個判斷最合理？\n```sql\nSELECT c.name, COUNT(o.order_id) AS cnt\nFROM customers c\nJOIN orders o ON c.customer_id = o.customer_id\nWHERE o.status = 'paid'\nGROUP BY c.name;\n```\n"
  options:
    a: "此查詢會列出所有客戶，即使沒有任何訂單"
    b: "此查詢會更新客戶姓名欄位"
    c: "此查詢會計算每位客戶已付款訂單數，沒有訂單的客戶不會出現"
    d: "因為用了 JOIN，所以不能再用 GROUP BY"
  correct: "c"
  explanation:
    why_correct: "內部 JOIN 只保留兩表都匹配的列，再依客戶名分組計算已付款訂單數。"
    why_not_a: "若要保留沒有訂單的客戶，通常要考慮 LEFT JOIN。這是 SQL 讀題常見陷阱。"
    why_not_b: "這是 `SELECT`，不會更新資料。"
    why_not_c: "此選項正確，完整描述 JOIN + WHERE + GROUP BY 的結果。"
    why_not_d: "JOIN 與 GROUP BY 可以同時使用，這是非常常見的查詢型態。"
  keywords:
    - "SQL"
    - "JOIN"
    - "GROUP BY"
    - "paid orders"
  exam_trap: true

- id: "L22202-Q34"
  topic_code: "L22202"
  item_code: "L22202-資料庫架構"
  difficulty: 5
  question: "一家跨國 IoT 平台每天寫入數十億筆裝置遙測資料，欄位稀疏、橫向擴充比複雜交易更重要。若在 RDBMS、document database、wide-column database、graph database 中選擇，哪個判斷最合理？"
  options:
    a: "graph database，因為裝置彼此可能有連線"
    b: "wide-column database，因為大規模稀疏欄位與擴展寫入是其典型優勢"
    c: "RDBMS，因為任何大資料量都應優先用 ACID"
    d: "document database，因為只要是 JSON 都一定最佳"
  correct: "b"
  explanation:
    why_correct: "wide-column database 常見於高吞吐、大規模、稀疏欄位的遙測與時序近似場景。"
    why_not_a: "即使裝置有關聯，題目強調的是超大規模寫入與稀疏欄位，不是路徑查詢。"
    why_not_b: "此選項正確，符合 wide-column 的強項。"
    why_not_c: "ACID 很重要，但不是所有超大規模寫入場景的首要需求。"
    why_not_d: "是否為 JSON 不是唯一選型準則，workload 與擴展模式更關鍵。"
  keywords:
    - "wide-column"
    - "Cassandra"
    - "sparse columns"
    - "horizontal scaling"
  exam_trap: false

- id: "L22202-Q35"
  topic_code: "L22202"
  item_code: "L22202-模型訓練"
  difficulty: 5
  question: "某團隊要建立詐欺偵測模型資料平台，需求包含：1. 離線訓練可重現；2. 線上特徵低延遲提供；3. 事後可查某模型版本用了哪批資料。若預算有限，只能優先投資一組基礎能力，下列何者最合理？"
  options:
    a: "feature store 加上資料集版本控管／時間旅行，先把特徵一致性與資料追溯打穩"
    b: "把所有資料改成 Excel，方便人工核對"
    c: "全部改存成 row-store，就能同時自然解決三項需求"
    d: "只建更多報表 dashboard，先讓主管看得到圖表"
  correct: "a"
  explanation:
    why_correct: "三項需求的共同底座就是 feature 一致性與資料可追溯；這比先做報表或改檔案格式更關鍵。"
    why_not_a: "此選項正確，雖然不是所有能力一次到位，但能最大幅降低後續 ML 資料管理風險。"
    why_not_b: "Excel 不具備可靠的線上服務與版本治理能力。"
    why_not_c: "row-store 不是解決 feature 管理與資料重現的核心機制。"
    why_not_d: "dashboard 有助溝通，但無法建立可重現、可追溯的 ML data foundation。"
  keywords:
    - "feature store"
    - "時間旅行"
    - "dataset versioning"
    - "fraud detection"
  exam_trap: false
