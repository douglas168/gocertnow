- id: "L22202-Q14"
  topic_code: "L22202"
  item_code: "L22202-資料庫架構"
  difficulty: 2
  question: "閱讀下列 MongoDB 查詢，哪個解讀正確？\n```javascript\ndb.orders.find(\n  { status: 'paid', amount: { $gt: 1000 } },\n  { _id: 0, customer: 1, amount: 1 }\n)\n```\n"
  options:
    a: "查出已付款且金額大於 1000 的文件，只投影 `customer` 與 `amount`"
    b: "查出已付款且金額大於 1000 的文件，但只回傳 `_id`"
