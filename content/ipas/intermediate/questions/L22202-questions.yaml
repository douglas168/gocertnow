    d: "回傳所有欄位，但不含 `customer`"
  correct: "a"
  explanation:
    why_correct: "第一個物件是查詢條件，第二個物件是 projection，`_id:0` 表示不回傳 `_id`。"
    why_not_a: "此選項正確，條件與 projection 都解讀正確。"
    why_not_b: "projection 明確設定 `_id:0`，所以不是只回傳 `_id`，而是排除 `_id`。"
    why_not_c: "沒有使用 `$set` 或 update API，因此不會更新資料。"
    why_not_d: "第二個參數明確指定只回傳 `customer` 與 `amount`，不是所有欄位。"
  keywords:
