    why_not_a: "這更接近 key-value store 的描述。很多考生看到『快速查詢』就誤選，但 RDBMS 的核心不是單純 key lookup。"
    why_not_b: "此選項正確，完整描述了 RDBMS 的典型資料模型與查詢方式。"
    why_not_c: "node/edge 是 graph database 的建模方式，不是關聯式資料庫的主要表示法。"
    why_not_d: "RDBMS 當然也能儲存 BLOB，但它並不是為非結構化資料而生。"
