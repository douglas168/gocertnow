  item_code: "L22202-資料庫架構"
  difficulty: 1
  question: "下列何者最符合 ACID 與 BASE 的典型對照？"
  options:
    a: "ACID 常見於 NoSQL；BASE 常見於 RDBMS"
    b: "兩者都保證強一致性（strong consistency）"
    c: "ACID 強調交易正確性；BASE 偏向可用性與最終一致性（eventual consistency）"
