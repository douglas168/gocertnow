  - id: "L21201-Q34"
    topic_code: "L21201"
    item_code: "L21201-04"
    difficulty: 5
    question: "某金融客服系統評估兩個方案：方案 A 採用 GPT-4o-mini API（每 1M token 約 US$5，無固定成本），方案 B 在 hicloud 自建 TAIDE-8B（每月固定 GPU 租用 NT$93,000 ≈ US$3,000，每 1M token 變動成本約 US$1）。資安要求方案 B 才能符合資料不出境，但預算限制 12 個月內 TCO 不得超過 US$50,000。下列哪一個推論最正確？（1 USD ≈ 31 NTD）"
    options:
      a: "因為 API 沒有固定成本，永遠都比自建便宜；資安要求應該重新評估必要性。"
      b: "Break-even 在約 7.5 百萬 token / 月，超過此量級自建划算；資安要求可後續再談。"
      c: "兩方案 12 個月 TCO 一定相同，因此選 API 即可。"
      d: "Break-even 在約 7.5 億 token / 月（即年用量 90 億 token），低於此量級時 API 划算；但因資安要求，方案 B 仍是唯一可選。"
    correct: "d"
    explanation:
      why_correct: "令 X 為月用量（百萬 token）。方案 A 月成本 = 5X (USD)；方案 B 月成本 = 3,000 + X (USD)。解 5X = 3,000 + X → X = 750（單位：百萬 token），即 break-even = 7.5 億 token/月。低於此量級 API 較便宜、高於則自建較便宜。但本題加上『資料不出境』硬約束（雙約束情境），方案 A 不符合資安條件直接被淘汰，剩方案 B；TCO 預算 US$50k / 年代表月度上限約 US$4,167，扣除固定 US$3,000 後可用 US$1,167 變動成本（≈ 116 萬 token / 月），業務需在此用量內運作或升級預算。"
      why_not_a: "API 並非永遠便宜（高量級時自建反勝），且資安屬硬性合規約束（公司治理、個資法、金管會），不是『重新評估必要性』就能取消的軟需求。"
      why_not_b: "單位錯誤：解出的 X = 750 是『百萬 token』，不是『萬 token』。750 百萬 = 7.5 億，不是 750 萬。此選項把單位差了 100 倍。另外『資安要求可後續再談』是硬約束被當軟約束的常見錯誤。"
      why_not_c: "不同月用量下兩方案 TCO 差距很大；只有恰好在 break-even 量級時才相等。此選項忽略量級依存。"
    keywords:
      - "break-even"
      - "雙約束"
      - "TCO"
      - "資料主權"
      - "data residency"
    exam_trap: true

