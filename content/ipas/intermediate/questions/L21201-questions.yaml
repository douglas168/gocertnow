  - id: "L21201-Q36"
    topic_code: "L21201"
    item_code: "L21201-04"
    difficulty: 5
    question: "下列哪一個流程最能正確描述「加權評分矩陣（Weighted Scoring Matrix）」的標準操作順序？四個選項都是真實會議上看過的提案，請挑出方法論最正確的一個。"
    options:
      a: "先找候選方案 → 各方案各自打分 → 事後合議出『最重要的準則』 → 加總"
      b: "先訂準則與權重（事前敲定）→ 各方案獨立打分 → 加權加總 → 必要時做敏感度分析"
      c: "先把所有可量化指標加總平均 → 補上權重做加權 → 再剔除低於門檻者"
      d: "先用雙約束過濾 → 直接取淘汰後的方案數最少者 → 略過評分以節省時間"
    correct: "b"
    explanation:
      why_correct: "標準順序：『事前敲定準則與權重 → 獨立打分 → 加權加總 → 敏感度分析』。先定義『該看什麼』與『多重要』才能避免事後被結果牽著走，敏感度分析則是對權重微調看排序是否穩定，是中級評估標準動作。"
      why_not_a: "事後合議準則 = 用結果反推依據，是錨定偏誤與確認偏誤的雙重陷阱；典型『先射箭再畫靶』。"
      why_not_c: "順序顛倒。應該先過濾（用雙約束/門檻刪除不可行者），再對剩餘集合評分；先平均再過濾會把不可行方案的分數帶進統計，污染決策。"
      why_not_d: "『過濾 vs 評分』不是二選一；過濾後仍須評分以從多個合格方案中挑出最佳，『取數量最少』本身就不是有意義的決策依據。"
    keywords:
      - "Weighted Scoring Matrix"
      - "操作順序"
      - "敏感度分析"
      - "確認偏誤"
    exam_trap: true

