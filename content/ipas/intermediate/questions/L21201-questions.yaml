      why_not_a: "7.0 可能來自漏算其中一項或記成 0.4×7。"
      why_not_b: "7.6 接近但運算錯一項（如把 0.1×7 算成 0.1×8）。"
      why_not_c: "7.2 來自把『資料治理』得分誤抄成 7（而非 9）：0.4×8 + 0.3×6 + 0.2×7 + 0.1×8 = 3.2 + 1.8 + 1.4 + 0.8 = 7.2。這是最常見的「抄錯一格分數」運算錯誤。"
