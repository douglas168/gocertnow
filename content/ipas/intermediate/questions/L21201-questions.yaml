  - id: "L21201-Q32"
    topic_code: "L21201"
    item_code: "L21201-02"
    difficulty: 4
    question: "下列關於「Managed API 是否有 lock-in」的敘述，何者最正確？"
    options:
      a: "Managed API 換掉只是改 endpoint，幾乎沒有轉換成本。"
      b: "Managed API 的 lock-in 來自 prompt 行為差異、微調權重不可攜出、向量索引/tool-calling schema 各家不同，是真實且可量化的轉換成本。"
      c: "只要用 OpenAI 相容介面，所有 API 都能 1:1 替換、零驗證成本。"
      d: "Managed API 永遠不會有版本變動造成的相容性風險，因此 vendor lock-in 比自建更小。"
    correct: "b"
    explanation:
      why_correct: "Managed API 的真實 lock-in 來源包含：模型行為差異（同 prompt 不同模型回答不一致）、微調權重不可攜出、向量索引格式不一、tool-calling / function-calling schema 各家不同。這些都是換廠商時必須重新做的工程與驗證成本。"
      why_not_a: "Prompt 在不同模型上表現不一致、評估需要重做，不是「改 endpoint」這麼簡單。"
      why_not_c: "OpenAI 相容介面只能解決「協定相容」，無法保證「行為相同」，仍需大量重新驗證。"
      why_not_d: "Managed API 有版本變動造成的相容性風險（如 Anthropic 棄用 Claude 1、OpenAI 變更模型行為、API 棄用 / deprecation 通知），這是真實的『版本鎖定』lock-in 事件。把『managed = 永遠穩定』當成理由是常見誤解。"
    keywords:
      - "Vendor Lock-in"
      - "Managed API 誤解"
      - "model deprecation"
      - "版本鎖定"
    exam_trap: true

