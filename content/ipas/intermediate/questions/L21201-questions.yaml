  - id: "L21201-Q30"
    topic_code: "L21201"
    item_code: "L21201-04"
    difficulty: 4
    question: |-
      董事會下達硬性財務指令：「任何 AI 投資的 Payback Period 必須 < 18 個月，否則不通過。」三個方案如下：
      方案 P：ROI 80%、Payback 14 個月、TCO 600 萬
      方案 Q：ROI 120%、Payback 24 個月、TCO 500 萬
      方案 R：ROI 60%、Payback 12 個月、TCO 700 萬
      下列分析何者最正確？
    options:
      a: "選 Q，因為 ROI 最高（120%），董事會的 Payback 條件可後續再協商。"
      b: "選 R，因為 Payback 最短（12 個月），財務最安全。"
      c: "Q 因 Payback = 24 個月不符董事會硬性指令直接淘汰；P 與 R 都符合，再從中比 ROI——P (80%) > R (60%)，因此選 P。Payback 是『過濾條件』而非『評分依據』。"
      d: "三方案都不選，因為 ROI 與 Payback 沒有單一勝出者。"
    correct: "c"
    explanation:
      why_correct: "硬性財務指令屬於『過濾條件 (filter)』而非『評分依據 (score)』。流程必須是：先過濾不合規方案 → 再從剩餘集合中比較主要 KPI。Q 雖 ROI 最高但 Payback 24 個月違反硬指令直接出局；剩 P、R 都符合，再比 ROI 取 P (80%)。"
      why_not_a: "把董事會硬性指令當『可協商的軟需求』，是中級評估最常見的『硬約束軟用』錯誤。"
      why_not_b: "Payback 短只是『過濾通過』的最低條件，不是『最佳化目標』；通過後仍須比 ROI。"
      why_not_d: "P 在過濾後同時符合硬條件且 ROI 最高，已是明確勝出方案，沒有理由全棄。"
    keywords:
      - "Payback Period"
      - "ROI"
      - "硬性條件過濾"
      - "雙約束決策"
    exam_trap: true

