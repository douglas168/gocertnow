      d: "GPU 算力不足導致推論結果不一致"
    correct: "a"
    explanation:
      why_correct: "離線高準確、上線體驗差最常見原因是「測試集 ≠ 真實流量分布」——也就是 distribution shift / 資料代表性不足；這提醒評估時必須用接近真實的代表性資料集。"
      why_not_b: "模型權重在無重訓的狀況下不會自行劣化。"
      why_not_c: "SLA 數字變動主要影響可用性，不直接造成「答錯」的抱怨。"
