      b: "功能性、效能、p95 延遲、Throughput、Accuracy、模型大小"
      c: "技術契合度、TCO、整合性、商業條款（SLA/Lock-in）、供應商風險、品牌知名度"
      d: "技術契合度、整合性、商業條款（SLA/Lock-in）、供應商風險、品牌知名度、UX 美感"
    correct: "a"
    explanation:
      why_correct: "選項 a 涵蓋金融業必要的六大互斥維度：技術、成本、合規（資料治理對金管會與個資法是硬性要求）、整合、商業條款、供應商風險。每一面向都不重疊、且都對應一個必要決策問題。"
      why_not_b: "全部 6 項都是『技術效能』的子維度（功能性、效能、p95、Throughput、Accuracy、模型大小都屬技術面），完全漏掉成本、合規、商業條款、供應商風險——是準則『重複』的典型錯誤。"
      why_not_c: "漏掉『資料治理與駐留』；金融業必須符合金管會、個資法、資料不出境，缺此維度等於跳過合規審查，且把『品牌知名度』當主準則屬軟性印象，不應佔加權位置。"
      why_not_d: "同時漏掉『TCO（成本）』與『資料治理（合規）』兩個關鍵維度，並加入兩個軟性印象指標（品牌、UX 美感），是準則設計『缺重要面向＋灌水軟指標』的雙重錯誤。"
    keywords:
      - "評估準則"
      - "Weighted Scoring Matrix"
      - "互斥維度"
      - "金融合規"
    exam_trap: false

  - id: "L21201-Q40"
    topic_code: "L21201"
    item_code: "L21201-03"
    difficulty: 5
    question: "某團隊在 PoC 階段達成「答對率 88%、TCO 符合預算、3 週內可上線」的初步成果。在進入正式導入（Go-No-Go）決策前，下列何者是最不該做的？"
    options:
      a: "用接近真實流量的代表性資料集再做一次評估，確認分布偏移風險"
      b: "與利害關係人確認上線後的維運責任、監控指標與退場機制"
      c: "盤點 lock-in 與資料治理風險，預先準備備援方案"
      d: "PoC 在小流量樣本（<5% 真實負載）上達成所有 KPI，即可逕行 Go，無須再做尖峰負載與代表性樣本驗證。"
    correct: "d"
    explanation:
      why_correct: "PoC 在『不到 5% 真實負載』的小樣本上達標，無法外推到尖峰流量與真實使用者分布——這是『樣本代表性謬誤 (sampling fallacy)』與『以小推大謬誤』。Go/No-Go 必須補上尖峰負載測試、代表性樣本驗證、長尾流量驗證，才能信賴 KPI。直接 Go 上線是高風險決策。"
      why_not_a: "用代表性資料集驗證是降低 distribution shift 風險的標準做法，應該做。"
      why_not_b: "上線後責任、監控、退場機制是可治理的 AI 系統必備，應該做。"
      why_not_c: "預先盤點 lock-in 與治理風險、備援方案，是正式導入前該做的事。"
    keywords:
      - "Go/No-Go"
      - "PoC"
      - "正式導入"
      - "sampling fallacy"
      - "代表性樣本"
    exam_trap: false
