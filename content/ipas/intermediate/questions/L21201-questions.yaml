  - id: "L21201-Q23"
    topic_code: "L21201"
    item_code: "L21201-04"
    difficulty: 3
    question: "某加權評分矩陣（Weighted Scoring Matrix）有四個準則：技術契合度（權重 0.4，得分 8）、TCO（權重 0.3，得分 6）、資料治理（權重 0.2，得分 9）、供應商風險（權重 0.1，得分 7）。其加權總分為何？（10 分制）"
