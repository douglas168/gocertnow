    item_code: "L21201-04"
    difficulty: 3
    question: "某 AI 專案投入成本 NT$500,000，第一年產生的可量化效益為 NT$650,000。在不考慮折現下，第一年 ROI 為何？"
    options:
      a: "23%"
      b: "30%"
      c: "100%"
      d: "130%"
    correct: "b"
    explanation:
      why_correct: "ROI =（效益 − 成本）/ 成本 × 100% =（650,000 − 500,000）/ 500,000 × 100% = 30%。"
      why_not_a: "23% 約等於 (650-500)/650，是把分母誤算成「效益」而不是「成本」，常見錯誤。"
      why_not_c: "100% 是把效益除以成本（650/500≈130%）但忘記減成本，又寫錯成 100%——數值即不對。"
      why_not_d: "130% 是『效益對成本比 (Benefit-to-Cost Ratio)』 = 650/500 = 1.3 = 130%，不是 ROI。ROI 必須先扣除投資 (淨效益)，公式為 (650−500)/500 = 30%。把 BCR 當 ROI 是最常見的計算錯誤。"
