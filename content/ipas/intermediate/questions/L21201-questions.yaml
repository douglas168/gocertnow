  - id: "L21201-Q27"
    topic_code: "L21201"
    item_code: "L21201-04"
    difficulty: 4
    question: |-
      某評選會議的對話節錄如下：
      ① 主管：「上次跟 A 廠商高層吃飯印象很好，我心裡 A 大概有 9 分，大家就以這個為基礎調整吧。」
      ② 法務：「那我給 A 在『資料治理』8 分。」
      ③ 採購：「A 報價偏高，但既然主管已經喊 9 分，我也給 8.5 分以免落差太大。」
      下列分析何者最正確指出此會議的方法論問題？
    options:
      a: "問題在於法務只給 8 分而非 9 分，破壞了一致性，應該全員給 9 分。"
      b: "問題在於主管在開場就丟出『9 分』作為錨點，後續評分被向 9 收斂；正確做法是各成員『先獨立評分、再彙整』，避免錨定偏誤。"
      c: "問題在於採購提到報價，採購不應評論成本，這是越權。"
      d: "問題在於沒有預先設權重，只要補上權重表即可解決。"
    correct: "b"
    explanation:
      why_correct: "錨定偏誤（Anchoring Bias）= 先被丟出的數字會主導後續判斷。對話①的主管把『9 分』先放上桌，對話③的採購明確自承『以免落差太大』而向 9 靠攏——這正是錨定偏誤的教科書範例。標準解方是『獨立評分→彙整』流程，而非全員向 9 對齊。"
      why_not_a: "全員給 9 分只會把錨定偏誤放大到 100%，而非解決問題。"
      why_not_c: "採購評論成本屬其專業範疇，不是越權；真正的問題在於評分順序。"
      why_not_d: "權重設定無法消除錨定偏誤；問題出在『先說數字再評分』的流程，不是權重缺失。"
    keywords:
      - "Anchoring Bias"
      - "錨定偏誤"
      - "獨立評分"
      - "評選流程"
    exam_trap: true

  - id: "L21201-Q28"
