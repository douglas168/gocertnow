# L21201 AI導入評估 — 練習題庫 (Deep depth pool, 40 題)
# 對應 IPAS AI應用規劃師 中級 — 科目一 L212 AI導入評估規劃
# 範圍: 技術效能評估 / 工具效能評估 / 適用解決方案選擇 / 成本效益分析
# 邊界: 不含 L21202 規劃流程、L21203 風險框架、初級 L12301 入門檢核

questions:

  # ============================================================
  # Difficulty 1 — Remember (8 題)
  # ============================================================

  - id: "L21201-Q01"
    topic_code: "L21201"
    item_code: "L21201-01"
    difficulty: 1
    question: "下列何者最能完整描述機器學習模型的「準確率（Accuracy）」？"
    options:
      a: "模型每秒可處理的請求數量"
      b: "模型回傳第一個 token 所需的平均時間"
      c: "模型在測試集上預測正確的樣本數佔總樣本數的比例"
      d: "模型在尖峰負載下仍能維持服務的能力"
    correct: "c"
    explanation:
      why_correct: "Accuracy = 預測正確樣本數 / 總樣本數，是分類模型最直觀的整體表現指標，屬於「技術效能」中模型品質維度。"
      why_not_a: "每秒處理請求數是 Throughput（吞吐量），是延遲/容量類指標，不是準確率。"
      why_not_b: "首字回應時間屬於 Latency（延遲，TTFT），衡量回應速度，不是答對比例。"
      why_not_d: "尖峰維持服務能力屬於 Reliability / Scalability（可靠性/擴展性），不是預測正確比例。"
    keywords:
      - "準確率"
      - "Accuracy"
      - "技術效能"
    exam_trap: false

  - id: "L21201-Q02"
    topic_code: "L21201"
    item_code: "L21201-04"
    difficulty: 1
    question: "下列何者是 ROI（投資報酬率，Return on Investment）的標準計算公式？"
    options:
      a: "ROI = 初始投資金額 ÷ 年度淨效益"
      b: "ROI = 總營收 ÷ 總成本"
      c: "ROI = 未來現金流折現值總和 − 初始投資"
      d: "ROI = （效益 − 成本）÷ 成本 × 100%"
    correct: "d"
    explanation:
      why_correct: "ROI =（淨效益 − 成本）/ 成本 × 100%，衡量每投入 1 元能回收的百分比，是中級評估最常用的單期報酬指標。"
      why_not_a: "初始投資 ÷ 年度淨效益 是 Payback Period（回收期）的公式，計算「幾年回本」，不是 ROI。"
      why_not_b: "總營收 / 總成本 接近毛利率概念，沒有扣除成本，會嚴重高估 ROI。"
      why_not_c: "未來現金流折現減初始投資是 NPV（淨現值）的概念，比 ROI 多了時間價值，不是 ROI。"
    keywords:
      - "ROI"
      - "投資報酬率"
      - "成本效益"
    exam_trap: true

  - id: "L21201-Q03"
    topic_code: "L21201"
    item_code: "L21201-04"
    difficulty: 1
    question: "TCO（Total Cost of Ownership，總體擁有成本）下列何者最能完整描述其涵蓋範圍？"
    options:
      a: "僅包含購買軟體授權與硬體的初始費用"
      b: "僅包含每月雲端服務的訂閱費用"
      c: "包含取得、部署、維運、人力、退役等整個生命週期的直接與間接成本"
      d: "等同於每年的營運費用 OpEx 總和"
    correct: "c"
    explanation:
      why_correct: "TCO 強調「全生命週期 + 直接與間接成本」，包含 CapEx（購置）、OpEx（雲端費/電費/人力）、整合成本、退役成本、機會成本等。是中級導入評估最常被低估的概念。"
      why_not_a: "只算初始費用是常見錯誤——導入後 3–5 年的維運與人力往往大於初始投資。"
      why_not_b: "只算雲端訂閱費漏掉了內部人力、整合、教育訓練、安全治理等成本。"
      why_not_d: "TCO 同時包含 CapEx 與 OpEx，把 TCO 等同於 OpEx 是常見漏算間接成本的錯誤。"
    keywords:
      - "TCO"
      - "總體擁有成本"
      - "生命週期成本"
    exam_trap: false

  - id: "L21201-Q04"
    topic_code: "L21201"
    item_code: "L21201-02"
    difficulty: 1
    question: "在工具評估中，所謂「Vendor Lock-in（供應商鎖定）」最直接的意義為何？"
    options:
      a: "供應商提供的合約有最低使用期限"
      b: "供應商保證 99.9% 服務可用性的條款"
      c: "供應商提供獨家折扣，要求顧客排他採購"
      d: "因技術、資料格式或介面深度綁定，使企業更換供應商的轉換成本顯著升高"
    correct: "d"
    explanation:
      why_correct: "Vendor Lock-in 的核心是「轉換成本」高到難以離開，常見來源包含專有 API、資料格式、向量索引、微調權重不可攜出等。"
      why_not_a: "最低使用期限是合約條款（commitment），與技術鎖定不同；可協商但不會綁住資料/技術。"
      why_not_b: "99.9% 是 SLA（服務等級協定），是品質承諾，與是否難以更換無關。"
      why_not_c: "獨家折扣屬於商務策略，不是技術綁定的本質。"
    keywords:
      - "Vendor Lock-in"
      - "供應商鎖定"
      - "轉換成本"
    exam_trap: false

  - id: "L21201-Q05"
    topic_code: "L21201"
    item_code: "L21201-03"
    difficulty: 1
    question: "依「適用解決方案選擇階梯」由低到高的成本/複雜度，下列順序何者正確？"
    options:
      a: "Prompt Engineering → RAG → Fine-tune → From-scratch（從頭訓練）"
      b: "Fine-tune → Prompt Engineering → RAG → From-scratch"
      c: "RAG → Prompt Engineering → From-scratch → Fine-tune"
      d: "From-scratch → Fine-tune → RAG → Prompt Engineering"
    correct: "a"
    explanation:
      why_correct: "業界共識的成本/複雜度階梯由低到高：Prompt（最便宜，幾乎零工程）→ RAG（加檢索層）→ Fine-tune（需資料+訓練算力）→ From-scratch（最貴，需大量算力與資料）。導入決策應由下往上，能用便宜方案達成 KPI 就不要往上爬。"
      why_not_b: "Fine-tune 比 RAG 與 Prompt 都貴，順序顛倒。"
      why_not_c: "RAG 比 Prompt 貴（多了檢索/向量庫成本），順序錯誤。"
      why_not_d: "完全反向；From-scratch 是最後手段，不是第一步。"
    keywords:
      - "解決方案階梯"
      - "Prompt Engineering"
      - "RAG"
      - "Fine-tune"
    exam_trap: false

  - id: "L21201-Q06"
    topic_code: "L21201"
    item_code: "L21201-01"
    difficulty: 1
    question: "下列關於「Throughput（吞吐量）」的描述何者最正確？"
    options:
      a: "系統在單位時間內可成功處理的請求或資料量"
      b: "單一請求從送出到收到首個 token 的時間"
      c: "模型在完全相同輸入下每次輸出一致的程度"
      d: "服務在合約上承諾的可用時間百分比"
    correct: "a"
    explanation:
      why_correct: "Throughput 衡量「容量」——例如 RPS（requests per second）或每秒生成的 token 數，反映系統能不能撐住流量。"
      why_not_b: "首字延遲是 TTFT / Latency，不是吞吐量。"
      why_not_c: "輸出一致性屬於 Determinism / Reliability 的一面，不是吞吐量。"
      why_not_d: "可用時間百分比是 SLA / Availability，與單位時間處理量是不同維度的指標。"
    keywords:
      - "Throughput"
      - "吞吐量"
      - "RPS"
    exam_trap: false

  - id: "L21201-Q07"
    topic_code: "L21201"
    item_code: "L21201-04"
    difficulty: 1
    question: "下列何者最符合「Payback Period（回收期）」的定義？"
    options:
      a: "未來各期淨現金流折現後減去初始投資的差額"
      b: "每年淨利除以初始投資的百分比"
      c: "投資後達到收益等於成本所需的時間"
      d: "達到內部收益率（IRR）為 0 所需的時間"
    correct: "c"
    explanation:
      why_correct: "Payback Period = 多久能把初始投資賺回來，常用公式 = 初始投資 / 每年淨效益（簡化版）。中級導入評估的「幾個月回本」對話用這個指標。"
      why_not_a: "折現後的差額是 NPV（淨現值）的概念，不是 Payback。"
      why_not_b: "每年淨利除以初始投資是 ROI 的年化版本，不是回本「時間」。"
      why_not_d: "IRR 是另一種折現概念，與回本期意義不同；Payback 不需要 IRR=0。"
    keywords:
      - "Payback Period"
      - "回收期"
      - "成本效益"
    exam_trap: false

  - id: "L21201-Q08"
    topic_code: "L21201"
    item_code: "L21201-02"
    difficulty: 1
    question: "「Data Residency（資料駐留地）」在工具評估中的核心意義為何？"
    options:
      a: "資料在實體上儲存與處理所在的地理區域與司法管轄"
      b: "資料在資料庫中保存的最長期限"
      c: "資料的備份頻率與保留份數"
      d: "資料的加密演算法強度"
    correct: "a"
    explanation:
      why_correct: "Data Residency 指資料實際儲存/處理的地理位置與適用法律，對於受個資法、金管會、政府機敏資料規範的場域是必要評估項目。"
      why_not_b: "保存期限是 Data Retention，不同概念。"
      why_not_c: "備份份數是 Backup / DR 設計，不是駐留地。"
      why_not_d: "加密強度屬於資料安全的技術控制，不是地理位置議題。"
    keywords:
      - "Data Residency"
      - "資料駐留地"
      - "資料治理"
    exam_trap: false

  # ============================================================
  # Difficulty 2 — Understand (8 題)
  # ============================================================

  - id: "L21201-Q09"
    topic_code: "L21201"
    item_code: "L21201-01"
    difficulty: 2
    question: "下列關於 p95 延遲與平均延遲（Average Latency）的敘述，何者正確？"
    options:
      a: "p95 延遲一定小於平均延遲，因為 95% 比 100% 小"
      b: "平均延遲若良好，使用者體驗一定平順，不需再看 p95"
      c: "p95 延遲反映尾端體驗，能揭露平均值掩蓋的偶發長尾請求"
      d: "p95 與 average latency 永遠相等，只是表達單位不同"
    correct: "c"
    explanation:
      why_correct: "p95 = 95% 的請求都比這個時間快；尾端 5% 的長尾請求往往是使用者抱怨的來源，p95/p99 能揭露平均值所掩蓋的偶發大延遲。"
      why_not_a: "p95 不一定小於平均；長尾分布下 p95 通常顯著大於 average。把「95 < 100」誤類比到延遲是常見直覺錯誤。"
      why_not_b: "只看 average 會被尾端拖累隱藏，這正是 SRE 圈強調看 p95/p99 的原因。"
      why_not_d: "p95 與 average 是不同統計量，幾乎不會相等，僅在分布極為集中時才接近。"
    keywords:
      - "p95"
      - "Latency"
      - "尾端延遲"
    exam_trap: true

  - id: "L21201-Q10"
    topic_code: "L21201"
    item_code: "L21201-04"
    difficulty: 2
    question: "下列關於 TCO 與 ROI 的敘述何者正確？"
    options:
      a: "TCO 是成本面總額，ROI 衡量投入產出的比率關係，兩者互補不可互換"
      b: "TCO 越低代表 ROI 一定越高"
      c: "ROI 為正就代表 TCO 已被回收，不需再做回收期分析"
      d: "TCO 與 ROI 都已內含時間折現，因此不需再算 NPV"
    correct: "a"
    explanation:
      why_correct: "TCO 衡量「總成本」的絕對值；ROI 衡量「相對報酬」的百分比。低 TCO 不保證高 ROI（若效益更低）；高 ROI 也可能伴隨高 TCO。兩者必須一起看。"
      why_not_b: "效益不變才成立；若低成本方案也帶來更低效益，ROI 反而可能更差。"
      why_not_c: "ROI 為正只代表單期效益>成本，不直接告訴你「幾年內」回本，仍需 Payback。"
      why_not_d: "ROI、TCO 在中級層級多採未折現算法，沒有內含時間價值，需要 NPV/IRR 才有折現。"
    keywords:
      - "TCO"
      - "ROI"
      - "成本效益"
    exam_trap: true

  - id: "L21201-Q11"
    topic_code: "L21201"
    item_code: "L21201-02"
    difficulty: 2
    question: "關於「Managed API（如 OpenAI、Claude、Gemini）」與「Self-hosted（如自建 TAIDE 於中華電信 hicloud）」的取捨，下列敘述何者正確？"
    options:
      a: "Managed API 完全沒有 vendor lock-in，可隨時無痛切換"
      b: "Managed API 啟動快、初期成本低；Self-hosted 在資料留台與長期高用量時較有利"
      c: "Self-hosted 因不需要付 token 費，TCO 必然低於 Managed API"
      d: "Self-hosted 的延遲一定低於 Managed API"
    correct: "b"
    explanation:
      why_correct: "Managed API 優勢=啟動快、無維運、按用量付費；Self-hosted 優勢=資料不出境、長期高用量單位成本低、可深度客製。決策依用量規模與資料治理需求。"
      why_not_a: "Managed API 的 prompt/微調權重/向量索引都會造成可觀的轉換成本，不是「無 lock-in」。"
      why_not_c: "Self-hosted 有 GPU、人力、運維、安全治理等隱性 TCO，低用量下往往比 API 貴很多。"
      why_not_d: "Self-hosted 延遲取決於硬體與實作；多數企業自建反而比商業 API 慢。"
    keywords:
      - "Managed API"
      - "Self-hosted"
      - "TAIDE"
      - "hicloud"
    exam_trap: true

  - id: "L21201-Q12"
    topic_code: "L21201"
    item_code: "L21201-04"
    difficulty: 2
    question: "下列關於 CapEx 與 OpEx 在 AI 導入評估的敘述何者正確？"
    options:
      a: "CapEx 為一次性資本支出（如 GPU 採購），OpEx 為持續性營運支出（如雲端與人力）"
      b: "雲端訂閱費屬於 CapEx，因為簽約一次"
      c: "CapEx 不會影響 TCO，只有 OpEx 才會"
      d: "OpEx 一律可立即費用化，因此優於 CapEx"
    correct: "a"
    explanation:
      why_correct: "CapEx＝資本支出（買硬體、機房）；OpEx＝營運支出（雲端、電費、人力、訂閱）。Self-hosted 偏 CapEx 重，Managed API 偏 OpEx 重，是 build-vs-buy 的核心會計差異。"
      why_not_b: "雲端訂閱屬於 OpEx（持續支出），不是 CapEx。"
      why_not_c: "TCO 同時包含 CapEx 與 OpEx，兩者都會影響。"
      why_not_d: "OpEx 與 CapEx 各有會計與財務優劣，不能一概而論「OpEx 較好」。"
    keywords:
      - "CapEx"
      - "OpEx"
      - "TCO"
    exam_trap: true

  - id: "L21201-Q13"
    topic_code: "L21201"
    item_code: "L21201-03"
    difficulty: 2
    question: "下列關於 RAG（Retrieval-Augmented Generation，檢索增強生成）的敘述何者最正確？"
    options:
      a: "RAG 必須先 Fine-tune 模型才能使用"
      b: "RAG 的成本與複雜度高於 From-scratch 訓練"
      c: "RAG 只能用於英文場景"
      d: "RAG 透過外部檢索把企業知識注入提示中，主要解決幻覺與資料時效問題"
    correct: "d"
    explanation:
      why_correct: "RAG 在推論時動態檢索外部文件並塞入 prompt，不需改模型權重，是目前處理「企業私有知識+減少幻覺+資料即時更新」最 cost-effective 的方案。"
      why_not_a: "RAG 與 Fine-tune 是獨立技術，可單用 RAG 不必微調；許多企業只用 RAG 就達標。"
      why_not_b: "RAG 介於 Prompt 與 Fine-tune 之間，遠比 From-scratch 便宜。"
      why_not_c: "RAG 與語言無關，只取決於 embedding/檢索器與 LLM 的繁中能力。"
    keywords:
      - "RAG"
      - "檢索增強生成"
      - "幻覺"
    exam_trap: false

  - id: "L21201-Q14"
    topic_code: "L21201"
    item_code: "L21201-01"
    difficulty: 2
    question: "下列關於 Scalability（擴展性）與 Reliability（可靠性）的敘述何者正確？"
    options:
      a: "Scalability 強調系統在負載增加時仍能維持效能；Reliability 強調系統在預期條件下穩定無故障"
      b: "兩者意義完全相同，可互換使用"
      c: "Scalability 等於 SLA 99.99%"
      d: "Reliability 只適用於硬體，不適用於 AI 模型服務"
    correct: "a"
    explanation:
      why_correct: "Scalability=隨流量成長而擴展能力（水平/垂直）；Reliability=正常運作不出錯、可預測。兩者是技術效能評估的不同維度。"
      why_not_b: "兩者重點不同，混為一談會在採購評估時漏掉關鍵維度。"
      why_not_c: "99.99% 是 Availability（可用性）的 SLA 數字，不是擴展性。"
      why_not_d: "AI 服務同樣需要 Reliability（模型推論成功率、漂移、服務不中斷）。"
    keywords:
      - "Scalability"
      - "Reliability"
      - "技術效能"
    exam_trap: false

  - id: "L21201-Q15"
    topic_code: "L21201"
    item_code: "L21201-03"
    difficulty: 2
    question: "下列關於 Fine-tune（微調）的敘述何者正確？"
    options:
      a: "Fine-tune 主要透過修改模型權重，使模型更貼近特定任務的「行為樣態」或語氣"
      b: "Fine-tune 可以替代知識更新，因此不需要 RAG"
      c: "Fine-tune 一旦完成，模型可以即時學會剛發生的新聞事件"
      d: "Fine-tune 適用所有商業 API，不需要任何資料準備"
    correct: "a"
    explanation:
      why_correct: "Fine-tune 改的是「模型怎麼回應」（語氣、結構、特定領域風格、分類行為），對「事實知識更新」效果不佳——後者更適合 RAG。"
