    options:
      a: "情境 X 較簡單，因為兩家都是 API；情境 Y 較難，因為需重新做 prompt 重調、評估重跑、向量重建、推論基建（vLLM/GPU 排程/監控）、合規驗證——Lock-in 轉換成本顯著高於情境 X。"
      b: "情境 Y 較簡單，因為自建後就完全沒 Lock-in。"
      c: "兩個情境的轉換成本完全相同，因為 prompt 條數一樣。"
      d: "情境 X 較難，因為兩家 API 廠商互為競爭對手不會互相支援格式轉換。"
    correct: "a"
    explanation:
      why_correct: "情境 X 仍是『API → API』，只需重調 prompt、重跑評估、改 SDK；情境 Y 多了『建置與運維推論基建』整個層級——GPU/vLLM/排程/監控/SRE on-call/合規驗證，這些是 Self-host 才有的固定成本。Lock-in 轉換成本 = 既有資產重做 + 新基建建置，後者只在情境 Y 出現。"
      why_not_b: "Self-host 仍有 Lock-in：GPU 廠牌、推論框架、開源模型版本、向量庫格式都會綁住，只是 Lock-in 來源不同。"
      why_not_c: "Prompt 條數只是 Lock-in 的『其中一個維度』；基建建置成本才是兩情境的主要差異。"
      why_not_d: "API 廠商之間的競爭關係並不直接決定轉換難度；難度主要來自 prompt 行為差異與評估重跑，不是商業關係。"
    keywords:
      - "Vendor Lock-in"
      - "Managed API"
      - "Self-hosted"
      - "遷移成本"
    exam_trap: true

  - id: "L21201-Q29"
