- id: "L22103-Q36"
  topic_code: "L22103"
  item_code: "L22103-10"
  difficulty: 5
  question: "某資料團隊有三個城市的客服等待時間資料，想先回答「三城市平均等待時間是否存在整體差異？」此時最恰當的第一步是什麼？"
  options:
    a: "先做 one-way ANOVA 檢查整體平均數是否不同"
    b: "直接把三城市兩兩做多次獨立樣本 t 檢定，忽略整體檢定"
    c: "先做卡方獨立性檢定，因為城市是類別變數"
    d: "先做單樣本 t 檢定，把三城市合併成一組"
  correct: "a"
  explanation:
    why_correct: "問題焦點是三組以上平均數的整體差異，因此 first step 應是 one-way ANOVA。"
    why_not_a: "此選項正確，也符合官方樣題偏好的檢定選擇思路。"
    why_not_b: "直接多次 t-test 會增加錯誤率，且忽略整體檢定架構。"
    why_not_c: "城市是分組變數，但應變數是等待時間這個數值型平均數。"
    why_not_d: "合併三城市會失去組別比較意義。"
  keywords:
    - "ANOVA"
    - "test selection"
    - "three groups"
