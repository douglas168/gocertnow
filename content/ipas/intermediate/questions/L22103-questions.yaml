    b: "前半句錯、後半句對；p-value 不代表 H0 機率，但一定代表效果大"
    c: "兩句都不恰當；p-value 不等於 H0 為真的機率，也不直接代表效果大小"
    d: "只有在 α = 0.01 時這句話才正確"
  correct: "c"
  explanation:
    why_correct: "p-value 只衡量資料在 H0 下的極端程度，既不是 H0 的機率，也不能單獨代表效果大小或實務重要性。"
    why_not_a: "這是統計課最常見的誤解之一。"
    why_not_b: "顯著不等於效果大，還要看估計值與區間。"
    why_not_c: "此選項正確，完整指出兩個錯誤解讀。"
    why_not_d: "錯誤不在 α 的值，而在 p-value 被誤解。"
  keywords:
    - "p-value interpretation"
    - "effect size misconception"
    - "exam trap"
  exam_trap: true

- id: "L22103-Q35"
  topic_code: "L22103"
  item_code: "L22103-4"
  difficulty: 5
  question: "某正式題同時給出 `p-value = 0.08`、`α = 0.05` 與 95% 信賴區間 `[-1.5, 0.4]`。下列哪個綜合判斷最合理？"
  options:
    a: "應拒絕 H0，因為信賴區間有負值"
    b: "目前證據不足以拒絕 H0，且信賴區間包含假設值 0 與此結論一致"
    c: "應接受 H0 為真，因為 p-value 大於 α"
    d: "p-value 與信賴區間互相衝突，表示資料一定有錯"
  correct: "b"
  explanation:
    why_correct: "`p-value = 0.08 > 0.05` 表示無法拒絕 H0，而 95% CI 包含 0 也與該結論一致。"
    why_not_a: "重點不是區間有負值，而是是否包含假設值。"
    why_not_b: "此選項正確，完整整合了 p-value 與 CI 的一致訊號。"
    why_not_c: "較嚴謹說法應是 fail to reject H0，不是接受 H0 為真。"
    why_not_d: "這兩項資訊並不衝突。"
  keywords:
