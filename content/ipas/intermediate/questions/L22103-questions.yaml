- id: "L22103-Q01"
  topic_code: "L22103"
  item_code: "L22103-1"
  difficulty: 1
  question: "在假設檢定（hypothesis testing）中，哪一個敘述最符合虛無假設（null hypothesis, H0）的角色？"
  options:
    a: "代表目前先被假定成立、等待資料檢驗的基準敘述"
    b: "一定是研究者真正想證明為真的敘述"
    c: "只要設定了 H0，就不需要設定對立假設（alternative hypothesis, H1）"
    d: "H0 一旦被提出，就不能被拒絕"
  correct: "a"
  explanation:
    why_correct: "H0 是檢定時的基準假設，研究者用樣本資料判斷是否有足夠證據拒絕它。"
    why_not_a: "此選項正確，符合 H0 作為檢定起點與比較基準的角色。"
    why_not_b: "考生常把 H0 誤認為研究者想證明的主張；實際上研究者通常更關注 H1。"
    why_not_c: "假設檢定需要 H0 與 H1 成對出現，才能明確定義拒絕方向。"
    why_not_d: "若資料提供足夠證據，H0 可以被拒絕。"
  keywords:
    - "H0"
    - "null hypothesis"
    - "假設檢定"
  exam_trap: true

- id: "L22103-Q02"
  topic_code: "L22103"
  item_code: "L22103-2"
  difficulty: 1
  question: "型一錯誤（Type I error, α）是指下列哪一種情況？"
  options:
    a: "H0 為真時，卻未拒絕 H0"
    b: "H0 為真時，卻錯誤地拒絕 H0"
    c: "H0 為假時，正確地拒絕 H0"
    d: "H0 為假時，卻未蒐集任何資料"
  correct: "b"
  explanation:
    why_correct: "型一錯誤是把原本真的 H0 錯誤拒絕。"
    why_not_a: "這比較接近正確決策，不是型一錯誤。"
    why_not_b: "此選項正確，正是 α 的定義。"
    why_not_c: "H0 為假且成功拒絕，是正確判斷，不是錯誤。"
    why_not_d: "是否蒐集資料不是 α 的定義。"
  keywords:
    - "Type I error"
    - "alpha"
  exam_trap: false

- id: "L22103-Q03"
  topic_code: "L22103"
  item_code: "L22103-3"
  difficulty: 1
  question: "若檢定結果得到 `p-value = 0.03`，且顯著水準（significance level） `α = 0.05`，下列哪個結論正確？"
  options:
    a: "因為 `p-value` 小，所以 H0 一定為真"
    b: "因為 `0.03 > 0.05`，所以不能拒絕 H0"
    c: "因為 `p-value < α`，所以拒絕 H0"
    d: "因為 `p-value < α`，所以接受 H1 為絕對真理"
  correct: "c"
  explanation:
    why_correct: "`p-value < α` 表示在 H0 成立下觀察到這麼極端資料的機率很低，因此拒絕 H0。"
    why_not_a: "`p-value` 小不代表 H0 為真，反而表示資料對 H0 不利。"
    why_not_b: "這是方向判讀錯誤，0.03 明顯小於 0.05。"
    why_not_c: "此選項正確，符合標準決策規則。"
    why_not_d: "拒絕 H0 不等於證明 H1 絕對為真，這是常見過度解讀。"
  keywords:
    - "p-value"
    - "alpha"
    - "reject H0"
  exam_trap: true

- id: "L22103-Q04"
  topic_code: "L22103"
  item_code: "L22103-4"
  difficulty: 1
  question: "關於 95% 信賴區間（95% confidence interval），下列哪一項敘述最正確？"
  options:
    a: "表示這次樣本中有 95% 的觀測值都落在區間內"
    b: "表示母體平均數有 95% 的機率每天都會改變"
    c: "表示 H0 一定成立"
    d: "表示用相同方法重複抽樣，長期而言約有 95% 的區間會涵蓋真實參數"
  correct: "d"
  explanation:
    why_correct: "信賴區間的 95% 是長期覆蓋率概念，不是單次抽樣下參數隨機移動的機率陳述。"
    why_not_a: "這把信賴區間誤當成資料覆蓋率，與參數估計概念不同。"
    why_not_b: "母體參數通常視為固定未知，不是每天變動的隨機量。"
    why_not_c: "信賴區間可用於輔助檢定，但本身不表示 H0 必然成立。"
    why_not_d: "此選項正確，符合信賴區間的標準詮釋。"
  keywords:
    - "confidence interval"
    - "95%"
    - "統計推論"
  exam_trap: true

- id: "L22103-Q05"
  topic_code: "L22103"
  item_code: "L22103-5"
  difficulty: 1
  question: "若要比較某班學生實際平均分數是否不同於 70 分，最典型應使用哪一種檢定？"
  options:
    a: "單樣本 t 檢定（one-sample t-test）"
    b: "卡方獨立性檢定（chi-square test of independence）"
    c: "單因子變異數分析（one-way ANOVA）"
    d: "配對樣本 t 檢定（paired t-test）"
  correct: "a"
  explanation:
    why_correct: "當問題是單一樣本平均數是否等於某個假設值時，應使用 one-sample t-test。"
    why_not_a: "此選項正確，符合單一樣本平均數對固定參考值的情境。"
    why_not_b: "卡方獨立性檢定處理的是類別資料關聯，不是平均數。"
    why_not_c: "ANOVA 用於三組以上平均數整體比較。"
    why_not_d: "paired t-test 需要同一對象前後配對資料。"
  keywords:
    - "one-sample t-test"
    - "平均數"
    - "檢定選擇"
  exam_trap: false

- id: "L22103-Q06"
  topic_code: "L22103"
  item_code: "L22103-6"
  difficulty: 1
  question: "卡方獨立性檢定（chi-square test of independence）主要用來檢查什麼？"
  options:
    a: "兩組平均數是否相等"
    b: "兩個類別變數之間是否具有關聯"
    c: "單一平均數是否等於某個基準值"
    d: "樣本平均數之差是否大於 0"
  correct: "b"
  explanation:
    why_correct: "卡方獨立性檢定針對列聯表中的類別計數，評估兩個類別變數是否獨立。"
    why_not_a: "平均數比較通常使用 t-test 或 ANOVA。"
    why_not_b: "此選項正確，這正是 chi-square independence test 的用途。"
    why_not_c: "這屬於單樣本平均數檢定。"
    why_not_d: "這是數值型平均差異問題，不是類別關聯。"
  keywords:
    - "chi-square"
    - "independence"
    - "categorical"
  exam_trap: false

- id: "L22103-Q07"
  topic_code: "L22103"
  item_code: "L22103-9"
  difficulty: 1
  question: "在 Python 的 `scipy.stats` 中，若要比較兩組獨立樣本平均數，哪個函式最直接對應獨立樣本 t 檢定（independent two-sample t-test）？"
  options:
    a: "`scipy.stats.f_oneway()`"
    b: "`scipy.stats.chi2_contingency()`"
    c: "`scipy.stats.ttest_ind()`"
    d: "`scipy.stats.ttest_rel()`"
  correct: "c"
  explanation:
    why_correct: "`ttest_ind()` 對應兩組獨立樣本平均數比較，是 independent two-sample t-test 的標準函式。"
    why_not_a: "`f_oneway()` 是 one-way ANOVA，不是兩組獨立樣本 t-test 的首選。"
    why_not_b: "`chi2_contingency()` 用於列聯表的卡方獨立性檢定。"
    why_not_c: "此選項正確，名稱中的 `ind` 即 independent。"
    why_not_d: "`ttest_rel()` 用於配對樣本，不適合獨立兩組。"
  keywords:
    - "scipy.stats"
    - "ttest_ind"
    - "independent two-sample t-test"
  exam_trap: false

- id: "L22103-Q08"
  topic_code: "L22103"
  item_code: "L22103-7"
  difficulty: 1
  question: "若要同時比較三個以上群組的平均數是否存在整體差異，最常用的統計量是下列哪一項？"
  options:
    a: "z 值（z statistic）"
    b: "t 值（t statistic）"
    c: "卡方值（chi-square statistic）"
    d: "F 值（F statistic）"
  correct: "d"
  explanation:
    why_correct: "三組以上平均數的整體比較通常使用 one-way ANOVA，其核心檢定統計量為 F 值。"
    why_not_a: "z 值不是此情境的典型統計量。"
    why_not_b: "t 值通常對應一組或兩組平均數比較。"
    why_not_c: "卡方值主要用於類別計數資料。"
    why_not_d: "此選項正確，F statistic 是 ANOVA 的標準統計量。"
  keywords:
    - "F statistic"
    - "ANOVA"
    - "平均數比較"
  exam_trap: false

- id: "L22103-Q09"
  topic_code: "L22103"
  item_code: "L22103-1"
  difficulty: 2
  question: "關於虛無假設（H0）與對立假設（H1）的設定，下列何者正確？"
  options:
    a: "H1 一定要寫成等號形式，例如 `μ = 50`"
    b: "H0 常包含等號，而 H1 表示差異、效果或方向性主張"
    c: "H0 與 H1 可以同時都寫成 `μ > 50`"
    d: "H1 只在 p-value 小於 0.01 時才需要設定"
  correct: "b"
  explanation:
    why_correct: "實務上 H0 常寫成等於或無差異，H1 才表示不同、大於或小於等方向。"
    why_not_a: "等號通常放在 H0，這是考生常見的符號陷阱。"
    why_not_b: "此選項正確，符合標準檢定設定。"
    why_not_c: "H0 與 H1 必須互斥，不可完全相同。"
    why_not_d: "在檢定開始前就要先設定 H0 與 H1，不能看完 p-value 才補寫。"
  keywords:
    - "H0"
    - "H1"
    - "假設設定"
  exam_trap: true

- id: "L22103-Q10"
  topic_code: "L22103"
  item_code: "L22103-2"
  difficulty: 2
  question: "下列哪一項最能正確描述型二錯誤（Type II error, β）？"
  options:
    a: "H0 為假時，卻未拒絕 H0"
    b: "H0 為真時，卻拒絕 H0"
    c: "H0 為假時，正確拒絕 H0"
    d: "只要 `α = 0.05`，β 一定等於 0.95"
  correct: "a"
  explanation:
    why_correct: "型二錯誤是 H0 其實錯了，但檢定沒有抓到。"
    why_not_a: "此選項正確，正是 β 的核心意義。"
    why_not_b: "這是型一錯誤 α。"
    why_not_c: "這是正確判斷，不是錯誤。"
    why_not_d: "α 與 β 相關但不互補成 1，還受效果大小與樣本數影響。"
  keywords:
    - "Type II error"
    - "beta"
  exam_trap: true

- id: "L22103-Q11"
  topic_code: "L22103"
  item_code: "L22103-3"
  difficulty: 2
  question: "關於 p-value 的意義，下列何者正確？"
  options:
    a: "它是 H0 為真的機率"
    b: "它是資料一定支持 H1 的比例"
    c: "它是樣本平均數等於母體平均數的機率"
    d: "它是在 H0 為真時，觀察到目前或更極端結果的機率"
  correct: "d"
  explanation:
    why_correct: "p-value 的條件前提是 H0 為真，衡量目前資料有多極端。"
    why_not_a: "這是最常見誤解；p-value 不是 H0 為真的後驗機率。"
    why_not_b: "p-value 不等於對 H1 的支持比例。"
    why_not_c: "這不是 p-value 的定義。"
    why_not_d: "此選項正確，符合教科書與官方學習指引用法。"
  keywords:
    - "p-value"
    - "extreme result"
    - "interpretation"
  exam_trap: true

- id: "L22103-Q12"
  topic_code: "L22103"
  item_code: "L22103-4"
  difficulty: 2
  question: "若單樣本平均數的 95% 信賴區間不包含假設值 `μ0`，在雙尾檢定（two-tailed test）且 `α = 0.05` 下，通常可推論什麼？"
  options:
    a: "一定發生型二錯誤"
    b: "H0 一定為真"
    c: "可拒絕 `H0: μ = μ0`"
    d: "代表資料不需要任何檢定"
  correct: "c"
  explanation:
    why_correct: "雙尾檢定中，95% CI 若不含假設值，通常對應 `p-value < 0.05`，因此拒絕 H0。"
    why_not_a: "型二錯誤無法僅靠這項資訊直接判斷。"
    why_not_b: "區間不包含假設值，反而代表 H0 缺乏支持。"
    why_not_c: "此選項正確，CI 與雙尾檢定在此常具有一致結論。"
    why_not_d: "CI 本身是統計推論工具，但不表示檢定可被忽略。"
  keywords:
    - "confidence interval"
    - "two-tailed test"
    - "reject H0"
  exam_trap: false

