  question: "閱讀下列 pseudocode，輸出結果為何？\n\n```python\nalpha = 0.05\np_value = 0.20\nif p_value <= alpha:\n    print(\"Reject H0\")\nelse:\n    print(\"Fail to reject H0\")\n```"
