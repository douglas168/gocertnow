- id: "L22103-Q40"
  topic_code: "L22103"
  item_code: "L22103-2"
  difficulty: 5
  question: "某醫療 AI 團隊在早期篩檢模型評估中，認為漏掉真正異常個案的代價很高。若只從假設檢定錯誤型態的觀點思考，團隊最可能特別關注哪一項？"
  options:
    a: "型二錯誤（Type II error, β），因為未偵測到真實效果或差異的代價高"
    b: "型一錯誤（Type I error, α），因為它永遠比 β 更重要"
    c: "只要看 p-value，不需要考慮 α 與 β"
    d: "只要信賴區間夠窄，就不會有任何錯誤"
  correct: "a"
  explanation:
    why_correct: "若漏判成本高，團隊通常會更關注型二錯誤 β 與檢定力。"
    why_not_a: "此選項正確，符合高漏失成本情境下的風險考量。"
    why_not_b: "哪種錯誤更重要取決於情境，不能一概而論。"
    why_not_c: "p-value 不是唯一決策元素，錯誤成本與 α/β 取捨也很重要。"
    why_not_d: "區間窄只代表估計較精確，不代表完全沒有錯誤。"
  keywords:
    - "Type II error"
    - "beta"
    - "power"
  exam_trap: false
