- id: "L22103-Q37"
  topic_code: "L22103"
  item_code: "L22103-9"
  difficulty: 5
  question: "下列哪段 SciPy 程式最符合「比較兩組獨立樣本平均數，且不假設變異數相等」的需求？"
  options:
    a: "`stats.ttest_rel(group_a, group_b)`"
    b: "`stats.chi2_contingency([group_a, group_b])`"
    c: "`stats.ttest_ind(group_a, group_b, equal_var=False)`"
    d: "`stats.f_oneway(group_a, group_b, equal_var=False)`"
  correct: "c"
  explanation:
    why_correct: "`ttest_ind(..., equal_var=False)` 對應不假設變異數相等的獨立樣本 t 檢定，適用兩組獨立樣本。"
    why_not_a: "`ttest_rel` 是配對樣本，不符合獨立兩組。"
    why_not_b: "卡方檢定不是拿來比較數值型平均數。"
    why_not_c: "此選項正確，也反映 SciPy 文件中的重要參數 `equal_var=False`。"
    why_not_d: "`f_oneway` 不是這個情境最直接的函式，且沒有這種標準參數用法。"
  keywords:
    - "ttest_ind"
    - "equal_var=False"
  exam_trap: false

- id: "L22103-Q38"
  topic_code: "L22103"
  item_code: "L22103-8"
  difficulty: 5
  question: "閱讀下列 decision logic：\n\n```python\nif p_value <= alpha:\n    conclusion = \"Reject H0\"\nelse:\n    conclusion = \"Accept H0\"\n```\n若要讓結論文字更符合官方與統計上較嚴謹的用語，最適合如何修改？"
  options:
    a: "把 `Reject H0` 改成 `H0 is false forever`"
    b: "把 `alpha` 改成 `beta` 即可"
    c: "把 `Accept H0` 改成 `Need more GPU`"
    d: "把 `Accept H0` 改成 `Fail to reject H0`"
  correct: "d"
  explanation:
    why_correct: "在 `p-value > α` 時，較嚴謹的表述是無法拒絕 H0，而不是接受 H0。"
    why_not_a: "Reject H0 也不代表永久證明 H0 為假。"
    why_not_b: "β 與此結論用語問題無關。"
    why_not_c: "這與統計結論無關。"
    why_not_d: "此選項正確，符合官方學習指引偏好的措辭。"
  keywords:
    - "Fail to reject H0"
    - "pseudocode"
    - "official wording"
  exam_trap: true

- id: "L22103-Q39"
  topic_code: "L22103"
  item_code: "L22103-6"
  difficulty: 5
  question: "某分析師想檢驗「推薦演算法版本（A/B）」與「是否點擊（有/無）」是否相關，卻打算把每組點擊率當成平均數去做 t-test。從檢定選擇角度看，哪個評估最恰當？"
  options:
    a: "完全正確，因為任何兩組比較都用 t-test"
    b: "較合適的是卡方獨立性檢定，因為兩變數皆為類別型"
    c: "較合適的是 one-way ANOVA，因為有兩個欄位"
    d: "較合適的是單樣本 t 檢定，因為點擊率只有一個比例"
  correct: "b"
  explanation:
    why_correct: "版本與點擊結果都是類別變數，重點是關聯性而非平均數，因此應優先考慮 chi-square independence test。"
    why_not_a: "不是所有兩組比較都用 t-test，資料型態是關鍵。"
    why_not_b: "此選項正確，直接抓到 categorical vs numerical 的分界。"
    why_not_c: "ANOVA 比較的是數值型平均數，不是類別關聯。"
    why_not_d: "單樣本 t-test 不處理這種列聯表關聯問題。"
