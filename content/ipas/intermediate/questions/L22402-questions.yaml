    why_not_b: "過擬合要看訓練與測試落差，不能只靠 AUC=0.5 就下結論。"
    why_not_c: "AUC 與特定門檻下的 Precision 不是同一概念。"
    why_not_d: "若完全沒有錯誤，AUC 反而應接近 1。"
  keywords:
