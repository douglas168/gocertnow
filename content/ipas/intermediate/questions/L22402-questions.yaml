- id: "L22402-Q21"
  topic_code: "L22402"
  item_code: "f1-score"
  difficulty: 3
  question: "某客服流失預測模型的 Precision=0.60、Recall=0.75。若產品經理要求用單一數值同時反映兩者平衡表現，則 F1-score 最接近何者？"
  options:
    a: "0.60"
    b: "0.80"
    c: "0.90"
    d: "0.67"
  correct: "d"
  explanation:
    why_correct: "F1 = 2 × 0.60 × 0.75 / (0.60 + 0.75) = 0.6667，最接近 0.67（≈ 0.6667）。"
    why_not_a: "0.60 只是 Precision，未整合 Recall。"
    why_not_b: "0.80 高於兩者中的較大值，不可能是調和平均。"
