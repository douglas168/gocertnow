  correct: "c"
  explanation:
    why_correct: "題目同時強調不要錯殺正常用戶與人工量能有限，代表需要先確保被攔下者大多真的有問題，因此應先以 Precision 為主，再做門檻調整。"
    why_not_a: "單純追求 Recall 可能導致大量正常求職者被誤攔。"
    why_not_b: "Accuracy 在此類不平衡篩選任務常無法對應實際營運成本。"
    why_not_d: "AUC 有助比較模型，但最終仍要落到門檻與作業量能。"
  keywords:
    - "Precision first"
    - "門檻調整"
    - "manual review capacity"
  exam_trap: false

- id: "L22402-Q36"
  topic_code: "L22402"
  item_code: "precision-recall"
  difficulty: 5
  question: "某詐欺偵測團隊用同一組 `predict_proba` 測試不同門檻。門檻從 0.8 降到 0.4 後，Recall 明顯提高，但誤報也變多。若主管問『這是否代表模型本身排序能力變好？』，最佳回答為何？"
  options:
    a: "是，因為 Recall 提高就代表模型更強"
    b: "否，這主要反映門檻改變；模型的排序能力不一定改變"
    c: "是，因為 FP 變多表示模型看到更多資訊"
    d: "否，但代表 AUC-ROC 一定下降"
  correct: "b"
  explanation:
    why_correct: "在同一組機率分數下調整門檻，只是改變決策切點；這會改變 Precision/Recall，但不代表模型本身的排序能力改變。"
    why_not_a: "Recall 提高可能只是門檻降低造成，不能直接視為模型本質變強。"
    why_not_c: "FP 增加通常是門檻放寬的副作用，不是『看到更多資訊』。"
    why_not_d: "若底層分數不變，AUC 通常也不變。"
  keywords:
    - "門檻效果"
    - "Recall increase"
    - "model ranking"
  exam_trap: true

- id: "L22402-Q37"
  topic_code: "L22402"
  item_code: "f1-score"
  difficulty: 5
  question: "兩個模型在同一資料集上的結果如下：模型 A 的 Precision=0.92、Recall=0.40；模型 B 的 Precision=0.70、Recall=0.70。若團隊想找『Precision 與 Recall 較均衡』的版本，最佳判斷為何？"
  options:
    a: "選 A，因為 Precision 更高就代表整體更好"
    b: "選 B，因為其 F1-score 較高且兩項指標更平衡"
    c: "兩者無法比較，因為沒有 TN"
    d: "選 A，因為 Recall 低可以完全忽略"
  correct: "b"
  explanation:
    why_correct: "模型 A 的 F1 約為 0.56，模型 B 的 F1 為 0.70。若目標是平衡 Precision 與 Recall，B 更符合需求。"
    why_not_a: "Precision 高不代表整體平衡較佳，Recall 過低會影響實務可用性。"
    why_not_c: "F1 不需要 TN 即可比較。"
    why_not_d: "Recall 低是否可忽略要看場景，題目已明示要看平衡。"
  keywords:
    - "F1-based selection"
    - "balanced performance"
    - "model comparison"
  exam_trap: false

- id: "L22402-Q38"
  topic_code: "L22402"
  item_code: "auc-roc"
  difficulty: 5
  question: "某分析師提出三種評估流程：1. 用 `predict()` 算 AUC-ROC；2. 用 `predict_proba()[:,1]` 算 AUC-ROC；3. 用 `predict_proba()[:,1]` 搭配多個門檻畫 ROC 曲線。若要符合標準做法，哪一種組合最佳？"
  options:
    a: "只有 1 正確"
    b: "只有 2 正確"
    c: "2 與 3 正確，且 3 是 2 的視覺化延伸"
    d: "1、2、3 都等價"
  correct: "c"
  explanation:
    why_correct: "AUC-ROC 的標準輸入是連續分數，如 `predict_proba()[:,1]`；ROC 曲線則是對不同門檻的視覺化，因此 2 與 3 都符合方法論。"
    why_not_a: "只用 hard label 算 AUC 會失去排序資訊，通常不建議。"
    why_not_b: "2 正確，但 3 也正確，且是 ROC 的直接操作方式。"
    why_not_d: "三者並不等價，1 的資訊量最低。"
  keywords:
    - "AUC workflow"
    - "ROC curve"
    - "predict_proba"
  exam_trap: true

- id: "L22402-Q39"
  topic_code: "L22402"
  item_code: "use-cases"
  difficulty: 5
  question: "某資料分析組要為三個專案制定第一優先指標：甲. 垃圾郵件攔截，重視正常信件不要被擋；乙. 醫療初篩，重視不要漏掉患者；丙. 尚未決定上線門檻的新模型比較。下列哪一組配對最佳？"
  options:
    a: "甲→Recall，乙→Precision，丙→Accuracy"
    b: "甲→Accuracy，乙→AUC-ROC，丙→Recall"
    c: "甲→Precision，乙→Recall，丙→AUC-ROC"
    d: "甲→F1-score，乙→Accuracy，丙→Precision"
  correct: "c"
  explanation:
    why_correct: "垃圾郵件重視別誤擋正常信件，優先看 Precision；醫療初篩怕漏診，優先看 Recall；門檻未定的模型比較，AUC-ROC 最合適。"
    why_not_a: "這組把前兩者的優先順序對調，也把模型比較誤交給 Accuracy。"
    why_not_b: "Accuracy 不適合垃圾郵件主痛點，AUC 也不能直接取代醫療初篩對漏診的關注。"
    why_not_d: "F1 有時有用，但若題目已清楚給出業務優先順序，就應先選更直接的指標。"
  keywords:
    - "metric selection"
    - "use case mapping"
    - "AUC-ROC"
  exam_trap: false

- id: "L22402-Q40"
  topic_code: "L22402"
  item_code: "sklearn-pseudocode"
  difficulty: 5
  question: "某新進工程師寫下流程：`model.fit(X_train, y_train)` → `y_prob = model.predict_proba(X_test)[:,1]` → `for t in [0.3,0.5,0.7]: y_pred = (y_prob >= t)` → 比較 Precision/Recall。從部署監控角度看，這段流程的最佳解讀是什麼？"
  options:
    a: "這是在做特徵選擇（Feature Selection）"
    b: "這是在把分類問題轉成回歸問題"
    c: "這是在重新訓練三個不同模型"
    d: "這是在固定同一模型分數後，透過不同門檻評估業務取捨"
  correct: "d"
  explanation:
    why_correct: "模型只訓練一次，後面是在同一組機率分數上測試不同門檻，觀察 Precision/Recall 如何隨業務門檻改變。"
    why_not_a: "流程中沒有任何特徵篩選步驟。"
    why_not_b: "輸出機率不代表改成回歸，仍是分類決策流程。"
    why_not_c: "只有 `.fit()` 一次，並沒有重訓三個模型。"
  keywords:
    - "門檻調整"
    - "deployment monitoring"
    - "predict_proba loop"
  exam_trap: false
