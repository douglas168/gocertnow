- id: "L22402-Q17"
  topic_code: "L22402"
  item_code: "confusion-matrix"
  difficulty: 3
  question: "某內容審查團隊收到模型報表：TP=45、FP=15、TN=120、FN=20。若主管問『被模型判定為違規的內容中，真的違規的比例是多少？』，應回覆下列何者？"
