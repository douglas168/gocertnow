- id: "L22402-Q01"
  topic_code: "L22402"
  item_code: "confusion-matrix"
  difficulty: 1
  question: "在二元分類的混淆矩陣（Confusion Matrix）中，實際為正類、模型也判定為正類，稱為下列何者？"
  options:
    a: "真陽性（True Positive, TP）"
    b: "假陽性（False Positive, FP）"
    c: "真陰性（True Negative, TN）"
    d: "假陰性（False Negative, FN）"
  correct: "a"
  explanation:
    why_correct: "真陽性表示實際標籤為正類，且模型預測也為正類，是分類正確且抓到目標事件的情況。"
    why_not_b: "假陽性是模型把實際負類誤判成正類。考生常因為看到『判成正類』就選 FP，卻忽略了實際標籤也是判斷條件。"
    why_not_c: "真陰性是實際與預測都為負類，和本題的『實際為正類』不符。"
    why_not_d: "假陰性是漏掉真正的正類，代表實際為正類但模型判成負類。"
  keywords:
    - "混淆矩陣"
    - "True Positive"
    - "TP"
  exam_trap: false

- id: "L22402-Q02"
  topic_code: "L22402"
  item_code: "confusion-matrix"
  difficulty: 1
  question: "若信用卡詐欺偵測模型將一筆正常交易誤判為詐欺，這在混淆矩陣（Confusion Matrix）中最適合記為何者？"
  options:
    a: "真陽性（True Positive, TP）"
    b: "假陽性（False Positive, FP）"
    c: "真陰性（True Negative, TN）"
    d: "假陰性（False Negative, FN）"
  correct: "b"
  explanation:
    why_correct: "正常交易屬於負類，卻被模型判成正類詐欺，因此是 False Positive。"
    why_not_a: "真陽性代表真的詐欺也被抓到。許多人只看到『模型有抓到異常』就誤選，但本題的實際類別是正常交易。"
    why_not_c: "真陰性應是正常交易且模型也判為正常，並非誤判。"
    why_not_d: "假陰性是漏掉真正詐欺案件，方向與本題相反。"
  keywords:
    - "False Positive"
    - "fraud detection"
    - "confusion matrix"
  exam_trap: false

- id: "L22402-Q03"
  topic_code: "L22402"
  item_code: "confusion-matrix"
  difficulty: 1
  question: "某模型的混淆矩陣（Confusion Matrix）為 TP=80、TN=50、FP=10、FN=20，則準確率（Accuracy）為何？"
  options:
    a: "0.80"
    b: "0.75"
    c: "0.8125"
    d: "0.8889"
  correct: "c"
  explanation:
    why_correct: "Accuracy = (TP + TN) / (TP + TN + FP + FN) = (80 + 50) / 160 = 0.8125。"
    why_not_a: "0.80 常來自把 80/100 直覺當成準確率，只看 TP 而忽略 TN、FP、FN。"
    why_not_b: "0.75 常見於分母分子代錯，例如只用部分欄位計算。"
    why_not_d: "0.8889 比較像 Precision = 80 / (80 + 10)，是把 Accuracy 與 Precision 混用的常見錯誤。"
  keywords:
    - "Accuracy"
    - "混淆矩陣計算"
    - "classification metric"
  exam_trap: true

- id: "L22402-Q04"
  topic_code: "L22402"
  item_code: "confusion-matrix"
  difficulty: 1
  question: "在疾病篩檢情境中，若病人實際有病，但模型預測為無病，這屬於哪一種結果？"
  options:
    a: "真陽性（True Positive, TP）"
    b: "假陽性（False Positive, FP）"
    c: "真陰性（True Negative, TN）"
    d: "假陰性（False Negative, FN）"
  correct: "d"
  explanation:
    why_correct: "實際為正類但預測為負類，就是假陰性，代表模型漏掉真正需要被偵測的個案。"
    why_not_a: "真陽性是成功找出病患，不是漏判。"
    why_not_b: "假陽性是把健康者誤判為有病，與本題的實際標籤不同。"
    why_not_c: "真陰性要求實際與預測都為負類，與題意不符。"
  keywords:
    - "False Negative"
    - "medical screening"
    - "FN"
  exam_trap: false

- id: "L22402-Q05"
  topic_code: "L22402"
  item_code: "confusion-matrix"
  difficulty: 1
  question: "關於混淆矩陣（Confusion Matrix）的列與欄，下列敘述何者最常見且正確？"
  options:
    a: "所有教材都固定列為預測、欄為實際，因此不必看標示"
    b: "混淆矩陣只能用於多類別分類，不能用於二元分類"
    c: "混淆矩陣只能看整體正確率，不能看錯誤型態"
    d: "閱讀混淆矩陣前，應先確認列與欄分別代表實際標籤或預測標籤"
  correct: "d"
  explanation:
    why_correct: "不同工具或教材的軸向定義可能不同，先確認標示才能正確辨識 TP、FP、TN、FN。"
    why_not_a: "這是常見誤解。若不看標示直接套公式，很容易把 FP 與 FN 對調。"
    why_not_b: "混淆矩陣可用於二元或多類別分類。"
    why_not_c: "混淆矩陣的核心價值正是拆解不同錯誤型態，而不只是一個總體比率。"
  keywords:
    - "confusion matrix axis"
    - "TP FP FN TN"
    - "interpretation"
  exam_trap: true

- id: "L22402-Q06"
  topic_code: "L22402"
  item_code: "precision-recall"
  difficulty: 1
  question: "在垃圾郵件過濾（Spam Filtering）情境中，如果企業最在意『正常郵件不要被誤判成垃圾郵件』，通常應優先觀察哪個指標？"
  options:
    a: "Precision（精確率）"
    b: "Recall（召回率）"
    c: "Accuracy（準確率）"
    d: "Support（樣本數）"
  correct: "a"
  explanation:
    why_correct: "當模型一旦判為垃圾郵件，希望大多數都真的為垃圾郵件，這就是重視降低 False Positive，因此應優先看 Precision。"
    why_not_b: "Recall 著重抓到多少真正垃圾郵件，較偏向降低漏網率，不是本題主要風險。"
    why_not_c: "Accuracy 在類別不平衡時可能看起來很高，卻無法反映正常郵件被誤殺的痛點。"
    why_not_d: "Support 只表示樣本數，不能直接表示預測品質。"
  keywords:
    - "Precision"
    - "spam filtering"
    - "false positive"
  exam_trap: false

- id: "L22402-Q07"
  topic_code: "L22402"
  item_code: "precision-recall"
  difficulty: 1
  question: "在詐欺偵測（Fraud Detection）情境中，若銀行更在意『不要漏掉真詐欺』，通常應優先提高哪個指標？"
  options:
    a: "Precision（精確率）"
    b: "Recall（召回率）"
    c: "Specificity（特異度）"
    d: "Accuracy（準確率）"
  correct: "b"
  explanation:
    why_correct: "不漏掉真詐欺代表要盡量降低 False Negative，因此優先追求較高的 Recall。"
    why_not_a: "Precision 著重被判成詐欺的案件中有多少真的詐欺，並不直接對應漏判成本。"
    why_not_c: "Specificity 是針對負類判對的能力，和『漏掉正類』不是同一件事。"
    why_not_d: "Accuracy 在詐欺比例很低時容易失真，不能作為唯一主指標。"
  keywords:
    - "Recall"
    - "fraud detection"
    - "false negative"
  exam_trap: false

- id: "L22402-Q08"
  topic_code: "L22402"
  item_code: "precision-recall"
  difficulty: 1
  question: "下列何者最能正確描述精確率（Precision）與召回率（Recall）的差異？"
  options:
    a: "Precision 衡量抓到多少真實正類；Recall 衡量預測正類中有多少是對的"
    b: "Precision 與 Recall 在任何資料集都一定相同"
    c: "Precision 衡量預測為正類中有多少是真的；Recall 衡量實際正類中有多少被抓到"
    d: "Precision 只能用在回歸（Regression），Recall 只能用在分類（Classification）"
  correct: "c"
  explanation:
    why_correct: "Precision 的分母是預測正類總數，Recall 的分母是實際正類總數，兩者回答的是不同管理問題。"
    why_not_a: "這是把兩者定義對調的典型考點。"
    why_not_b: "只有在極特殊情況下才可能接近，不是一般定義。"
    why_not_d: "Precision 與 Recall 都是分類任務常用指標，不是回歸指標。"
  keywords:
    - "Precision vs Recall"
    - "definition"
    - "classification metrics"
  exam_trap: true

- id: "L22402-Q09"
  topic_code: "L22402"
  item_code: "f1-score"
  difficulty: 2
  question: "關於 F1-score（F1 分數），下列敘述何者正確？"
  options:
    a: "F1-score 是 Precision 與 Recall 的算術平均"
    b: "F1-score 是 Precision 與 Recall 的調和平均（Harmonic Mean）"
    c: "F1-score 只需要 TN 與 FP 就能計算"
    d: "F1-score 只適用於回歸（Regression）"
  correct: "b"
  explanation:
    why_correct: "F1-score = 2PR / (P + R)，以調和平均方式平衡 Precision 與 Recall，避免其中一個極低時被算術平均掩蓋。"
    why_not_a: "算術平均無法凸顯不平衡表現，這是常見混淆。"
    why_not_c: "F1 來自 Precision 與 Recall，因此核心仍與 TP、FP、FN 有關，不是只看 TN 與 FP。"
    why_not_d: "F1 是分類指標，尤其常用於不平衡分類。"
  keywords:
    - "F1-score"
    - "harmonic mean"
    - "precision recall"
  exam_trap: false

- id: "L22402-Q10"
  topic_code: "L22402"
  item_code: "f1-score"
  difficulty: 2
  question: "若某模型的 Precision=0.8、Recall=0.5，則 F1-score（F1 分數）最接近下列何者？"
  options:
    a: "0.62"
    b: "0.80"
    c: "0.40"
    d: "0.65"
  correct: "a"
  explanation:
    why_correct: "F1 = 2PR / (P + R) = 2 × 0.8 × 0.5 / 1.3 ≈ 0.6154，最接近 0.62。"
    why_not_b: "0.80 是直接把較高的 Precision 當成 F1，忽略 Recall 較低會拉低結果。"
    why_not_c: "0.40 常見於錯把 Precision 與 Recall 相乘後未乘 2 或分母代錯。"
    why_not_d: "0.65 看似合理，但若沒有正確套用公式，容易高估 F1。"
  keywords:
    - "F1 calculation"
    - "Precision"
    - "Recall"
  exam_trap: false

- id: "L22402-Q11"
  topic_code: "L22402"
  item_code: "auc-roc"
  difficulty: 2
  question: "關於 ROC 曲線（Receiver Operating Characteristic Curve）與 AUC-ROC，下列敘述何者正確？"
  options:
    a: "AUC-ROC 一定要用最終 hard label 計算"
    b: "ROC 曲線的橫軸通常是真正率（True Positive Rate）"
    c: "ROC 曲線主要觀察不同門檻（threshold）下真正率與假正率的變化"
    d: "AUC-ROC 越低代表模型越穩定"
  correct: "c"
  explanation:
    why_correct: "ROC 曲線是以不同門檻掃描，觀察 TPR 與 FPR 的變化；AUC 則是該曲線下面積。"
    why_not_a: "AUC-ROC 的標準做法是使用 prediction scores，例如 `predict_proba` 的機率，而不是只用 hard label。"
    why_not_b: "ROC 的橫軸通常是 False Positive Rate，不是真正率。"
    why_not_d: "AUC 越高通常代表排序能力越好，越低不是越穩定。"
  keywords:
    - "ROC"
    - "AUC-ROC"
    - "門檻"
  exam_trap: true

