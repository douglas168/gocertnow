    why_not_b: "0.69 常見於把 45/(45+20) 算成 Recall，卻誤以為是『判為違規中真的違規』。"
    why_not_c: "0.90 並非由本題數值正確推得，容易來自只看 TN 主導的直覺。"
    why_not_d: "0.82 看起來像整體 Accuracy 近似值，但題目問的是正類預測的可信度。"
  keywords:
