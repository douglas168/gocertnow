    b: "直接等待所有新品累積大量資料後再開始"
    c: "只選最複雜模型，忽略資料來源差異"
    d: "只用單一門市資料建模，因為資料越單純越好"
  correct: "a"
  explanation:
    why_correct: "此題要求同時兼顧資料不足、場域差異與導入成本。先補代表性資料、借用相似商品訊號，再選可快速落地的模型，是較完整的折衷方案。"
    why_not_a: "正確答案。"
    why_not_c: "忽略資料來源差異會讓模型偏向特定場域。"
    why_not_d: "只用單一門市雖簡單，但泛化到其他門市的風險很高。"
  keywords:
    - "data-collection"
    - "tradeoff"
    - "deployment"
  exam_trap: false

- id: "L21301-Q34"
