- id: "L21301-Q14"
  topic_code: "L21301"
  item_code: "CATEGORICAL_ENCODING"
  difficulty: 2
  question: "關於目標編碼（Target Encoding），下列哪一項敘述最合理？"
  options:
    a: "它只適用於影像辨識"
    b: "它在高基數（High Cardinality）類別下可能比 one-hot encoding 更精簡，但要小心 target leakage"
    c: "它與 label encoding 完全相同"
    d: "它不會受到資料切分順序影響"
  correct: "b"
  explanation:
    why_correct: "target encoding 常用於高基數類別以避免欄位爆炸，但若在切分前就利用目標值編碼，容易洩漏答案資訊。"
    why_not_a: "這是表格資料常見技術，不是影像專用。"
    why_not_b: "正確答案。"
    why_not_c: "label encoding 只是指定代號，target encoding 則用目標統計資訊。"
    why_not_d: "切分順序非常關鍵，正是此方法的風險來源。"
  keywords:
    - "target-encoding"
    - "high-cardinality"
    - "data-leakage"
  exam_trap: true

- id: "L21301-Q15"
  topic_code: "L21301"
  item_code: "DATA_SPLIT_LEAKAGE"
  difficulty: 2
  question: "關於交叉驗證（Cross-Validation）的用途，下列何者正確？"
  options:
    a: "用來永久取代測試集（Test Set）"
    b: "用來把所有資料都變成訓練資料，不需驗證"
    c: "用來更公平地估計模型在不同資料切分下的表現"
    d: "用來把類別不平衡（Class Imbalance）自動消除"
  correct: "c"
  explanation:
    why_correct: "交叉驗證透過多次切分與評估，能減少單一次切分造成的偶然性，更公平比較模型泛化能力。"
    why_not_a: "交叉驗證常用於模型選擇，但最終仍應保留獨立測試集做最後驗證。"
    why_not_b: "交叉驗證本質上仍包含訓練與驗證角色，只是輪流切分。"
    why_not_d: "交叉驗證不會自動修正類別比例問題。"
  keywords:
    - "cross-validation"
    - "資料切分"
    - "模型比較"
  exam_trap: true

- id: "L21301-Q16"
  topic_code: "L21301"
  item_code: "CLASS_IMBALANCE"
  difficulty: 2
  question: "在高度類別不平衡（Class Imbalance）的二元分類中，只看準確率（Accuracy）最大的風險是什麼？"
  options:
    a: "可能掩蓋模型對少數類別的低辨識能力"
    b: "會讓資料自動產生異常值（Outlier）"
    c: "會讓訓練集與測試集大小不同"
    d: "會導致所有模型都無法訓練"
  correct: "a"
  explanation:
    why_correct: "若多數類別占比極高，只要一直猜多數類別就可能得到高 accuracy，但對真正重要的少數類別沒有辨識力。"
    why_not_a: "正確答案。"
    why_not_c: "評估指標不會改變資料切分大小。"
    why_not_d: "模型仍可訓練，只是評估方式若不當，會誤判效果。"
  keywords:
    - "accuracy"
    - "class-imbalance"
    - "evaluation-metric"
  exam_trap: true

- id: "L21301-Q17"
  topic_code: "L21301"
  item_code: "OUTLIER_HANDLING"
  difficulty: 3
  question: "某保險公司在理賠金額資料中發現少數極高數值。業務主管說這些可能是重大事故，而不是輸入錯誤。此時對異常值（Outlier）最合理的處理原則是什麼？"
  options:
    a: "先確認異常值是否具有業務意義，再決定保留、轉換或另行處理"
    b: "只要偏離平均數就全部刪除"
    c: "把所有高額理賠都改成平均值"
    d: "直接改用神經網路（Neural Network）就不用處理"
  correct: "a"
  explanation:
    why_correct: "異常值不一定是錯誤資料，可能代表重要事件。應先判斷其業務含義，再選擇保留、截尾或轉換。"
    why_not_a: "正確答案。"
    why_not_c: "全部改平均值會抹除真實重大事故訊號，是常見但危險的過度清洗。"
    why_not_d: "換模型不能替代資料理解，且高額事件是否保留是業務與資料判斷問題。"
  keywords:
    - "outlier-handling"
    - "業務情境"
    - "資料清洗"
  exam_trap: true

- id: "L21301-Q18"
  topic_code: "L21301"
  item_code: "FEATURE_SCALING"
  difficulty: 3
