- id: "L21301-Q35"
  topic_code: "L21301"
  item_code: "OUTLIER_HANDLING"
  difficulty: 5
  question: "某物流公司以配送時間預測延遲風險，資料中有少量極端長延遲紀錄。這些紀錄部分是系統輸入錯誤，部分是真實天災事件。若要建立可用於日常營運的模型，下列哪個方案最好？"
  options:
    a: "全部保留，不做任何檢查，避免人為介入"
    b: "全部刪除，因為極端值都會傷害模型"
    c: "區分錯誤資料與真實罕見事件；修正或排除明顯錯誤，並依應用目標決定是否保留真實極端事件"
    d: "把所有極端值改成中位數，最穩定"
  correct: "c"
  explanation:
    why_correct: "最佳方案要同時考慮資料品質與業務目的。輸入錯誤應處理；真實極端事件是否保留，要看模型是否服務日常營運或極端風險管理。"
    why_not_a: "完全不檢查會讓錯誤資料污染模型。"
    why_not_b: "把真實罕見事件全部刪除，可能喪失重要風險訊號。"
    why_not_c: "正確答案。"
    why_not_d: "全部改中位數雖簡單，但會混淆錯誤與真實事件。"
  keywords:
    - "outlier-handling"
    - "資料品質"
    - "業務目標"
  exam_trap: false

- id: "L21301-Q36"
