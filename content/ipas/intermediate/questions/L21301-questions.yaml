  item_code: "CLASS_IMBALANCE"
  difficulty: 5
  question: "某醫療篩檢模型中，陽性率只有 2%，且漏判陽性成本遠高於誤判陰性。若要在模型比較與部署決策間取得平衡，下列何者最佳？"
  options:
