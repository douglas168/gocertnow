  item_code: "MISSING_VALUE"
  difficulty: 5
  question: "某金融資料專案中，收入欄位缺失多集中在高資產客群，且該欄位對授信判斷重要。若目標是做穩健模型比較，哪個做法最好？"
  options:
    a: "直接刪除所有缺失列，因為最乾淨"
    b: "先分析缺失是否具系統性，再設計合適插補策略或缺失指標，並在訓練流程內完成以避免 leakage"
    c: "在全資料集用平均數補完後再切分"
    d: "將缺失都當作 0，因為收入越低風險越高"
  correct: "b"
  explanation:
    why_correct: "題目同時涉及缺失機制、欄位重要性與 leakage。最佳做法是先判斷缺失是否系統性，再在正確切分流程中處理。"
    why_not_a: "若缺失集中在特定客群，直接刪除可能使樣本偏差更嚴重。"
    why_not_b: "正確答案。"
    why_not_c: "先全資料插補會把測試資訊帶入流程。"
    why_not_d: "把缺失直接當 0 是把未知值誤當真實值，風險很高。"
