    why_not_a: "accuracy 在 2% 陽性率下容易誤導。"
    why_not_b: "可解釋性重要，但若忽略陽性辨識能力，可能無法滿足醫療場景需求。"
    why_not_c: "單純切分不能解決不平衡與成本敏感問題。"
