- id: "L21301-Q38"
  topic_code: "L21301"
  item_code: "MODEL_TRADEOFFS"
  difficulty: 5
  question: "某企業要做客戶流失預測，要求：1. 必須向法遵說明主要判斷依據；2. 資料量中等；3. 預算有限；4. 希望比單一規則更準。下列哪種方案最合適？"
  options:
    a: "大型神經網路（Neural Network），因為表現潛力最高"
    b: "只用人工規則，不建立模型"
    c: "以決策樹（Decision Tree）或其他較可解釋模型為優先，再依驗證結果評估是否需要更穩健但較難解釋的方案"
    d: "固定使用 k-NN（k-Nearest Neighbors），因為最便宜"
  correct: "c"
  explanation:
    why_correct: "題目核心是可解釋性、預算與中等資料量的折衷。先以較可解釋模型為主，再依效果評估是否接受可解釋性下降的方案，最符合實務。"
    why_not_a: "神經網路可能過度超出成本與解釋要求。"
    why_not_b: "純規則雖可解釋，但題目希望比單一規則更準，應至少比較模型方案。"
    why_not_c: "正確答案。"
    why_not_d: "k-NN 不一定最便宜，推論成本也可能偏高，且未必最適合此情境。"
  keywords:
    - "model-tradeoff"
    - "compliance"
    - "interpretability"
  exam_trap: false

- id: "L21301-Q39"
  topic_code: "L21301"
  item_code: "MODEL_COMPARISON"
  difficulty: 5
  question: "某團隊要在 SVM（Support Vector Machine）、隨機森林（Random Forest）與神經網路（Neural Network）之間做選擇，條件是：資料量中等、數值尺度差異大、需要穩定表現、可接受中等可解釋性。哪個判斷最合理？"
  options:
    a: "SVM 一定最佳，因為資料量中等"
    b: "神經網路一定最佳，因為所有問題都可用深度學習解決"
    c: "隨機森林常是務實選項；SVM 可比較但需重視縮放，神經網路則要再評估資料量與成本是否值得"
    d: "三者完全等價，只要看誰名字比較新"
  correct: "c"
  explanation:
    why_correct: "題目要求綜合尺度敏感度、資料量、穩定性與成本。隨機森林常是中等資料量下的穩健基準；SVM 可行但需縮放；神經網路未必划算。"
    why_not_a: "SVM 不是一定最佳，還要看尺度處理、特徵性質與實際驗證結果。"
    why_not_b: "這是常見迷思，深度學習不是所有表格問題的預設答案。"
    why_not_c: "正確答案。"
    why_not_d: "模型選擇應基於條件與驗證，不是名氣。"
  keywords:
    - "svm"
    - "random-forest"
    - "neural-network"
  exam_trap: true

- id: "L21301-Q40"
  topic_code: "L21301"
  item_code: "DATA_SPLIT_LEAKAGE"
  difficulty: 5
  question: "某專案要比較多種模型，資料包含高基數類別欄位、缺失值與類別不平衡問題。若目標是得到最可信的最終比較結果，下列流程何者最佳？"
  options:
    a: "先在全資料完成編碼、插補、特徵選擇，再切分資料以節省時間"
    b: "先切分訓練/驗證/測試，再在訓練流程內處理插補、編碼與不平衡，最後保留測試集做一次性驗證"
    c: "直接在測試集上反覆調整前處理與模型，找到最高分方案"
    d: "只要用交叉驗證（Cross-Validation），就不必擔心任何 leakage"
  correct: "b"
  explanation:
    why_correct: "可信比較的關鍵是先切分資料，並讓所有會學到資料統計或目標資訊的處理都只在訓練流程內完成，最後用獨立測試集驗證。"
    why_not_a: "先全資料前處理是最典型的 leakage 來源之一。"
    why_not_b: "正確答案。"
    why_not_c: "測試集不應被反覆用來調參，否則失去最終驗證意義。"
    why_not_d: "交叉驗證能改善估計穩定性，但若流程設計錯誤，仍然會 leakage。"
  keywords:
    - "data-split"
    - "data-leakage"
    - "model-comparison"
  exam_trap: true
