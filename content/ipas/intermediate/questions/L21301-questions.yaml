- id: "L21301-Q37"
  topic_code: "L21301"
  item_code: "FEATURE_ENGINEERING"
  difficulty: 5
  question: "某 B2B 銷售預測專案中，團隊有大量原始欄位，但可用樣本有限，且管理層希望模型結果可被說明。哪個策略最符合這三個限制？"
  options:
    a: "盡量保留所有欄位，讓模型自己挑選"
    b: "優先建立具商業意義的衍生特徵與精簡特徵集合，再比較較可解釋的模型"
    c: "只要樣本有限，就一定不能做特徵工程"
    d: "直接用最高複雜度模型，因為特徵工程會浪費時間"
  correct: "b"
  explanation:
