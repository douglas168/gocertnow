- id: "L21301-Q01"
  topic_code: "L21301"
  item_code: "DATA_COLLECTION"
  difficulty: 1
  question: "在數據收集（Data Collection）階段，若企業希望降低後續分析偏差，最優先應確認哪一項？"
  options:
    a: "資料來源是否與業務目標與母體一致"
    b: "資料表欄位名稱是否全部使用英文"
    c: "是否先選定最複雜的模型"
    d: "是否先把所有欄位做標準化（Standardization）"
  correct: "a"
  explanation:
    why_correct: "資料若一開始就不代表實際目標母體，再精細的清洗與建模都難以補救，因此來源與蒐集對象是否符合業務問題是首要確認點。"
    why_not_a: "正確答案。"
    why_not_c: "先選複雜模型是常見誤區。模型能力無法彌補樣本代表性不足，反而可能掩蓋資料問題。"
    why_not_d: "標準化屬於後續預處理工作，而且只有部分模型特別依賴尺度處理，不是收集階段的優先事項。"
  keywords:
    - "數據收集"
    - "data-collection"
    - "代表性"
  exam_trap: false

- id: "L21301-Q02"
  topic_code: "L21301"
  item_code: "MISSING_VALUE"
  difficulty: 1
  question: "缺失值處理（Missing Value Handling）中，「插補（Imputation）」的主要概念是什麼？"
  options:
    a: "把整個資料集直接刪除後重收"
    b: "以合理方式補上缺漏值，保留更多資料"
    c: "只保留有缺值的欄位"
    d: "把缺失值全部視為異常值（Outlier）"
  correct: "b"
  explanation:
    why_correct: "插補是用平均數、中位數、眾數或其他合理方法填補缺漏值，目的在降低資料流失並維持分析可用性。"
    why_not_a: "全部重收資料成本極高，也不是缺失值處理的定義。考生常把資料品質問題誤認為一定要從頭蒐集。"
    why_not_c: "只保留有缺值欄位沒有處理問題本身，反而會讓資訊更少。"
    why_not_d: "缺失值與異常值是不同概念。缺失值是未觀測到，異常值是觀測到但偏離常態。"
  keywords:
    - "缺失值"
    - "imputation"
    - "資料清洗"
  exam_trap: false

- id: "L21301-Q03"
  topic_code: "L21301"
  item_code: "OUTLIER_HANDLING"
  difficulty: 1
  question: "下列何者最符合異常值（Outlier）的定義？"
  options:
    a: "所有文字型欄位"
    b: "所有空白或 null 值"
    c: "與大多數觀測值差異顯著的資料點"
    d: "經過標準化（Standardization）後的數值"
  correct: "c"
  explanation:
    why_correct: "異常值是相對於整體資料分布顯著偏離的觀測值，可能來自錯誤、罕見事件或真實極端情況。"
    why_not_a: "資料型態是文字不代表它是異常值，這是把欄位型態與數值分布概念混淆。"
    why_not_b: "空值屬於缺失值，不是異常值。這是考場常見混淆。"
    why_not_d: "標準化只是轉換尺度，不會讓資料自然成為異常值。"
  keywords:
    - "異常值"
    - "outlier"
    - "資料分布"
  exam_trap: true

- id: "L21301-Q04"
  topic_code: "L21301"
  item_code: "FEATURE_SCALING"
  difficulty: 1
  question: "當特徵縮放（Feature Scaling）題目提到「標準化（Standardization）」時，通常是在做什麼？"
  options:
    a: "把所有欄位改成 0 或 1"
    b: "只保留最大值與最小值"
    c: "把類別欄位轉成編碼"
    d: "讓特徵落在可比較的尺度，常以平均數與標準差為基準"
  correct: "d"
  explanation:
    why_correct: "標準化的核心是把不同量綱的特徵轉為可比較尺度，常見做法會參考平均數與標準差。"
    why_not_a: "0/1 通常與二元化或 one-hot encoding 有關，不是標準化的定義。"
    why_not_b: "只看極值比較像正規化（Normalization）中的區間壓縮概念，也不是完整描述。"
    why_not_c: "類別編碼屬於 categorical encoding，不是 feature scaling。"
  keywords:
    - "特徵縮放"
    - "standardization"
    - "尺度敏感"
  exam_trap: true

- id: "L21301-Q05"
  topic_code: "L21301"
  item_code: "CATEGORICAL_ENCODING"
  difficulty: 1
  question: "類別特徵編碼（Categorical Encoding）中，one-hot encoding 最適合用來表達什麼？"
  options:
    a: "無大小順序的離散類別"
    b: "只適用連續數值"
    c: "時間序列的季節性"
    d: "缺失值插補結果"
  correct: "a"
  explanation:
    why_correct: "one-hot encoding 會為每個類別建立獨立欄位，特別適合無自然順序的名目型類別。"
    why_not_a: "正確答案。"
    why_not_c: "季節性可以被編碼，但題目問的是 one-hot 最典型適用情境，不是時間序列本身。"
    why_not_d: "插補是填補缺值，不是類別編碼方法。"
  keywords:
    - "類別編碼"
    - "one-hot-encoding"
    - "名目型資料"
  exam_trap: false

- id: "L21301-Q06"
  topic_code: "L21301"
  item_code: "DATA_SPLIT_LEAKAGE"
  difficulty: 1
  question: "在資料切分（Data Split）中，測試集（Test Set）的主要用途是什麼？"
  options:
    a: "用來反覆調整模型超參數"
    b: "用來做最終泛化能力（Generalization）驗證"
    c: "用來補齊缺失值"
    d: "用來決定要不要收集資料"
  correct: "b"
  explanation:
    why_correct: "測試集應保留到最後，用於評估模型對未見資料的泛化能力，避免調參造成評估偏樂觀。"
    why_not_a: "這是典型考點。反覆用測試集調參會造成 data leakage 與高估表現。"
    why_not_c: "缺失值處理應在資料準備流程中完成，且要避免把測試集資訊帶回訓練。"
    why_not_d: "資料收集決策來自業務需求與資料盤點，不是測試集的角色。"
  keywords:
    - "test-set"
    - "generalization"
    - "data-leakage"
  exam_trap: true

- id: "L21301-Q07"
  topic_code: "L21301"
  item_code: "CLASS_IMBALANCE"
  difficulty: 1
  question: "類別不平衡（Class Imbalance）是指什麼情況？"
  options:
    a: "所有欄位都做過標準化"
    b: "資料集只有數值欄位"
    c: "不同類別的樣本數差異很大"
    d: "訓練集、驗證集、測試集大小完全相同"
  correct: "c"
  explanation:
    why_correct: "類別不平衡表示某些類別樣本遠多於其他類別，可能使模型偏向多數類別。"
    why_not_a: "標準化與類別比例無關。"
    why_not_b: "欄位型態與類別分布是不同概念。"
    why_not_d: "資料切分比例與類別不平衡沒有直接對應。"
  keywords:
    - "類別不平衡"
    - "class-imbalance"
    - "樣本比例"
  exam_trap: false

- id: "L21301-Q08"
  topic_code: "L21301"
  item_code: "FEATURE_ENGINEERING"
  difficulty: 1
  question: "特徵工程（Feature Engineering）的主要目的為何？"
  options:
    a: "讓所有模型都變成黑箱（Black Box）"
    b: "只增加欄位數量，不考慮品質"
    c: "完全取代模型選擇"
    d: "把原始資料轉成更有助於模型學習的表徵"
  correct: "d"
  explanation:
    why_correct: "特徵工程的重點是提升資料對任務的表達力，讓模型更容易學到有效模式。"
    why_not_a: "特徵工程不等於讓模型更難解釋，很多情況反而能提升可解釋性。"
    why_not_b: "只堆疊欄位是常見誤區，無關特徵過多可能增加雜訊。"
    why_not_c: "模型選擇與特徵工程互補，並非彼此取代。"
  keywords:
    - "特徵工程"
    - "feature-engineering"
    - "資料表徵"
  exam_trap: false

- id: "L21301-Q09"
  topic_code: "L21301"
  item_code: "MODEL_TRADEOFFS"
  difficulty: 2
  question: "關於模型選擇權衡（Model Selection Tradeoff），下列敘述何者正確？"
  options:
    a: "可解釋性高的模型一定比複雜模型準確"
    b: "模型表現只由演算法決定，與資料品質無關"
    c: "可解釋性、表現、成本常需同時權衡"
    d: "只要資料量大，就不需要考慮模型特性"
  correct: "c"
  explanation:
    why_correct: "實務上必須在可解釋性、預測表現、部署成本、資料量需求之間做取捨，沒有單一模型在所有條件下都最好。"
    why_not_a: "可解釋性高不代表一定最準，這是把單一評估面向絕對化。"
    why_not_b: "資料品質、標註品質與前處理都會深刻影響模型表現。"
    why_not_d: "即使資料量大，仍需考慮可解釋性、延遲、尺度敏感度與維運成本。"
  keywords:
    - "模型選擇"
    - "tradeoff"
    - "可解釋性"
  exam_trap: false

- id: "L21301-Q10"
  topic_code: "L21301"
  item_code: "MODEL_COMPARISON"
  difficulty: 2
  question: "關於決策樹（Decision Tree）與隨機森林（Random Forest）的比較，下列何者正確？"
  options:
    a: "決策樹通常比隨機森林更穩健且較不易過擬合"
    b: "隨機森林通常比單一決策樹更穩健，但可解釋性較低"
    c: "兩者都完全不受資料品質影響"
    d: "兩者都必須先做 one-hot encoding 才能使用"
  correct: "b"
  explanation:
    why_correct: "隨機森林透過多棵樹集成，通常能降低單一樹的高變異問題，但整體結構較不直觀。"
    why_not_a: "單一決策樹容易過擬合，是教材中常見比較點。"
    why_not_b: "正確答案。"
    why_not_c: "再穩健的模型也會受缺值、標註錯誤與偏差資料影響。"
    why_not_d: "樹模型不一定必須做 one-hot encoding；是否需要仍取決於資料表示方式與工具環境。"
  keywords:
    - "decision-tree"
    - "random-forest"
    - "模型比較"
  exam_trap: true

- id: "L21301-Q11"
  topic_code: "L21301"
  item_code: "DATA_COLLECTION"
  difficulty: 2
  question: "若公司蒐集顧客回饋數據（Customer Feedback Data）只來自高價會員，對整體市場預測可能造成什麼問題？"
  options:
    a: "資料會自動完成標準化（Standardization）"
    b: "模型一定比較容易訓練"
    c: "樣本代表性不足，可能產生抽樣偏差（Sampling Bias）"
    d: "可直接避免類別不平衡（Class Imbalance）"
  correct: "c"
  explanation:
    why_correct: "若資料只來自特定族群，模型學到的是偏向該族群的模式，無法代表整體市場。"
    why_not_a: "抽樣來源與數值尺度處理無關。"
    why_not_b: "資料量集中於單一族群不代表訓練更有效，反而可能犧牲泛化能力。"
    why_not_d: "抽樣偏差不會自然解決類別不平衡，兩者是不同資料問題。"
  keywords:
    - "sampling-bias"
    - "數據收集"
    - "代表性"
  exam_trap: false

- id: "L21301-Q12"
  topic_code: "L21301"
  item_code: "MISSING_VALUE"
  difficulty: 2
  question: "下列何者最能正確描述刪除缺失資料列（Deletion）與插補（Imputation）的差異？"
  options:
    a: "刪除一定比插補更準確"
    b: "插補一定不會引入偏差"
    c: "只要有缺值，就必須刪除整欄"
    d: "刪除會減少資料量；插補則是在保留資料量與引入假設之間取捨"
  correct: "d"
  explanation:
    why_correct: "刪除法較直接，但可能損失大量資訊；插補保留資料量，但會加入對資料分布的假設，因此需要權衡。"
    why_not_a: "刪除是否較好取決於缺失比例與缺失機制，不是固定答案。"
    why_not_b: "插補仍可能帶來偏差，尤其缺失機制不隨機時。"
    why_not_c: "整欄刪除是極端作法，除非該欄重要性低且缺失嚴重，否則不一定合理。"
  keywords:
    - "deletion"
    - "imputation"
    - "缺失值"
  exam_trap: true

- id: "L21301-Q13"
  topic_code: "L21301"
  item_code: "FEATURE_SCALING"
  difficulty: 2
  question: "關於特徵縮放（Feature Scaling），下列敘述何者正確？"
  options:
    a: "k-NN 與 SVM 通常比樹模型更受特徵尺度影響"
    b: "決策樹一定必須做標準化（Standardization）才可訓練"
    c: "做了縮放後就不需要資料切分"
    d: "縮放只能用在影像資料，不能用在表格資料"
  correct: "a"
  explanation:
    why_correct: "k-NN 與 SVM 依賴距離或邊界尺度，特徵量綱差異大時影響較明顯；樹模型通常相對不敏感。"
    why_not_a: "正確答案。"
    why_not_c: "縮放無法取代資料切分，這是把預處理與評估設計混為一談。"
    why_not_d: "表格資料正是縮放題最常見的出題情境。"
  keywords:
