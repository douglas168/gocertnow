# L21102 電腦視覺技術與應用 — 練習題庫 (40 題)
# iPAS AI 應用規劃師 中級 · 科目一 · 電腦視覺
# 難度分布 8/8/8/8/8 · 答案分布 a=10 b=10 c=10 d=10 · exam_trap = 14 題

questions:
  # ============================================================
  # Difficulty 1 — Remember (Q01–Q08)
  # ============================================================

  - id: "L21102-Q01"
    topic_code: "L21102"
    item_code: "L21102"
    difficulty: 1
    question: "關於卷積神經網路（Convolutional Neural Network, CNN）的池化層（Pooling Layer），下列哪一項「不是」其主要目的？"
    options:
      a: "縮小特徵圖（feature map）尺寸"
      b: "降低後續層的參數量與運算量"
      c: "抽取新的局部特徵（local feature）"
      d: "提升對平移變化的不變性（translation invariance）"
    correct: "c"
    explanation:
      why_correct: "池化層的目的是「縮小尺寸、保留主要訊號、降低參數量、提升平移不變性」。抽取特徵是卷積層（convolutional layer）的工作，池化只是「降採樣」既有特徵圖，不會抽出新特徵。口訣「卷積負責生（特徵圖），池化負責縮（空間維度）」。"
      why_not_a: "縮小特徵圖尺寸（down-sampling）正是池化的核心功能之一，選它等於答對。"
      why_not_b: "池化把 H×W 縮小，後續層的參數量與運算量都會下降，這是真的。"
      why_not_d: "最大池化（max pooling）讓輸入有小幅平移時輸出仍相似，這就是平移不變性的主要來源，是正確敘述。"
    keywords:
      - "池化層"
      - "pooling"
      - "平移不變性"
      - "translation invariance"
    exam_trap: true

  - id: "L21102-Q02"
    topic_code: "L21102"
    item_code: "L21102"
    difficulty: 1
    question: "下列哪一項是卷積神經網路（CNN）卷積輸出尺寸公式？其中 W 為輸入邊長、F 為 kernel 大小、P 為 padding、S 為 stride。"
    options:
      a: "O = W / S"
      b: "O = (W − F + 2P) / S + 1"
      c: "O = (W + F − 2P) / S − 1"
      d: "O = W × S − F + P"
    correct: "b"
    explanation:
      why_correct: "卷積輸出尺寸公式為 O = (W − F + 2P) / S + 1，需為整數。此公式幾乎是中級 CV 計算題的唯一命題來源。"
      why_not_a: "只用 W/S 忽略了 kernel 大小與 padding 的修正項，會得到錯誤結果。"
      why_not_c: "符號顛倒，padding 應為加項（補 2P），kernel 應為減項，此選項完全反過來。"
      why_not_d: "乘以 stride 是錯的方向——stride 越大輸出越小，應為除法。"
    keywords:
      - "卷積輸出"
      - "convolution output"
      - "stride"
      - "padding"
    exam_trap: true

  - id: "L21102-Q03"
    topic_code: "L21102"
    item_code: "L21102"
    difficulty: 1
    question: "YOLO（You Only Look Once）屬於下列哪一類型的物件偵測（object detection）架構？"
    options:
      a: "單階段（single-shot / one-stage）偵測器"
      b: "兩階段（two-stage）偵測器"
      c: "Faster R-CNN 是單階段偵測器，速度通常優於 YOLO"
      d: "純生成式（generative）模型"
    correct: "a"
    explanation:
      why_correct: "YOLO 一次 forward pass 直接輸出整張圖的所有 bbox 與類別預測，屬於單階段偵測器，速度為其核心優勢。"
      why_not_b: "兩階段偵測器（如 Faster R-CNN）先用 RPN 產生約 2000 個候選框再分類，不是 YOLO 的做法。"
      why_not_c: "Faster R-CNN 是兩階段（先 RPN 再分類）；YOLO 才是單階段。兩階段精度略高但速度慢，屬常見混淆。"
      why_not_d: "YOLO 是判別式模型（predicts labels），不是生成式（生成新影像）模型。"
    keywords:
      - "YOLO"
      - "single-shot detector"
      - "物件偵測"
    exam_trap: false

  - id: "L21102-Q04"
    topic_code: "L21102"
    item_code: "L21102"
    difficulty: 1
    question: "在物件偵測中，IoU（Intersection over Union）的定義為何？"
    options:
      a: "預測框的面積 ÷ 真實框的面積"
      b: "預測框邊長 ÷ 真實框邊長"
      c: "預測信心分數（confidence）× 類別機率"
      d: "兩框交集面積 ÷ 兩框聯集面積"
    correct: "d"
    explanation:
      why_correct: "IoU = Area(A ∩ B) / Area(A ∪ B)，即交集面積除以聯集面積，範圍 [0, 1]，≥ 0.5 通常視為正確偵測（True Positive）。"
      why_not_a: "單純面積比不考慮「兩框是否真的重疊」，兩框完全錯開仍會得到 1.0，顯然不合理。"
      why_not_b: "邊長比忽略了 2D 空間的重疊關係，不是 IoU 定義。"
      why_not_c: "信心分數與類別機率是用於排序預測框、或計算 AP 的輸入，並不是 IoU。"
    keywords:
      - "IoU"
      - "Intersection over Union"
      - "交集比聯集"
    exam_trap: false

  - id: "L21102-Q05"
    topic_code: "L21102"
    item_code: "L21102"
    difficulty: 1
    question: "ResNet（Residual Network）最重要的架構創新是下列哪一項？"
    options:
      a: "引入 attention 機制取代卷積"
      b: "池化層具有可訓練權重，透過梯度下降自動學習"
      c: "在 block 之間加入恆等捷徑（identity shortcut / skip connection）"
      d: "把卷積核固定為 1×1 以減少參數"
    correct: "c"
    explanation:
      why_correct: "ResNet 的核心是殘差連接（residual / skip connection）：H(x) = F(x) + x，讓梯度有捷徑反傳、並讓深層最差也能退化成恆等映射，解決退化問題（degradation）。"
      why_not_a: "Attention 機制屬於 Transformer / ViT 範疇，不是 ResNet 的創新。"
      why_not_b: "池化層（max/avg pool）沒有可訓練參數，只是固定的降取樣操作，不會透過梯度下降學習；常與卷積層混淆。"
      why_not_d: "ResNet 裡確實有用 1×1 bottleneck 降維，但那是效率優化、不是「最重要的創新」。"
    keywords:
      - "ResNet"
      - "skip connection"
      - "residual block"
      - "殘差連接"
    exam_trap: false

  - id: "L21102-Q06"
    topic_code: "L21102"
    item_code: "L21102"
    difficulty: 1
    question: "下列何者是語意分割（Semantic Segmentation）的標準代表架構？"
    options:
      a: "ResNet-50"
      b: "U-Net"
      c: "Mask R-CNN 是典型的物件偵測模型，與 YOLO 同屬單階段架構"
      d: "Faster R-CNN"
    correct: "b"
    explanation:
      why_correct: "U-Net 由 Ronneberger 等人（2015）提出，採 encoder-decoder 搭配 skip connection，是語意分割（尤其醫學影像）的經典代表。其他常見架構還有 FCN、DeepLab。"
      why_not_a: "ResNet-50 是影像分類（classification）的代表 backbone，輸出單一 label，不是分割架構。"
      why_not_c: "Mask R-CNN 是實例分割模型（擴展自 Faster R-CNN 加 mask branch），屬兩階段架構，不是單階段偵測，也不是語意分割。"
      why_not_d: "Faster R-CNN 也是物件偵測，分割要看 Mask R-CNN（而且是實例分割，不是語意）。"
    keywords:
      - "semantic segmentation"
      - "U-Net"
      - "語意分割"
    exam_trap: false

  - id: "L21102-Q07"
    topic_code: "L21102"
    item_code: "L21102"
    difficulty: 1
    question: "mAP@0.5:0.95（COCO 標準）實際上是幾個 IoU 門檻下的 mAP 平均？"
    options:
      a: "1 個（只取 0.5）"
      b: "2 個（0.5 與 0.95）"
      c: "5 個（0.5, 0.6, 0.7, 0.8, 0.9）"
      d: "10 個（0.50, 0.55, 0.60, …, 0.95，間隔 0.05）"
    correct: "d"
    explanation:
      why_correct: "COCO 評測的 mAP@0.5:0.95 是在 IoU 門檻 {0.50, 0.55, 0.60, …, 0.95} 共 10 個門檻各算一次 mAP 再平均，是現代論文標配的嚴格指標。"
      why_not_a: "單一 0.5 門檻是 mAP@0.5（PASCAL VOC 傳統），不是 mAP@0.5:0.95。"
      why_not_b: "只取兩個端點門檻不符合 COCO 定義。"
      why_not_c: "間隔 0.1 會只得到 5 個門檻，但 COCO 實際用 0.05 間隔，共 10 個。"
    keywords:
      - "mAP"
      - "COCO"
      - "IoU threshold"
    exam_trap: true

  - id: "L21102-Q08"
    topic_code: "L21102"
    item_code: "L21102"
    difficulty: 1
    question: "下列何者是影像分類（Image Classification）的典型輸出？"
    options:
      a: "一個類別 label 與其機率"
      b: "一組 bounding box 與類別"
      c: "每個像素的類別（per-pixel label）"
      d: "每個個體獨立的 mask"
    correct: "a"
    explanation:
      why_correct: "影像分類的輸出就是「整張圖屬於哪一個類別」，通常伴隨 softmax 機率分布。"
      why_not_b: "輸出 bbox + 類別是物件偵測（如 YOLO、Faster R-CNN）。"
      why_not_c: "逐像素類別是語意分割（U-Net、DeepLab）。"
      why_not_d: "逐個體 mask 是實例分割（Mask R-CNN）。"
    keywords:
      - "image classification"
      - "影像分類"
    exam_trap: false

  # ============================================================
  # Difficulty 2 — Understand (Q09–Q16)
