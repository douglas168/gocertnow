  - id: "L21102-Q39"
    topic_code: "L21102"
    item_code: "L21102"
    difficulty: 5
    question: "綜合評估：一家公司要為零售店做「即時顧客動線分析」，需求為 (1) 在多支店內攝影機上 15+ FPS 運行；(2) 同時追蹤店內多位顧客（每人要分開成獨立 ID）；(3) 算力限制為中階 GPU server；(4) 預算緊、團隊人力有限。下列架構組合何者最合理？"
    options:
      a: "Mask R-CNN + 全系列 backbone，追求最高精度"
      b: "ResNet 分類 + 手寫規則計數"
      c: "YOLO 系列（v8/v10）做即時偵測 + 下游接 tracking（如 ByteTrack / BoT-SORT）進行 ID 關聯；若預算允許再加 pose 或 re-ID 以強化多攝影機 ID 一致"
      d: "以 DeepLab 做語意分割後，用質心追蹤客群移動軌跡"
    correct: "c"
    explanation:
      why_correct: "需求需平衡即時（15 FPS、中階 GPU）+ 個體追蹤 + 預算/人力有限。業界標準解法是「YOLO 偵測 + 輕量 tracker」。此組合可即時運行、成熟工具鏈多、調校門檻低。實例分割在此場景是 overkill。"
      why_not_a: "Mask R-CNN 在 15+ FPS 多攝影機場景延遲過高，且像素級 mask 對動線分析並非必要——bbox 足夠。"
      why_not_b: "ResNet 分類無法給位置，手寫規則很難擴展到多人追蹤。"
      why_not_d: "語意分割不區分個體——同類別（顧客）都是同一片 mask，無法做個體軌跡追蹤；這需要實例分割 + ReID 或 bbox + tracker。單取質心會把整群顧客視為一個點，完全無法分人。"
    keywords:
      - "YOLO"
      - "multi-object tracking"
      - "retail analytics"
      - "trade-off"
    exam_trap: false

  - id: "L21102-Q40"
    topic_code: "L21102"
    item_code: "L21102"
    difficulty: 5
    question: "某研究生把下列 CV 任務依難度由易到難排序：①影像分類 ②物件偵測 ③語意分割 ④實例分割 ⑤全景分割。他提出：「資訊量越高、任務通常越難」。下列評估何者最完整且正確？"
    options:
      a: "排序完全錯誤，五種任務難度相同"
      b: "排序正確但理由不對，實際上只與模型大小相關"
      c: "全景分割最簡單，因為它把所有任務合在一起反而最好訓練"
      d: "排序方向基本正確——分類僅 1 label、偵測加 bbox、語意分割給每像素類別、實例分割再加個體 ID、全景分割同時涵蓋 stuff 與 thing；但「難度」也取決於資料標註成本、算力與任務語境，不是單一維度"
    correct: "d"
    explanation:
      why_correct: "排序方向正確（資訊量遞增），但要補充「難度」也受標註成本、算力、應用語境影響，並非單一線性維度。例如醫療小資料集上語意分割可能比偵測更難訓；標註一張實例分割圖的成本遠高於一張分類。考量多維度才是完整評估。"
      why_not_a: "五種任務資訊量差異明顯（從 1 個 label 到逐像素類別 + 個體 ID），難度不會相同。"
      why_not_b: "模型大小不是決定難度的唯一因素——標註格式、資料量、評估方式都有影響。"
      why_not_c: "全景分割是「語意 + 實例」的合併升級，標註最貴、模型設計最複雜，絕非「最簡單」。"
    keywords:
      - "task complexity"
      - "classification to panoptic"
      - "資訊量"
    exam_trap: false
