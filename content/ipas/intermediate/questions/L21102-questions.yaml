    correct: "d"
    explanation:
      why_correct: "參數量 = (F×F×C_in + 1) × C_out = (3×3×64 + 1) × 128 = (576 + 1) × 128 = 577 × 128 = 73,856。"
      why_not_a: "3×3×64×64 = 36,864——把 C_out 誤填成 64。"
      why_not_b: "少算了 C_out 的一半（可能誤用 depthwise 的概念）。"
