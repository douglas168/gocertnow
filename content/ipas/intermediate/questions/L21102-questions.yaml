  - id: "L21102-Q21"
    topic_code: "L21102"
    item_code: "L21102"
    difficulty: 3
    question: "預測 bbox = (0, 0) 到 (100, 100)；真實 bbox = (50, 50) 到 (150, 150)。請計算此預測的 IoU 值。"
    options:
      a: "0.25"
      b: "約 0.143"
      c: "0.5"
      d: "約 0.333"
    correct: "b"
    explanation:
      why_correct: "交集為 (50, 50) 到 (100, 100) 即 50×50 = 2,500。兩框各 10,000，聯集 = 10,000 + 10,000 − 2,500 = 17,500。IoU = 2,500 / 17,500 ≈ 0.143。低於 0.5 門檻，會被判為 False Positive。"
      why_not_a: "0.25 = 交集/單框面積（2500/10000），這是混淆 IoU 與單框比率。"
      why_not_c: "0.5 是常見判定門檻但不是此題的計算結果。"
      why_not_d: "0.333 = 交集/(聯集−交集) 等錯誤算法。"
    keywords:
      - "IoU"
      - "計算"
      - "bounding box"
    exam_trap: false

