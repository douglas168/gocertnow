  - id: "L21102-Q24"
    topic_code: "L21102"
    item_code: "L21102"
    difficulty: 3
    question: "要在 28×28 的輸入特徵圖上進行 3×3 卷積，且保持輸出空間尺寸仍為 28×28（same padding）。應該設定 padding P 為多少、stride S 為多少？"
    options:
      a: "P = 0, S = 2"
      b: "P = 2, S = 2"
      c: "P = 0, S = 1"
      d: "P = 1, S = 1"
    correct: "d"
    explanation:
      why_correct: "Same padding 快捷規則：當 S=1 時 P = (F−1)/2。F=3 → P=1。代公式 O = (28 − 3 + 2)/1 + 1 = 28 ✓。"
