    options:
      a: "COCO 只是想讓指標看起來更複雜，實務上沒差別"
      b: "因為 mAP@0.5:0.95 將 IoU 門檻從 0.5 延伸到 0.95（10 個門檻求平均），對 bbox 定位精度更敏感——鼓勵模型不只是「抓到物件」還要「貼得緊」。在醫療、自駕等高精度場景特別重要"
      c: "因為 mAP@0.5 已被棄用，不再使用"
      d: "因為 mAP@0.5:0.95 只適用語意分割"
    correct: "b"
    explanation:
      why_correct: "mAP@0.5 給太寬鬆——bbox 大致對就給分；現代應用（自駕、醫療）需要精準定位。擴展到 10 個門檻平均，讓模型不能只滿足於「勉強 IoU 0.5」，而要在 0.75、0.9 等嚴格門檻也保持表現，這才是 COCO 把它當主要指標的原因。"
