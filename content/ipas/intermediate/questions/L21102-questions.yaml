      d: "說法錯誤，skip connection 主要解決退化（degradation）與梯度消失（vanishing gradient），和過擬合是不同問題"
    correct: "d"
    explanation:
      why_correct: "He et al. 2015 明白指出「退化問題」的特徵是「訓練誤差隨深度增加反而變大」，這是優化問題、不是過擬合（過擬合是訓練誤差低但測試誤差高）。Skip connection 讓梯度有捷徑反傳、並允許恆等映射，解決的是退化與梯度消失。"
      why_not_a: "把退化誤認為過擬合是最常見的概念混淆。"
      why_not_b: "dropout 是正則化（抑制過擬合），與 skip connection 的目的不同。"
