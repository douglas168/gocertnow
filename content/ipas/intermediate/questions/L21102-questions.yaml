  - id: "L21102-Q33"
    topic_code: "L21102"
    item_code: "L21102"
    difficulty: 5
    question: "某新創要為車牌辨識系統做架構選型，需求為：(1) 在高速公路攝影機上即時處理車流（< 50 ms 單張）、(2) 車牌位置精度要求高（IoU 至少 0.7）、(3) 部署在 NVIDIA Jetson 系列邊緣裝置。下列方案何者最合理？"
    options:
      a: "Faster R-CNN + ResNet-152，為了追求極致精度"
      b: "YOLO 系列輕量版本（如 YOLOv8-s 或 YOLOv10-s）先偵測車牌框，再用小型 OCR 模型辨識字元"
      c: "U-Net 對整張圖做語意分割後找出車牌色塊"
      d: "Mask R-CNN 產生像素級 mask 後用電腦視覺傳統方法切字"
    correct: "b"
    explanation:
      why_correct: "YOLO 輕量版滿足即時（單階段、<50ms），v8/v10 的 mAP@0.5:0.95 已足以達到 IoU 0.7 定位精度，Jetson 系列對 YOLO 有官方部署支援（TensorRT 導出、INT8 量化）。車牌辨識業界正是這個組合：YOLO 偵測車牌框 + 小型 OCR 辨字。"
      why_not_a: "ResNet-152 + Faster R-CNN 延遲會遠超 50ms，無法在 Jetson 上即時達成需求；且精度上 YOLOv8+ 已追平，精度優勢不再絕對。"
      why_not_c: "語意分割只給「車牌色塊」，還要後處理才能分出每個車牌個體，且 U-Net 運算量較大，不適合邊緣即時。"
      why_not_d: "Mask R-CNN 像素級 mask 對車牌而言是 overkill（bbox 已足夠），且延遲高、不符合邊緣即時要求。"
    keywords:
      - "license plate"
      - "YOLO"
      - "edge deployment"
      - "trade-off"
    exam_trap: false

  - id: "L21102-Q34"
    topic_code: "L21102"
    item_code: "L21102"
    difficulty: 5
    question: "一個 CV 團隊發現他們的 20 層 plain CNN 比 10 層版本在「訓練集上」誤差更高。資深工程師給出四種診斷，下列何者最合理？"
    options:
      a: "這是退化問題（degradation）——並非過擬合，而是深度造成優化困難。建議改用 ResNet 結構加入 skip connection"
      b: "這是過擬合，應加強 dropout 與 L2 正則化"
      c: "這是標註錯誤，重標資料即可"
      d: "這是批次大小太小，調大 batch size 即可解決"
    correct: "a"
    explanation:
      why_correct: "關鍵線索：「訓練集上」誤差反而更高——這不是過擬合（過擬合是訓練低測試高），而是 ResNet 論文定義的退化問題。解法正是加 skip connection，讓深層最差退化為恆等映射。"
      why_not_b: "過擬合不會讓訓練誤差也變高。"
      why_not_c: "標註錯誤通常隨資料一起進訓練，不會對深度特別敏感。"
      why_not_d: "batch size 會影響收斂，但不會導致「加深」就突然變差這個特定模式。"
    keywords:
      - "degradation"
      - "skip connection"
      - "ResNet diagnosis"
    exam_trap: true

  - id: "L21102-Q35"
    topic_code: "L21102"
    item_code: "L21102"
    difficulty: 5
    question: "醫院要建置 AI 系統辨識病理切片上的多個癌細胞，不僅要標出位置，還要「分別數出每顆細胞」並畫出各自輪廓以便病理科醫師評估。下列架構組合何者最合適？"
    options:
      a: "ResNet-50 分類器 + sliding window"
      b: "YOLOv8 + 單純 bbox 輸出"
      c: "U-Net 語意分割"
      d: "Mask R-CNN（實例分割 backbone + mask branch），並搭配 Faster R-CNN 的 RPN 做高精度候選框"
    correct: "d"
    explanation:
      why_correct: "需求 = 同類（癌細胞）要分個體 + 逐細胞輪廓 → 實例分割。Mask R-CNN（= Faster R-CNN + mask branch + RoIAlign）是此任務的標準答案，醫學場景對精度要求高、通常不計延遲成本。"
      why_not_a: "分類 + 滑動視窗無法產生逐細胞輪廓。"
      why_not_b: "YOLO 只給 bbox，無法給出「輪廓」。"
      why_not_c: "U-Net 是語意分割——多顆同類細胞會變成一片色塊，無法個別計數。"
    keywords:
      - "Mask R-CNN"
      - "instance segmentation"
      - "medical imaging"
    exam_trap: false

  - id: "L21102-Q36"
    topic_code: "L21102"
    item_code: "L21102"
    difficulty: 5
    question: "某工程師報告說：「我把卷積換成更大 kernel（9×9），不加 padding、stride=1，結果模型精度掉、運算量爆增」。下列評估何者最正確？"
    options:
      a: "大 kernel 一定比小 kernel 好，應改用 11×11"
      b: "應把 stride 改為 0 以減少運算量"
      c: "大 kernel（9×9）參數量為 81C_in·C_out，遠高於四層 3×3 堆疊（36C_in·C_out）即可達成的等效 9×9 感受野（節省約 55%）；且無 padding 會快速縮小特徵圖，使深層資訊不足。建議改用多層 3×3 堆疊或加 padding"
      d: "應把 C_out 設為 1 以配合大 kernel"
    correct: "c"
    explanation:
      why_correct: "兩個分析都對：(1) 感受野的正確對應是「四層 3×3 = 9×9」（每多堆一層 3×3，感受野每邊增加 2：3→5→7→9）。參數量 9×9 單層為 81C²，四層 3×3 為 4×9C² = 36C²，節省約 55%，現代 CNN 偏好小 kernel 堆疊。(2) 不加 padding 會讓每層 W 減 8，幾層下去特徵圖就消失了。"
      why_not_a: "11×11 參數更爆炸，方向完全錯誤。"
      why_not_b: "stride=0 沒有定義（公式分母為零）。"
      why_not_d: "C_out=1 會讓後續層完全沒有容量。"
    keywords:
      - "kernel size trade-off"
      - "padding"
      - "receptive field"
    exam_trap: false

