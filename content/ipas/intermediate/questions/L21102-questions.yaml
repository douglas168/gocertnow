      a: "模型大致能框到物件（寬鬆門檻表現好），但 bbox 不夠貼合（嚴格門檻下降多），代表定位精度有進步空間"
      b: "資料集過擬合，mAP@0.5 比較嚴格"
      c: "mAP@0.5:0.95 只看單一門檻，應以 mAP@0.5 為準"
      d: "兩個數值衝突，其中一定有一個算錯"
    correct: "a"
    explanation:
      why_correct: "mAP@0.5 寬鬆，mAP@0.5:0.95 嚴格。兩者落差大代表模型能「抓到物件」，但框的四個邊沒貼很緊，IoU 往 0.75、0.9 走時 TP 數量迅速下降。這是 bbox regression 有優化空間的典型訊號。"
      why_not_b: "嚴格度方向反了，mAP@0.5 較寬鬆。"
      why_not_c: "mAP@0.5:0.95 是 10 個門檻的平均，不是單一。"
      why_not_d: "兩數值不衝突，反而是互補訊息。"
    keywords:
      - "mAP"
      - "定位精度"
      - "COCO"
    exam_trap: true

  - id: "L21102-Q32"
    topic_code: "L21102"
    item_code: "L21102"
    difficulty: 4
    question: "比較「堆兩層 3×3 卷積」與「一層 5×5 卷積」，下列分析何者最正確？"
    options:
      a: "兩者感受野相同、但一層 5×5 參數更少"
      b: "兩者運算量相同、感受野不同"
      c: "兩層 3×3 的有效感受野（receptive field）約等同一層 5×5，且通常參數更少、非線性更多"
      d: "一層 5×5 的效果永遠優於兩層 3×3"
    correct: "c"
    explanation:
      why_correct: "疊兩層 3×3（不考慮 stride、padding 影響）有效感受野等同 5×5。參數量：2×(3×3×C²) = 18C² vs 5×5×C² = 25C²，兩層 3×3 少 28%。且每層間有 ReLU，非線性更強，這正是 VGG / ResNet 偏好小 kernel 堆疊的理由。"
      why_not_a: "參數比較方向錯了——一層 5×5 的參數反而比兩層 3×3 多。"
      why_not_b: "運算量與感受野都不一樣，且兩層 3×3 感受野 ≈ 5×5。"
      why_not_d: "小 kernel 堆疊是現代 CNN 的主流設計，不是「永遠較差」。"
    keywords:
      - "receptive field"
      - "kernel size"
      - "3x3 vs 5x5"
    exam_trap: false

