  - id: "L21102-Q09"
    topic_code: "L21102"
    item_code: "L21102"
    difficulty: 2
    question: "卷積神經網路（CNN）之所以相較全連接網路（Fully Connected Network, FCN）更適合處理影像，主要因為下列哪兩個假設？"
    options:
      a: "隨機性（randomness）與稀疏性（sparsity）"
      b: "局部性（locality）與平移不變性（translation invariance）"
      c: "獨立性（independence）與正規化（normalization）"
      d: "高維嵌入（high-dim embedding）與迴圈連接（recurrence）"
    correct: "b"
    explanation:
      why_correct: "CNN 利用兩個先驗假設：(1) 局部性——邊緣紋理只在小塊區域內相關；(2) 平移不變性——同一個特徵偵測器在任何位置都有效。兩者一起大幅減少參數並增強泛化。"
      why_not_a: "稀疏性比較是 L1 正則化概念，隨機性與 CNN 架構無關。"
      why_not_c: "正規化是訓練技巧（BN、LayerNorm），不是 CNN 架構的底層假設。"
      why_not_d: "迴圈連接屬於 RNN 家族，不是 CNN 核心。"
    keywords:
      - "locality"
      - "translation invariance"
      - "CNN 假設"
    exam_trap: false

  - id: "L21102-Q10"
    topic_code: "L21102"
    item_code: "L21102"
    difficulty: 2
    question: "下列關於殘差連接（skip connection / residual connection）的敘述，何者最能正確解釋其作用？"
    options:
      a: "讓模型在推論時可以跳過部分層以加速"
      b: "把兩個不同模型的輸出相加以做 ensemble"
      c: "讓梯度可以直接反傳至淺層，並讓 block 最差退化為恆等映射（identity mapping）"
      d: "把輸入影像直接接到最後一層以保留原始像素"
    correct: "c"
    explanation:
      why_correct: "殘差連接 H(x) = F(x) + x 提供梯度的高速公路，解決深層網路的退化問題；當 F(x)→0 時整個 block 就是恆等映射，避免加深反而變差。"
      why_not_a: "skip connection 在推論時一樣要計算 F(x)，並不是動態「跳過」。"
      why_not_b: "ensemble 是在模型層級合併，不是 block 內部的 + x 操作。"
      why_not_d: "輸入影像不會直接接到最後一層；skip 是「block 級」的局部捷徑。"
    keywords:
      - "skip connection"
      - "residual"
      - "identity mapping"
      - "退化問題"
    exam_trap: true

  - id: "L21102-Q11"
    topic_code: "L21102"
    item_code: "L21102"
    difficulty: 2
    question: "下列何者最能描述「平移不變性（translation invariance）」的來源？"
    options:
      a: "主要來自池化層的降採樣與視窗聚合"
      b: "主要來自全連接層把特徵打亂"
      c: "主要來自批次正規化（Batch Normalization）的標準化"
      d: "主要來自 dropout 隨機丟棄神經元"
    correct: "a"
    explanation:
      why_correct: "雖然卷積的權重共享也有貢獻，但 iPAS 與多數教材的標準答案是：池化（pooling）透過視窗聚合與降採樣，讓小幅平移的輸入產生相近的輸出，這是平移不變性的主要機制。觀念對比：卷積 → 等變性（Equivariance，輸入平移，輸出也平移）；池化 → 不變性（Invariance，輸入小幅擾動，輸出不變，max-pool 尤其明顯）。"
      why_not_b: "全連接層反而對位置高度敏感——這正是為什麼要先用 CNN 再接 FC。"
      why_not_c: "BN 是為了穩定訓練與加速收斂，與平移不變性無關。"
      why_not_d: "Dropout 是正則化，防止過擬合，與平移無關。"
    keywords:
      - "translation invariance"
      - "pooling"
      - "池化"
    exam_trap: true

  - id: "L21102-Q12"
    topic_code: "L21102"
    item_code: "L21102"
    difficulty: 2
    question: "語意分割（semantic segmentation）與實例分割（instance segmentation）最關鍵的差異是？"
    options:
      a: "語意分割用 CNN，實例分割用 RNN"
      b: "語意分割輸出 bbox，實例分割輸出類別"
      c: "實例分割無法輸出像素級別的結果"
      d: "語意分割同類不分個體，實例分割同類也會區分個體"
    correct: "d"
    explanation:
      why_correct: "最核心差異是個體區分：同一張圖有 3 隻羊時，語意分割只輸出「一片羊色塊」，實例分割要分成羊₁、羊₂、羊₃ 三個獨立 mask。iPAS 114/05 曾現場考這題。"
      why_not_a: "兩者都是 CNN 類架構（U-Net 屬 CNN、Mask R-CNN 也是），與 RNN 無關。"
      why_not_b: "兩者都輸出像素級類別，bbox 是物件偵測的輸出。"
      why_not_c: "實例分割本質上就是像素級輸出（per-instance mask），這個說法顛倒了實例分割的定義。"
    keywords:
      - "semantic segmentation"
      - "instance segmentation"
      - "語意分割"
      - "實例分割"
    exam_trap: true

  - id: "L21102-Q13"
    topic_code: "L21102"
    item_code: "L21102"
    difficulty: 2
    question: "下列對 YOLO 與 CNN 關係的描述，何者最正確？"
    options:
      a: "YOLO 是全新架構，不屬於 CNN 家族，已完全取代 CNN"
      b: "YOLO 是建立在 CNN backbone（如 CSPDarknet）之上的偵測頭架構"
      c: "YOLO 只使用 transformer，與 CNN 無關"
      d: "YOLO 因為是單階段，所以不使用非極大值抑制（NMS）"
    correct: "b"
    explanation:
      why_correct: "YOLO 的 backbone（特徵抽取）本身就是 CNN（YOLOv8 用 CSPDarknet53），YOLO 提供的是偵測頭與整體 pipeline，兩者是「上層應用建在 CNN 之上」的層級關係，不是替代。"
      why_not_a: "CNN 是 YOLO 的底層元件，沒有「取代」的關係。"
      why_not_c: "雖有 transformer 偵測器（DETR）存在，但 YOLO v3–v10 主線架構都仍是 CNN backbone。"
      why_not_d: "YOLOv1–v9 都依賴 NMS 去除重疊框，YOLOv10 才以 one-to-one head 改為 NMS-free。單階段與是否用 NMS 無關，常見混淆。"
    keywords:
      - "YOLO"
      - "CNN backbone"
      - "CSPDarknet"
    exam_trap: true

  - id: "L21102-Q14"
    topic_code: "L21102"
    item_code: "L21102"
    difficulty: 2
    question: "卷積層中的 stride（步長）設為 2 而非 1，主要效果是？"
    options:
      a: "輸入通道數（C_in）加倍"
      b: "kernel 數量加倍"
      c: "輸出特徵圖空間尺寸大約縮小為 1/2"
      d: "參數量加倍"
    correct: "c"
    explanation:
      why_correct: "由公式 O = (W − F + 2P)/S + 1 可知 S 在分母，S=2 會讓輸出空間尺寸（H、W）大約縮半，是一種取代池化做降採樣的方式（stride-2 conv）。"
      why_not_a: "stride 影響的是空間維度，與通道數無關。"
      why_not_b: "kernel 數量由該層 C_out 決定，與 stride 無關。"
      why_not_d: "參數量取決於 F×F×C_in×C_out + bias，stride 不影響參數量，只影響輸出尺寸與計算量。"
    keywords:
      - "stride"
      - "步長"
      - "降採樣"
    exam_trap: false

  - id: "L21102-Q15"
    topic_code: "L21102"
    item_code: "L21102"
    difficulty: 2
    question: "關於 mAP@0.5 與 mAP@0.5:0.95 兩個指標，下列敘述何者正確？"
    options:
      a: "mAP@0.5 較寬鬆；mAP@0.5:0.95 較嚴格，對定位精度更敏感"
      b: "mAP@0.5 較嚴格；mAP@0.5:0.95 較寬鬆"
      c: "兩者數值必定相同，只是名字不同"
      d: "mAP@0.5:0.95 只在語意分割使用，不用於物件偵測"
    correct: "a"
    explanation:
      why_correct: "mAP@0.5 只要 IoU ≥ 0.5 就算對，相對寬鬆；mAP@0.5:0.95 要在 10 個 IoU 門檻（0.50~0.95）都表現好才能拿高分，對 bbox 貼合度要求更嚴。"
      why_not_b: "嚴格度方向反了。"
      why_not_c: "兩者是不同計算方式，數值通常 mAP@0.5 > mAP@0.5:0.95。"
      why_not_d: "mAP@0.5:0.95 就是 COCO 物件偵測的頭牌指標。"
    keywords:
      - "mAP@0.5"
      - "mAP@0.5:0.95"
      - "COCO"
    exam_trap: false

  - id: "L21102-Q16"
    topic_code: "L21102"
    item_code: "L21102"
    difficulty: 2
    question: "下列關於 ReLU（Rectified Linear Unit）激活函數的描述，何者最正確？"
    options:
      a: "ReLU 讓網路只做線性轉換，提升可解釋性"
      b: "ReLU 把輸入壓縮到 [0, 1] 區間"
      c: "ReLU 主要用於迴歸輸出層，不適合中間層"
      d: "ReLU = max(0, x)，用於引入非線性，且計算簡單、不易飽和"
    correct: "d"
    explanation:
      why_correct: "ReLU(x) = max(0, x)，作用是引入非線性（沒有它多層卷積等於一層線性變換），計算極便宜且正區段不會飽和，是 CNN 最常用的激活函數。"
      why_not_a: "剛好相反——激活函數就是為了打破「全網路線性」這件事。"
      why_not_b: "壓縮到 [0, 1] 是 Sigmoid 的功能，不是 ReLU。"
      why_not_c: "ReLU 主要就是用於中間層；輸出層通常用 softmax（分類）或線性（迴歸）。"
    keywords:
      - "ReLU"
      - "激活函數"
      - "非線性"
    exam_trap: false

