      b: "沒有問題，兩階段的精度永遠高於單階段"
      c: "問題在於 Faster R-CNN 耗電，應改用 Mask R-CNN"
      d: "問題在於應該用 U-Net，因為自駕車只關心像素級分割"
    correct: "a"
    explanation:
      why_correct: "這是一個雙重錯誤：(1) 架構選型要在精度、延遲、算力三維 trade-off，自駕車延遲敏感，Faster R-CNN（>50ms）幾乎不可接受；(2)「兩階段一定比較準」是過時說法，現代 YOLO 已追平。實務上自駕前方偵測採 YOLO 系列居多。"
