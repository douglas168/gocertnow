  - id: "L21102-Q19"
    topic_code: "L21102"
    item_code: "L21102"
    difficulty: 3
    question: "一個 3×3 的卷積層，輸入通道 64、輸出通道 128，且使用偏差（bias）。請問此層的參數量為何？"
    options:
