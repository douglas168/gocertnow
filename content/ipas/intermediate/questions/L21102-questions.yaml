  - id: "L21102-Q17"
    topic_code: "L21102"
    item_code: "L21102"
    difficulty: 3
    question: "某 ML 工程師要在 ResNet-50 的第一個卷積層處理 224×224×3 的輸入，參數為：kernel 7×7、stride 2、padding 3、64 個 filter。請問輸出特徵圖的空間尺寸為何？"
    options:
      a: "224 × 224"
      b: "56 × 56"
      c: "112 × 112"
      d: "28 × 28"
    correct: "c"
    explanation:
      why_correct: "套公式 O = (W − F + 2P)/S + 1 = (224 − 7 + 6)/2 + 1 = 223/2 + 1。PyTorch 以 floor 處理 → 111 + 1 = 112。輸出為 112×112×64，正是 ResNet-50 conv1 實際尺寸。"
      why_not_a: "stride=2 就會讓尺寸縮半，不可能維持 224×224。"
      why_not_b: "56×56 要再經過後面的 max-pool 才會得到，不是 conv1 的直接輸出。"
      why_not_d: "28×28 是 ResNet 更深層的尺寸，不是第一層。"
