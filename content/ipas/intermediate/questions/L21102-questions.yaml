      why_not_b: "S=2 同上，就算 padding 調整也無法保持尺寸。"
      why_not_c: "P=0, S=1 會得 O = (28−3)/1 + 1 = 26，比輸入小。"
    keywords:
      - "same padding"
      - "stride"
      - "padding"
      - "公式"
    exam_trap: false

