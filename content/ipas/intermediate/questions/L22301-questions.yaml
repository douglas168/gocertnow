  item_code: "L22301"
  difficulty: 5
  question: "某分析師主張：『只要把資料做 StandardScaler，就等於同時完成 Normalization 與偏態校正。』若從本章觀點評估，哪個回應最合理？"
  options:
    a: "此說法不正確，因為 StandardScaler 主要處理統計尺度，不等於固定區間映射，也不保證修正偏態"
    b: "此說法正確，因為平均數變 0 就代表資料已標準、正規且近似常態"
    c: "此說法正確，因為任何 scaler 都能同時處理 outlier 與 skewness"
    d: "此說法部分正確，但僅限於資料是整數時"
  correct: "a"
  explanation:
    why_correct: "StandardScaler 的功能是以 mean 與 standard deviation 調整尺度；它不等於 min-max normalization，也不等於針對右偏做 log/Box-Cox 之類的分佈轉換。"
    why_not_a: "此選項正確。"
    why_not_b: "這把三件不同的事混成一件，是典型考試陷阱。"
    why_not_c: "沒有任何 scaler 能一概而論同時解決所有分佈問題。"
    why_not_d: "是否為整數與這個判斷無直接關係。"
  keywords:
    - "StandardScaler"
    - "Normalization"
    - "skewness"
  exam_trap: true

