- id: "L22301-Q01"
  topic_code: "L22301"
  item_code: "L22301"
  difficulty: 1
  question: "下列何者是標準化（Standardization）常用的 z-score 公式？"
  options:
    a: "z = (x − μ) / σ"
    b: "z = (x − x_min) / (x_max − x_min)"
    c: "z = (x − median) / IQR"
    d: "z = (x − μ) / σ²"
  correct: "a"
  explanation:
    why_correct: "標準化（Standardization）常用的 z-score 公式為 z = (x − μ) / σ，表示資料點相對平均數偏離了幾個標準差。"
    why_not_a: "此選項正確。"
    why_not_b: "這是最小最大正規化（min-max normalization）的公式，考生常把 normalization 與 standardization 混為一談。"
    why_not_c: "這是 RobustScaler 的典型教學公式，使用 median 與 IQR，不是 z-score。"
    why_not_d: "分母應為標準差 σ，不是變異數 σ²；這是常見的公式記憶錯誤。"
  keywords:
    - "標準化"
    - "Standardization"
    - "z-score"
  exam_trap: true

- id: "L22301-Q02"
  topic_code: "L22301"
  item_code: "L22301"
  difficulty: 1
  question: "下列何者是將資料映射到 0 到 1 區間的最小最大正規化（min-max normalization）公式？"
  options:
    a: "x' = (x − μ) / σ"
    b: "x' = (x − x_min) / (x_max − x_min)"
    c: "x' = (x − median) / IQR"
    d: "x' = ln(x)"
  correct: "b"
  explanation:
    why_correct: "最小最大正規化（min-max normalization）會依據最小值與最大值，將資料線性映射到固定區間，最常見是 0 到 1。"
    why_not_a: "這是 z-score 標準化（Standardization），不是正規化到固定邊界的公式。"
    why_not_b: "此選項正確。"
    why_not_c: "這是 RobustScaler 的典型公式，主要目的是降低異常值影響，不是直接映射到 0 到 1。"
    why_not_d: "對數轉換（log transform）可處理偏態，但不保證輸出在 0 到 1 區間。"
  keywords:
    - "正規化"
    - "min-max normalization"
    - "公式"
  exam_trap: true

- id: "L22301-Q03"
  topic_code: "L22301"
  item_code: "L22301"
  difficulty: 1
  question: "RobustScaler 的核心縮放基準為何？"
  options:
    a: "平均數（mean）與標準差（standard deviation）"
    b: "最小值（minimum）與最大值（maximum）"
    c: "中位數（median）與四分位距（IQR）"
    d: "眾數（mode）與全距（range）"
  correct: "c"
  explanation:
    why_correct: "RobustScaler 以中位數與四分位距（IQR）做中心化與縮放，因此比使用 mean、standard deviation 的方法更能抵抗 outliers。"
    why_not_a: "這描述的是 StandardScaler 的主要概念，不是 RobustScaler。"
    why_not_b: "這較接近 MinMaxScaler 的思路，並非 RobustScaler。"
    why_not_c: "此選項正確。"
    why_not_d: "mode 與 range 不是 sklearn RobustScaler 的核心統計量，但初學者可能因為都屬於描述統計而誤選。"
  keywords:
    - "RobustScaler"
    - "median"
    - "IQR"
  exam_trap: false

- id: "L22301-Q04"
  topic_code: "L22301"
  item_code: "L22301"
  difficulty: 1
  question: "下列何者最能正確區分標準化（Standardization）與正規化（Normalization）？"
  options:
    a: "兩者完全同義，只是不同教科書用語"
    b: "標準化一定把資料壓到 0 到 1，正規化一定讓平均變成 0"
    c: "標準化只能用在常態分佈，正規化只能用在偏態分佈"
    d: "標準化通常以平均數與標準差調整尺度；正規化常把資料映到固定區間"
  correct: "d"
  explanation:
    why_correct: "標準化（Standardization）通常讓資料以平均數 0、標準差 1 的尺度表達；正規化（Normalization）常指 min-max 這類映到固定範圍的轉換。"
    why_not_a: "這是最常見誤解。考試常故意把兩者當同義詞來設陷阱。"
    why_not_b: "這把兩者效果完全對調了，屬於典型背公式但沒理解目的的錯法。"
    why_not_c: "兩者都可依情境使用，並非只能對某一種分佈使用。"
    why_not_d: "此選項正確。"
  keywords:
    - "標準化"
    - "正規化"
    - "Standardization"
    - "Normalization"
  exam_trap: true

- id: "L22301-Q05"
  topic_code: "L22301"
  item_code: "L22301"
  difficulty: 1
  question: "對數轉換（log transform）中的 `log1p(x)` 最適合用於哪一種資料條件？"
  options:
    a: "資料含 0，且希望進行近似對數轉換"
    b: "資料有負值很多，想直接套用 Box-Cox"
    c: "資料已經在 0 到 1 之間，不需任何轉換"
    d: "資料只要是整數，就應一律使用 `log1p`"
  correct: "a"
  explanation:
    why_correct: "`log1p(x)` 等於 ln(1+x)，對含 0 的非負資料比直接取 ln(x) 更安全，常用於右偏且有 0 值的計數型資料。"
    why_not_a: "此選項正確。"
    why_not_b: "Box-Cox 要求 x > 0，負值資料不能直接套用；`log1p` 也不是處理任意負值的萬用解。"
    why_not_c: "是否在 0 到 1 區間與是否需要 log transform 無直接必然關係，重點是偏態與資料性質。"
    why_not_d: "資料是整數不代表一定適合做對數轉換，這忽略了分佈與分析目的。"
  keywords:
    - "log transform"
    - "log1p"
    - "右偏"
  exam_trap: true

- id: "L22301-Q06"
  topic_code: "L22301"
  item_code: "L22301"
  difficulty: 1
  question: "關於 Box-Cox transform，下列何者正確？"
  options:
    a: "只要資料有 outlier，就一定優先用 Box-Cox"
    b: "當 λ = 1 時，Box-Cox 等同 z-score"
    c: "Box-Cox 可直接處理任意實數，包含 0 與負值"
    d: "當 λ = 0 時，Box-Cox 退化為 ln(x)，且要求 x > 0"
  correct: "d"
  explanation:
    why_correct: "Box-Cox 的定義中，λ = 0 時會退化為 ln(x)，而且輸入必須為正值，這是最常考的兩個核心條件。"
    why_not_a: "Box-Cox 主要用於分佈形狀調整，不是只要有 outlier 就必用；對抗 outliers 更常想到 RobustScaler。"
    why_not_b: "λ = 1 並不等同 z-score，Box-Cox 與 z-score 是不同目的與公式的轉換。"
    why_not_c: "這是 Yeo-Johnson 與 Box-Cox 常被混淆的地方；Box-Cox 不能直接處理 0 或負值。"
    why_not_d: "此選項正確。"
  keywords:
    - "Box-Cox"
    - "lambda"
    - "log"
  exam_trap: true

