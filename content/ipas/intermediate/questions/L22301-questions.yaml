    why_not_a: "相關係數矩陣不是 StandardScaler 的主要輸出，這比較像後續分析或統計檢查。"
    why_not_b: "這是類別資料統計，不是數值欄位標準化的核心資訊。"
    why_not_c: "此選項正確。"
    why_not_d: "主成分載荷屬於 PCA 範疇，不是本章 preprocessing 的 fit 結果。"
  keywords:
