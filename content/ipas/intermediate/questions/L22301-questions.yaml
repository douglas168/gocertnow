- id: "L22301-Q15"
  topic_code: "L22301"
  item_code: "L22301"
  difficulty: 3
  question: "某製造業資料欄位的平均數 μ=50、標準差 σ=10，若某筆觀測值 x=65，則其 z-score 標準化（Standardization）結果為何？"
  options:
    a: "1.5"
    b: "0.15"
    c: "6.5"
    d: "-1.5"
  correct: "a"
  explanation:
    why_correct: "依公式 z = (x − μ) / σ = (65 − 50) / 10 = 1.5，因此此值高於平均 1.5 個標準差。"
    why_not_a: "此選項正確。"
    why_not_b: "這是把分母誤當成 100 或錯把標準差當百分比，屬於粗心計算錯誤。"
    why_not_c: "這是直接把 65 除以 10，忽略先減平均數的步驟。"
    why_not_d: "若 x 小於平均數才可能得到負值，本題 x=65 大於 μ=50。"
  keywords:
    - "z-score"
    - "Standardization"
    - "公式計算"
  exam_trap: false

- id: "L22301-Q16"
  topic_code: "L22301"
  item_code: "L22301"
  difficulty: 3
  question: "某平台的欄位最小值為 20、最大值為 80。若觀測值 x=50，則以最小最大正規化（min-max normalization）映到 0 到 1 的結果為何？"
  options:
    a: "0.25"
    b: "0.50"
    c: "0.60"
    d: "0.75"
  correct: "b"
  explanation:
    why_correct: "依公式 x' = (x − x_min) / (x_max − x_min) = (50 − 20) / (80 − 20) = 30/60 = 0.5。"
    why_not_a: "這通常是把分母錯算成 120，或誤把 30 除以錯誤範圍。"
    why_not_b: "此選項正確。"
    why_not_c: "這是把 30/50 或其他錯誤範圍代入造成的常見計算錯誤。"
    why_not_d: "很多考生把 x=50 直覺當成接近上界，但實際上它正好在 20 與 80 的中間。"
  keywords:
    - "min-max normalization"
    - "正規化"
    - "公式計算"
  exam_trap: false

