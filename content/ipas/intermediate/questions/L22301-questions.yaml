- id: "L22301-Q35"
  topic_code: "L22301"
  item_code: "L22301"
  difficulty: 5
  question: "某資料欄位同時滿足以下條件：一、值全為正；二、分佈明顯右偏；三、希望用可參數化方式調整分佈；四、團隊知道 λ=0 時應退化為 log。依這些限制，下列哪個方案最符合？"
  options:
    a: "使用 MinMaxScaler，因為它也有可調參數 `feature_range`"
    b: "使用 StandardScaler，因為標準差本身就是 λ"
    c: "使用 Box-Cox transform"
    d: "使用 SMOTE，因為右偏代表樣本不平衡"
  correct: "c"
  explanation:
    why_correct: "題目已把 Box-Cox 的關鍵線索全部給出：正值、右偏、可參數化 λ、且 λ=0 時退化為 log，因此最符合的是 Box-Cox transform。"
    why_not_a: "MinMaxScaler 的參數控制的是輸出區間，不是分佈形狀調整。"
    why_not_b: "StandardScaler 沒有 λ 這個分佈轉換參數，這是概念錯置。"
    why_not_c: "此選項正確。"
    why_not_d: "SMOTE 與連續欄位偏態轉換無關。"
  keywords:
    - "Box-Cox"
    - "lambda"
    - "transform selection"
  exam_trap: false
