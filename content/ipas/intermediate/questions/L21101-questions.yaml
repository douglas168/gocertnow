# ===== Coverage gap fills (added post-review) =====

  - id: "L21101-Q41"
    topic_code: "L21101"
    item_code: "L21101"
    difficulty: 3
    question: "下列對「Transformer」一詞的定位，何者最正確？"
    options:
      a: "Transformer 就是 ChatGPT 的商品名，指特定的聊天機器人產品"
      b: "Transformer 是 2017 年 Vaswani 等人提出的『架構』（encoder-decoder + self-attention），而 BERT / GPT / T5 是以此架構不同配置（encoder-only / decoder-only / encoder-decoder）建出的『模型』"
      c: "Transformer 是 LSTM 的升級版，內部仍是 RNN 循序展開，只是多了注意力層"
      d: "Transformer 只能用於機器翻譯任務，不能拿來做其他 NLP 任務"
    correct: "b"
    explanation:
      why_correct: "Transformer 原論文《Attention Is All You Need》(2017) 提出的是一種『架構』：以 self-attention + FFN 為核心，預設為 encoder-decoder 結構。後續的 BERT（encoder-only）、GPT（decoder-only）、T5/BART（encoder-decoder）都是基於此架構的不同配置 + 不同預訓練目標所得到的『模型』。區分『架構 (architecture) / 模型 (model) / 產品 (product)』三層是 iPAS 中級常見陷阱。"
      why_not_a: "ChatGPT 是 OpenAI 推出的產品，底層模型是 GPT 家族，Transformer 則是 GPT 所基於的架構。把架構等同產品是最典型的概念混淆。"
      why_not_c: "Transformer 刻意『捨棄 RNN 的循序依賴』，以純 attention + 位置編碼實現平行運算，與 LSTM 運作機制本質不同，並非 RNN 的升級版。"
      why_not_d: "原論文以機器翻譯為示範任務，但架構本身是通用的（後續廣泛用於分類、生成、摘要、視覺 ViT 等），並未受限於單一任務。"
    keywords:
      - "architecture vs model"
      - "transformer"
    exam_trap: true

  - id: "L21101-Q42"
    topic_code: "L21101"
    item_code: "L21101"
    difficulty: 4
    question: "在 encoder-decoder Transformer（如 T5、BART）做翻譯時，decoder 如何獲取 encoder 已經編碼的來源句資訊？"
    options:
      a: "透過 cross-attention：Q 來自 decoder hidden state，K 與 V 來自 encoder 輸出"
      b: "透過 decoder 內部的 self-attention：Q、K、V 全部都來自 encoder 輸出"
      c: "將 encoder 輸出直接與 decoder 的 token embedding 串接（concat），不使用任何注意力機制"
      d: "藉由 residual skip connection，把 encoder 輸出直接加到 decoder 的最終 logits 上"
    correct: "a"
    explanation:
      why_correct: "Encoder-decoder Transformer 的核心橋梁就是 cross-attention（又稱 encoder-decoder attention）：Query 來自 decoder 當前層的 hidden state、Key/Value 來自 encoder 最終輸出。這使 decoder 在生成每個目標 token 時都能『對齊』到來源句相關位置，是翻譯與抽象式摘要的關鍵。"
      why_not_b: "Self-attention 的定義是 Q、K、V 來自同一序列。若 Q/K/V 全來自 encoder 輸出，就變成 encoder 的 self-attention，decoder 無法取得來源句資訊，架構上錯誤。"
      why_not_c: "Concat 方式失去位置對齊彈性，且 decoder 無法學習『當前輸出字』該對齊到來源句哪個位置；這不是 Transformer 的設計方式。"
      why_not_d: "Residual skip 是同一層輸入/輸出的捷徑（add & norm），並非跨模組資訊橋梁；且『加到 logits 上』維度與語意都不匹配。"
    keywords:
      - "cross-attention"
      - "encoder-decoder"
    exam_trap: true
