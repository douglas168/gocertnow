# ===== Difficulty 1: Remember (8 questions) =====

  - id: "L21101-Q01"
    topic_code: "L21101"
    item_code: "L21101"
    difficulty: 1
    question: "在自然語言處理（NLP）流程中，將一段連續文字切分為最小處理單位（詞、子詞或字元）的步驟稱為什麼？"
    options:
      a: "詞幹還原（Stemming）"
      b: "斷詞 / 分詞（Tokenization）"
      c: "停用詞移除（Stop-word Removal）"
      d: "詞形還原（Lemmatization）"
    correct: "b"
    explanation:
      why_correct: "Tokenization（斷詞）是將原始文本切成 token 的前置步驟，所有後續 embedding、模型輸入都依賴此結果。iPAS 樣題 Q2 標準答案。"
      why_not_a: "Stemming 是把已切好的詞去字尾（running→run），屬於詞的**正規化**，不是切分動作。"
      why_not_c: "停用詞移除是過濾「的、是、了」等低資訊詞，前提是已經完成 tokenization。"
      why_not_d: "Lemmatization 是把詞變回字典原型（went→go），也是正規化步驟而非切分步驟。"
    keywords:
      - "斷詞"
      - "tokenization"
    exam_trap: true

  - id: "L21101-Q02"
    topic_code: "L21101"
    item_code: "L21101"
    difficulty: 1
    question: "下列何者屬於「靜態詞向量（static word embedding）」技術？"
    options:
      a: "BERT"
      b: "ELMo"
      c: "Word2Vec"
      d: "GPT"
    correct: "c"
    explanation:
      why_correct: "Word2Vec 為每個詞學一個固定向量，與上下文無關，是典型的靜態詞向量。iPAS 樣題 Q10 標準答案。"
      why_not_a: "BERT 產生「上下文相關」的動態向量，同一詞在不同句中向量不同。"
      why_not_b: "ELMo 是第一代 contextualized embedding（LSTM 版），也是動態的。"
      why_not_d: "GPT 是自回歸語言模型，其 hidden state 亦隨上下文變化，不屬靜態。"
    keywords:
      - "word2vec"
      - "static embedding"
    exam_trap: false

  - id: "L21101-Q03"
    topic_code: "L21101"
    item_code: "L21101"
    difficulty: 1
    question: "Transformer 自注意力（Self-Attention）機制中的三個核心向量分別稱為什麼？"
    options:
      a: "Input、Hidden、Output"
      b: "Query、Key、Value"
      c: "Encoder、Decoder、Attention"
      d: "Embedding、Position、Mask"
    correct: "b"
    explanation:
      why_correct: "Self-Attention 以 Query 與所有 Key 計算相似度，得到權重後對 Value 加權求和，Q/K/V 為 Vaswani et al. 2017 定義。"
      why_not_a: "Input/Hidden/Output 是一般神經網路層的通稱，不是 attention 的專有名詞。"
      why_not_c: "Encoder/Decoder 是架構模組名稱，非 attention 內部向量。"
      why_not_d: "Embedding、Positional Encoding、Mask 是 Transformer 輸入端的組件，不是注意力計算的 Q/K/V。"
    keywords:
      - "Q/K/V"
      - "self-attention"
    exam_trap: false

  - id: "L21101-Q04"
    topic_code: "L21101"
    item_code: "L21101"
    difficulty: 1
    question: "下列關於 BERT 與 GPT 的敘述，何者正確？"
    options:
      a: "BERT 是雙向（bidirectional）、GPT 是單向（unidirectional / causal）"
      b: "BERT 是單向、GPT 是雙向"
      c: "兩者都是雙向"
      d: "兩者都是單向"
    correct: "a"
    explanation:
      why_correct: "BERT 使用 Masked LM：遮掉 ~15% token，模型依左右兩側剩餘 token 還原，天然學到雙向語境表示（bidirectional encoder）。GPT 使用 causal LM：透過 attention mask 禁止看未來 token，每個位置只能看左側歷史（unidirectional/causal decoder），以支援逐字生成。這正是兩大家族分流的根本原因，05/17 實考直接考此題。"
      why_not_b: "方向剛好顛倒，是最常見的混淆選項（若考生記錯 MLM 與 causal LM 的對應就會選到）。"
      why_not_c: "GPT 為自回歸生成模型，若允許看未來 token 會洩漏答案，故必是單向；『兩者都是雙向』與 causal LM 的定義直接矛盾。"
      why_not_d: "BERT 的預訓練目標 MLM 本身就要求『同時利用左右上下文』還原被遮位置，『兩者都是單向』與 BERT 架構核心設計直接矛盾。"
    keywords:
      - "BERT 雙向"
      - "GPT 單向"
    exam_trap: true

  - id: "L21101-Q05"
    topic_code: "L21101"
    item_code: "L21101"
    difficulty: 1
    question: "情感分析（Sentiment Analysis）屬於下列哪一類 NLP 任務？"
    options:
      a: "序列生成（Sequence Generation）"
      b: "文本分類（Text Classification）"
      c: "機器翻譯（Machine Translation）"
      d: "命名實體識別（NER）"
    correct: "b"
    explanation:
      why_correct: "情感分析是將整段文本分類為正面/負面/中性，屬於 sentence-level classification，是文本分類的子任務。iPAS 樣題 Q3 標準答案。"
      why_not_a: "序列生成輸出變長文字，情感分析只輸出一個類別標籤。"
      why_not_c: "機器翻譯為 seq2seq，輸入輸出皆為句子。"
      why_not_d: "NER 是 token-level 分類（每個詞標一個實體類別），情感分析為 sentence-level。"
    keywords:
      - "sentiment analysis"
      - "text classification"
    exam_trap: false

  - id: "L21101-Q06"
    topic_code: "L21101"
    item_code: "L21101"
    difficulty: 1
    question: "下列哪一項子詞分詞（subword tokenization）演算法最常與 GPT 系列模型搭配？"
    options:
      a: "WordPiece"
      b: "SentencePiece + Unigram"
      c: "Byte-Pair Encoding（BPE）"
      d: "字元級（Character-level）切分"
    correct: "c"
    explanation:
      why_correct: "GPT-2、GPT-3、Llama 皆使用 BPE（byte-level BPE），透過合併高頻字元對形成子詞。"
      why_not_a: "WordPiece 是 BERT 家族使用的演算法，與 GPT 不同。"
      why_not_b: "SentencePiece + Unigram 常用於 T5、XLNet、多語模型。"
      why_not_d: "字元級切分序列過長、效率低，主流 LLM 皆不採用。"
    keywords:
      - "BPE"
      - "GPT tokenizer"
    exam_trap: false

  - id: "L21101-Q07"
    topic_code: "L21101"
    item_code: "L21101"
    difficulty: 1
    question: "Transformer 架構中引入「位置編碼（Positional Encoding）」的主要原因為何？"
    options:
      a: "因 self-attention 對輸入順序排列對稱，需額外資訊讓模型能分辨 token 在序列中的相對/絕對位置"
      b: "取代 attention 中的 Q/K/V 計算，減少注意力分數的運算量"
      c: "讓模型在推論時能自動延長最大序列長度至訓練時的兩倍"
      d: "等價於 BERT 的 [CLS] token，用來彙整整句的句子級表示"
    correct: "a"
    explanation:
      why_correct: "Self-Attention 本身對順序不敏感（排列對稱），若無位置編碼，模型無法分辨「狗咬人」與「人咬狗」，故須加入位置資訊（sinusoidal 或 learned）。"
      why_not_b: "位置編碼只是與 token embedding 相加，並未取代 Q/K/V 運算，也不降低 attention 複雜度。"
      why_not_c: "原始 sinusoidal 雖具外推可能，但實務上外推效果有限，且並非位置編碼的主要目的；更長序列通常需 ALiBi / RoPE 等設計。"
      why_not_d: "[CLS] 是 BERT 額外加入的分類 token，與位置編碼的功能無關（[CLS] 做句子表徵，PE 做位置資訊）。"
    keywords:
      - "positional encoding"
      - "位置編碼"
    exam_trap: false

  - id: "L21101-Q08"
    topic_code: "L21101"
    item_code: "L21101"
    difficulty: 1
    question: "下列哪一組屬於「編碼器-解碼器（encoder-decoder）」架構的代表模型？"
    options:
      a: "BERT、RoBERTa（僅保留 encoder，使用 MLM 預訓練）"
      b: "GPT、Llama（僅保留 decoder，使用 causal LM 預訓練）"
      c: "T5、BART（同時使用 encoder 處理輸入、decoder 生成輸出）"
      d: "ELMo、Word2Vec（使用 bi-LSTM 或淺層神經網路得到詞向量）"
    correct: "c"
    explanation:
      why_correct: "T5 以 text-to-text 統一框架 + span corruption 預訓練；BART 以 denoising autoencoder 預訓練，皆保留完整 encoder-decoder 結構，天然適合 seq2seq 任務（翻譯、摘要）。"
      why_not_a: "BERT、RoBERTa 屬 encoder-only：只保留 Transformer encoder 堆疊，透過 MLM 做雙向理解，不含 decoder。"
      why_not_b: "GPT、Llama 屬 decoder-only：只保留含 causal mask 的 decoder，逐字自回歸生成，不含 encoder。"
      why_not_d: "ELMo 是 bi-LSTM 產生 contextual embedding、Word2Vec 是淺層預測型詞向量，兩者都不是 Transformer 架構，更不是 encoder-decoder。"
    keywords:
      - "encoder-decoder"
      - "T5 BART"
    exam_trap: false

# ===== Difficulty 2: Understand (8 questions) =====

  - id: "L21101-Q09"
    topic_code: "L21101"
    item_code: "L21101"
    difficulty: 2
    question: "為何子詞（subword）分詞比傳統「以空白切詞」更適合處理大型預訓練模型的詞彙表？"
    options:
      a: "子詞完全避免任何未知詞（OOV）問題，且詞彙量可無限壓縮"
      b: "子詞能在固定詞彙量內兼顧常見詞完整保留與罕見詞可再拆解，降低 OOV 機率"
      c: "子詞切分速度比空白切分快十倍以上"
      d: "子詞是語言學正式分析單位，具備語意最小性保證"
    correct: "b"
    explanation:
      why_correct: "BPE/WordPiece 對高頻詞保留完整 token，對低頻詞拆成更小片段，以固定詞彙量涵蓋幾乎所有輸入，大幅降低 OOV。"
      why_not_a: "子詞可顯著降低但非「完全避免」OOV，且詞彙量固定並非「可無限壓縮」。"
      why_not_c: "速度非主要優勢，空白切分其實更快；子詞的價值在模型效能而非分詞速度。"
      why_not_d: "子詞是統計切分結果，未必對應語言學形素，不具語意最小性保證。"
    keywords:
      - "subword"
      - "OOV"
    exam_trap: true

  - id: "L21101-Q10"
    topic_code: "L21101"
    item_code: "L21101"
    difficulty: 2
    question: "以下對 word2vec 與 BERT 產生的詞向量，最關鍵的差異描述為何？"
    options:
      a: "word2vec 為每個詞一個固定向量；BERT 向量隨上下文改變"
      b: "word2vec 需要 GPU 才能訓練；BERT 可用 CPU 訓練"
      c: "word2vec 支援中文；BERT 僅支援英文"
      d: "word2vec 是 Transformer-based；BERT 是 RNN-based"
    correct: "a"
    explanation:
      why_correct: "word2vec 屬 static embedding，bank 在任何句子向量相同；BERT 為 contextualized embedding，河岸 vs 銀行向量不同。這是 114.09 樣題解析標註的「進階細節」。"
      why_not_b: "兩者皆可在 CPU/GPU 上訓練，硬體不是本質差異。"
      why_not_c: "兩者皆有中文版本（如中文 word2vec、bert-base-chinese）。"
      why_not_d: "word2vec 為淺層神經網路（非 Transformer），BERT 為 Transformer encoder（非 RNN）— 敘述顛倒。"
    keywords:
      - "contextualized embedding"
      - "polysemy"
    exam_trap: true

  - id: "L21101-Q11"
    topic_code: "L21101"
    item_code: "L21101"
    difficulty: 2
    question: "「多頭自注意力（Multi-Head Self-Attention）」的主要效益為何？"
    options:
      a: "可完全取代前饋神經網路（FFN），減少一半參數"
      b: "讓模型同時在不同子空間關注不同類型的關聯（語法、語意、共指等）"
      c: "將注意力複雜度從 O(n²) 降為 O(n log n)"
      d: "使模型自動學會最佳 tokenization 方式"
    correct: "b"
    explanation:
      why_correct: "多頭將 Q/K/V 投影到多個子空間各自做 attention，每個 head 可專注不同語言現象（長距、短距、句法、指代），再拼接回去增強表示能力。"
      why_not_a: "Multi-head 與 FFN 是 Transformer block 中並存且互補的模組，無法互相取代。"
      why_not_c: "Multi-head 不改變 attention 的 O(n²) 複雜度，加速複雜度需 Linformer/Longformer 類改造。"
      why_not_d: "Tokenization 由 tokenizer 獨立完成，與 attention head 無關。"
    keywords:
      - "multi-head attention"
      - "子空間"
    exam_trap: false

  - id: "L21101-Q12"
    topic_code: "L21101"
    item_code: "L21101"
    difficulty: 2
    question: "BERT 的 MLM（Masked Language Modeling）預訓練為什麼能產生「雙向」語境表示？"
    options:
      a: "因為 BERT 把輸入反向再正向各跑一次"
      b: "因為被 mask 的位置可同時使用左側與右側 token 作為線索預測"
      c: "因為 BERT 用了 bidirectional RNN 取代自注意力"
      d: "因為 MLM 每一步都會重新洗牌 token 順序"
    correct: "b"
    explanation:
      why_correct: "MLM 遮掉 ~15% token，讓模型依據剩餘「兩側」上下文還原目標詞，這使 encoder 的每個位置都同時吸收左右資訊，形成雙向表示。"
      why_not_a: "BERT 並非正反跑兩次（這是 ELMo LSTM 做法）；BERT 的雙向性來自 attention 無方向限制 + MLM 訓練目標。"
      why_not_c: "BERT 基於 Transformer encoder，不使用 RNN。"
      why_not_d: "MLM 不改變 token 順序，僅遮蔽部分位置。"
    keywords:
      - "MLM"
      - "bidirectional"
    exam_trap: false

  - id: "L21101-Q13"
    topic_code: "L21101"
    item_code: "L21101"
    difficulty: 2
    question: "GPT 系列採用「因果語言建模（causal LM / autoregressive）」，這對生成任務的影響為何？"
    options:
      a: "每一步預測時只能看左側歷史，確保生成過程可逐字延伸"
      b: "每一步可同時看左右，所以輸出比 BERT 更流暢"
      c: "訓練時已看完整個序列，推論時必須一次產生所有 token"
      d: "生成過程隨機排序，因此 token 順序不重要"
    correct: "a"
    explanation:
      why_correct: "Causal mask 使位置 t 只能關注 ≤t 的 token，和人類逐字往下寫的過程一致，也讓 next-token prediction 可自然延伸出新內容。"
      why_not_b: "Decoder-only 的 GPT 不能看右側未來 token，否則會洩漏答案。"
      why_not_c: "自回歸推論是逐 token 生成，不是一次輸出整串。"
      why_not_d: "順序對因果 LM 至關重要，絕非隨機。"
    keywords:
      - "causal LM"
      - "autoregressive"
    exam_trap: false

  - id: "L21101-Q14"
    topic_code: "L21101"
    item_code: "L21101"
    difficulty: 2
    question: "下列對「抽取式摘要（extractive）」與「生成式摘要（abstractive）」的比較，何者正確？"
    options:
      a: "抽取式是選原文句子組合、生成式可重寫並產生原文沒有的新句"
      b: "抽取式可產生原文沒有的新表達，生成式則逐字複製"
      c: "兩者輸出內容完全相同，只是用詞不同"
      d: "抽取式只能用 decoder-only 模型，生成式只能用 encoder-only"
    correct: "a"
    explanation:
      why_correct: "Extractive 的輸出必然是原文既有句/片段的組合，具可追溯性；abstractive 由模型解碼，可跨句融合並產生原文從未出現的新表達（改寫、綜合）。『是否允許新表達』即兩者的本質分界。"
      why_not_b: "方向顛倒：能產生新表達的是生成式，不是抽取式。抽取式在定義上即不允許產生原文沒有的字串。"
      why_not_c: "兩者輸出風格、忠實度、幻覺風險差異顯著：抽取式近乎零幻覺但僵硬；生成式流暢但可能捏造。兩者不可視為相同。"
      why_not_d: "架構對應顛倒：抽取式常用 encoder-only（如 BERT 判斷句子是否納入摘要）；生成式常用 encoder-decoder（T5/BART）或 decoder-only。"
    keywords:
      - "extractive summarization"
      - "abstractive summarization"
    exam_trap: false

  - id: "L21101-Q15"
    topic_code: "L21101"
    item_code: "L21101"
    difficulty: 2
    question: "「pretrain → fine-tune」範式的意義為何？"
    options:
      a: "先用大規模無標註語料學通用語言表示，再用少量標註資料調整以解決特定任務"
      b: "預訓練與微調各自訓練不同的隨機初始化模型，下游階段不繼承預訓練權重"
      c: "預訓練階段就已完成所有下游標註分類頭的參數學習，微調僅微調 embedding"
      d: "僅適用於 encoder-only 模型（如 BERT），decoder-only 與 encoder-decoder 無法採用此範式"
    correct: "a"
    explanation:
      why_correct: "BERT 所確立的範式：無監督預訓練掌握廣泛語言知識，再以少量標註資料將通用模型調整為 classification / QA / NER 等下游任務專用模型，本質是『通用語言能力→特定任務能力』的兩階段轉移。"
      why_not_b: "微調階段必然繼承預訓練權重（否則與從零訓練無異），『不繼承』即不是 pretrain→fine-tune。"
      why_not_c: "下游分類頭是微調階段才新加的，預訓練模型對下游類別一無所知；且微調通常解凍整個模型，而非僅 embedding。"
      why_not_d: "GPT、T5、BART 皆採用此範式（只是訓練目標不同：causal LM / span corruption / denoising），並非 encoder-only 專利。"
    keywords:
      - "pretrain"
      - "fine-tune"
    exam_trap: false

  - id: "L21101-Q16"
    topic_code: "L21101"
    item_code: "L21101"
    difficulty: 2
    question: "下列關於 tokenizer 與模型家族的對應，何者正確？"
    options:
      a: "BERT → BPE；GPT → WordPiece；T5 → SentencePiece"
      b: "BERT → WordPiece；GPT → BPE；T5 → SentencePiece"
      c: "BERT → SentencePiece；GPT → WordPiece；T5 → BPE"
      d: "三者皆使用字元級切分，無差別"
    correct: "b"
    explanation:
      why_correct: "Hugging Face 官方文件與原論文對應：BERT/ALBERT 用 WordPiece、GPT/GPT-2/GPT-3/Llama 用（byte-level）BPE、T5/mT5/XLNet 以 SentencePiece 作為 tokenizer 函式庫（內部演算法為 Unigram LM）。"
      why_not_a: "BERT 與 GPT 的 tokenizer 對調。BERT 原論文即明確指定 WordPiece。"
      why_not_c: "三者全錯位，是標準干擾選項形態。"
      why_not_d: "現代 LLM 皆採子詞（subword）分詞，字元級序列過長、效率極差，主流模型未採用。"
    keywords:
      - "tokenizer mapping"
      - "WordPiece vs BPE"
    exam_trap: true

# ===== Difficulty 3: Apply (8 questions) =====

  - id: "L21101-Q17"
    topic_code: "L21101"
    item_code: "L21101"
    difficulty: 3
    question: "某電商想針對中文商品評論做「正面／負面／中性」三分類。團隊的約束是：(i) 只能輸出固定類別標籤、不得生成文字，(ii) 需要雙向上下文理解（例如『不難吃』這類雙重否定），(iii) 標註資料僅約 2,000 筆，希望微調成本最低。以下哪一種架構最適合直接微調用於此任務？"
    options:
      a: "encoder-only（如中文 BERT / RoBERTa-wwm），在 [CLS] 上接一個三分類線性頭做 fine-tune"
      b: "decoder-only（如 GPT），要求模型逐字生成「正面／負面／中性」再解析輸出字串"
      c: "encoder-decoder（如 T5），把分類包裝成 text-to-text 目標輸出字串標籤"
      d: "word2vec 取平均 + Logistic Regression，不使用 Transformer"
    correct: "a"
    explanation:
      why_correct: "三個約束 (i) 僅輸出 label、(ii) 雙向上下文、(iii) 低資料量微調，恰好對應 encoder-only 的強項：MLM 預訓練提供雙向表示、[CLS] + 線性頭參數極少收斂快、且封閉類別不需生成。這是 iPAS 中級「任務特性→架構家族」的標準答案。"
      why_not_b: "Decoder-only 是單向（causal），違反約束 (ii)；且需要 prompt 設計與字串解析，違反約束 (i) 不得生成文字的硬性條件。"
      why_not_c: "T5 雖能做，但把 3 類封閉標籤包成 seq2seq 會同時激活 encoder+decoder（參數量與推論成本更高），違反約束 (iii) 成本最低原則。"
      why_not_d: "靜態詞向量對「不難吃」這類雙重否定無法區分（『不』與『難吃』都各是一個固定向量），直接違反約束 (ii)。"
