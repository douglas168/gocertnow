  - id: "L21101-Q28"
    topic_code: "L21101"
    item_code: "L21101"
    difficulty: 4
    question: "下列關於「BPE / WordPiece / Unigram LM」三種 subword 分詞『演算法』的比較，何者最正確？（提示：SentencePiece 為 Google 開源的 tokenizer 函式庫，內部演算法為 BPE 或 Unigram LM，本身不是一種新演算法）"
    options:
      a: "三者完全等價，只是命名不同，訓練結果永遠相同"
      b: "BPE 以合併最高頻字元對為核心（GPT/Llama）；WordPiece 以最大化語言模型概率選擇合併對（BERT）；Unigram LM 從大詞彙表逐步移除、保留概率最大子集（T5/XLNet，常透過 SentencePiece 實作）"
      c: "BPE 只能處理英文，WordPiece 只能處理德文，Unigram LM 只能處理日文"
      d: "三者皆是深度神經網路，需要 GPU 訓練數週才能得到 tokenizer"
    correct: "b"
    explanation:
      why_correct: "三者皆為子詞演算法但訓練準則不同：BPE 依頻率反覆合併、WordPiece 以合併後語言模型概率最大者優先、Unigram LM 則反向從大詞彙開始裁減。SentencePiece 是 Google 開源 tokenizer 函式庫，內部演算法是 BPE 或 Unigram LM；T5/ALBERT/XLNet 通常用 Unigram LM（via SentencePiece）。這是 iPAS 中級『函式庫 vs 演算法』的關鍵陷阱。"
      why_not_a: "訓練目標與結果顯著不同（頻率 vs 概率 vs 反向裁減），同語料下三者產生的詞彙表與切分結果並不相同。"
      why_not_c: "三種演算法皆為語言無關（只依賴字元/位元組統計），都可處理任何語言，語種限制描述錯誤。"
      why_not_d: "三者皆是統計/啟發式演算法，完全不需要神經網路訓練，通常在 CPU 數十分鐘內即可訓出。"
    keywords:
      - "subword comparison"
      - "tokenizer"
    exam_trap: true

  - id: "L21101-Q29"
    topic_code: "L21101"
    item_code: "L21101"
    difficulty: 3
    question: "word2vec 的 CBOW 與 Skip-gram 皆屬「預測型（predictive）」，而 GloVe 屬於「共現統計型（count-based）」。下列敘述何者正確？"
    options:
      a: "兩者都是動態詞向量，會隨句子變化"
