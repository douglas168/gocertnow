  - id: "L21101-Q34"
    topic_code: "L21101"
    item_code: "L21101"
    difficulty: 5
    question: "某醫療新創需要：(i) 長文件輸入、(ii) 可改寫並綜合多段生成衛教摘要、(iii) 要求每句可回溯到來源段落。在單一模型骨幹前提下，最合理的架構 + 補強設計為何？"
    options:
      a: "以 encoder-only BERT 做句子分類，放棄生成需求"
      b: "以 decoder-only GPT 直接生成，不處理可追溯性"
      c: "以 encoder-decoder（如 BART/T5）做抽象式摘要，並搭配檢索/引用標註機制提供可追溯性"
      d: "以 word2vec 相似度排序原句取代摘要生成"
    correct: "c"
    explanation:
      why_correct: "條件 i+ii 指向 encoder-decoder 抽象式摘要；條件 iii 則需在模型外加檢索或引用對齊來補足可追溯，是最符合三條件的折衷方案。"
      why_not_a: "放棄生成即不符條件 ii。"
      why_not_b: "不處理可追溯即不符條件 iii，醫療場域高風險。"
      why_not_d: "相似度排序無法改寫與綜合，不符條件 ii。"
