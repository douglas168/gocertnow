      d: "CBOW 實際上是矩陣分解法，與 GloVe 的數學推導完全等價"
    correct: "c"
    explanation:
      why_correct: "word2vec 以上下文預測目標詞（CBOW）或反之（Skip-gram）；GloVe 分解全域共現矩陣。兩者最終都得到「每詞一向量」的靜態表示，只是訓練信號來源不同（預測 vs 統計共現）。"
