  - id: "L21101-Q35"
    topic_code: "L21101"
    item_code: "L21101"
    difficulty: 5
    question: "某團隊比較三模型：M1（encoder-only）、M2（decoder-only）、M3（encoder-decoder）。若任務為「多輪對話機器人 + few-shot 指令控制口吻 + 長上下文續寫」，且希望維運單一模型，最佳選擇與理由為何？"
    options:
      a: "M1；因為 BERT 擅長雙向，故對話也最佳"
      b: "M3；因為 T5 同時包含 encoder 與 decoder，一定最強"
      c: "三者皆不適合，應回到 RNN"
      d: "M2；因為 causal LM + in-context learning + 長 context window 是 decoder-only 的原生強項"
    correct: "d"
    explanation:
      why_correct: "多輪對話與 few-shot prompting 為 decoder-only LLM 的核心能力；2024–2026 LLM 主流亦為 decoder-only（GPT/Llama/Qwen）。"
      why_not_a: "BERT 不能做長生成，多輪續寫非其能力。"
      why_not_b: "T5 可用但多輪對話與 in-context learning 非其優勢，通常不選它做對話主機。"
      why_not_c: "RNN 在長距依賴與平行化上皆劣於 Transformer。"
