# ===== Difficulty 4: Analyze (8 questions) =====

  - id: "L21101-Q25"
    topic_code: "L21101"
    item_code: "L21101"
    difficulty: 4
    question: "比較 Transformer 與傳統 RNN/LSTM 處理長序列時的差異，下列敘述何者最完整且正確？"
    options:
      a: "Transformer 循序計算但不會梯度消失；RNN 可平行運算"
      b: "兩者本質相同，僅名稱不同"
      c: "Transformer 的計算複雜度恆低於 RNN，故總是更快"
      d: "Transformer 以自注意力捕捉任意距離依賴並支援平行運算；RNN 依循序計算易梯度消失、難以平行"
    correct: "d"
    explanation:
      why_correct: "Self-Attention 任意位置兩兩相連，不受距離影響，且矩陣運算天然可平行；RNN 依時間步循序推進，長距依賴易梯度消失且難平行化 — 四關鍵詞常一起出現於考題。"
      why_not_a: "Transformer 可平行、RNN 循序，此選項把兩者特性顛倒。"
      why_not_b: "機制與特性差異顯著，不可等同。"
      why_not_c: "Attention 為 O(n²)，序列極長時未必快於 RNN 的 O(n)；「總是更快」錯。"
    keywords:
      - "transformer vs rnn"
      - "parallelism"
    exam_trap: true

