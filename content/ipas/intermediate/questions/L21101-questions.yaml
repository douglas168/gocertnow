  - id: "L21101-Q39"
    topic_code: "L21101"
    item_code: "L21101"
    difficulty: 5
    question: "某平台負責人在選 tokenizer 時收到四個建議：(甲) BERT 中文用 BPE；(乙) GPT 用 WordPiece；(丙) T5 用 SentencePiece；(丁) 多語混合場景可採 SentencePiece。下列哪一組判斷全部正確？"
    options:
      a: "甲、乙"
      b: "丙、丁"
      c: "甲、丁"
      d: "乙、丙"
    correct: "b"
    explanation:
      why_correct: "逐項驗證：(甲) BERT→WordPiece（非 BPE），錯；(乙) GPT→BPE（非 WordPiece），錯；(丙) T5→SentencePiece（內部 Unigram LM），正確；(丁) 多語混合場景因 SentencePiece 不依賴空白、對 CJK/泰語/越南語更穩健，首選正確。因此正確組合為『丙、丁』。"
      why_not_a: "甲、乙皆為 tokenizer 對應錯誤的典型陷阱（BERT/GPT 對調），兩者皆錯。"
