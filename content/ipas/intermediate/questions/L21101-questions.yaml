      why_not_c: "三者差異本質即在架構家族與訓練方向皆不同，不是同一目標的別名。"
    keywords:
      - "pretrain objectives"
      - "architecture family"
    exam_trap: false

  - id: "L21101-Q31"
    topic_code: "L21101"
    item_code: "L21101"
    difficulty: 4
    question: "比較「抽取式 QA」與「生成式 QA」下列何者最能描述兩者的取捨？"
    options:
      a: "抽取式答案必在原文、可追溯、但無法跨段綜合；生成式可綜合改寫但可能幻覺"
      b: "抽取式一定比生成式正確、且演算法保證永不幻覺"
      c: "抽取式答案若跨多段即自動融合，且不會超出原文語意；生成式僅能回傳單句原文片段，無改寫能力"
      d: "兩者僅模型規模不同（抽取式用小模型、生成式用大模型），機制完全相同"
    correct: "a"
    explanation:
      why_correct: "抽取式以原文片段作答具可追溯性但侷限於單段；生成式可跨段綜合改寫但存在幻覺風險，這是選型的核心 trade-off（醫法金場景常因此選抽取式以降低法律風險）。"
      why_not_b: "抽取式若原文根本沒寫到答案時也會錯（選錯片段），並非一律更正確；『演算法保證永不幻覺』是過度誇大。"
      why_not_c: "敘述與事實顛倒：能跨段綜合與改寫的是生成式；抽取式反而是輸出原文片段、不能改寫。"
      why_not_d: "兩者機制本質不同（一個做 span classification、一個做 seq2seq 生成），與模型規模無關。"
    keywords:
      - "extractive vs generative QA"
      - "hallucination"
    exam_trap: true

  - id: "L21101-Q32"
    topic_code: "L21101"
    item_code: "L21101"
    difficulty: 3
    question: "分析 Self-Attention 的計算複雜度，下列何者最正確？"
    options:
      a: "對序列長度 n 為 O(n²)，因此長序列（如整本書）會面臨顯著算力與記憶體挑戰"
      b: "複雜度恆為 O(1)，與序列長度無關"
      c: "複雜度為 O(log n)，比 RNN 明顯更優"
      d: "複雜度為 O(n³)，比 RNN 差"
    correct: "a"
    explanation:
      why_correct: "標準 self-attention 需計算每一對 token 的相似度，形成 n×n 矩陣，複雜度 O(n²)，這也是長文檔必須引入 Longformer、FlashAttention 等優化的動機。"
      why_not_b: "O(1) 與序列無關明顯不合事實。"
      why_not_c: "RNN 為 O(n)，attention 並沒有降到 O(log n)。"
      why_not_d: "並非 O(n³)；標準實作是 O(n²)。"
    keywords:
      - "attention complexity"
      - "O(n^2)"
    exam_trap: false

# ===== Difficulty 5: Evaluate (8 questions) =====

  - id: "L21101-Q33"
    topic_code: "L21101"
    item_code: "L21101"
    difficulty: 5
    question: "某保險公司要建構系統：同時（a）從多頁保單「抽取式」定位條款原文、（b）對條款做「正負面傾向」分類。在不為每個任務維護獨立大型 LLM 的前提下，最佳骨幹選擇為何？"
    options:
      a: "以兩個不同 decoder-only GPT 分別訓練，互不共享參數"
      b: "以 word2vec 為核心，兩個任務都用餘弦相似度"
      c: "以 encoder-decoder T5 做兩次 seq2seq 生成，忽略 BERT"
      d: "以單一 encoder-only 中文 BERT 為基座，分別微調 token-classification（抽取定位）與 sentence-classification（傾向）兩個頭"
    correct: "d"
    explanation:
      why_correct: "兩個子任務皆屬理解型（token-level 抽取 + sentence-level 分類），都是 BERT 強項；共用 encoder 基座只接兩個輕量頭最省算力與維運成本。"
      why_not_a: "雙 LLM 維運成本極高，且兩任務都不是生成式。"
      why_not_b: "word2vec 無法做片段起訖定位。"
      why_not_c: "T5 對此任務過重，且 seq2seq 生成分類標籤不易穩定。"
