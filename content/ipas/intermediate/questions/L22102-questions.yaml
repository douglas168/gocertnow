  item_code: "L22102-7"
  difficulty: 5
  question: "某資料分析師要在 Python 中計算 `X~N(50,3^2)` 的 `P(47<=X<=53)`。下列哪一個 `scipy.stats` 寫法最符合題意且參數正確？"
  options:
    a: "`norm.pdf(53, loc=50, scale=3) - norm.pdf(47, loc=50, scale=3)`"
    b: "`norm.cdf(53, loc=50, scale=3) - norm.cdf(47, loc=50, scale=3)`"
    c: "`norm.cdf(53, loc=50, scale=9) - norm.cdf(47, loc=50, scale=9)`"
    d: "`poisson.cdf(53, mu=50) - poisson.cdf(47, mu=50)`"
  correct: "b"
  explanation:
    why_correct: "區間機率要用 CDF 相減，且 `scale` 應是標準差 3，不是變異數 9。"
    why_not_a: "PDF 差值不是區間機率，這是把密度與機率混淆。"
    why_not_b: "此選項正確，函式、分佈、參數與區間讀法都正確。"
    why_not_c: "把變異數 9 當成 `scale` 是常見 SciPy 參數錯誤。"
    why_not_d: "題目明確是常態分佈，不是 Poisson。"
  keywords:
    - "scipy.stats"
    - "norm.cdf"
    - "interval probability"
  exam_trap: true

- id: "L22102-Q35"
  topic_code: "L22102"
  item_code: "L22102-3"
  difficulty: 5
  question: "某電商每分鐘平均有 0.2 位用戶完成結帳，一天中要監控『某分鐘內是否出現多筆結帳』的稀有事件。若團隊希望模型簡潔、可直接用平均率建參數，哪個選擇最合理？"
  options:
    a: "均勻分佈（Uniform Distribution），因為時間軸是連續的"
    b: "常態分佈（Normal Distribution），因為可以近似任何分佈"
    c: "卜瓦松分佈（Poisson Distribution），因為是在固定時間區間內計數且事件稀少"
    d: "二項分佈（Binomial Distribution），但一定要先知道每天總分鐘數才可計算"
  correct: "c"
  explanation:
    why_correct: "題目重點是固定時間區間內的稀有事件計數，且希望直接用平均率建模，Poisson 最合適。"
    why_not_a: "時間是連續的，不代表事件次數服從均勻分佈。"
    why_not_b: "常態分佈不是『任何分佈都可直接取代』，尤其這裡是低率計數問題。"
    why_not_c: "此選項正確，也呼應 Poisson 的使用條件。"
    why_not_d: "若改成二項分佈，需要明確固定試驗次數與成功機率；本題更自然是率驅動的事件計數。"
  keywords:
    - "Poisson"
    - "model selection"
    - "rate"
  exam_trap: false

- id: "L22102-Q36"
  topic_code: "L22102"
  item_code: "L22102-4"
  difficulty: 5
  question: "客服主管想計算『平均每小時 1.2 通未接來電時，下一小時剛好 0 通未接』的機率。若要求使用最直接的 `scipy.stats` 寫法，下列何者最佳？"
  options:
    a: "`norm.pdf(0, loc=1.2, scale=1.2)`"
    b: "`binom.pmf(0, n=1.2, p=0.5)`"
    c: "`poisson.cdf(0, mu=1.2)`"
    d: "`poisson.pmf(0, mu=1.2)`"
  correct: "d"
  explanation:
    why_correct: "剛好 0 次是單點機率，Poisson 應使用 `pmf`；`mu=1.2` 表示平均每小時 1.2 通。"
    why_not_a: "常態分佈不是此題最直接模型，而且 `pdf` 也不是離散事件單點機率。"
    why_not_b: "`n` 不能是 1.2，且此題沒有固定試驗次數設定。"
    why_not_c: "`cdf(0)` 算的是 `P(X<=0)`，雖在非負整數情況下數值等於 `P(X=0)`，但題目要求最直接寫法，`pmf` 更精確。"
    why_not_d: "此選項正確，模型與函式選擇都最恰當。"
  keywords:
    - "poisson.pmf"
    - "scipy.stats"
    - "exact probability"
  exam_trap: false

- id: "L22102-Q37"
  topic_code: "L22102"
  item_code: "L22102-5"
  difficulty: 5
  question: "某校要模擬學生在 10 到 20 分鐘之間隨機進入線上測驗平台，且假設這段區間內每個到達時刻都同樣可能。若要選最符合假設的模型，下列何者最佳？"
  options:
    a: "均勻分佈（Uniform Distribution） `U(10,20)`"
    b: "常態分佈（Normal Distribution） `N(15,5^2)`"
    c: "二項分佈（Binomial Distribution） `Binomial(10,0.5)`"
    d: "卜瓦松分佈（Poisson Distribution） `Poisson(15)`"
  correct: "a"
  explanation:
    why_correct: "題目明確指出區間內每個時刻都同樣可能，這正是均勻分佈的定義。"
    why_not_a: "此選項正確，完整符合『區間內等可能』的條件。"
    why_not_b: "常態分佈集中於中間值，兩端機率較低，不符合等可能。"
    why_not_c: "二項分佈描述固定次數成功次數，不是到達時刻。"
    why_not_d: "Poisson 描述事件次數，不是事件發生的連續時間位置。"
  keywords:
    - "Uniform"
    - "equal likelihood"
    - "model selection"
  exam_trap: false

- id: "L22102-Q38"
  topic_code: "L22102"
  item_code: "L22102-6"
  difficulty: 5
  question: "某研究員發現原始資料明顯不是常態分佈，但她每次隨機抽取 200 筆樣本並計算平均值，想用常態分佈近似這些平均值的分佈。下列判斷何者最合理？"
  options:
    a: "不可行，因為原始資料不是常態，所以平均值分佈絕不可能近似常態"
    b: "可行，因為中央極限定理指出在樣本數夠大時，樣本平均數分佈常可近似常態"
    c: "不可行，除非原始資料是均勻分佈"
    d: "只有在單筆資料的 z-score 都小於 1 時才可行"
  correct: "b"
  explanation:
    why_correct: "CLT 的重點正是在母體不一定常態時，樣本平均數仍可能在大樣本下近似常態。"
    why_not_a: "這把母體分佈與 sample mean 分佈混為一談。"
    why_not_b: "此選項正確，200 筆通常足以支撐 CLT 的直觀應用。"
    why_not_c: "CLT 並不限於均勻分佈。"
    why_not_d: "z-score 門檻不是 CLT 的成立條件。"
  keywords:
    - "CLT"
    - "Normal approximation"
    - "large sample"
  exam_trap: false

- id: "L22102-Q39"
  topic_code: "L22102"
  item_code: "L22102-1"
  difficulty: 5
  question: "主管要求分析師用一句話解釋：『某 KPI 連續型指標在 80 以下的機率』應該看哪一種函數。若要避免混淆 PMF、PDF、CDF，下列哪個回答最完整？"
  options:
    a: "看 PMF，因為 80 是一個特定數值"
    b: "看 PDF，因為 PDF 就是所有機率"
    c: "看 CDF，因為它直接表示 `P(X<=80)`；若是連續型，單點機率不能用 PDF 值直接代替"
    d: "三者都可以，結果只差單位不同"
  correct: "c"
  explanation:
    why_correct: "題目問的是『80 以下』，本質是累積機率，因此應看 CDF；同時也點出連續型單點機率陷阱。"
    why_not_a: "PMF 適用於離散型單點機率，不適合這個連續型累積機率問題。"
    why_not_b: "PDF 不是所有機率，更不能直接回答 `P(X<=80)`。"
    why_not_c: "此選項正確，兼顧函數選擇與概念澄清。"
    why_not_d: "三者意義不同，不能互換。"
  keywords:
    - "CDF"
    - "PMF vs PDF"
    - "continuous"
  exam_trap: true

- id: "L22102-Q40"
  topic_code: "L22102"
  item_code: "L22102-2"
  difficulty: 5
  question: "某教師想用 `scipy.stats` 驗證常態分佈（Normal Distribution） `N(100, 15^2)` 中，成績落在 85 到 115 分之間的比例是否約為 68%。若要寫出最合理的驗證方式，下列何者最佳？"
  options:
    a: "使用 `norm.pdf(115, loc=100, scale=15) - norm.pdf(85, loc=100, scale=15)`，因為 PDF 差值就是區間機率"
    b: "使用 `norm.cdf(115, loc=100, scale=225) - norm.cdf(85, loc=100, scale=225)`，因為 `scale` 要傳變異數"
    c: "使用 `poisson.cdf(115, mu=100) - poisson.cdf(85, mu=100)`，因為分數都是整數"
    d: "使用 `norm.cdf(115, loc=100, scale=15) - norm.cdf(85, loc=100, scale=15)`，因為區間機率應由 CDF 相減且 `scale` 是標準差"
  correct: "d"
  explanation:
    why_correct: "常態分佈的區間機率要用 CDF 相減，且 SciPy 的 `scale` 是標準差 15，不是變異數 225。"
    why_not_a: "PDF 差值不是區間機率，這是最典型的密度與機率混淆。"
    why_not_b: "即使函式選對，`scale` 傳變異數仍是錯誤。"
    why_not_c: "分數是否為整數不決定要用 Poisson；題目明確給的是常態分佈。"
    why_not_d: "此選項正確，函式、參數與觀念都完整無誤。"
  keywords:
    - "scipy.stats"
    - "norm.cdf"
    - "68-95-99.7 rule"
  exam_trap: true
