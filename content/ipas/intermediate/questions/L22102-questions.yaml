  question: "關於二項分佈（Binomial Distribution），下列敘述何者正確？"
  options:
    a: "每次試驗的成功機率可以隨次數改變"
    b: "適合描述固定次數獨立試驗中的成功次數"
    c: "只能用來近似連續型測量值"
