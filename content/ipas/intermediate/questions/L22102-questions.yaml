- id: "L22102-Q18"
  topic_code: "L22102"
  item_code: "L22102-4"
  difficulty: 3
  question: "新竹某機房統計每小時的硬碟告警件數，長期平均約為 2.5 件。若要估計下一小時剛好出現 4 件告警的機率，最適合使用哪一種模型？"
  options:
    a: "常態分佈（Normal Distribution）"
    b: "卜瓦松分佈（Poisson Distribution）"
    c: "均勻分佈（Uniform Distribution）"
    d: "二項分佈（Binomial Distribution）"
  correct: "b"
  explanation:
    why_correct: "固定時間區間內的事件次數，且已知平均發生率，正是 Poisson 的標準使用情境。"
    why_not_a: "常態分佈較適合連續型或近似對稱的大樣本情境。"
    why_not_b: "此選項正確，平均每小時 2.5 件可直接視為 `λ=2.5`。"
    why_not_c: "均勻分佈表示區間內等可能，與事件次數無關。"
    why_not_d: "題目沒有固定試驗次數與固定成功機率，不符合 Binomial 的設定。"
  keywords:
    - "Poisson"
    - "lambda"
    - "scenario"
  exam_trap: false

- id: "L22102-Q19"
  topic_code: "L22102"
  item_code: "L22102-7"
  difficulty: 3
  question: "閱讀下列程式碼後，判斷它在計算什麼：`binom.pmf(2, n=5, p=0.3)`"
  options:
    a: "常態分佈下，值小於等於 2 的累積機率"
    b: "卜瓦松分佈下，剛好發生 2 次的機率"
    c: "5 次獨立試驗、成功率 0.3 時，剛好成功 2 次的機率"
    d: "在區間 [0,5] 上取到 2 的密度"
  correct: "c"
  explanation:
    why_correct: "`binom.pmf(k,n,p)` 回傳 Binomial 在剛好 `k` 次成功時的機率。"
    why_not_a: "這是 `cdf` 語意，而且題目使用的是二項分佈不是常態。"
    why_not_b: "Poisson 會用 `poisson.pmf`，不是 `binom.pmf`。"
    why_not_c: "此選項正確，完整說出函式與參數意義。"
    why_not_d: "`pmf` 是離散型機率，不是連續型密度。"
  keywords:
    - "scipy.stats"
    - "binom.pmf"
    - "code reading"
  exam_trap: false

- id: "L22102-Q20"
  topic_code: "L22102"
  item_code: "L22102-5"
  difficulty: 3
  question: "某模擬系統假設到站時間 `X~U(2,8)`。若工程師要用 `scipy.stats` 計算 `x=5` 的機率密度值，哪個寫法正確？"
  options:
    a: "`uniform.pdf(5, a=2, b=8)`"
    b: "`uniform.pmf(5, loc=2, scale=6)`"
    c: "`uniform.cdf(5, loc=2, scale=8)`"
    d: "`uniform.pdf(5, loc=2, scale=6)`"
  correct: "d"
  explanation:
    why_correct: "SciPy 的 `uniform` 用 `loc=a`、`scale=b-a`，因此 `U(2,8)` 應寫成 `loc=2, scale=6`，且題目要的是 PDF。"
    why_not_a: "SciPy `uniform` 不是直接用 `a`、`b` 命名參數。"
    why_not_b: "Uniform 是連續型分佈，應用 `pdf` 而不是 `pmf`。"
    why_not_c: "這同時把函式與 `scale` 都用錯了；`cdf` 不是密度，`scale` 也應是 6。"
    why_not_d: "此選項正確，完全符合 SciPy 的參數格式。"
  keywords:
    - "scipy.stats"
    - "uniform.pdf"
    - "loc scale"
  exam_trap: true

- id: "L22102-Q21"
  topic_code: "L22102"
  item_code: "L22102-6"
  difficulty: 3
  question: "台中某零售商的單筆訂單金額分佈明顯右偏，但分析師每天抽 100 筆訂單計算平均金額，並想評估這個平均值的分佈。此時最合理的說法是什麼？"
  options:
    a: "根據中央極限定理，樣本平均數的分佈可望接近常態分佈"
    b: "因為原始資料右偏，所以樣本平均數一定也完全右偏"
    c: "只有原始資料本來是均勻分佈時，樣本平均數才可近似常態"
    d: "CLT 只適用於樣本數小於 30"
  correct: "a"
  explanation:
    why_correct: "即使母體右偏，只要樣本數夠大，樣本平均數的抽樣分佈通常仍可近似常態。"
    why_not_a: "此選項正確，正是 CLT 的實務直覺。"
    why_not_b: "CLT 討論的是平均數分佈，不是原始資料形狀直接複製。"
    why_not_c: "CLT 不限於均勻分佈。"
    why_not_d: "一般是樣本數愈大愈有利於近似常態，不是小於 30。"
  keywords:
    - "CLT"
    - "sample mean"
    - "right-skewed"
  exam_trap: false

- id: "L22102-Q22"
  topic_code: "L22102"
  item_code: "L22102-1"
  difficulty: 3
  question: "某連續型變數的累積分配函數滿足 `F(10)=0.82`、`F(6)=0.31`。則 `P(6<X<=10)` 應為何？"
  options:
    a: "0.82"
    b: "0.51"
    c: "0.31"
    d: "1.13"
  correct: "b"
  explanation:
    why_correct: "區間機率可由 CDF 相減得到：`P(6<X<=10)=F(10)-F(6)=0.82-0.31=0.51`。"
    why_not_a: "這只是 `P(X<=10)`，忽略了下界 6。"
    why_not_b: "此選項正確，區間機率的讀法就是 CDF 相減。"
    why_not_c: "這只是 `P(X<=6)`。"
    why_not_d: "機率不可能大於 1，且把兩個 CDF 值相加也是錯誤做法。"
  keywords:
    - "CDF"
    - "interval probability"
    - "P(a<X<=b)"
  exam_trap: false

- id: "L22102-Q23"
  topic_code: "L22102"
  item_code: "L22102-2"
  difficulty: 3
  question: "某班統計測驗分數近似常態分佈（Normal Distribution），平均 70 分、標準差 10 分。學生甲考 85 分，其 z-score 為何？"
  options:
    a: "0.5"
    b: "1.0"
    c: "1.5"
    d: "2.5"
  correct: "c"
  explanation:
    why_correct: "z-score = `(85-70)/10 = 1.5`。"
    why_not_a: "這表示只高於平均 5 分，計算少除或少減都容易得到。"
    why_not_b: "若誤把差距 15 看成 10，常會選到 1.0。"
    why_not_c: "此選項正確，依公式直接計算即可。"
    why_not_d: "這相當於高出 25 分，與題目不符。"
  keywords:
    - "z-score"
    - "Normal Distribution"
    - "calculation"
  exam_trap: false

- id: "L22102-Q24"
  topic_code: "L22102"
  item_code: "L22102-3"
  difficulty: 3
  question: "某 AI 線上課程共有 8 名學員參加小測，每人答對題目的機率獨立且皆為 0.6。若要計算剛好 5 人答對的機率，哪個表示式最適合？"
  options:
    a: "`poisson.pmf(5, mu=4.8)`"
    b: "`norm.cdf(5, loc=4.8, scale=1.39)`"
    c: "`8C5 * 0.6^8 * 0.4^5`"
    d: "`8C5 * 0.6^5 * 0.4^3`"
  correct: "d"
  explanation:
    why_correct: "Binomial 的 PMF 為 `C(n,k)p^k(1-p)^(n-k)`，本題應為 `8C5 * 0.6^5 * 0.4^3`。"
    why_not_a: "雖然 `np=4.8`，但題目是固定 8 人、每人成功率 0.6 的典型 Binomial，不應直接改用 Poisson。"
    why_not_b: "常態近似不是本題最直接且精確的表示式。"
    why_not_c: "成功與失敗次方寫反了，是常見公式記憶錯誤。"
    why_not_d: "此選項正確，完整符合二項分佈 PMF。"
  keywords:
    - "Binomial"
    - "PMF"
    - "combination"
  exam_trap: true

- id: "L22102-Q25"
  topic_code: "L22102"
  item_code: "L22102-4"
  difficulty: 4
  question: "某資安團隊想估計『一天內 20000 封郵件中，被偵測為惡意連結的封數』。已知單封郵件為惡意的機率約 0.0005，彼此近似獨立。若想用較簡潔的模型近似，最合理的選擇是什麼？"
  options:
    a: "用卜瓦松分佈（Poisson Distribution）近似二項分佈，並取 `λ=np`"
    b: "只能用均勻分佈，因為郵件數很多"
    c: "只能用常態分佈，因為 `n` 很大"
    d: "不能建模，因為惡意郵件是離散事件"
  correct: "a"
  explanation:
    why_correct: "當 `n` 大、`p` 小時，Binomial 可用 Poisson 近似，且 `λ=np=20000*0.0005=10`。"
    why_not_a: "此選項正確，這正是 Binomial vs Poisson selection 的經典情境。"
    why_not_b: "均勻分佈不描述事件次數。"
    why_not_c: "常態近似有時可用，但題目強調稀有事件與簡潔近似，Poisson 更貼切。"
    why_not_d: "離散事件當然可以建模，Poisson 與 Binomial 都是離散分佈。"
  keywords:
    - "Poisson approximation"
    - "Binomial"
    - "lambda=np"
  exam_trap: false

