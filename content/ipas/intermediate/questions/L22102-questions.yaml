    why_not_a: "值是整數不代表要用二項分佈；是否用常態要看分佈型態。"
    why_not_b: "此選項正確，這正是 SciPy 初學者最常犯的參數錯誤。"
    why_not_c: "`cdf` 才是累積機率，`pdf` 只是密度。"
    why_not_d: "常態分佈當然可以計算 CDF。"
