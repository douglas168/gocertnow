- id: "L22102-Q12"
  topic_code: "L22102"
  item_code: "L22102-5"
  difficulty: 2
  question: "若 `X~U(2,8)`，則其機率密度函數（PDF）在區間內的值為何？"
  options:
    a: "`1/2`"
    b: "`1/8`"
    c: "`1/10`"
    d: "`1/6`"
  correct: "d"
  explanation:
    why_correct: "均勻分佈 `U(a,b)` 的 PDF 為 `1/(b-a)`，因此此題是 `1/(8-2)=1/6`。"
    why_not_a: "考生常把下界 2 拿來直接代入，但 PDF 只看區間長度。"
    why_not_b: "把上界 8 當分母是常見速算錯誤，忽略了要先做 `b-a`。"
    why_not_c: "這不是任何正確公式的結果。"
    why_not_d: "此選項正確，因為區間長度是 6。"
  keywords:
    - "Uniform"
    - "PDF"
    - "1/(b-a)"
  exam_trap: true

- id: "L22102-Q13"
  topic_code: "L22102"
  item_code: "L22102-6"
  difficulty: 2
  question: "關於中央極限定理（CLT），下列敘述何者正確？"
  options:
    a: "當樣本數夠大時，樣本平均數的抽樣分佈會趨近常態分佈"
    b: "不論樣本數大小，原始資料都一定變成常態分佈"
    c: "CLT 只適用於 Poisson 分佈"
    d: "CLT 只討論單筆資料的 z-score"
  correct: "a"
  explanation:
    why_correct: "CLT 的直觀重點是 sample mean 的分佈逐漸接近常態，而不是原始資料本身改變形狀。"
    why_not_a: "此選項正確，這正是 CLT 最常被考的核心。"
    why_not_b: "這是典型誤解；原始母體可以不是常態。"
    why_not_c: "CLT 是一般性的抽樣結果，不限於 Poisson。"
    why_not_d: "z-score 是標準化工具，不是 CLT 的主題。"
  keywords:
    - "CLT"
    - "Normal approximation"
