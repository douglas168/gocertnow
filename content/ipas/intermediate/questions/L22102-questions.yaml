    why_correct: "Binomial 的基本條件是固定試驗次數、每次成功或失敗、試驗獨立且成功機率固定。"
    why_not_a: "若成功機率改變，就不符合標準二項分佈前提。"
    why_not_b: "此選項正確，完整描述了 Binomial 的典型使用情境。"
    why_not_c: "二項分佈是離散型分佈，用來計數成功次數。"
    why_not_d: "二項分佈的標準參數仍是 `n` 與 `p`。"
