- id: "L22102-Q01"
  topic_code: "L22102"
  item_code: "L22102-1"
  difficulty: 1
  question: "對於連續型隨機變數的機率密度函數（PDF, Probability Density Function），下列何者正確？"
  options:
    a: "PDF 在某一點的函數值是密度，不等於該點本身的機率"
    b: "PDF 可直接表示 `P(X=x)`，且通常大於 0"
    c: "PDF 只適用於離散型資料"
    d: "PDF 與累積分配函數（CDF, Cumulative Distribution Function）完全相同"
  correct: "a"
  explanation:
    why_correct: "PDF 描述的是機率密度；對連續型變數而言，真正的機率來自區間下的面積，單點機率 `P(X=x)` 為 0。"
    why_not_a: "此選項正確，因為 PDF 的函數值代表密度高低，而不是單點機率本身。"
    why_not_b: "這是最常見誤區，考生容易把曲線高度誤當成機率值。"
    why_not_c: "離散型資料應用 PMF；PDF 是連續型分佈的表示方式。"
    why_not_d: "CDF 是累積到某點以下的機率，PDF 是密度函數，兩者用途不同。"
  keywords:
    - "PDF"
    - "continuous"
    - "單點機率"
  exam_trap: true

- id: "L22102-Q02"
  topic_code: "L22102"
  item_code: "L22102-2"
  difficulty: 1
  question: "在常態分佈（Normal Distribution）中，z-score 的主要作用是什麼？"
  options:
    a: "直接求出樣本變異數"
    b: "把觀測值轉成距離平均數多少個標準差的標準化量"
    c: "把離散分佈轉成連續分佈"
    d: "檢查資料是否一定服從常態分佈"
  correct: "b"
  explanation:
    why_correct: "z-score 為 `(x-μ)/σ`，表示某值離平均數幾個標準差，便於比較不同尺度的資料。"
    why_not_a: "變異數描述整體散布；z-score 是對單一觀測值做位置標準化。"
    why_not_b: "此選項正確，符合 z-score 的定義。"
    why_not_c: "標準化不會改變資料是離散或連續的本質。"
    why_not_d: "z-score 可協助判讀相對位置，但不能單靠它證明資料必為常態。"
  keywords:
    - "z-score"
    - "Normal Distribution"
    - "標準化"
  exam_trap: false

- id: "L22102-Q03"
  topic_code: "L22102"
  item_code: "L22102-3"
  difficulty: 1
  question: "下列哪一組參數是二項分佈（Binomial Distribution）的標準參數表示？"
  options:
    a: "平均數 `μ` 與標準差 `σ`"
    b: "下界 `a` 與上界 `b`"
    c: "試驗次數 `n` 與成功機率 `p`"
    d: "平均發生率 `λ`"
  correct: "c"
  explanation:
    why_correct: "二項分佈描述固定 `n` 次獨立試驗中成功次數，且每次成功機率固定為 `p`。"
    why_not_a: "這較常用於常態分佈的描述，不是 Binomial 的核心參數。"
    why_not_b: "這是均勻分佈常見的區間記號。"
    why_not_c: "此選項正確，`n` 與 `p` 正是二項分佈的標準參數。"
    why_not_d: "`λ` 是 Poisson 分佈常用參數，不足以描述二項分佈。"
  keywords:
    - "Binomial"
    - "n"
    - "p"
  exam_trap: false

- id: "L22102-Q04"
  topic_code: "L22102"
  item_code: "L22102-4"
  difficulty: 1
  question: "下列哪一個情境最適合使用卜瓦松分佈（Poisson Distribution）建模？"
  options:
    a: "一批 20 題選擇題中答對的題數"
    b: "0 到 100 分之間任一分數都等可能的模擬值"
    c: "全校身高近似鐘形分佈的情況"
    d: "客服中心每 10 分鐘接到的來電件數"
  correct: "d"
  explanation:
    why_correct: "Poisson 適合描述固定時間或空間區間內的事件次數，且事件以固定平均率發生。"
    why_not_a: "這是固定次數試驗中的成功次數，較符合二項分佈。"
    why_not_b: "這描述的是區間內等可能，較符合均勻分佈。"
    why_not_c: "鐘形對稱較像常態分佈，不是事件計數。"
    why_not_d: "此選項正確，因為來電件數是固定時間內的計數型事件。"
  keywords:
    - "Poisson"
    - "rate"
    - "rare events"
  exam_trap: false

- id: "L22102-Q05"
  topic_code: "L22102"
  item_code: "L22102-5"
  difficulty: 1
  question: "若隨機變數服從均勻分佈（Uniform Distribution） `U(a,b)`，其平均數為何？"
  options:
    a: "`(a+b)/2`"
    b: "`(b-a)/2`"
    c: "`1/(b-a)`"
    d: "`ab/2`"
  correct: "a"
  explanation:
    why_correct: "均勻分佈在區間兩端對稱，平均數位於區間中央，因此為 `(a+b)/2`。"
    why_not_a: "此選項正確，直接反映均勻分佈的中心位置。"
    why_not_b: "這是半個區間長度，不是平均數。"
    why_not_c: "這是 PDF 高度，不是平均數。"
    why_not_d: "將端點相乘沒有統計上的平均位置意義。"
  keywords:
    - "Uniform"
    - "mean"
    - "U(a,b)"
  exam_trap: false

- id: "L22102-Q06"
  topic_code: "L22102"
  item_code: "L22102-6"
  difficulty: 1
  question: "中央極限定理（Central Limit Theorem, CLT）主要說明在樣本數夠大時，哪一個量的分佈會趨近常態分佈（Normal Distribution）？"
  options:
    a: "每一筆原始觀測值本身"
    b: "樣本平均數（sample mean）的抽樣分佈"
    c: "資料表欄位名稱的出現次數"
    d: "每一個機率密度函數的函數值"
  correct: "b"
  explanation:
    why_correct: "CLT 講的是樣本平均數的抽樣分佈，而不是單一觀測值本身。"
    why_not_a: "這是最常見誤解；CLT 不保證原始資料會變成常態。"
    why_not_b: "此選項正確，CLT 的核心對象就是 sample mean。"
    why_not_c: "欄位名稱與機率分佈無關。"
    why_not_d: "CLT 討論的是統計量的分佈，不是 PDF 的點值。"
  keywords:
    - "CLT"
    - "sample mean"
    - "抽樣分佈"
  exam_trap: true

- id: "L22102-Q07"
  topic_code: "L22102"
  item_code: "L22102-7"
  difficulty: 1
  question: "若資料科學家要用 `scipy.stats` 計算 `X~N(70,5^2)` 時 `P(X<=75)`，下列哪個函式呼叫正確？"
  options:
    a: "`norm.pdf(75, loc=70, scale=5)`"
    b: "`norm.cdf(75, loc=70, scale=25)`"
    c: "`norm.cdf(75, loc=70, scale=5)`"
    d: "`binom.cdf(75, n=70, p=0.5)`"
  correct: "c"
  explanation:
    why_correct: "`norm.cdf` 計算累積機率 `P(X<=x)`，且 `scale` 應傳入標準差 `σ=5`，不是變異數。"
    why_not_a: "`pdf` 回傳密度，不是累積機率。看到 `P(X<=75)` 時應優先想到 `cdf`。"
    why_not_b: "25 是變異數 `σ^2`，但 SciPy 的 `scale` 參數要的是標準差。"
    why_not_c: "此選項正確，函式與參數都符合題意。"
    why_not_d: "這題是常態分佈累積機率，不是二項分佈。"
  keywords:
    - "scipy.stats"
    - "norm.cdf"
    - "scale"
  exam_trap: true

- id: "L22102-Q08"
  topic_code: "L22102"
  item_code: "L22102-1"
  difficulty: 1
  question: "累積分配函數（CDF, Cumulative Distribution Function） `F(x)` 的定義為何？"
  options:
    a: "`P(X=x)`"
    b: "某點的機率密度值"
    c: "`P(X>x)`"
    d: "`P(X<=x)`"
  correct: "d"
  explanation:
    why_correct: "CDF 定義就是隨機變數小於或等於某值 `x` 的累積機率。"
    why_not_a: "這是單點機率，較接近 PMF 的語意。"
    why_not_b: "這是 PDF 的語意，不是累積機率。"
    why_not_c: "這是右尾機率，方向相反，是考試常見混淆。"
    why_not_d: "此選項正確，完全符合 CDF 的標準定義。"
  keywords:
    - "CDF"
    - "P(X<=x)"
    - "累積機率"
  exam_trap: true

- id: "L22102-Q09"
  topic_code: "L22102"
  item_code: "L22102-2"
  difficulty: 2
  question: "關於常態分佈（Normal Distribution）的 68-95-99.7 rule，下列敘述何者正確？"
  options:
    a: "約有 95% 的資料會落在平均數上下 2 個標準差內"
    b: "約有 68% 的資料會落在平均數上下 3 個標準差內"
    c: "約有 99.7% 的資料會落在平均數上下 1 個標準差內"
    d: "只有在離散型資料才適用"
  correct: "a"
  explanation:
    why_correct: "經驗法則（即 68-95-99.7 法則）指出，常態分佈約 68%、95%、99.7% 分別落在 1、2、3 個標準差內。"
    why_not_a: "此選項正確，對應到經驗法則的 95% 部分。"
    why_not_b: "3 個標準差應約對應 99.7%，不是 68%。"
    why_not_c: "1 個標準差只約有 68%，不是 99.7%。"
    why_not_d: "常態分佈是連續型分佈，與離散型無關。"
  keywords:
    - "68-95-99.7 rule"
    - "Normal Distribution"
    - "empirical rule"
  exam_trap: false

