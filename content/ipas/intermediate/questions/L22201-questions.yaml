    why_not_a: "空白字元由 `\\s` 表示，不是 `\\d`。"
    why_not_c: "零個或多個應使用 `\\d*`（星號），`+` 要求至少一個字元。"
    why_not_d: "英文字母由 `[a-zA-Z]` 或 `[a-z]` 表示，`\\d` 專指數字。"
