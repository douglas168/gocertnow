  difficulty: 1
  question: "pandas 的 `dropna(how='all')` 與 `dropna(how='any')` 的差異為何？"
  options:
    a: "`how='all'` 只刪除「該列所有欄位都是 NaN」的列；`how='any'` 只要有一欄為 NaN 就刪除"
    b: "`how='all'` 只要有一欄為 NaN 就刪除；`how='any'` 只刪除全列皆為 NaN 的列"
    c: "兩者行為相同，差異僅在效能"
    d: "`how='all'` 刪除欄（columns）；`how='any'` 刪除列（rows）"
  correct: "a"
  explanation:
    why_correct: "`how='all'` 表示只有當一整列的所有值都是 NaN 時才刪除，`how='any'` 表示只要該列中有任一 NaN 就刪除。這是 pandas 文件的精確定義。"
    why_not_b: "選項 B 把兩個參數的意義對調，是最常見的混淆錯誤。"
    why_not_c: "兩者行為截然不同，`how='any'` 比 `how='all'` 刪除更多列，不僅是效能差異。"
    why_not_d: "`how=` 參數控制刪除條件，axis= 才控制刪除方向（列或欄）。"
  keywords:
