- id: "L22201-Q15"
  topic_code: "L22201"
  item_code: "L22201-E"
  difficulty: 3
  question: "以下 pandas 程式碼的執行結果為何？\n\n```python\nimport pandas as pd\ndf = pd.DataFrame({'raw': ['TEL:02-12345678', 'TEL:03-9876543']})\ndf['phone'] = df['raw'].str.extract(r'TEL:(\\d{2}-\\d{7,8})')\nprint(df['phone'].tolist())\n```"
  options:
    a: "['TEL:02-12345678', 'TEL:03-9876543']（回傳整個原始字串）"
    b: "['02', '03']（只擷取區碼）"
    c: "['02-12345678', '03-9876543']（擷取捕獲群組內容）"
    d: "None（正規表達式語法錯誤）"
  correct: "c"
  explanation:
    why_correct: "`str.extract()` 回傳第一個捕獲群組（括號內）的匹配內容。regex `TEL:(\\d{2}-\\d{7,8})` 的捕獲群組是 `\\d{2}-\\d{7,8}`，故擷取結果為 '02-12345678' 和 '03-9876543'。"
    why_not_a: "`str.extract()` 只回傳捕獲群組，不包含群組外的 'TEL:' 前綴。"
