- id: "L22201-Q08"
  topic_code: "L22201"
  item_code: "L22201-H"
  difficulty: 2
  question: "下列哪個敘述最精確地區分假名化（pseudonymization）與匿名化（anonymization）？"
  options:
    a: "兩者皆不可逆，差異僅在加密強度"
    b: "假名化使用雜湊（hash）；匿名化使用對稱加密（symmetric encryption）"
    c: "假名化是不可逆的資料遮蔽，匿名化是可逆的 token 替換"
    d: "假名化可透過金鑰或映射表還原原始 PII；匿名化是不可逆的單向轉換"
  correct: "d"
  explanation:
    why_correct: "假名化（pseudonymization）以 token 或假名替換 PII，但保留映射表，可以還原（reversible）；匿名化（anonymization）是不可逆的單向轉換，無法從輸出復原原始 PII，兩者的核心差異在可逆性。"
    why_not_a: "假名化是可逆的，並非兩者皆不可逆。"
    why_not_b: "假名化的技術實作多樣（token、雜湊+鹽值、加密等），匿名化也不限於對稱加密；以技術手段分類並不精確。"
    why_not_c: "選項 C 把可逆性對調了——假名化才是可逆的，匿名化才是不可逆的。"
  keywords:
    - "pseudonymization"
    - "假名化"
    - "anonymization"
    - "匿名化"
    - "PII"
  exam_trap: false

