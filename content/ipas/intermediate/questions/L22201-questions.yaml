- id: "L22201-Q26"
  topic_code: "L22201"
  item_code: "L22201-H"
  difficulty: 4
  question: "某公司將客戶手機號碼以 SHA-256 雜湊（無鹽值 salt）後儲存於資料庫，並聲稱已完成「匿名化（anonymization）」。下列哪個敘述最準確描述此方案的風險？"
  options:
    a: "SHA-256 是單向雜湊，原始號碼無法被反推，此方案完全符合匿名化標準"
    b: "此方案是假名化（pseudonymization）而非匿名化，因為有金鑰映射可還原"
    c: "雜湊本身無法被數學反推，但台灣手機號碼輸入空間有限（約 10^8 個），攻擊者可預先計算所有號碼的 SHA-256 雜湊值建立彩虹表（rainbow table），實現重識別（re-identification）"
    d: "此方案完全符合 GDPR 的匿名化標準，因為 SHA-256 是不可逆演算法"
  correct: "c"
  explanation:
    why_correct: "SHA-256 本身是不可逆的，但台灣手機號碼格式固定（09 開頭 10 位數，約 10^8 個可能值），輸入空間有限。攻擊者只需預先計算所有可能號碼的雜湊值，建立查找表，即可從雜湊值逆推回原始號碼。無鹽值雜湊在有限輸入空間下不足以構成真正的匿名化。正確做法是加鹽值（salt）或使用 tokenization。"
    why_not_a: "SHA-256 的不可逆性在理論上成立，但實際上有限輸入空間使彩虹表攻擊完全可行，聲稱「無法還原」在此場景是錯誤的。"
    why_not_b: "無鹽值 SHA-256 雜湊不存在「金鑰映射」，假名化的特徵是可透過金鑰還原；此方案嚴格說既非假名化也非真正的匿名化，問題在彩虹表風險。（補充：無鹽值雜湊因彩虹表攻擊風險，嚴格而言既非假名化也非足夠的匿名化，屬於不充分的遮蔽手段。此知識點在 §3-9 §6 陷阱5 有延伸說明。）"
    why_not_d: "GDPR 對匿名化的要求是「合理手段下不可重識別」；彩虹表攻擊是可行且已知的合理手段，因此此方案不符合 GDPR 匿名化標準。"
