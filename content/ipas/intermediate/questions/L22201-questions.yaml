- id: "L22201-Q30"
  topic_code: "L22201"
  item_code: "L22201-B"
  difficulty: 5
  question: "某電商平台有「全台各縣市門市銷售額」資料，各縣市銷售均值差異達 3–5 倍。資料工程師需填補缺值，同時維護一個供全國分析的 Gold 層報表。以下哪個策略在準確性與可維護性上最佳？"
  options:
    a: "在 Silver 層按縣市（partition by city）分組計算中位數填補；Gold 層只做聚合，不再填補"
    b: "在 Gold 層用全局中位數填補，因為 Gold 層用途是全國分析"
    c: "在 Bronze 層用 ffill() 前向填補，避免後續層次需要處理缺值"
    d: "對缺值欄位一律填 0，以確保計算不報錯"
  correct: "a"
  explanation:
    why_correct: "在 Silver 層按縣市分組計算各組中位數填補（partition-wise imputation），可確保填補值具有分組代表性，不受全局分布偏移影響；Gold 層只負責聚合報表，不應再做缺值填補（已在 Silver 完成）。這符合 Lakehouse 各層職責分離原則。"
    why_not_b: "Gold 層使用全局中位數填補，會讓銷售額低的縣市缺值被高估、銷售高的縣市被低估，全國分析結果偏差更大，且違反「清理在 Silver」的分層原則。"
    why_not_c: "Bronze 層應保留原始資料（land as-is），在 Bronze 填補缺值會破壞原始資料不可變性，且 ffill 在截面（cross-sectional）資料中無意義——ffill 是時間序列縱向填補。"
    why_not_d: "填 0 對銷售額欄位會把缺失值錯誤解讀為「零銷售」，嚴重扭曲統計分析，特別是均值、加總類指標。"
  keywords:
    - "partition-wise imputation"
    - "Silver layer"
    - "groupby"
    - "median"
    - "Lakehouse"
  exam_trap: true

- id: "L22201-Q31"
  topic_code: "L22201"
  item_code: "L22201-C"
  difficulty: 5
  question: "某資料工程師設計 Delta Lake upsert 管線，每日從 CDC（Change Data Capture）接收上游異動資料並合併至主表。以下程式碼有何問題？\n\n```python\n# 每日 CDC 增量資料（未去重）\nsource_df = spark.read.parquet('/cdc/daily/')\n\n# MERGE INTO 主表\nspark.sql(\"\"\"\n    MERGE INTO gold.orders AS target\n    USING source AS source\n    ON target.order_id = source.order_id\n    WHEN MATCHED THEN UPDATE SET *\n    WHEN NOT MATCHED THEN INSERT *\n\"\"\")\n```"
  options:
    a: "程式碼正確，Delta Lake MERGE INTO 自動去除 source 中的重複 order_id"
    b: "應改用 INSERT OVERWRITE 而非 MERGE INTO，因為 MERGE 不支援 ACID"
    c: "source_df 未先去重就送入 MERGE，若同一 order_id 在 CDC 中出現多次，可能導致非預期的多次 INSERT（NOT MATCHED 分支）"
    d: "Delta Lake MERGE INTO 語法錯誤，`WHEN NOT MATCHED THEN INSERT *` 不合法"
  correct: "c"
  explanation:
    why_correct: "Delta Lake 的 MERGE INTO 不會自動去重 source。當 source 中有多筆相同 order_id 時，MATCHED 分支會多次 UPDATE（每次覆蓋），NOT MATCHED 分支若 join 失敗則多次 INSERT，造成資料不一致。最佳實踐是先對 source_df 執行 `dropDuplicates(['order_id'])` 再傳入 MERGE。"
    why_not_a: "MERGE INTO 不會自動去重 source，這是常見的誤解（exam trap）。"
    why_not_b: "Delta Lake MERGE INTO 本身就是 ACID upsert，支援原子性操作；INSERT OVERWRITE 會覆蓋整個目標表，不適合增量更新。"
    why_not_d: "`WHEN NOT MATCHED THEN INSERT *` 是合法的 Delta Lake SQL 語法。"
  keywords:
    - "Delta Lake"
    - "MERGE INTO"
    - "ACID"
    - "pre-deduplicate"
    - "CDC"
  exam_trap: false

- id: "L22201-Q32"
  topic_code: "L22201"
  item_code: "L22201-I"
  difficulty: 5
  question: "新創公司正在評估下一代資料平台架構，面臨以下約束：① 資料科學家需要用 SQL 探索原始資料；② 資料量每月翻倍，算力需彈性擴展；③ 部分資料需在入庫前通過 GDPR 合規驗證才能儲存。約束①②支持 ELT/Lakehouse，約束③要求 ETL 的特性。下列哪個混合架構最合理？"
  options:
    a: "全面採用 ELT，GDPR 驗證改在 Silver 層做（載入後再清理驗證）"
    b: "全面採用 ETL，因為有一個合規要求就必須整體採用 ETL 架構"
    c: "依資料敏感度分流：GDPR 敏感資料走 ETL 先驗證再入庫；非敏感資料走 ELT 進 Lakehouse，利用雲端彈性算力；兩條路線共用 Gold 層服務資料科學家"
    d: "改用 NoSQL 資料庫，因為 schema-less 設計自動符合 GDPR 的靈活性需求"
  correct: "c"
  explanation:
    why_correct: "混合架構是正解：GDPR 敏感資料走 ETL（在載入前驗證，符合約束③），非敏感資料走 ELT Lakehouse（彈性算力，符合約束②，且 SQL 探索原始 Bronze 資料，符合約束①）。兩條路線不互斥，依資料類型分流是最務實的 trade-off 選擇。"
    why_not_a: "ELT 是「載入後才清理」，GDPR 若在 Silver 層才驗證，非合規資料已進入 Bronze 儲存，可能違反 GDPR 資料最小化（data minimisation）原則。"
    why_not_b: "因一個合規需求就整體採用 ETL，放棄了雲端彈性算力（違反約束②）和原始資料 SQL 探索（違反約束①），過度限制架構彈性。"
    why_not_d: "NoSQL schema-less 設計解決的是資料模型靈活性問題，與 GDPR 合規驗證完全無關；且資料科學家 SQL 探索在 NoSQL 上實作成本更高。"
  keywords:
    - "ETL"
    - "ELT"
    - "GDPR"
    - "hybrid architecture"
    - "Lakehouse"
    - "data minimisation"
  exam_trap: false

- id: "L22201-Q33"
  topic_code: "L22201"
  item_code: "L22201-J"
  difficulty: 5
  question: "某平台串流處理用戶行為事件，設計了以下去重管線：\n\n```python\nevents = (\n    spark.readStream.format('kafka')...\n    .withWatermark('event_time', '30 minutes')\n    .dropDuplicatesWithinWatermark(['user_id', 'event_type', 'event_time'])\n)\nquery = events.writeStream.outputMode('append')...\n```\n\n產品經理要求：若某地區網路不穩定，事件最長可能延遲 2 小時才到達。目前設定是否足夠？應如何調整？"
  options:
    a: "30 分鐘已足夠，串流系統自動補償延遲"
    b: "應將 watermark 延長至至少 `'2 hours'`，否則超過 30 分鐘的晚到事件會被丟棄，導致資料遺失；同時需評估狀態大小（state size）與延遲容忍的權衡"
    c: "應改用 `outputMode('complete')` 以確保所有延遲資料都被保留"
    d: "必須停止 watermark 機制（移除 withWatermark），改用無限狀態保留以防止任何事件丟失"
  correct: "b"
  explanation:
    why_correct: "Watermark 閾值決定了系統容忍的最大事件延遲。30 分鐘 watermark 意味著超過 30 分鐘的晚到事件「可能」被丟棄。若業務需求是容忍最長 2 小時延遲，就必須將 watermark 設為 ≥ 2 hours。但延長 watermark 也意味著狀態保留時間更長（更多記憶體），這是延遲容忍度與狀態大小（memory）的典型 trade-off。"
    why_not_a: "Spark 不會自動補償 watermark 閾值不足的問題；超過 watermark 的事件確實可能被丟棄。"
    why_not_c: "`complete` 模式與 watermark 不相容（AnalysisException），且完整輸出模式要求重輸出所有歷史結果，並非「保留延遲資料」的正確方案。"
    why_not_d: "移除 watermark 會導致狀態無限增長（unbounded state），最終 OOM；這不是生產環境可接受的方案。"
  keywords:
    - "watermark"
    - "late-arriving"
    - "state size"
    - "trade-off"
    - "2 hours"
  exam_trap: false

- id: "L22201-Q34"
  topic_code: "L22201"
  item_code: "L22201-H"
  difficulty: 5
  question: "某健保資料分析平台需對外提供研究用資料集，研究者不得追溯個別病患。法律顧問要求「真正的匿名化（anonymization）」，但資料科學家認為「假名化（pseudonymization）加上嚴格存取控制」更實用。在以下哪種情境下，假名化方案確實不足以替代匿名化？"
  options:
    a: "當資料集包含罕見疾病診斷（rare disease diagnosis），透過疾病碼 + 地區 + 年齡可能唯一識別個別病患，即使移除姓名也可被重識別（re-identified）"
    b: "當研究者只需要統計聚合資料（aggregate statistics），個別紀錄不需提供"
    c: "當假名化使用的 token 由第三方機構持有金鑰，研究平台無法解碼"
    d: "當資料集已移除所有直接識別欄位（姓名、身分證、手機號碼）"
  correct: "a"
  explanation:
    why_correct: "假名化僅移除直接識別符（如姓名），但保留準識別符（quasi-identifiers）如疾病碼、地區、年齡。罕見疾病在特定地區的特定年齡層可能只有少數病患，攻擊者可透過連結攻擊（linkage attack）重識別個別病患。在此情境下，假名化「不足」，需要 k-匿名化（k-anonymity）或差分隱私（differential privacy）等真正匿名化技術。"
    why_not_b: "若只提供聚合統計資料，假名化與匿名化的區別不關鍵，因為個別紀錄本就不暴露；這是假名化「足夠」的情境。"
    why_not_c: "第三方持有金鑰是假名化的強化版本，研究平台無法解碼，安全性進一步提高，這是假名化「可接受」的情境。"
    why_not_d: "移除直接識別欄位後仍可能被重識別（正是選項 A 描述的情況），但 D 本身不是判斷假名化「不足」的直接原因；A 才直接說明了為何假名化不夠的機制。"
  keywords:
    - "anonymization"
    - "pseudonymization"
    - "re-identification"
    - "quasi-identifier"
    - "rare disease"
    - "linkage attack"
  exam_trap: false

- id: "L22201-Q35"
  topic_code: "L22201"
  item_code: "L22201-F"
  difficulty: 5
  question: "某 FinTech 公司設計資料品質閘控（data quality gate）於 Silver 層，需同時監控六大維度。下列哪組規則設計最完整地覆蓋六個維度（Completeness、Accuracy、Consistency、Timeliness、Uniqueness、Validity）？"
  options:
    a: "① 缺值率 < 5%；② 金額欄位為正數；③ 主鍵無重複；④ 日期格式符合 ISO 8601"
    b: "① 主鍵無重複；② 所有欄位有值；③ 日期格式正確；④ 來源系統版本一致"
    c: "① 每日資料量波動 < 20%；② 與昨日資料 join 後無新欄位；③ 主鍵無重複；④ 資料更新時間差 < 30 分鐘"
    d: "① 缺值率 < 5%（Completeness）；② 與參考主檔比對準確率 > 99%（Accuracy）；③ 跨表外鍵一致（Consistency）；④ 資料更新時間差 < 1 小時（Timeliness）；⑤ 主鍵唯一率 = 100%（Uniqueness）；⑥ 金額欄位格式及值域合法（Validity）"
  correct: "d"
  explanation:
    why_correct: "選項 D 精確對應全部六個維度，每條規則各負責一個維度：① Completeness（缺值率）、② Accuracy（與參考主檔比對）、③ Consistency（跨表外鍵）、④ Timeliness（更新時間差）、⑤ Uniqueness（主鍵唯一率）、⑥ Validity（金額格式及值域）。這是六維度全覆蓋的品質閘控設計。"
    why_not_a: "只有 4 條規則：① Completeness（缺值率）、② Validity（金額正數）、③ Uniqueness（主鍵無重複）、④ Validity（日期格式）——缺少 Accuracy、Consistency、Timeliness，且 Validity 重複覆蓋。"
    why_not_b: "只覆蓋 4 個維度：Uniqueness（主鍵無重複）、Completeness（所有欄位有值）、Validity（日期格式）、Consistency（來源系統版本）——缺少 Accuracy 和 Timeliness。"
    why_not_c: "資料量波動和 join 後新欄位偵測屬於 schema drift 監控，不是 Accuracy 維度；雖有 Timeliness 和 Uniqueness，但缺少 Completeness、Accuracy（正式定義）、Validity 的明確規則，六維未全覆蓋。"
  keywords:
    - "資料品質"
    - "six dimensions"
    - "quality gate"
    - "Silver layer"
    - "Completeness"
    - "Accuracy"
    - "Timeliness"
  exam_trap: false
