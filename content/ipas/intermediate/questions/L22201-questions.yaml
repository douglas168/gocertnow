  explanation:
    why_correct: "Schema drift 的定義是：上游資料結構（欄位名稱、型別、新增/刪除欄位）在下游不知情的情況下改變，導致管線解析失敗，是造成 30–40% 管線中斷的主要原因。"
    why_not_a: "記憶體溢出是資源問題，不是 schema drift。"
    why_not_b: "晚到資料是 late-arriving records 問題，屬於 watermark policy 範疇。"
    why_not_d: "工具版本不相容是相容性問題，不是 schema drift 的典型成因。"
