- id: "L22201-Q10"
  topic_code: "L22201"
  item_code: "L22201-B"
  difficulty: 2
  question: "時間序列（time-series）資料中有零散缺值，希望以前一個有效觀測值填補（forward fill）。在 pandas 3.0 環境下，哪段程式碼是正確寫法？"
  options:
    a: "`df['col'] = df['col'].ffill()`"
    b: "`df['col'] = df['col'].fillna(method='ffill')`"
    c: "`df['col'] = df['col'].fillna(method='pad')`"
    d: "`df['col'] = df['col'].forward_fill()`"
  correct: "a"
  explanation:
    why_correct: "pandas 3.0 已移除 `fillna()` 的 `method=` 參數；正確的前向填補方式是直接呼叫 `df.ffill()` 或 `Series.ffill()`。"
    why_not_b: "`fillna(method='ffill')` 在 pandas 2.1 起發出 FutureWarning，在 3.0 已完全移除，執行時會拋出 TypeError。"
    why_not_c: "`fillna(method='pad')` 與 B 同理，`method=` 參數在 3.0 已移除，`'pad'` 是 `'ffill'` 的別名但同樣無效。"
    why_not_d: "`forward_fill()` 不是 pandas 的標準方法名稱，執行會拋出 AttributeError。"
  keywords:
    - "ffill"
    - "pandas 3.0"
    - "fillna method removed"
    - "time-series imputation"
  exam_trap: true

- id: "L22201-Q11"
  topic_code: "L22201"
  item_code: "L22201-C"
  difficulty: 2
  question: "電商訂單資料表中，同一筆訂單可能因系統重傳出現多筆 `order_id` 相同的紀錄，需保留最後一筆（系統認定最新狀態）並刪除其餘。下列哪個 pandas 呼叫正確實現此需求？"
  options:
    a: "`df.drop_duplicates(subset=['order_id'], keep=False)`"
    b: "`df.drop_duplicates(subset=['order_id'], keep='first')`"
    c: "`df.drop_duplicates(subset=['order_id'], keep='last')`"
    d: "`df.drop_duplicates(keep='last')`"
  correct: "c"
  explanation:
    why_correct: "`keep='last'` 表示在重複的 `order_id` 群組中保留最後一筆，其餘刪除；`subset=['order_id']` 指定只依 order_id 判斷重複。"
    why_not_a: "`keep=False` 會連最後那筆也刪除，導致訂單資料完全消失，結果錯誤。"
    why_not_b: "`keep='first'` 保留第一筆，不符合「保留最新狀態（最後一筆）」需求。"
    why_not_d: "未指定 `subset` 時，pandas 以所有欄位判斷重複，相同 order_id 但其他欄位不同的紀錄不會被判為重複，無法達成目標。"
  keywords:
    - "drop_duplicates"
    - "keep='last'"
    - "subset"
    - "deduplication"
  exam_trap: false

- id: "L22201-Q12"
  topic_code: "L22201"
  item_code: "L22201-D"
  difficulty: 2
  question: "Z-score 異常值處理中，「clipping（截斷）」策略與「dropping（刪除）」策略的主要差異為何？"
  options:
    a: "Clipping 刪除異常值所在整列；dropping 以邊界值替換"
    b: "Clipping 使用 IQR 計算；dropping 使用 Z-score 計算"
    c: "兩者均不影響樣本數，差異僅在計算複雜度"
    d: "Clipping 將超出閾值的值截斷至邊界值（如 ±3σ），保留樣本數；dropping 移除整列，樣本數減少"
  correct: "d"
  explanation:
    why_correct: "Z-score clipping 把超過 |Z|=3 的觀測值截斷至 +3σ 或 −3σ，紀錄仍保留；dropping 則直接移除該紀錄，樣本數下降，可能導致偏差（bias）。兩者適用場景不同。"
    why_not_a: "選項 A 把兩者定義對調了。"
    why_not_b: "Clipping 與 dropping 都可以搭配 IQR 或 Z-score 計算閾值，並非方法本身決定計算方式。"
    why_not_c: "Dropping 會減少樣本數，選項 C 說法錯誤。"
  keywords:
    - "z-score"
    - "clipping"
    - "dropping"
    - "outlier"
  exam_trap: false

