  options:
    a: "ETL（先清理/驗證/去識別化，再載入報告系統），因為受監管管線需要在載入前確保資料合規"
    b: "串流架構（Kafka + Flink），因為金融資料需要低延遲"
    c: "ELT + Lakehouse Bronze/Silver/Gold，因為分層架構支援所有清理需求"
    d: "直接讀取（直接查詢交易源頭資料庫），因為避免複製可降低合規風險"
