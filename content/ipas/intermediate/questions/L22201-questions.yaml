    why_not_a: "批次抓取是離線批量取得資料，非即時，且需客戶端主動發起。"
    why_not_c: "排程 API 輪詢仍由客戶端主動發送請求，會有輪詢間隔造成的延遲，不是『不需輪詢』的方案。"
    why_not_d: "IoT 串流是設備持續傳送感測資料，適合物聯網場景，但並非『外部服務狀態更新』的標準模式。"
