  item_code: "L22201-C"
  difficulty: 1
  question: "pandas `drop_duplicates()` 的 `keep` 參數設為 `False` 時，其行為是？"
  options:
    a: "保留第一筆重複紀錄，刪除其餘"
    b: "保留最後一筆重複紀錄，刪除其餘"
    c: "刪除所有重複紀錄（包括第一次出現的那筆）"
    d: "不刪除任何紀錄，僅標記重複欄位"
  correct: "c"
  explanation:
    why_correct: "`keep=False` 表示所有出現過重複的紀錄全部刪除，不保留任何一筆，結果只剩下完全唯一（never duplicated）的紀錄。"
    why_not_a: "保留第一筆是 `keep='first'`（預設值）的行為。"
    why_not_b: "保留最後一筆是 `keep='last'` 的行為。"
    why_not_d: "pandas `drop_duplicates()` 不提供「僅標記」功能，要標記請用 `duplicated()` 方法。"
  keywords:
    - "drop_duplicates"
    - "keep=False"
    - "deduplication"
