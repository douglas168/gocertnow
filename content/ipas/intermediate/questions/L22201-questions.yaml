  question: "ETL（Extract-Transform-Load）與 ELT（Extract-Load-Transform）的根本差異為何？"
  options:
    a: "ETL 在載入前先完成清理與轉換（transform before load）；ELT 先載入原始資料再在目標端執行轉換"
