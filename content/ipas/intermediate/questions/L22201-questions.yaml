    why_correct: "受監管的金融報告管線需要在資料入庫前就完成驗證、去識別化和稽核，這正是 ETL（Transform before Load）的設計初衷。地端環境也缺乏 ELT 所需的雲端彈性算力。"
    why_not_b: "串流架構專注於低延遲，但監管報告通常是批次場景；且串流不能替代載入前的資料驗證流程。"
    why_not_c: "ELT 把清理移至 Silver 層（載入後才清理），不滿足「載入前通過驗證」的監管要求。"
