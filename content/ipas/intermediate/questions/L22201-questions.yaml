- id: "L22201-Q28"
  topic_code: "L22201"
  item_code: "L22201-J"
  difficulty: 4
  question: "Spark Structured Streaming 設定 `withWatermark('event_time', '2 hours')`，以下哪個敘述正確描述 watermark 的語意保證？"
  options:
    a: "所有延遲超過 2 小時的資料保證被立即拋棄（dropped immediately）"
    b: "Watermark 2 小時表示結果最多延遲 2 小時才輸出，與事件時間無關"
    c: "Watermark 只對 `complete` 輸出模式有效，`append` 和 `update` 模式無法使用 watermark"
    d: "延遲在 2 小時內的資料保證被聚合處理；延遲超過 2 小時的資料「可能」被丟棄（不保證一定丟棄），取決於 watermark 推進時機"
  correct: "d"
  explanation:
    why_correct: "Spark 文件的精確語意：watermark 保證延遲在閾值（2 hours）內的資料一定會被聚合；超過閾值的資料「可能」被丟棄，但不是百分之百保證立即丟棄——若該批次的 watermark 尚未推進到足夠遠，晚到資料仍可能被處理。Watermark 的作用是允許引擎安全地清理過期狀態。"
    why_not_a: "「保證立即拋棄」是錯誤的；watermark 推進是基於最大 event_time，超過閾值的資料是「可能」被丟棄，非「保證立即」。"
    why_not_b: "Watermark 的 '2 hours' 是事件時間（event time）的延遲容忍度，不是結果輸出的處理時間（processing time）延遲。"
    why_not_c: "Watermark 與 `append` 和 `update` 模式相容；不相容的是 `complete` 模式，選項 C 描述完全相反。"
  keywords:
    - "watermark"
    - "event_time"
    - "late data"
    - "guarantee"
    - "structured streaming"
  exam_trap: false

- id: "L22201-Q29"
  topic_code: "L22201"
  item_code: "L22201-G"
  difficulty: 4
  question: "根據業界研究，schema drift 造成資料管線中斷的比例約為多少？哪種組合策略能同時兼顧「即時偵測」與「不中斷管線」？"
  options:
    a: "約 5–10%；使用靜態 DDL 腳本（static DDL scripts）定期更新 schema"
    b: "約 30–40%；結合 schema registry（版本管控）與 schema-on-read（延遲 schema 套用）"
    c: "約 60–70%；唯一解是改用 NoSQL 資料庫避免固定 schema"
    d: "約 30–40%；使用強制固定 schema（strict schema enforcement）並在偵測到 drift 時立即中斷管線"
  correct: "b"
  explanation:
    why_correct: "Airbyte 研究資料指出 schema drift 造成約 30–40% 的管線中斷。最佳兼顧策略是：schema registry 做版本管控並即時偵測變更，schema-on-read 讓新欄位不中斷現有管線，兩者互補。"
    why_not_a: "5–10% 低估了 schema drift 的普遍性；靜態 DDL 腳本是被動人工更新，無法即時偵測。"
    why_not_c: "60–70% 過度高估；改用 NoSQL 並非唯一解，且會帶來其他資料管理複雜度。"
    why_not_d: "30–40% 比例正確，但強制固定 schema 在遇到新增欄位（合理變更）時立即中斷管線，過於保守，無法兼顧「不中斷管線」。"
  keywords:
    - "schema drift"
    - "30-40%"
    - "schema registry"
