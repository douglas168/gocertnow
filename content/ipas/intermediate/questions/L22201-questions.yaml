- id: "L22201-Q04"
  topic_code: "L22201"
  item_code: "L22201-D"
  difficulty: 1
  question: "IQR（四分位距，Interquartile Range）異常值偵測中，標準的「下界 fence」公式為何？"
  options:
    a: "Q1 − 1.5 × IQR，其中 IQR = Q3 − Q1"
    b: "Q2 − 1.5 × IQR，其中 IQR = Q3 − Q1"
    c: "Q1 − 2.0 × IQR，其中 IQR = Q3 − Q1"
    d: "Q1 − 1.5 × IQR，其中 IQR = Q3 − Q2"
  correct: "a"
  explanation:
    why_correct: "IQR 的定義為第三四分位數減第一四分位數（Q3 − Q1），Tukey fence 下界為 Q1 − 1.5 × IQR，上界為 Q3 + 1.5 × IQR。選項 a 兩者皆正確。"
    why_not_b: "下界以 Q1 為基準，不是 Q2（中位數）。"
    why_not_c: "乘數 2.0 不是 Tukey fence 的標準係數；標準係數是 1.5（嚴格異常值用 3.0）。"
    why_not_d: "選項 d 將 IQR 定義為 Q3 − Q2（Q2 為中位數），此為錯誤定義；IQR 應為 Q3 − Q1。定義錯誤導致 fence 計算結果不正確。"
  keywords:
    - "IQR"
    - "四分位距"
    - "outlier"
    - "fence"
  exam_trap: false

