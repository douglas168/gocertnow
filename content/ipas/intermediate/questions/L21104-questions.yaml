      why_not_b: "自訓大型原生多模態需大量算力與資料，小團隊無法負擔。"
      why_not_d: "純 CNN 影像分類能力不足——法務現場照片需要跨模態語意推論（文字問題↔影像證據），單純 bolt-on CNN 分類器無法支援 VQA/跨模態檢索類需求。"
