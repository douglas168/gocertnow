# L21104 多模態人工智慧應用 — Practice Question Pool
# 38 questions · Bloom 1-5 · iPAS AI 中級 科目一
# Scope: fusion strategies, CLIP, cross-attention, named architectures, use-case mapping, evaluation metrics
# Taiwan terminology: 雜訊、交叉注意力、對比學習

questions:
  - id: "L21104-Q01"
    topic_code: "L21104"
    item_code: "L21104-1"
    difficulty: 1
    question: "「多模態人工智慧（Multimodal AI）」最精確的定義是什麼？"
    options:
      a: "一種只能同時處理多國語言文字的 AI 模型"
      b: "能同時處理並整合兩種以上不同類型資料（如文字、圖像、聲音）的 AI 系統"
      c: "使用多個 GPU 並行運算的深度學習模型"
      d: "同時搭載多個不同模型版本的部署架構"
    correct: "b"
    explanation:
      why_correct: "多模態（Multimodal）的「模態」指資料型態（modality），例如文字、圖像、聲音、影片等。多模態 AI 能同時接收並整合多種模態的資料進行推論或生成。"
      why_not_a: "多國語言仍屬於單一「文字」模態，只是不同語系。這屬於多語言（multilingual），不是多模態。"
      why_not_c: "多 GPU 並行是硬體運算架構，與資料模態無關。"
      why_not_d: "部署多個模型版本屬於 MLOps 範疇（L21302），與多模態定義無關。"
    keywords:
      - "多模態"
      - "multimodal"
      - "modality"
    exam_trap: true

  - id: "L21104-Q02"
    topic_code: "L21104"
    item_code: "L21104-1"
    difficulty: 1
    question: "在多模態 AI 中，下列哪一組全部屬於不同的「模態（Modality）」？"
    options:
      a: "中文文字、英文文字、日文文字"
      b: "RGB 影像、灰階影像、黑白影像"
      c: "文字、圖像、聲音"
      d: "JPEG、PNG、BMP 影像格式"
    correct: "c"
    explanation:
      why_correct: "文字、圖像、聲音是三種本質不同的資料型態，屬於三種不同的模態。這也是 iPAS L21104 大綱關鍵字所列的三種代表性模態。"
      why_not_a: "不同語言都屬於「文字」這單一模態，只是語種不同。"
      why_not_b: "RGB/灰階/黑白都是影像的色彩表示方式，仍屬於「圖像」同一模態。"
      why_not_d: "JPEG/PNG/BMP 只是影像的壓縮或編碼格式，內容仍是「圖像」一種模態。"
    keywords:
      - "模態"
      - "modality"
    exam_trap: true

  - id: "L21104-Q03"
    topic_code: "L21104"
    item_code: "L21104-1"
    difficulty: 1
    question: "CLIP（Contrastive Language-Image Pre-training）模型的核心訓練方法是下列何者？"
    options:
      a: "對比學習（Contrastive Learning）"
      b: "強化學習（Reinforcement Learning）"
      c: "擴散模型訓練（Diffusion Training）"
      d: "生成對抗訓練（Adversarial Training）"
    correct: "a"
    explanation:
      why_correct: "CLIP 的全名即 Contrastive Language-Image Pre-training，核心為對稱 InfoNCE 對比學習——拉近配對的（圖、文）嵌入、拉開未配對者。"
      why_not_b: "強化學習用於 RLHF、遊戲代理等，不是 CLIP 的訓練機制。"
      why_not_c: "擴散模型訓練是 Stable Diffusion / DALL-E 的方法，雖然它們「使用」CLIP 文字編碼器，但 CLIP 本身不是擴散模型。"
      why_not_d: "對抗訓練是 GAN 的方法，CLIP 沒有判別器 vs 生成器的對抗設定。"
    keywords:
      - "CLIP"
      - "對比學習"
      - "contrastive learning"
    exam_trap: false

  - id: "L21104-Q04"
    topic_code: "L21104"
    item_code: "L21104-1"
    difficulty: 1
    question: "在交叉注意力（Cross-Attention）機制中，Query、Key、Value 的來源為何？"
    options:
      a: "Q、K、V 全部來自同一個序列"
      b: "Q、K、V 全部隨機產生"
      c: "Q 來自某一模態，K、V 來自另一模態"
      d: "Q 來自模型輸出，K、V 來自損失函數"
    correct: "c"
    explanation:
      why_correct: "交叉注意力的定義：Query 由一個模態（如 U-Net 雜訊潛向量）提供，Key 與 Value 由另一模態（如文字嵌入）提供，使解碼端可「看向」另一模態的資訊。"
      why_not_a: "Q/K/V 全來自同一序列是自注意力（Self-Attention），不是交叉注意力。這是最常見的混淆題。"
      why_not_b: "Q/K/V 都是由可學習的線性投影產生，不是隨機產生。"
      why_not_d: "損失函數不參與 Q/K/V 的計算。"
    keywords:
      - "交叉注意力"
      - "cross-attention"
      - "Q/K/V"
    exam_trap: true

  - id: "L21104-Q05"
    topic_code: "L21104"
    item_code: "L21104-1"
    difficulty: 1
    question: "Whisper 是由 OpenAI 推出的多模態模型，它的主要任務是下列何者？"
    options:
      a: "文字轉圖像（Text-to-Image）"
      b: "語音辨識與語音翻譯（ASR / Speech Translation）"
      c: "圖像分類（Image Classification）"
      d: "文字轉語音（TTS）"
    correct: "b"
    explanation:
      why_correct: "Whisper 是 encoder-decoder Transformer，輸入 log-Mel 頻譜（音訊模態），輸出文字 token，支援多語言轉錄與翻譯。屬於「audio → text」的跨模態任務。"
      why_not_a: "文字轉圖像是 Stable Diffusion、DALL-E 的任務，不是 Whisper。"
      why_not_c: "Whisper 不處理圖像模態。"
      why_not_d: "TTS（Text-to-Speech，如 ElevenLabs、OpenAI TTS、VITS）方向相反——輸入文字、輸出語音；Whisper 是 ASR，方向是輸入語音、輸出文字，兩者容易混淆但任務方向相反。"
    keywords:
      - "Whisper"
      - "ASR"
      - "語音辨識"
    exam_trap: false

  - id: "L21104-Q06"
    topic_code: "L21104"
    item_code: "L21104-1"
    difficulty: 1
    question: "下列哪一種融合策略（Fusion Strategy）的特徵是「每個模態用獨立模型，最後在輸出層以投票或加權平均整合」？"
    options:
      a: "早期融合（Early Fusion）"
      b: "晚期融合（Late Fusion / 決策層融合）"
      c: "混合融合（Hybrid Fusion）"
      d: "交叉注意力融合（Cross-Attention Fusion）"
    correct: "b"
    explanation:
      why_correct: "晚期融合（決策層融合）讓每個模態有自己的獨立模型，只在最後輸出層（logits、分數、預測類別）合併，典型如加權平均、投票、堆疊。CLIP 常被視為 late fusion 的典型（嚴格來說更常被歸類為『對比式雙編碼器對齊』；但若以『何時合流』視角則屬 late fusion 的典型）。"
      why_not_a: "早期融合是在「輸入或底層特徵階段」就把不同模態串接起來，送進同一個聯合模型。"
      why_not_c: "混合融合是在不同層次（早/中/晚）組合多種融合策略，例如先 early 再 cross-attention；並不符合題幹「最後在輸出層以投票或加權平均整合」的純 late fusion 描述。另注意：原生/後接式（GPT-4o vs GPT-4V）是在談整體模型設計；而 early/late/hybrid/cross-attention 是在談『資訊何時融合』。兩者維度不同，不要混用。"
      why_not_d: "交叉注意力融合是在中層以 Q/K/V 跨模態互動（Stable Diffusion、Flamingo），不是在輸出層以投票/加權平均整合。"
    keywords:
      - "晚期融合"
      - "late fusion"
      - "決策層融合"
    exam_trap: false

  - id: "L21104-Q07"
    topic_code: "L21104"
    item_code: "L21104-1"
    difficulty: 1
    question: "下列哪一個模型是「文字轉圖像（Text-to-Image）」的代表性架構？"
    options:
      a: "BERT"
      b: "Whisper"
      c: "CLIP"
      d: "Stable Diffusion"
    correct: "d"
    explanation:
      why_correct: "Stable Diffusion 是典型的文字轉圖像（T2I）潛空間擴散模型，透過 CLIP 文字編碼器 + U-Net + 交叉注意力完成條件生成。"
      why_not_a: "BERT 是純文字理解模型（L21101），不處理圖像。"
      why_not_b: "Whisper 是語音轉文字（ASR），不生成圖像。"
      why_not_c: "CLIP 是「檢索與對齊」模型，本身不會生成圖像。這是最常見的陷阱：CLIP 的文字編碼器被 Stable Diffusion 使用，但 CLIP 本身不產生圖像。"
    keywords:
      - "Stable Diffusion"
      - "text-to-image"
      - "文字轉圖像"
    exam_trap: true

  - id: "L21104-Q08"
    topic_code: "L21104"
    item_code: "L21104-1"
    difficulty: 4
    question: "「多模態（Multimodal）」與「跨模態（Cross-modal）」最恰當的關係描述為下列何者？"
    options:
      a: "兩者完全等義，可互相替換"
      b: "跨模態是多模態的超集合，範圍更大"
      c: "多模態是能力（能處理多種模態），跨模態是任務方向（模態間轉換或檢索），多模態 ⊇ 跨模態"
      d: "多模態指模型，跨模態指資料集，兩者無關"
    correct: "c"
    explanation:
      why_correct: "多模態描述系統「同時處理多種模態」的能力（umbrella term）；跨模態描述「在模態之間轉換或檢索」的任務方向（如文字↔圖像檢索、文字→圖像生成）。跨模態任務是多模態系統的一個子集合。"
      why_not_a: "在 iPAS 與學術文獻中兩者並非完全等義，這是常見誤解題。"
      why_not_b: "範圍關係相反——多模態才是更大的範疇。"
      why_not_d: "兩者都是描述任務或能力的術語，並非「一個指模型一個指資料集」。"
    keywords:
      - "多模態"
      - "跨模態"
      - "cross-modal"
    exam_trap: true

  - id: "L21104-Q09"
    topic_code: "L21104"
    item_code: "L21104-1"
    difficulty: 2
    question: "CLIP 採用「雙編碼器（Dual Encoder）+ 共享嵌入空間」的設計，對訓練目標的意義為何？"
    options:
      a: "讓同一張圖可以產生多種不同的文字描述"
      b: "讓影像可被壓縮成固定大小的 JPEG 檔"
      c: "讓模型能逐字生成圖像的像素值"
      d: "讓配對的（圖像, 文字）在嵌入空間中距離拉近、未配對者距離拉遠（以餘弦相似度衡量）"
    correct: "d"
    explanation:
      why_correct: "CLIP 的對稱 InfoNCE 目標：批次中正確配對（image_i, text_i）視為正樣本、其他組合視為負樣本，最大化正樣本相似度、最小化負樣本相似度，使雙模態在共享嵌入空間中對齊。"
      why_not_a: "CLIP 不是生成模型，不會生成文字描述。"
      why_not_b: "JPEG 壓縮屬於訊號處理，與深度學習嵌入無關。"
      why_not_c: "CLIP 沒有像素生成能力（這是擴散/GAN 模型的任務）。"
    keywords:
      - "CLIP"
      - "dual encoder"
      - "共享嵌入空間"
    exam_trap: false

  - id: "L21104-Q10"
    topic_code: "L21104"
    item_code: "L21104-1"
    difficulty: 2
    question: "下列關於 GPT-4o 與 GPT-4V（Vision）的比較，哪一項描述最正確？"
    options:
      a: "GPT-4o 與 GPT-4V 是同一個模型的不同名稱，沒有架構差異"
      b: "GPT-4V 是原生多模態（單一模型統一 token 空間）；GPT-4o 是在文字模型外加視覺接頭"
      c: "GPT-4V 較早採視覺接上文字模型的作法；GPT-4o 是原生多模態（單一模型、統一 token 空間、支援文字/影像/語音）"
      d: "GPT-4o 只支援語音，GPT-4V 只支援影像，兩者不能結合"
    correct: "c"
    explanation:
      why_correct: "GPT-4V（2023）是視覺能力加在文字模型之上的 bolt-on 架構；GPT-4o（2024 Omni）是自回歸單一模型，輸入輸出都可為文字/影像/語音/影片的 token，屬於原生多模態。"
      why_not_a: "兩者架構有本質差異，不是單純改名。"
      why_not_b: "敘述與事實相反。"
      why_not_d: "GPT-4o 同時支援文字、影像、語音；能力更廣而非更窄。"
    keywords:
      - "GPT-4o"
      - "GPT-4V"
      - "原生多模態"
    exam_trap: true

  - id: "L21104-Q11"
    topic_code: "L21104"
    item_code: "L21104-1"
    difficulty: 2
    question: "下列關於 Stable Diffusion 與 CLIP 關係的描述，何者正確？"
    options:
      a: "Stable Diffusion 內部完全沒有使用 CLIP"
      b: "Stable Diffusion 使用 CLIP 的文字編碼器將提示轉為嵌入，再以交叉注意力注入 U-Net"
      c: "CLIP 是 Stable Diffusion 的解碼器，負責把潛向量還原為像素"
      d: "Stable Diffusion 是 CLIP 的升級版，功能完全取代 CLIP"
    correct: "b"
    explanation:
      why_correct: "Stable Diffusion 採用 CLIP（ViT-L/14）文字編碼器將提示嵌入，透過交叉注意力在 U-Net 多層解析度注入條件訊號，引導雜訊逐步還原。"
      why_not_a: "這是常見陷阱——Stable Diffusion 明確使用 CLIP 文字編碼器。"
      why_not_c: "CLIP 是編碼器不是解碼器；Stable Diffusion 的解碼器是 VAE decoder。"
      why_not_d: "CLIP 與 Stable Diffusion 任務方向不同（檢索對齊 vs 生成），不是升級取代關係。"
    keywords:
      - "Stable Diffusion"
      - "CLIP"
      - "交叉注意力"
    exam_trap: true

  - id: "L21104-Q12"
    topic_code: "L21104"
    item_code: "L21104-1"
    difficulty: 2
    question: "下列哪一個任務最適合用「對比式雙編碼器（如 CLIP）」架構處理？"
    options:
      a: "大規模文字-圖像檢索與零樣本分類"
      b: "長篇中文文章寫作"
      c: "即時語音對話"
      d: "影片剪輯自動化"
    correct: "a"
    explanation:
      why_correct: "CLIP 把圖與文各自編碼到共享嵌入空間，嵌入可事先計算並建索引，查詢時只需向量近似搜尋，非常適合大規模檢索與零樣本（把類別名當作文字嵌入查最近的影像嵌入）。"
      why_not_b: "長文寫作屬於自回歸語言模型的任務，與雙編碼器檢索無關。"
      why_not_c: "即時語音對話需要自回歸生成與低延遲解碼，CLIP 架構不適合。"
      why_not_d: "影片剪輯屬於工作流自動化，不是 CLIP 的核心用例。"
    keywords:
      - "CLIP"
      - "retrieval"
      - "zero-shot"
    exam_trap: false

  - id: "L21104-Q13"
    topic_code: "L21104"
    item_code: "L21104-1"
    difficulty: 2
    question: "下列哪一組對「圖像模態編碼器（Image Encoder）」的描述最正確？"
    options:
      a: "只能使用傳統 CNN（如 ResNet）"
      b: "影像需先轉成文字才能進入模型"
      c: "必須使用 RNN/LSTM 處理影像"
      d: "常見選擇包含 CNN（ResNet）與 ViT（Vision Transformer），兩者皆可"
    correct: "d"
    explanation:
      why_correct: "現代多模態系統的影像編碼器常見兩大類：CNN（如 ResNet）與 ViT。CLIP 原論文同時提供 ResNet 與 ViT 兩種版本；LLaVA、Qwen-VL、Flamingo 等多以 ViT 為主。"
      why_not_a: "ViT 已是主流選擇，不限於 CNN。"
      why_not_b: "影像直接以像素/patch 編碼進入模型，不需要先轉文字。"
      why_not_c: "RNN/LSTM 是序列模型，不是影像編碼器的主流選擇。"
