      why_not_c: "訓練集 loss 不能代表泛化能力。"
      why_not_d: "這是常見的「半套」評估方法——公開 benchmark 可反映一般表現，但缺 OOD 與領域資料集，無法驗證穩健性與實務適用性；屬「可行但不完整」的評估，不是最成熟的策略。"
