  - id: "L21104-Q36"
    topic_code: "L21104"
    item_code: "L21104-1"
    difficulty: 1
    question: "語音辨識（ASR）系統最常使用的評估指標是哪一個？"
    options:
      a: "WER（Word Error Rate，字錯誤率）"
      b: "BLEU"
      c: "FID"
      d: "Recall@K"
    correct: "a"
    explanation:
      why_correct: "WER（Word Error Rate）= (S + D + I) / N，是 ASR 的標準指標，計算轉錄文字與參考文字之間的替換（S）、刪除（D）、插入（I）錯誤佔參考字數（N）的比例，Whisper、Wav2Vec2、Conformer 等 ASR 論文都以 WER 做主指標。"
      why_not_b: "BLEU 用於機器翻譯與圖像描述（captioning），以 n-gram 重疊衡量生成文字與參考文字的相似度，不是 ASR 指標。"
      why_not_c: "FID（Fréchet Inception Distance）用於評估圖像生成品質（T2I、GAN、Diffusion），衡量生成圖分布與真實圖分布距離。"
      why_not_d: "Recall@K 用於檢索任務（如 CLIP 跨模態檢索），衡量 top-K 中包含正解的比例。"
    keywords:
      - "WER"
      - "ASR"
      - "評估指標"
    exam_trap: false

  - id: "L21104-Q37"
    topic_code: "L21104"
    item_code: "L21104-1"
    difficulty: 2
    question: "若要評估 CLIP 在 100 萬張圖片庫中「以文找圖」的效能，最合適的指標組合是下列何者？"
    options:
      a: "Accuracy / F1（分類指標）"
      b: "Recall@1、Recall@5、Recall@10（檢索指標）"
      c: "BLEU / CIDEr（圖像描述指標）"
      d: "WER（語音辨識指標）"
    correct: "b"
    explanation:
      why_correct: "大規模檢索任務的標準指標是 Recall@K：對每個查詢（文字），看 top-K 檢索結果中是否包含正解圖片，在 K=1/5/10 時計算命中率。CLIP 原論文與所有檢索系統皆以此為主指標，能同時反映 top-1 嚴格命中與 top-K 寬容命中。"
      why_not_a: "Accuracy/F1 是分類指標，適用於固定類別數的場景；100 萬張圖的檢索是開集合排序任務，不是分類。"
      why_not_c: "BLEU/CIDEr 用於評估生成文字與參考文字的 n-gram 重疊，是 captioning 任務的指標，與檢索方向不同。"
      why_not_d: "WER 是 ASR 任務的字錯誤率，與圖像檢索無關。"
    keywords:
      - "Recall@K"
      - "retrieval"
      - "CLIP"
      - "評估指標"
    exam_trap: false

  - id: "L21104-Q38"
    topic_code: "L21104"
    item_code: "L21104-1"
    difficulty: 3
    question: "一個系統先將影像、聲音、文字在淺層各自抽特徵後融合一次（early），再以交叉注意力（cross-attention）在深層再次融合以做最終分類。這屬於哪一種融合策略？"
    options:
      a: "只能算早期融合（Early Fusion）"
      b: "只能算晚期融合（Late Fusion）"
      c: "混合融合（Hybrid Fusion）"
      d: "只能算交叉注意力融合（Cross-Attention Fusion）"
    correct: "c"
    explanation:
      why_correct: "混合融合（Hybrid Fusion）= 在不同層次組合多種融合策略。此題同時包含早期特徵串接（early）與深層交叉注意力（cross-attention），屬典型 hybrid fusion。許多 SOTA 多模態系統（如 LXMERT、ViLBERT、MultiModal Transformer）都是 hybrid。"
      why_not_a: "本題有「深層再次融合」，不只有早期融合。"
      why_not_b: "本題未在輸出層做獨立模型的決策整合，不是純 late fusion。"
      why_not_d: "本題還包含淺層 early 融合，不純粹是 cross-attention；cross-attention 只是 hybrid 的一部份。"
    keywords:
      - "hybrid fusion"
      - "混合融合"
      - "fusion strategy"
    exam_trap: true
