    item_code: "L21104-1"
    difficulty: 5
    question: "某團隊嘗試用 CLIP 直接做「台灣健保醫學影像 → 診斷報告文字生成」。系統上線後發現報告品質極差。最可能的根本原因是下列何者？"
    options:
      a: "CLIP 模型訓練時 batch 太大"
      b: "把 CLIP 當成可直接解碼長文本的生成器"
      c: "CLIP 是對比檢索/對齊模型，本質上不具自由文字生成能力；要做診斷報告生成需改用 encoder-decoder 或 VLM（ViT + LLM），CLIP 僅適合做「選擇/檢索」類任務"
      d: "健保資料格式不支援 CLIP"
    correct: "c"
    explanation:
      why_correct: "這是 iPAS 的核心任務方向陷阱：CLIP 做「共享嵌入空間對齊」（檢索、零樣本分類），沒有自由文字解碼器，無法生成自由形式報告。要生成報告需 encoder-decoder 或 VLM（ViT + LLM）。"
      why_not_a: "批次大小是訓練超參，不是「無法生成文字」的根本原因。"
      why_not_b: "此選項描述的是「誤用模式」——把 CLIP 當生成器使用；這是現象，不是根本原因。根本原因是 CLIP 架構本身沒有自由文字解碼器（c 選項），必須改用 VLM 才能生成。容易與 c 混淆，但 c 點出的是「架構限制」，才是正解。"
      why_not_d: "資料格式與 CLIP 本身架構限制無關。"
    keywords:
      - "CLIP"
      - "任務方向"
      - "generation vs retrieval"
    exam_trap: true

  - id: "L21104-Q32"
    topic_code: "L21104"
    item_code: "L21104-1"
    difficulty: 5
    question: "評估兩種多模態 VQA 系統，下列哪一種「評估策略」最能同時兼顧準確性、穩健性與實務可用性？"
    options:
      a: "只看單一公開 benchmark（如 VQAv2）的單一指標"
      b: "同時採用公開 benchmark 多項指標（如 VQA accuracy、CIDEr/BLEU for captioning、retrieval R@K）+ 自建領域測試集 + 分布外（OOD）樣本 + 對抗性樣本（如含雜訊、偏題）+ 人類評估"
      c: "僅用訓練集上的 loss"
      d: "只看公開 benchmark，缺 OOD 測試與自建領域資料集"
    correct: "b"
    explanation:
      why_correct: "評估框架：公開指標 + 自建領域集 + OOD 測試 + 人類評估 = 完整評估四元組。多模態系統評估應採多維度：公開 benchmark 指標避免自嗨、領域測試集驗證實務適用、OOD 與對抗樣本檢驗穩健性、人類評估補足自動指標的盲區。單一 benchmark/單一指標易被過擬合。"
