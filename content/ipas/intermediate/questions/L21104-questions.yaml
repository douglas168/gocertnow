  - id: "L21104-Q15"
    topic_code: "L21104"
    item_code: "L21104-1"
    difficulty: 3
    question: "一家台灣電商想做「以文找圖、以圖找文」的商品檢索系統，需支援百萬級商品、亞秒級查詢，且使用者常輸入細粒度屬性（如「紅色短袖配藍色口袋」）。下列哪一種架構最合適？"
    options:
      a: "先用 CLIP 做大規模粗篩（Recall / 向量近似搜尋），再用交叉注意力重排模型做精排（Ranking）的兩階段架構"
      b: "只用單一 CLIP 雙編碼器做向量相似度查詢，無需重排"
      c: "訓練一個 GAN 生成所有商品圖片後再比對"
      d: "只用單一 CNN 做影像分類即可"
    correct: "a"
    explanation:
      why_correct: "工業級電商檢索的最佳實務是「兩階段」：第一階段用 CLIP 做百萬級向量粗篩（Recall@K，可預先索引、亞秒查詢）；第二階段用交叉注意力重排模型（如 BLIP-2、CoCa）對 top-K 做細粒度屬性比對（紅色、短袖、藍色口袋）。純 CLIP 的雙編碼器在細粒度屬性組合上有已知弱點，需靠 reranker 補足。"
