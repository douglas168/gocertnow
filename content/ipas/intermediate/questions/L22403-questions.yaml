    why_not_a: "不存在所有模型都固定 384 tokens 的規則。"
    why_not_c: "embedding 維度由模型決定，不會因 chunk 字數自動增長。"
    why_not_d: "向量資料庫能存更長文字，限制通常不是這麼絕對。"
