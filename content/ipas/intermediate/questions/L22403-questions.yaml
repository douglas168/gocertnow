- id: "L22403-Q01"
  topic_code: "L22403"
  item_code: "L22403-1"
  difficulty: 1
  question: "在大規模預訓練語料庫（pretraining corpus）的四個核心考量中，下列何者最直接對應『是否有權合法使用資料』？"
  options:
    a: "授權合規（licensing compliance）"
    b: "向量維度（embedding dimension）"
    c: "推論延遲（inference latency）"
    d: "GPU 時脈（GPU clock）"
  correct: "a"
  explanation:
    why_correct: "授權合規直接關係到資料來源是否可被蒐集、儲存、訓練與再利用，是大規模語料治理的重要面向。"
    why_not_b: "向量維度屬於模型表示或檢索設定，和語料授權是否合法無直接關係。"
    why_not_c: "推論延遲是部署與服務品質議題，不是語料來源合法性的判斷標準。"
    why_not_d: "GPU 時脈是硬體規格，考生常把『訓練需要算力』誤認成『資料合規』的一部分。"
  keywords:
    - "pretraining corpus"
    - "licensing compliance"
    - "資料治理"
  exam_trap: false

- id: "L22403-Q02"
  topic_code: "L22403"
  item_code: "L22403-2"
  difficulty: 1
  question: "在語料清理與去重（deduplication）中，MinHash 最常用來處理下列哪一類問題？"
  options:
    a: "完全相同檔案（exact duplicate）"
    b: "近似重複文件（near-duplicate documents）"
    c: "GPU 記憶體不足"
    d: "模型過度量化（over-quantization）"
  correct: "b"
  explanation:
    why_correct: "MinHash 透過近似集合相似度，適合找出內容相近但非逐字完全相同的 near-dedup 問題。"
    why_not_a: "完全相同文件通常可用 hash 或 exact-match 比對處理，不必動用 MinHash。"
    why_not_c: "GPU 記憶體不足是訓練資源問題，和文本去重演算法不同。"
    why_not_d: "量化是模型壓縮技術，不是資料清理流程。"
  keywords:
    - "MinHash"
    - "near-dedup"
    - "語料清理"
  exam_trap: false

- id: "L22403-Q03"
  topic_code: "L22403"
  item_code: "L22403-3"
  difficulty: 1
  question: "關於 Byte Pair Encoding（BPE），下列敘述何者正確？"
  options:
    a: "以 chosen/rejected pair 訓練 tokenizer"
    b: "先固定整個字典後不再更新"
    c: "透過反覆合併高頻字元對（iterative merge）形成 subword"
    d: "一定需要人工先斷詞成單字後才能運作"
  correct: "c"
  explanation:
    why_correct: "BPE 的核心就是從較小單位開始，反覆合併高頻字元對或子詞對，建立 subword vocabulary。"
    why_not_a: "chosen/rejected pair 是 RLHF 偏好資料格式，不是 tokenizer 訓練方式。"
    why_not_b: "BPE vocabulary 是經由 merge 規則逐步形成，不是先天固定後完全不更新。"
    why_not_d: "BPE 並不要求一定先做人工單字切分；把它和傳統斷詞流程混為一談是常見誤解。"
  keywords:
    - "BPE"
    - "iterative merge"
    - "subword tokenization"
  exam_trap: true

- id: "L22403-Q04"
  topic_code: "L22403"
  item_code: "L22403-4"
  difficulty: 1
  question: "在三大典範（pretraining vs fine-tuning vs RAG）的資料量比較中，通常哪一者需要最大的資料規模？"
  options:
    a: "RAG 文件索引（retrieval index）"
    b: "監督式微調（SFT）"
    c: "LoRA adapter 設定"
    d: "預訓練（pretraining）"
  correct: "d"
  explanation:
    why_correct: "預訓練通常需要百 GB、TB 甚至兆 token 等級資料，量級明顯高於 SFT 與單次 RAG 文件庫。"
    why_not_a: "RAG 重點是把任務相關文件切塊索引，通常遠小於預訓練語料。"
    why_not_b: "SFT 常見是 10K 到 100K instruction-response pairs，不會接近預訓練量級。"
    why_not_c: "LoRA 是參數高效微調方法，不是資料規模典範。"
  keywords:
    - "pretraining"
    - "fine-tuning"
    - "RAG"
  exam_trap: false

- id: "L22403-Q05"
  topic_code: "L22403"
  item_code: "L22403-5"
  difficulty: 1
  question: "下列何者最符合監督式微調（Supervised Fine-Tuning, SFT）資料集的典型規模？"
  options:
    a: "約 10K–100K 組 instruction-response pairs"
    b: "一定要 1T tokens 以上"
    c: "只能使用 50 筆以下專家標註"
    d: "固定為 5,000,000 tokens，不可增減"
  correct: "a"
  explanation:
    why_correct: "SFT 常見資料量級為數萬到十萬級 instruction-response pairs，重點在任務對齊與品質，而非追求預訓練等級海量資料。"
    why_not_b: "1T tokens 屬於預訓練量級，拿來描述 SFT 是把兩種典範混淆。"
    why_not_c: "少量資料也可能有用，但不是 SFT 的典型規模描述。"
    why_not_d: "5,000,000 tokens 是特定平台文件限制類資訊，不是 SFT 固定規格。"
  keywords:
    - "SFT"
    - "instruction tuning"
    - "資料規模"
  exam_trap: true

- id: "L22403-Q06"
  topic_code: "L22403"
  item_code: "L22403-6"
  difficulty: 1
  question: "在 RAG 資料管線（RAG data pipeline）中，文件通常在建立向量索引前先經過哪個步驟？"
  options:
    a: "反向傳播（backpropagation）"
    b: "切塊（chunking）"
    c: "模型蒸餾（distillation）"
    d: "梯度裁剪（gradient clipping）"
  correct: "b"
  explanation:
    why_correct: "RAG 的典型流程是 chunking -> embedding -> 向量資料庫（Vector Store） -> retrieval -> prompt augmentation -> generation。"
    why_not_a: "反向傳播屬於模型訓練，不是建立檢索索引的必要步驟。"
    why_not_c: "模型蒸餾是壓縮模型的方法，和文件前處理不同。"
    why_not_d: "梯度裁剪也是訓練技巧，非 RAG 建索引流程。"
  keywords:
    - "RAG"
    - "chunking"
    - "向量資料庫（Vector Store）"
  exam_trap: false

- id: "L22403-Q07"
  topic_code: "L22403"
  item_code: "L22403-7"
  difficulty: 1
  question: "在資料平行（Data Parallelism, DDP）中，下列何者最符合其基本運作方式？"
  options:
    a: "每張 GPU 只存模型的一層"
    b: "每張 GPU 使用不同 tokenizer"
    c: "模型在多張 GPU 上各自複製一份，資料批次被切分後同步梯度（AllReduce）"
    d: "把文件切塊後寫入向量資料庫"
  correct: "c"
  explanation:
    why_correct: "DDP 的核心是 model replicated, data split，之後用 AllReduce 同步梯度更新。"
    why_not_a: "把模型層或權重切開比較接近 tensor 或 pipeline parallelism。"
    why_not_b: "tokenizer 通常不是 DDP 切分的核心對象。"
    why_not_d: "這描述的是 RAG 建索引流程，不是分散式訓練。"
  keywords:
    - "Data Parallelism"
    - "DDP"
    - "AllReduce"
  exam_trap: true

- id: "L22403-Q08"
  topic_code: "L22403"
  item_code: "L22403-8"
  difficulty: 1
  question: "若要用 Hugging Face `pipeline()` 做一般生成式續寫（text continuation），下列哪個 task name 最正確？"
  options:
    a: "`summarization`"
    b: "`question-answering`"
    c: "`feature-extraction`"
    d: "`text-generation`"
  correct: "d"
  explanation:
    why_correct: "`text-generation` 是做一般文字生成與續寫時最直接的 pipeline task name。"
    why_not_a: "`summarization` 用於摘要任務，學生常因為也會輸出文字而誤選。"
    why_not_b: "`question-answering` 偏抽取式問答，不是自由生成續寫的標準 task。"
    why_not_c: "`feature-extraction` 主要輸出向量表徵，不是自然語句生成。"
  keywords:
    - "Hugging Face"
