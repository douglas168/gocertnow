  item_code: "L22403-4"
  difficulty: 2
  question: "為什麼在企業導入生成式 AI 時，RAG（Retrieval-Augmented Generation）通常不需要像 pretraining 那樣的 TB 級資料？"
  options:
    a: "因為 RAG 不會用到 tokenizer"
    b: "因為 RAG 只允許使用英文資料"
    c: "因為 RAG 仍要重新訓練整個基礎模型"
    d: "因為 RAG 主要是對任務相關文件做切塊、嵌入與檢索，而不是從零學語言能力"
  correct: "d"
  explanation:
    why_correct: "RAG 的價值在補充外部知識檢索，並不等於重新建立模型的通用語言能力，因此資料量常遠小於 pretraining。"
    why_not_a: "RAG 一樣常會受 tokenizer 與 token 長度影響。"
    why_not_b: "RAG 並不限於英文，中文與多語資料也可使用。"
    why_not_c: "RAG 核心不是 full retraining，這是和 fine-tuning/pretraining 混淆的典型錯誤。"
  keywords:
    - "RAG"
    - "pretraining vs RAG"
    - "資料量級"
