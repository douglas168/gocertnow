- id: "L22403-Q10"
  topic_code: "L22403"
  item_code: "L22403-2"
  difficulty: 2
  question: "語料去重（deduplication）能降低模型 memorization 與 train-test overlap，最主要是因為它做了什麼？"
  options:
    a: "移除完全相同或近似重複的內容，減少模型反覆看到相同片段"
    b: "把每份文件都改寫成不同語言"
    c: "把所有低頻詞都刪掉"
    d: "只保留最長的文件"
  correct: "a"
  explanation:
    why_correct: "去重的目的就是減少重複曝光，避免模型過度記住特定內容，也降低評估資料污染。"
    why_not_b: "改寫語言不等於去重，甚至可能保留相同語意重複。"
    why_not_c: "刪除低頻詞屬於粗糙詞彙過濾，不是 dedup 的核心。"
    why_not_d: "只保留長文件無法處理重複問題，還可能犧牲多樣性。"
  keywords:
    - "deduplication"
    - "memorization"
    - "train-test overlap"
  exam_trap: false

- id: "L22403-Q11"
  topic_code: "L22403"
  item_code: "L22403-3"
  difficulty: 2
  question: "相較於 BPE，WordPiece 的 merge 準則更接近下列哪一種描述？"
  options:
    a: "只看字元出現順序，不看統計"
    b: "完全隨機選擇要合併的子詞"
    c: "依提升訓練語料 likelihood 的效果決定合併"
    d: "固定使用人工詞典，不進行資料驅動學習"
  correct: "c"
  explanation:
    why_correct: "WordPiece 常被描述為 likelihood-based merge，和 BPE 只看頻率的直觀說法不同。"
    why_not_a: "WordPiece 並不是只看順序，核心仍是統計驅動。"
    why_not_b: "隨機合併不可能形成穩定有效的 tokenizer。"
    why_not_d: "WordPiece 仍是從資料學出 subword，不是固定人工詞典。"
  keywords:
    - "WordPiece"
    - "likelihood-based merge"
    - "BPE comparison"
  exam_trap: true

- id: "L22403-Q12"
