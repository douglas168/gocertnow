- id: "L22403-Q19"
  topic_code: "L22403"
  item_code: "L22403-3"
  difficulty: 3
  question: "某團隊要處理中英日混合文本，且希望 tokenizer 對沒有明確空白分隔的語言也能穩定工作。下列哪個選擇最合理？"
