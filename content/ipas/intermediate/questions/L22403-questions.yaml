  item_code: "L22403-6"
  difficulty: 2
  question: "RAG 中常見的 fixed-size chunking 為何常落在 256–512 tokens 左右？"
  options:
    a: "因為所有模型都強制固定 384 tokens"
    b: "因為這個範圍常能兼顧語意完整性、檢索粒度與上下文長度成本"
