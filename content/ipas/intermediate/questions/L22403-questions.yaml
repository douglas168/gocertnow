  question: "某 40B 模型在 8 張 GPU 上訓練時，單卡放不下完整模型。若團隊希望降低記憶體壓力，但又擔心 stage 間 idle bubble，最合理的評估是什麼？"
  options:
    a: "只用 Data Parallelism 就一定能解決模型放不下的問題"
    b: "直接改用更大的 chunk size，與平行策略無關"
    c: "把所有資料轉成 chosen/rejected pairs 即可"
    d: "可優先考慮 Tensor Parallelism，必要時再與 Pipeline Parallelism 組合，因為前者先解決單層權重放不下的問題"
  correct: "d"
  explanation:
    why_correct: "當單卡放不下模型時，先處理權重切分是合理路徑；若模型更大，再評估與 pipeline 組合及其 bubble 成本。"
    why_not_a: "Data Parallelism 會複製完整模型，無法解決單卡無法容納的根本問題。"
    why_not_b: "chunk size 屬於 RAG/文本處理，不是模型記憶體切分方案。"
    why_not_c: "chosen/rejected pairs 是 RLHF 資料格式，和模型裝不下無關。"
  keywords:
    - "Tensor Parallelism"
    - "Pipeline Parallelism"
    - "memory trade-off"
  exam_trap: false

- id: "L22403-Q37"
  topic_code: "L22403"
  item_code: "L22403-8"
  difficulty: 5
  question: "閱讀下列 pseudocode 後，哪個修改最能符合『摘要（summarization）』用途？\n\n```python\nfrom transformers import pipeline\npipe = pipeline(task=?, model=\"google/flan-t5-base\")\nresult = pipe(article)\n```"
  options:
    a: "把 `task` 設成 `summarization`"
    b: "把 `task` 設成 `feature-extraction`"
    c: "把 `task` 設成 `fill-mask`"
    d: "把 `task` 設成 `text-classification`"
  correct: "a"
  explanation:
    why_correct: "`summarization` 是 Hugging Face 對摘要任務提供的標準 pipeline task name。"
    why_not_b: "`feature-extraction` 會輸出表徵向量，不會直接產生摘要文字。"
    why_not_c: "`fill-mask` 用於遮罩語詞填空，與長文摘要不同。"
    why_not_d: "`text-classification` 會輸出類別，不會整理摘要內容。"
  keywords:
    - "pipeline"
    - "summarization"
    - "pseudocode"
  exam_trap: false

- id: "L22403-Q38"
  topic_code: "L22403"
  item_code: "L22403-3"
  difficulty: 5
  question: "你要在多語客服系統中選 tokenizer，需求是：支援中英混合、盡量降低人工 pre-tokenization 依賴、並和現代生成模型實務接軌。從工程與資料角度評估，下列何者最合理？"
  options:
    a: "固定選 WordPiece，因為所有生成模型都只用 WordPiece"
    b: "優先考慮 BPE 或 SentencePiece；若特別重視 raw text 與多語無空白處理，SentencePiece 更有優勢"
    c: "放棄 subword，全部改成人工詞典切詞"
    d: "tokenizer 與資料品質無關，因此可隨機選"
  correct: "b"
  explanation:
    why_correct: "這個判斷同時考慮生成模型實務與多語處理特性，不把 tokenizer 選型簡化成單一教條。"
    why_not_a: "WordPiece 常見於 BERT 類模型，但不是所有生成模型都採用。"
    why_not_c: "人工詞典切詞在人力與泛化上通常不如主流 subword 方法。"
    why_not_d: "tokenizer 會影響 token 數、跨語言處理與資料切分效率，不能隨機選。"
  keywords:
    - "SentencePiece"
    - "BPE"
    - "tokenizer selection"
  exam_trap: false

- id: "L22403-Q39"
  topic_code: "L22403"
  item_code: "L22403-4"
  difficulty: 5
  question: "若某團隊同時有 1,200 份內部 SOP、6 萬筆客服指令資料，以及有限算力，想在三個月內交付可用系統。從 pretraining、fine-tuning、RAG 三者取捨，下列方案何者最值得優先採用？"
  options:
    a: "先做 3T tokens 的預訓練，再視情況補文件"
    b: "只用 Common Crawl，因為規模最大"
    c: "以 RAG 導入 SOP 知識，並用 6 萬筆資料做 SFT/LoRA 強化互動格式與任務對齊"
    d: "完全不做知識整理，僅靠 `top_k` 與 `top_p` 調參"
  correct: "c"
  explanation:
    why_correct: "這個方案同時利用 RAG 的知識更新能力與 SFT/LoRA 的任務對齊能力，最符合三個月交付與有限算力條件。"
    why_not_a: "3T tokens 預訓練與專案時程、資源完全不匹配。"
    why_not_b: "單靠 Common Crawl 既無內部 SOP 可追溯性，也不保證客服任務對齊。"
    why_not_d: "生成參數調整不能取代知識與對齊策略。"
  keywords:
    - "RAG"
    - "SFT"
    - "LoRA"
  exam_trap: false

- id: "L22403-Q40"
  topic_code: "L22403"
  item_code: "L22403-1"
  difficulty: 5
  question: "某團隊在比較預訓練語料來源時，看到下列選項：Common Crawl 約 100TB raw HTML、過濾後可形成約 15TB tokens 的 C4；ROOTS 約 1.6TB、59 languages（46 自然語言 + 13 程式語言）；RedPajama 1.2T tokens；Dolma 約 1.7T tokens（訓練樣本；總語料池約 3T，口訣常記 3T）。若專案目標是『多語、多樣且較容易治理』，哪個評估最合理？"
  options:
    a: "只看 Dolma 的 token 數最大，因此必然是唯一正解"
    b: "只要選 Common Crawl，授權與品質就不需要再檢查"
    c: "只要 ROOTS 是多語，就完全不必考慮資料品質與授權"
    d: "不能只看規模；還要同時評估多語覆蓋、來源多樣性、資料品質與授權合規，必要時採混合語料策略"
  correct: "d"
  explanation:
    why_correct: "這題的重點是評估取捨，不是背最大數字。多語與治理需求意味著規模、品質、多樣性、合規都要一起看。"
    why_not_a: "token 數大不代表最適合專案目標，尤其當治理與多語平衡更重要時。"
    why_not_b: "Common Crawl 規模大，但品質與授權風險反而更需要額外治理。"
    why_not_c: "多語只是其中一個面向，不會自動保證合規或高品質。"
  keywords:
    - "Common Crawl"
    - "ROOTS"
    - "RedPajama"
    - "Dolma"
  exam_trap: true
