- id: "L22403-Q09"
  topic_code: "L22403"
  item_code: "L22403-1"
  difficulty: 2
  question: "下列哪一個資料集（dataset）最適合用來說明『高品質 curated mixture』而非單純大規模網頁爬蟲（web crawl）？"
  options:
    a: "The Pile（825GB，22 個多樣來源）"
