    why_not_b: "Common Crawl 代表的是規模極大、來源開放但品質與重複控制更困難的 raw web corpus。"
    why_not_c: "企業 FAQ 可用於 RAG 或微調，但不代表大規模 curated pretraining mixture。"
    why_not_d: "單一產品說明文件規模太小，也缺乏多樣性。"
