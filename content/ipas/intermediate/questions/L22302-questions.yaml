- id: "L22302-Q12"
  topic_code: "L22302"
  item_code: "資料不平衡處理策略"
  difficulty: 2
  question: "關於 SMOTE 與 train/test split 的先後順序，下列何者正確？"
  options:
    a: "先對整份資料做 SMOTE，再切分 train/test，評估較穩定"
    b: "先切分資料，再只對 training split 做 SMOTE，可避免 data leakage"
    c: "只要 test set 很大，先做 SMOTE 也不會 leakage"
    d: "SMOTE 應優先對 test set 做，讓指標比較漂亮"
  correct: "b"
  explanation:
    why_correct: "正確流程是先切分，再只在訓練資料上 resampling。若先對整體資料做 SMOTE，合成點可能帶入測試資訊，造成 data leakage。"
    why_not_a: "這是考場高頻陷阱。看似讓資料更平衡，但其實讓訓練過程間接接觸到測試集資訊。"
    why_not_c: "資料量大不能消除 leakage，本質問題是資訊邊界被破壞。"
    why_not_d: "test set 應保留真實分布，不能為了讓分數好看而先加工。"
  keywords:
    - "SMOTE"
    - "data-leakage"
    - "train-test-split"
  exam_trap: true

- id: "L22302-Q13"
  topic_code: "L22302"
  item_code: "數據分析演算法"
  difficulty: 2
  question: "關於決策樹（Decision Tree）的分裂策略，下列敘述何者正確？"
  options:
    a: "每次分裂都會同時搜尋整棵樹的全域最佳結構"
    b: "只有在資料平衡時才採用 greedy 策略"
    c: "通常採 greedy 方式，在當前節點挑選最能改善 criterion 的特徵與閾值"
    d: "先固定所有葉節點，再回推根節點"
  correct: "c"
  explanation:
    why_correct: "決策樹常採 greedy 分裂，在每個節點局部選擇當下最好的特徵與切點，而不是一次解出全域最佳樹。"
    why_not_a: "考生常把局部最佳誤以為全域最佳。全域最佳樹搜尋代價極高，實務與考試都以 greedy 為主。"
    why_not_b: "資料是否平衡不影響 greedy 作為基本分裂策略。"
    why_not_d: "決策樹是自上而下分裂，不是先決定葉節點再回推。"
  keywords:
    - "decision-tree"
    - "greedy"
    - "split-criterion"
  exam_trap: true

- id: "L22302-Q14"
  topic_code: "L22302"
  item_code: "資料不平衡處理策略"
  difficulty: 2
  question: "在 scikit-learn 的決策樹（Decision Tree）中，設定 `class_weight='balanced'` 的主要效果為何？"
  options:
    a: "自動對少數類產生合成樣本"
    b: "依類別頻率反比調整損失權重，使少數類錯分代價較高"
    c: "直接把資料轉成無監督式分群問題"
    d: "刪除所有多數類中靠近邊界的樣本"
  correct: "b"
  explanation:
    why_correct: "`class_weight='balanced'` 屬模型層級調整，會讓較少見的類別在訓練時獲得較高權重，不需新增資料。"
    why_not_a: "這是把 class_weight 與 SMOTE 混淆。前者不改資料列數，後者會新增樣本。"
    why_not_c: "類別權重不會改變學習任務型態，決策樹仍是監督式分類。"
    why_not_d: "刪除樣本屬欠採樣思維，不是 class_weight 的機制。"
  keywords:
    - "class_weight"
    - "balanced"
    - "decision-tree"
  exam_trap: false

