- id: "L22302-Q01"
  topic_code: "L22302"
  item_code: "數據分析演算法"
  difficulty: 1
  question: "在 K-means 分群（Clustering）中，演算法主要試圖最小化哪一個量？"
  options:
    a: "群內平方和（within-cluster sum of squares, SSE / inertia）"
    b: "測試集上的分類錯誤率"
    c: "各群之間的平均相關係數"
    d: "特徵之間的共變異數總和"
  correct: "a"
  explanation:
    why_correct: "K-means 的核心目標是讓每個樣本到其所屬群中心的距離平方和最小，也就是 SSE（在 scikit-learn 中常以 inertia 表示）。"
    why_not_b: "這是監督式分類模型常看的指標。K-means 沒有標籤，並不是用來最小化分類錯誤率。"
    why_not_c: "群間關聯可能是分析結果之一，但不是 K-means 的最佳化目標。考生常把『群要彼此不同』誤認成演算法直接最小化的量。"
    why_not_d: "共變異數描述特徵間變異關係，較接近統計描述，不是 K-means 計算更新中心點時的目標函數。"
  keywords:
    - "K-means"
    - "inertia"
    - "SSE"
  exam_trap: false

- id: "L22302-Q02"
  topic_code: "L22302"
  item_code: "數據分析演算法"
  difficulty: 1
  question: "關於 K-means 分群（Clustering）的用途，下列何者正確？"
  options:
    a: "可直接用來預測房價等連續數值"
    b: "屬於非監督式學習（Unsupervised Learning），主要用來找自然群組"
    c: "一定需要已標註的類別標籤才能訓練"
    d: "本質上是決策樹（Decision Tree）的一種變形"
  correct: "b"
  explanation:
    why_correct: "K-means 是典型的非監督式學習方法，目的是把資料依相似性分成多群，而不是依標籤學習。"
    why_not_a: "預測連續數值屬於迴歸（Regression）任務。常見誤解是以為任何輸出數字的模型都能做預測，但 K-means 輸出的是群組指派。"
    why_not_c: "需要標籤的是監督式方法。K-means 的價值就在於資料尚未標註時仍可探索結構。"
    why_not_d: "決策樹是監督式規則模型；K-means 是以距離與中心點為核心的分群方法，兩者原理不同。"
  keywords:
    - "unsupervised-learning"
    - "clustering"
    - "K-means"
  exam_trap: true

- id: "L22302-Q03"
  topic_code: "L22302"
  item_code: "數據分析演算法"
  difficulty: 1
  question: "在決策樹（Decision Tree）分類中，常用來評估節點分裂品質的指標包含下列何者？"
  options:
    a: "RMSE"
    b: "R-squared"
    c: "Gini impurity 與 entropy"
    d: "Silhouette score"
  correct: "c"
  explanation:
    why_correct: "分類型決策樹常以 Gini impurity 或 entropy / information gain 來衡量分裂後的純度提升。"
    why_not_a: "RMSE 常用於迴歸。考生容易把所有模型都套用同一組指標，但決策樹分類節點分裂不是靠 RMSE。"
    why_not_b: "R-squared 是迴歸解釋力指標，不是分類樹節點分裂標準。"
    why_not_d: "Silhouette score 常用於分群品質評估，與決策樹的節點純度無關。"
  keywords:
    - "decision-tree"
    - "gini"
    - "entropy"
  exam_trap: false

- id: "L22302-Q04"
  topic_code: "L22302"
  item_code: "資料不平衡處理策略"
  difficulty: 1
  question: "關於 SMOTE（Synthetic Minority Oversampling Technique），下列何者正確？"
  options:
    a: "它只會隨機複製少數類樣本，不會產生新點"
    b: "它只會刪除多數類樣本以平衡資料"
    c: "它必須先知道決策樹的分裂規則才能運作"
    d: "它會在少數類鄰近樣本之間做插值，產生合成樣本"
  correct: "d"
  explanation:
    why_correct: "SMOTE 的重點是利用少數類近鄰做線性插值，產生新的少數類樣本，而不是單純複製。"
    why_not_a: "這是最常見誤解。隨機複製較接近 naive oversampling，SMOTE 的核心差異正是『合成』新樣本。"
    why_not_b: "刪除多數類是 undersampling，例如 RandomUnderSampler，不是 SMOTE。"
    why_not_c: "SMOTE 是資料層級的 resampling 方法，不依賴特定分類器的規則或樹結構。"
  keywords:
    - "SMOTE"
    - "oversampling"
    - "interpolation"
  exam_trap: true

- id: "L22302-Q05"
  topic_code: "L22302"
  item_code: "數據分析演算法"
  difficulty: 1
  question: "關於 K-means 分群（Clustering）的收斂特性，下列何者正確？"
  options:
    a: "一定能找到全域最佳解（global optimum）"
    b: "不保證收斂，可能永遠迭代下去"
    c: "會收斂，但可能停在局部最佳解（local minimum）"
    d: "只有在資料已標註時才會收斂"
  correct: "c"
  explanation:
    why_correct: "K-means 會反覆指派樣本與更新中心點，使目標函數單調不增，因此會收斂；但初始中心不同可能落在局部最佳解。"
    why_not_a: "很多考生把『會收斂』誤認成『一定全域最佳』。K-means 的困難就在於初始化不同會有不同結果。"
    why_not_b: "在有限資料與標準更新規則下，K-means 不會無限改善而不停止。"
    why_not_d: "是否收斂與有無標籤無關，因為它本來就是非監督式方法。"
  keywords:
    - "local-minimum"
    - "convergence"
    - "K-means"
  exam_trap: true

- id: "L22302-Q06"
  topic_code: "L22302"
  item_code: "數據分析演算法"
  difficulty: 1
  question: "在決策樹（Decision Tree）中，使用 pruning（剪枝）最主要的目的為何？"
  options:
    a: "讓樹一定變成無監督式模型"
    b: "增加特徵數量以提升擬合能力"
    c: "把 entropy 轉換成 Gini impurity"
    d: "抑制過度擬合（overfitting），提升泛化能力"
  correct: "d"
  explanation:
    why_correct: "剪枝會限制樹的複雜度，避免模型過度記住訓練資料中的雜訊，常見於後剪枝的 ccp_alpha 或前剪枝的 max_depth。"
    why_not_a: "剪枝只改變模型複雜度，不會改變決策樹屬於監督式學習的本質。"
    why_not_b: "增加特徵數量反而可能提高複雜度，與剪枝目的相反。"
    why_not_c: "Gini 與 entropy 是分裂準則選項，不是透過剪枝互相轉換。"
  keywords:
    - "decision-tree"
    - "pruning"
    - "overfitting"
  exam_trap: false

- id: "L22302-Q07"
  topic_code: "L22302"
  item_code: "資料不平衡處理策略"
  difficulty: 1
  question: "當資料高度不平衡（Imbalanced Data）時，只看 accuracy 為何可能有風險？"
  options:
    a: "accuracy 會自動等於 recall"
    b: "accuracy 在多數類占比很高時，可能掩蓋少數類預測失敗"
    c: "accuracy 只能用於非監督式學習"
    d: "accuracy 必須先經過 SMOTE 才能計算"
  correct: "b"
  explanation:
    why_correct: "若 95% 都是多數類，模型即使全部猜多數類也可能有很高 accuracy，但對少數類毫無辨識能力，因此需搭配 precision、recall、F1、ROC AUC 等指標。"
    why_not_a: "accuracy 與 recall 定義不同。考生常把『整體正確率』與『找回少數類能力』混為一談。"
    why_not_c: "accuracy 可用於監督式分類，不是非監督式專用。"
    why_not_d: "是否 resampling 與能否計算 accuracy 無關，問題在於該指標是否足夠反映任務風險。"
  keywords:
    - "imbalanced-data"
    - "accuracy"
    - "recall"
  exam_trap: true

- id: "L22302-Q08"
  topic_code: "L22302"
  item_code: "資料不平衡處理策略"
  difficulty: 1
  question: "RandomUnderSampler 的主要作法為何？"
  options:
    a: "對少數類做鄰近插值"
    b: "對少數類增加 class_weight"
    c: "把多數類轉換成連續數值"
    d: "隨機刪除部分多數類樣本"
  correct: "d"
  explanation:
    why_correct: "RandomUnderSampler 透過減少多數類樣本數，使資料分布較平衡，做法是直接刪除部分多數類資料。"
    why_not_a: "鄰近插值是 SMOTE 的概念。考生常把 oversampling 與 undersampling 混在一起。"
    why_not_b: "class_weight 是模型層級調權，不是資料層級刪樣本。"
    why_not_c: "欠採樣與資料型態轉換無關。"
  keywords:
    - "RandomUnderSampler"
    - "undersampling"
    - "majority-class"
  exam_trap: false

- id: "L22302-Q09"
  topic_code: "L22302"
  item_code: "數據分析演算法"
  difficulty: 2
  question: "關於用 elbow method 選擇 K-means 分群（Clustering）中的群數 k，下列敘述何者正確？"
  options:
    a: "它是經驗法則（heuristic），觀察 SSE 下降趨勢的折點，不保證唯一正解"
    b: "它能嚴格證明最佳 k 的統計顯著性"
    c: "只要 k 越大，inertia 越大，所以找上升最快處"
    d: "它只能用在已標註資料"
  correct: "a"
  explanation:
    why_correct: "Elbow method 是視覺化與經驗判斷工具，幫助在模型複雜度與 SSE 改善幅度間取平衡，不是保證唯一最佳解的數學定理。"
    why_not_b: "這是常見高估。elbow method 提供判讀線索，不等於正式檢定。"
    why_not_c: "k 增加時 inertia 一般是下降或不變，不會上升；折點看的是『改善開始趨緩』。"
    why_not_d: "elbow method 用於非監督式 K-means，不需要標籤。"
  keywords:
    - "elbow-method"
    - "k-selection"
    - "inertia"
  exam_trap: true

- id: "L22302-Q10"
  topic_code: "L22302"
  item_code: "模式識別"
  difficulty: 2
  question: "下列哪一組對應最能說明模式識別（Pattern Recognition）中的分群式與規則式差異？"
  options:
    a: "分群式：決策樹（Decision Tree）；規則式：K-means"
    b: "分群式：K-means；規則式：決策樹可轉成 if-then rules"
    c: "分群式：ROC curve；規則式：AUC"
    d: "分群式：SMOTE；規則式：RandomUnderSampler"
  correct: "b"
  explanation:
    why_correct: "K-means 透過資料相似度找自然群組，屬分群式模式識別；決策樹可轉為 if-then 規則，屬規則式模式識別。"
    why_not_a: "這是把兩者顛倒。決策樹常被視為規則式，K-means 才是分群式。"
    why_not_c: "ROC 與 AUC 是評估工具，不是模式識別方法。"
    why_not_d: "SMOTE 與 RandomUnderSampler 是資料不平衡處理策略，不是模式識別類型。"
  keywords:
    - "pattern-recognition"
    - "cluster-based"
    - "rule-based"
  exam_trap: false

- id: "L22302-Q11"
  topic_code: "L22302"
  item_code: "數據分析演算法"
  difficulty: 2
  question: "K-means++ 初始化（Initialization）相較於完全隨機初始化，最合理的描述為何？"
  options:
    a: "保證一次就找到全域最佳解"
    b: "會把每個群的資料量強制設成一樣"
    c: "以較分散的方式挑選初始中心，常有助於加速收斂並改善結果穩定性"
    d: "只能搭配監督式分類使用"
  correct: "c"
  explanation:
    why_correct: "K-means++ 會優先選擇彼此較遠的初始中心，通常能降低差的初始化機率，讓收斂更快、結果更穩。"
    why_not_a: "這是過度解讀。K-means++ 改善初始化，但仍不保證全域最佳。"
    why_not_b: "初始中心選法不會強制群大小相同，資料本身分布可能很不均。"
    why_not_d: "K-means++ 是 K-means 的初始化方法，仍屬非監督式分群。"
  keywords:
    - "k-means++"
    - "initialization"
    - "convergence"
