- id: "L22302-Q17"
  topic_code: "L22302"
  item_code: "數據分析演算法"
  difficulty: 3
  question: "某零售業者想先把會員依消費行為自動分成幾群，再交由行銷團隊命名群別，手上沒有既有標籤。此時最適合的起始方法是下列何者？"
  options:
    a: "線性迴歸（Linear Regression），因為可輸出連續值"
