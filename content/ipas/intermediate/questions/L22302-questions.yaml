    why_correct: "在極度不平衡下，Precision-Recall curve 往往比 ROC AUC 更直接反映少數類被抓到與誤報之間的取捨。"
    why_not_a: "訓練集 accuracy 容易虛高，還忽略泛化與少數類風險。"
    why_not_b: "SSE 是分群指標，不是分類評估。"
    why_not_c: "樹深是模型複雜度描述，不是分類效能指標。"
  keywords:
    - "precision-recall-curve"
    - "ROC-AUC"
    - "imbalanced-data"
  exam_trap: true

- id: "L22302-Q33"
  topic_code: "L22302"
  item_code: "資料不平衡處理策略"
  difficulty: 5
  question: "某團隊準備提交正式實驗流程，候選方案如下。若目標是『避免 data leakage、使用現行 API、且能在交叉驗證中公平比較模型』，哪個方案最好？"
  options:
    a: "用 imblearn.pipeline.Pipeline 包住 `SMOTE()` 與分類器，並在 pipeline 內使用 `fit_resample` 的現行流程"
    b: "先對整體資料 `fit_sample`，再做交叉驗證"
    c: "先切出 test set，但在 train+test 合併後再做一次 SMOTE 讓分布更平均"
    d: "放棄 resampling，直接把 accuracy 當唯一比較依據"
  correct: "a"
  explanation:
    why_correct: "這個方案同時滿足三個條件：避免 leakage、遵循現行 `fit_resample` API、並讓 resampling 僅在各 training fold 內執行。"
    why_not_b: "`fit_sample` 已棄用，且先整體 resample 再 CV 會造成 leakage。這個選項故意結合兩個常見錯誤。"
    why_not_c: "即使先切 test，再把它合回去 resample，仍然破壞測試獨立性。"
    why_not_d: "accuracy 不能作為不平衡問題的唯一判斷依據，也沒有回答 leakage 與 API 的要求。"
  keywords:
    - "Pipeline"
    - "fit_resample"
    - "data-leakage"
  exam_trap: true

- id: "L22302-Q34"
  topic_code: "L22302"
  item_code: "資料不平衡處理策略"
  difficulty: 5
  question: "你要為法遵部門設計一個可解釋、資料筆數不能改動、且正負樣本約 1:30 的預警模型。下列哪個決策最符合這三項限制？"
  options:
    a: "使用 K-means 分群，因為無須標籤且可預測違規機率"
    b: "使用決策樹（Decision Tree）並設定 `class_weight='balanced'`"
    c: "先用 SMOTE 生成大量新樣本，再用黑箱模型"
    d: "只用 elbow method 決定規則數量"
  correct: "b"
  explanation:
    why_correct: "決策樹可提供可解釋規則，`class_weight='balanced'` 又能處理不平衡且不改變資料筆數，完整符合題目限制。"
    why_not_a: "K-means 是非監督式分群，不能直接當成有標籤的違規預測模型。"
    why_not_c: "SMOTE 會改動訓練資料筆數，且黑箱模型不符合法遵部門對可解釋性的要求。"
    why_not_d: "elbow method 是 K-means 選 k 的輔助工具，無法直接形成法遵判斷規則。"
  keywords:
    - "decision-tree"
    - "class_weight"
    - "explainability"
  exam_trap: true

- id: "L22302-Q35"
  topic_code: "L22302"
  item_code: "數據分析演算法"
  difficulty: 5
  question: "閱讀下列 K-means 分群（Clustering）偽碼，若要讓流程符合標準演算法，下列哪個敘述最合理？\n\n```text\n1. 隨機選 k 個中心\n2. 將每個點指定到最近中心\n3. 重新計算各群中心\n4. 若中心移動量小於 tol 則停止，否則回到步驟 2\n```\n\n團隊主管主張：『既然有 tol 停止條件，代表結果就是全域最佳。』你會如何回應？"
  options:
    a: "同意，因為 tol 代表已證明全域最優"
    b: "不同意；tol 只表示收斂判斷，K-means 仍可能停在 local minimum"
    c: "同意，因為每次重算中心都等同於 pruning"
    d: "不同意；只要有 tol 就代表其實是監督式分類"
  correct: "b"
  explanation:
    why_correct: "tol 只是停止迭代的條件，代表中心幾乎不再移動，不代表已跳脫初始化帶來的局部最佳限制。"
    why_not_a: "這是把『收斂』誤解成『全域最佳』，是 K-means 的經典考點。"
    why_not_c: "pruning 是決策樹控制複雜度的方法，與 K-means 的中心更新無關。"
    why_not_d: "tol 與學習型態無關，K-means 仍是非監督式分群。"
  keywords:
    - "K-means"
    - "tol"
    - "local-minimum"
  exam_trap: true

- id: "L22302-Q36"
  topic_code: "L22302"
  item_code: "模式識別"
  difficulty: 5
  question: "某製造業專案有兩段需求：第一段先以無標註感測資料找出設備運作型態；第二段再把工程師已確認的判斷邏輯落地成可審核規則。哪個整體方案最能同時滿足兩段需求？"
  options:
    a: "兩段都用 SMOTE，因為可以同時找型態與產生規則"
    b: "第一段用決策樹；第二段用 elbow method"
    c: "第一段用 K-means 做 cluster-based pattern recognition；第二段用決策樹做 rule-based pattern recognition"
    d: "兩段都只看 ROC AUC"
  correct: "c"
  explanation:
    why_correct: "這是典型分群式與規則式模式識別的組合應用：先探索型態，再把可解釋規則固化。"
    why_not_a: "SMOTE 是資料平衡策略，不負責型態探索或規則萃取。"
    why_not_b: "決策樹需要標籤；elbow method 也只是 K-means 選 k 輔助，不會輸出審核規則。"
    why_not_d: "ROC AUC 是評估指標，不是滿足兩段需求的建模方案。"
  keywords:
    - "pattern-recognition"
    - "K-means"
    - "decision-tree"
  exam_trap: false

- id: "L22302-Q37"
  topic_code: "L22302"
  item_code: "資料不平衡處理策略"
  difficulty: 5
  question: "你接手一份程式碼：\n\n```python\nX_sm, y_sm = SMOTE().fit_resample(X, y)\nX_train, X_test, y_train, y_test = train_test_split(X_sm, y_sm, test_size=0.2, random_state=42)\n```\n\n作者宣稱：『我已經用了現行 API，所以流程沒有問題。』若你要給出最關鍵的審查意見，哪一項最到位？"
  options:
    a: "程式的主要問題不是 API，而是先 resample 全資料後才切分，造成 data leakage"
    b: "主要問題是沒有使用 inertia_"
    c: "主要問題是沒有把 criterion 設成 entropy"
    d: "主要問題是沒有改成 RandomUnderSampler，所以一定失敗"
  correct: "a"
  explanation:
    why_correct: "即使 API 正確，流程仍錯。先對整份資料 SMOTE 再切 train/test，會把測試資訊滲入訓練過程，是更嚴重的問題。"
    why_not_b: "`inertia_` 是 KMeans 屬性，與這段不平衡分類流程無關。"
    why_not_c: "entropy 是決策樹分裂準則，不是這段程式的核心缺陷。"
    why_not_d: "RandomUnderSampler 可能是替代方案，但不是此段程式最本質的錯誤。"
  keywords:
    - "SMOTE"
    - "data-leakage"
    - "code-review"
  exam_trap: true

- id: "L22302-Q38"
  topic_code: "L22302"
  item_code: "資料不平衡處理策略"
  difficulty: 5
  question: "某專案先用 RandomUnderSampler 大幅刪除多數類後，accuracy 上升，但 recall 與 Precision-Recall curve 表現變差。若你要做專業判斷，下列何者最合理？"
  options:
    a: "應以 accuracy 為唯一準則，因為它最直觀"
    b: "既然做了 undersampling，其他指標都不再重要"
    c: "因為 RandomUnderSampler 不是決策樹，所以結果無法解讀"
    d: "不能只看 accuracy；在不平衡任務中，若少數類指標惡化，代表此做法未必符合任務目標"
  correct: "d"
  explanation:
    why_correct: "資料重採樣可能改變整體正確率，但任務若重視少數類偵測，應回到 recall、precision、PR curve 等指標判斷是否真的改善。"
    why_not_a: "accuracy 在不平衡情境下最容易誤導，尤其當任務風險集中在少數類時。"
    why_not_b: "resampling 只是手段，不代表可以忽略任務真正關心的評估指標。"
    why_not_c: "方法是否為決策樹與結果是否可解讀無直接關係；這是在轉移問題焦點。"
  keywords:
    - "RandomUnderSampler"
    - "accuracy"
    - "precision-recall-curve"
  exam_trap: true

- id: "L22302-Q39"
  topic_code: "L22302"
  item_code: "數據分析演算法"
  difficulty: 5
  question: "某產品團隊同時提出三個說法：\n1.『K-means 分群（Clustering）可直接拿來預測明年營收。』\n2.『決策樹（Decision Tree）只要改用 entropy 就是全域最佳。』\n3.『不平衡資料最好先整體 SMOTE，再交叉驗證。』\n\n若你只能選一個回覆去一次指出三者的共通錯誤，哪個最精準？"
  options:
    a: "三者都對，只是實作細節不同"
    b: "三者都錯，因為它們都把啟發式或局部方法誤當成可直接保證正確結論的萬靈丹"
    c: "只有第 1 點錯，其他都對"
    d: "只有第 3 點錯，因為前兩點屬於監督式就一定沒問題"
  correct: "b"
  explanation:
    why_correct: "第 1 點把分群誤當迴歸；第 2 點把局部分裂準則誤當全域保證；第 3 點忽略資料切分邊界。共通點都是把方法能力誇大。"
    why_not_a: "這會同時接受三個錯誤觀念。"
    why_not_c: "第 2、3 點也錯，而且錯在實務與考試都很常見。"
    why_not_d: "前兩點並非因為『監督式』就自動成立，第 1 點甚至不是監督式預測方法。"
  keywords:
    - "K-means"
    - "decision-tree"
    - "data-leakage"
  exam_trap: true

