- id: "L22101-Q36"
  topic_code: "L22101"
  item_code: "L22101-D"
  difficulty: 5
  question: "某半導體廠站在品質會議上檢視量測值，已知 Q1=48、Q3=55，排序資料最大幾筆為 60、65、68。若依箱型圖與 IQR fence 的標準畫法，下列哪一項最合理？"
  options:
    a: "右鬚畫到 68，因為它是最大值"
    b: "右鬚畫到 55，因為不能超過 Q3"
    c: "右鬚畫到 65，且 68 應標為離群值"
    d: "右鬚畫到 60，因為超過一半資料在此以下"
  correct: "c"
  explanation:
    why_correct: "IQR = 55 − 48 = 7，上界 fence = 55 + 1.5×7 = 65.5。箱型圖右鬚延伸到 fence 內的最後一個資料點，即 65（65 ≤ 65.5）。68 > 65.5，明確超出 fence，應標為離群值（outlier）。"
    why_not_a: "箱型圖右鬚並非無條件畫到最大值；超出 fence 的資料點應標為離群值，不納入鬚中。"
    why_not_b: "鬚可以延伸超過 Q3，上限是 fence（Q3 + 1.5×IQR），而非 Q3 本身。"
    why_not_c: "正確答案。"
    why_not_d: "60 在 fence 65.5 以內，並非最後一個非離群資料點；65 才是 fence 內最大值。"
  keywords:
    - "boxplot"
    - "IQR-fence"
    - "whisker"
    - "outlier"
  exam_trap: true

