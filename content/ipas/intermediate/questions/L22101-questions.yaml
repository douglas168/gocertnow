  correct: "a"
  explanation:
    why_correct: "少數極高金額會拉出右尾，因此整體分布通常為正偏態。"
    why_not_a: "正確答案。"
    why_not_c: "完全對稱表示兩側尾部近似平衡，與題目敘述不符。"
    why_not_d: "判斷偏態不一定需要先知道標準差，情境本身已提供足夠方向。"
