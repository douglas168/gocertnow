- id: "L22101-Q01"
  topic_code: "L22101"
  item_code: "L22101-A"
  difficulty: 1
  question: "在集中趨勢（central tendency）中，最能代表一組數值平均水準的指標通常是下列何者？"
  options:
    a: "平均數（mean）"
    b: "四分位距（IQR）"
    c: "全距（range）"
    d: "峰度（kurtosis）"
  correct: "a"
  explanation:
    why_correct: "平均數是把所有觀測值加總後除以筆數，用來描述整體平均水準，是最典型的集中趨勢指標。"
    why_not_a: "正確答案。平均數是最典型的集中趨勢指標。"
    why_not_b: "四分位距（IQR）衡量的是中間 50% 資料的分散範圍，屬於離散程度指標，不是集中趨勢；這是常見陷阱，IQR 是一種「距離」而不是「位置」。"
    why_not_c: "全距衡量的是最大值與最小值差距，屬於離散程度，不是集中趨勢。"
    why_not_d: "峰度描述分布尾部厚薄或尖峭程度，屬於分布型態，不是平均位置。"
  keywords:
    - "平均數"
    - "mean"
    - "集中趨勢"
  exam_trap: false

- id: "L22101-Q02"
  topic_code: "L22101"
  item_code: "L22101-A"
  difficulty: 1
  question: "當資料含有離群值（outlier）時，若要描述典型中心位置，通常較適合優先參考哪一個指標？"
  options:
    a: "平均數（mean）"
    b: "中位數（median）"
    c: "變異數（variance）"
    d: "全距（range）"
  correct: "b"
  explanation:
    why_correct: "中位數只看排序後的中間位置，較不容易被極端值拉動，因此在有 outlier 時通常比平均數穩健。"
    why_not_a: "平均數會把所有值都納入計算，遇到極端值時容易被大幅拉高或拉低，這是常見考試陷阱。"
    why_not_c: "變異數描述分散程度，不是中心位置。"
    why_not_d: "全距只反映極值差距，反而更容易受極端值影響。"
  keywords:
    - "中位數"
    - "median"
    - "outlier"
  exam_trap: true

- id: "L22101-Q03"
  topic_code: "L22101"
  item_code: "L22101-B"
  difficulty: 1
  question: "下列哪一個公式正確表示四分位距（interquartile range, IQR）？"
  options:
    a: "Q3 − Q2"
    b: "Q2 − Q1"
    c: "Q3 − Q1"
    d: "max − min"
  correct: "c"
  explanation:
    why_correct: "IQR 定義為第三四分位數 Q3 減去第一四分位數 Q1，用來衡量中間 50% 資料的分散程度。"
    why_not_a: "Q3 − Q2 只反映上半部一段距離，很多考生會把 Q2 當成下界，這是常見誤解。"
    why_not_c: "正確答案。"
    why_not_d: "max − min 是全距（range），不是 IQR。"
  keywords:
    - "IQR"
    - "Q3-Q1"
    - "四分位距"
  exam_trap: true

- id: "L22101-Q04"
  topic_code: "L22101"
  item_code: "L22101-B"
  difficulty: 1
  question: "關於母體變異數（population variance）與樣本變異數（sample variance）的分母，下列何者正確？"
  options:
    a: "兩者都除以 N−1"
    b: "兩者都除以 N"
    c: "母體除以 N−1，樣本除以 N"
    d: "母體除以 N，樣本除以 N−1"
  correct: "d"
  explanation:
    why_correct: "母體變異數使用全部母體資料，分母為 N；樣本變異數為校正估計偏差，常用分母 N−1。"
    why_not_a: "若兩者都除以 N−1，就混淆了母體與樣本的定義。"
    why_not_c: "這把兩者的分母對調，是最常見的記憶錯誤。"
    why_not_d: "正確答案。"
  keywords:
    - "母體變異數"
    - "sample-variance"
    - "ddof"
  exam_trap: true

- id: "L22101-Q05"
  topic_code: "L22101"
  item_code: "L22101-B"
  difficulty: 1
  question: "若某資料的 Q1=10、Q3=22，則依 IQR fence 規則計算出的上界（upper fence）為何？"
  options:
    a: "40"
    b: "34"
    c: "28"
    d: "52"
  correct: "a"
  explanation:
    why_correct: "IQR = 22 − 10 = 12，上界 = Q3 + 1.5×IQR = 22 + 18 = 40。"
    why_not_a: "正確答案。"
    why_not_c: "28 是把 1.5×IQR 算錯或把 Q1、Q3 用錯位置後常得到的干擾值。"
    why_not_d: "52 常見於把 IQR 誤算成 20，或誤把 fence 當成用全距推算。"
  keywords:
    - "IQR-fence"
    - "upper-fence"
    - "離群值"
  exam_trap: true

- id: "L22101-Q06"
  topic_code: "L22101"
  item_code: "L22101-C"
  difficulty: 1
  question: "關於正偏態（positive skewness）分布，下列敘述何者正確？"
  options:
    a: "左尾較長，且 mean < median"
    b: "右尾較長，且 mean > median"
    c: "左右完全對稱，且 mean = median = mode"
    d: "一定沒有離群值"
  correct: "b"
  explanation:
    why_correct: "正偏態代表右尾較長，較大的值會把平均數往右拉，因此常見關係是 mean > median > mode。"
    why_not_a: "左尾較長對應的是負偏態（negative skewness），方向常被考生記反。"
    why_not_c: "完全對稱才可能出現 mean、median、mode 接近，不是正偏態。"
    why_not_d: "偏態與是否一定存在離群值不是同一件事。"
  keywords:
    - "positive-skewness"
    - "右尾"
    - "mean>median"
  exam_trap: true

- id: "L22101-Q07"
  topic_code: "L22101"
  item_code: "L22101-C"
  difficulty: 1
  question: "在 `scipy.stats.kurtosis()` 中，若使用預設 Fisher 定義（fisher=True），常態分布（normal distribution）的峰度值應為何？"
  options:
    a: "−3"
    b: "1"
    c: "0"
    d: "3"
  correct: "c"
  explanation:
    why_correct: "SciPy 預設使用 Fisher's excess kurtosis，常態分布的 excess kurtosis 定義為 0。"
    why_not_a: "−3 是把 Pearson 3 再額外錯減一次的常見誤算。"
    why_not_c: "正確答案。"
    why_not_d: "3 對應的是 Pearson 定義，不是 SciPy 預設的 Fisher 定義。"
  keywords:
    - "kurtosis"
    - "Fisher"
    - "excess-kurtosis"
  exam_trap: true

- id: "L22101-Q08"
  topic_code: "L22101"
  item_code: "L22101-E"
  difficulty: 1
  question: "在 `pandas.DataFrame.describe()` 的數值摘要中，哪一列代表中位數（median）？"
  options:
    a: "`25%`"
    b: "`75%`"
    c: "`std`"
    d: "`50%`"
  correct: "d"
  explanation:
    why_correct: "`describe()` 中 `50%` 就是第 50 百分位，也就是中位數。"
    why_not_a: "`25%` 是第一四分位數 Q1，不是 median。"
    why_not_c: "`std` 是標準差，描述離散程度。"
    why_not_d: "正確答案。"
  keywords:
    - "pandas.describe"
    - "median"
    - "50%"
  exam_trap: true

- id: "L22101-Q09"
  topic_code: "L22101"
  item_code: "L22101-D"
  difficulty: 2
  question: "若數值欄位存在缺失值（missing values），且該欄位有明顯離群值（outliers），使用 `fillna()` 時通常較穩健的補值方式為何？"
  options:
    a: "以中位數（median）補值"
    b: "以最大值（max）補值"
    c: "以平均數（mean）補值"
    d: "以標準差（std）補值"
  correct: "a"
  explanation:
    why_correct: "中位數對極端值較不敏感，因此在分布偏斜或含 outlier 時，常比平均數更穩健。"
    why_not_a: "正確答案。"
    why_not_c: "平均數容易被極端值拉動，考生常因它最常見就直接選，但在此情境並非最佳。"
    why_not_d: "標準差是離散程度指標，不適合作為單一代表值來補缺失。"
  keywords:
    - "fillna"
    - "median-imputation"
    - "robust"
  exam_trap: true

- id: "L22101-Q10"
  topic_code: "L22101"
  item_code: "L22101-A"
  difficulty: 2
  question: "某班考試成績大多落在 60 到 80 分，但有一位學生 0 分。若想描述班上典型表現（typical performance），下列何者最合理？"
  options:
    a: "優先看平均數（mean），因為一定最公平"
    b: "優先看中位數（median），因為較不受 0 分影響"
    c: "優先看全距（range），因為能反映所有差異"
    d: "只看變異數（variance），因為能表示集中位置"
  correct: "b"
  explanation:
    why_correct: "單一 0 分屬於極端值，會顯著拉低平均數；中位數較能保留多數學生的典型成績。"
    why_not_a: "平均數並非任何情境都最適合，遇到偏態或極端值時常不是最好代表。"
    why_not_c: "全距只看最大與最小值，無法代表班級的中心位置。"
    why_not_d: "變異數描述離散程度，不是典型成績。"
  keywords:
    - "mean-vs-median"
    - "outlier"
    - "集中趨勢"
  exam_trap: true

- id: "L22101-Q11"
  topic_code: "L22101"
  item_code: "L22101-B"
  difficulty: 2
  question: "某資料的 Q1=18、Q2=25、Q3=31，則 IQR 為何？"
  options:
    a: "7"
    b: "6"
    c: "13"
    d: "25"
  correct: "c"
  explanation:
    why_correct: "IQR = Q3 − Q1 = 31 − 18 = 13。"
    why_not_a: "7 是把 Q3 − Q2 當成 IQR 的常見誤選。"
    why_not_c: "正確答案。"
    why_not_d: "25 是 Q2 本身，不是四分位距。"
  keywords:
    - "IQR"
    - "Q1-Q3"
    - "四分位數"
  exam_trap: true

- id: "L22101-Q12"
  topic_code: "L22101"
  item_code: "L22101-B"
  difficulty: 2
  question: "關於 `pandas.Series.describe()` 的 `std` 列，下列何者正確？"
  options:
    a: "使用母體標準差，等同 `np.std(ddof=0)`"
    b: "輸出的是變異數（variance）"
    c: "只在整數欄位才會出現"
    d: "使用樣本標準差，概念上等同 `ddof=1`"
  correct: "d"
  explanation:
    why_correct: "pandas `describe()` 的 `std` 預設採樣本標準差，也就是以 `N−1` 為分母的 `ddof=1` 概念。"
    why_not_a: "很多考生會把 pandas 和 NumPy 預設混為一談，但 `np.std()` 預設是 `ddof=0`。"
    why_not_c: "只要是數值欄位，一般都會有 `std` 摘要，不限整數。"
    why_not_d: "正確答案。"
  keywords:
    - "pandas.describe"
