  correct: "b"
  explanation:
    why_correct: "類別型欄位要保留最常見類別時，使用眾數 `mode()[0]` 最合理；此例會補成 `電話`。"
    why_not_a: "文字類別欄位沒有平均數可言，這是把數值與類別欄位混淆。"
    why_not_c: "補成 0 會產生不合理的新類別。"
    why_not_d: "直接刪除會流失資料，且題目明確要求保留分布特性並補值。"
  keywords:
    - "mode-imputation"
    - "categorical"
    - "pseudocode"
  exam_trap: false

- id: "L22101-Q39"
  topic_code: "L22101"
  item_code: "L22101-D"
  difficulty: 5
  question: "某團隊討論偏態資料的離群值流程。甲主張先用平均數與標準差做 z-score；乙主張先用 IQR method，再確認是否為真實商業事件。若資料明顯右偏且含少數高額訂單，哪一項判斷較佳？"
  options:
    a: "甲較佳，因為任何分布都應先用 z-score"
    b: "兩者都不佳，因為偏態資料不能做摘要"
    c: "乙較佳，因為 IQR 對偏態與極端值通常較穩健"
    d: "兩者效果一定完全相同"
  correct: "c"
  explanation:
    why_correct: "偏態且含極端值時，IQR method 較不受平均數與標準差失真的影響，再結合業務情境確認最實務。"
    why_not_a: "z-score 並非所有分布都優先適用，這種一體適用的想法是常見陷阱。"
    why_not_c: "正確答案。"
    why_not_d: "兩種方法的基礎假設與敏感度不同，結果常不相同。"
  keywords:
    - "IQR-vs-zscore"
    - "偏態資料"
    - "tradeoff"
  exam_trap: true

- id: "L22101-Q40"
  topic_code: "L22101"
  item_code: "L22101-E"
  difficulty: 5
  question: "某考生看到以下程式：`s = pd.Series([1, 1, 2, 3, None])`；`s.value_counts()`。若不額外設定參數，下列何者最可能是正確解讀？"
  options:
    a: "輸出會把 `None` 視為出現次數最高的值"
    b: "輸出會自動回傳平均數與標準差"
    c: "輸出只會顯示唯一值個數，不顯示次數"
    d: "輸出會列出各值次數，且預設不把 `None` 納入計數"
  correct: "d"
  explanation:
    why_correct: "`value_counts()` 會計算各唯一值的次數，且預設 `dropna=True`，因此不會把 `None` 或 NaN 納入計數。"
    why_not_a: "缺失值預設不會被算進去，很多考生會把 `value_counts()` 與 `fillna()` 混淆。"
    why_not_c: "只顯示唯一值個數是 `nunique()` 的概念，不是 `value_counts()`。"
    why_not_d: "正確答案。"
  keywords:
    - "value_counts"
    - "dropna"
    - "pseudocode"
  exam_trap: true
