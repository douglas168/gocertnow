- id: "L22101-Q17"
  topic_code: "L22101"
  item_code: "L22101-A"
  difficulty: 3
  question: "台北某補習班統計 5 位學員模擬考分數為 68、70、72、74、98。若要在招生簡報中呈現大多數學員的典型成績（typical score），哪一個指標最適合？"
  options:
    a: "中位數（median）72"
    b: "平均數（mean）76.4"
    c: "全距（range）30"
    d: "眾數（mode）不存在，因此不可摘要"
  correct: "a"
  explanation:
    why_correct: "98 明顯偏高，會把平均數往上拉；中位數 72 更能代表多數學員的中心位置。"
    why_not_a: "正確答案。"
    why_not_c: "全距只描述最高與最低的差距，無法當作典型成績。"
    why_not_d: "即使沒有眾數，也仍可用平均數或中位數進行摘要。"
  keywords:
    - "median"
    - "outlier"
    - "台灣情境"
  exam_trap: true

- id: "L22101-Q18"
  topic_code: "L22101"
  item_code: "L22101-B"
  difficulty: 3
  question: "某資料分析師執行 Python 程式 `arr = np.array([2, 4, 6, 8])` 與 `np.std(arr)`。若 NumPy 使用預設參數，輸出最接近下列何者？"
  options:
    a: "約 2.58，因為預設是 `ddof=1`"
    b: "約 2.24，因為預設是 `ddof=0`"
    c: "5.00，因為回傳的是變異數"
    d: "10.00，因為回傳的是總和"
  correct: "b"
  explanation:
    why_correct: "平均數為 5，平方離差和為 20；NumPy `np.std()` 預設 `ddof=0`，所以標準差為 sqrt(20/4) = sqrt(5) ≈ 2.24。"
    why_not_a: "2.58 是使用樣本標準差 `ddof=1` 才會出現的結果，這正是考試常設的陷阱。"
    why_not_c: "變異數會是 5，不是標準差，而且函式是 `std` 不是 `var`。"
    why_not_d: "NumPy 不會把 `std` 當作總和運算。"
  keywords:
    - "np.std"
    - "ddof=0"
    - "pseudocode"
  exam_trap: true

- id: "L22101-Q19"
  topic_code: "L22101"
  item_code: "L22101-D"
  difficulty: 3
  question: "新竹某製造廠量測 7 批產品良率，排序後為 72、74、75、76、78、80、95。已知 Q1=74、Q3=80，依 IQR fence 判斷，下列何者為離群值（outlier）？"
  options:
    a: "72"
    b: "80"
    c: "95"
    d: "76"
  correct: "c"
  explanation:
    why_correct: "IQR = 80 − 74 = 6，上界 = 80 + 1.5×6 = 89，下界 = 74 − 9 = 65，只有 95 超過上界，因此為 outlier。"
    why_not_a: "72 仍高於下界 65，不屬於離群值。"
    why_not_c: "正確答案。"
    why_not_d: "76 位於中央區域內，更不是離群值。"
  keywords:
    - "IQR-fence"
    - "outlier"
    - "製造業情境"
  exam_trap: false

- id: "L22101-Q20"
  topic_code: "L22101"
  item_code: "L22101-D"
  difficulty: 3
  question: "某校務系統的社團欄位為 `['AI社', 'AI社', None, '機器人社', None]`，資訊組想保留類別型欄位的常見值，執行 `s.fillna(s.mode()[0])` 後，最可能的補值內容為何？"
  options:
    a: "全部補成 `None`"
    b: "全部補成 `機器人社`"
    c: "全部補成空字串 `''`"
    d: "全部補成 `AI社`"
  correct: "d"
  explanation:
    why_correct: "`mode()[0]` 會取出出現次數最多的值；此例中 `AI社` 出現 2 次，為眾數，因此缺失值會補成 `AI社`。"
    why_not_a: "`fillna()` 的目的正是填補缺失，不會再補成缺失值本身。"
    why_not_c: "除非明確指定空字串，否則 `mode()[0]` 不會回傳 `''`。"
    why_not_d: "正確答案。"
  keywords:
    - "fillna"
    - "mode"
    - "pseudocode"
  exam_trap: false

- id: "L22101-Q21"
  topic_code: "L22101"
  item_code: "L22101-C"
  difficulty: 3
  question: "某電商平台多數訂單金額集中在 300 到 800 元，但少數高價訂單超過 10000 元。此分布最可能呈現哪一種偏態（skewness）？"
