- id: "L22101-Q13"
  topic_code: "L22101"
  item_code: "L22101-D"
  difficulty: 2
  question: "當資料分布明顯偏斜（skewed）且可能含離群值時，偵測 outlier 通常較適合先採用哪一種方法？"
  options:
    a: "IQR method"
    b: "只看平均數（mean）"
    c: "只看眾數（mode）"
    d: "直接固定以 1 個標準差判定"
  correct: "a"
  explanation:
    why_correct: "IQR method 依賴四分位數，對偏態與極端值較穩健，常比 z-score 更適合非近似常態資料。"
    why_not_a: "正確答案。"
    why_not_c: "眾數可描述最常見值，但不能單獨拿來判定 outlier。"
    why_not_d: "1 個標準差太寬鬆且非通用規則，常見 z-score 也多以 ±3σ 作為參考。"
  keywords:
    - "IQR-method"
    - "outlier-detection"
    - "skewed-data"
  exam_trap: true

- id: "L22101-Q14"
  topic_code: "L22101"
  item_code: "L22101-C"
  difficulty: 2
  question: "若一組資料呈負偏態（negative skewness），下列敘述何者最合理？"
  options:
    a: "右尾較長，通常 mean > median"
    b: "左尾較長，通常 mean < median"
    c: "一定對稱，且 mean = median"
    d: "一定無法計算平均數"
  correct: "b"
  explanation:
    why_correct: "負偏態表示左尾較長，較小的值會把平均數向左拉，因此通常 mean < median。"
    why_not_a: "這描述的是正偏態，方向正好相反。"
    why_not_c: "對稱分布才可能 mean 與 median 接近，不是負偏態。"
    why_not_d: "偏態資料當然仍可計算平均數，只是解讀要更小心。"
  keywords:
    - "negative-skewness"
    - "左尾"
    - "mean<median"
