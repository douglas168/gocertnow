    - "Responsible AI"
  exam_trap: true

- id: "L21203-Q15"
  topic_code: "L21203"
  item_code: "L21203"
  difficulty: 2
  question: "下列何者最能區分風險登記簿（Risk Register）與 5x5 可能性衝擊矩陣（Likelihood-Impact Matrix）的用途？"
  options:
    a: "兩者完全相同，只是名稱不同"
    b: "風險矩陣記錄風險 owner；風險登記簿只顯示色塊"
    c: "風險登記簿逐項管理風險資訊，風險矩陣用於機率與衝擊的視覺化分級"
