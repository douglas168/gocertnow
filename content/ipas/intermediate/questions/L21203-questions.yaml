- id: "L21203-Q35"
  topic_code: "L21203"
  item_code: "L21203"
  difficulty: 5
  question: "某團隊已依 NIST AI 風險管理框架（NIST AI RMF）完成使用情境盤點，現在發現生成式 AI（Generative AI）常出現幻覺（confabulation）與有害內容，但缺乏一致的量測指標與測試方法。此時最優先強化哪一個功能（Function）最合理？"
  options:
    a: "Govern，因為只要董事會表態支持即可"
    b: "Map，因為應回頭停止所有情境盤點"
    c: "Measure，因為需要建立可重複的風險量測、測試與指標設計"
    d: "Manage，因為不需先量測就能直接決定殘餘風險"
  correct: "c"
  explanation:
    why_correct: "題目缺口在『沒有一致量測指標與測試方法』，這正對應 Measure。之後才能更有根據地進入 Manage。"
    why_not_a: "Govern 重要，但本題已明確指出具體缺口在量測層，而不是政策宣示。"
    why_not_b: "Map 已完成基本盤點，現在問題不是脈絡不足，而是缺乏評估方法。"
    why_not_d: "沒有量測基礎就直接做處置，容易讓殘餘風險判斷失真。"
  keywords:
    - "NIST AI RMF"
    - "Measure"
    - "confabulation"
  exam_trap: false

