  question: "某市政府將在 2026 年導入求職媒合 AI（AI-assisted hiring）服務，供公立就業服務站使用，並委由外部廠商提供模型。若目標是在上線前同時處理高風險分類、基本權、委外治理與內部問責，哪一個方案最佳？"
  options:
    a: "確認其屬高風險（High-Risk）用途，於部署前完成 FRIA/等效影響評估，建立風險登記簿與人工覆核流程，並把供應商控制與責任分工納入治理"
    b: "只要求廠商保證模型準確率達標，內部不需再做風險評估"
    c: "先以 chatbot 的限制風險模式處理，重點只放在揭露使用 AI"
    d: "等臺灣《人工智慧基本法》公布施行後再開始治理規劃"
  correct: "a"
