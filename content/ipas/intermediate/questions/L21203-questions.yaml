    c: "只要求供應商簽 SLA，內部不另做分類與監控"
    d: "以多維衝擊的 5x5 可能性衝擊矩陣（Likelihood-Impact Matrix）做分級，董事會訂定各類風險胃納，再由風險登記簿持續追蹤 owner、控制與殘餘風險"
