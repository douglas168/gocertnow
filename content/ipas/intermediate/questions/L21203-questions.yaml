    why_correct: "深度偽造（deepfake）常對應限制風險中的透明要求，考生易把『影像』與『生物辨識』混為同一風險層級。"
    why_not_a: "涉及合成內容時，透明義務往往不可忽略，不能直接視為最小風險。"
    why_not_c: "不可接受風險是特定被禁止作法，不是所有影像應用。"
    why_not_d: "是否有人工後製不會自動排除 AI 法規要求。"
  keywords:
    - "deepfake"
    - "Limited Risk"
    - "transparency"
  exam_trap: true

- id: "L21203-Q31"
  topic_code: "L21203"
  item_code: "L21203"
  difficulty: 4
  question: "關於基本權影響評估（Fundamental Rights Impact Assessment, FRIA）與資料保護影響評估（Data Protection Impact Assessment, DPIA）的關係，下列何者最正確？"
  options:
    a: "兩者是完全相同的法定程序，只是翻譯不同"
    b: "只要做過 DPIA，就必然不需要再考量 FRIA"
    c: "兩者可能有重疊並可部分重用，但法律依據與關注範圍不同"
    d: "FRIA 只處理資安弱點，DPIA 才處理基本權"
  correct: "c"
  explanation:
    why_correct: "研究筆記明示 FRIA 與 DPIA 可結合或重用部分內容，但它們在法源與評估焦點上仍然不同。"
    why_not_a: "名稱相近造成誤解，但並非同一法定程序。"
    why_not_b: "做過 DPIA 不代表 FRIA 義務自然消失，尤其在 AI Act 高風險部署場景。"
    why_not_d: "FRIA 關注的是更廣義的基本權影響，不是只看資安。"
  keywords:
    - "FRIA"
    - "DPIA"
    - "AI Act"
  exam_trap: true

- id: "L21203-Q32"
  topic_code: "L21203"
  item_code: "L21203"
  difficulty: 4
  question: "若要把紅隊測試（red teaming）、風險登記簿（Risk Register）與 5x5 可能性衝擊矩陣（Likelihood-Impact Matrix）放進同一套 AI 風險生命週期，下列哪種分工最合理？"
  options:
    a: "紅隊測試負責董事會核定風險胃納，登記簿只存檔不更新"
    b: "風險矩陣取代所有風險識別活動，紅隊測試可省略"
    c: "風險登記簿只在專案結束後建立，避免過早干擾開發"
    d: "紅隊測試可作為實證式風險識別來源，矩陣協助分級，登記簿則持續追蹤 owner、控制與殘餘風險"
  correct: "d"
  explanation:
    why_correct: "這三者在方法論上互補：red teaming 幫助發現風險，矩陣幫助排序，登記簿負責持續管理。"
    why_not_a: "董事會核定風險胃納不是紅隊測試的職責；登記簿也必須持續更新。"
    why_not_b: "矩陣是評估工具，不會取代識別方法。"
    why_not_c: "風險登記簿應在生命週期中持續使用，不是結案才建立。"
  keywords:
    - "red teaming"
    - "Risk Register"
    - "Risk Matrix"
  exam_trap: false

- id: "L21203-Q33"
