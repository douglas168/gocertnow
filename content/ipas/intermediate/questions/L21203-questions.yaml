    b: "截至 2026-04，基本法已施行且由金管會主責，公部門只需遵守金融業 AI 指引"
    c: "截至 2026-04，基本法仍停留在草案，公部門暫無任何風險評估方向可依"
    d: "截至 2026-04，MODA 已單獨公布施行細則，因此國科會不再有角色"
  correct: "a"
