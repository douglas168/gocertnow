  item_code: "L21203"
  difficulty: 5
  question: "某金融機構已具 ISO/IEC 27001，計畫導入外部大型語言模型（Large Language Model, LLM）做客服與內部知識助理。若希望同時對齊部門監理期待、補足 AI 特有治理缺口，且避免把指引誤當硬法，何者最適合？"
  options:
    a: "只遵循金管會 AI 指引即可，因其已等同強制法令"
    b: "以 27001 為既有基礎，參照金管會 AI 指引建立問責與第三方監督，再以 ISO/IEC 42001 或等效制度補足 AI 管理系統缺口"
    c: "僅使用 NIST CSF 即可，不需另設 AI 供應商控管"
    d: "因為是生成式 AI，所以只看 NIST AI 600-1，不需顧及金融監理脈絡"
  correct: "b"
