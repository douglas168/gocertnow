    why_not_a: "名稱相近但功能不同，這是典型名詞辨識陷阱。"
    why_not_b: "實際上 owner 主要記在風險登記簿，不是只放在矩陣。"
    why_not_d: "風險登記簿需要持續更新，不是只在結案時才使用。"
