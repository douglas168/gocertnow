    - "Risk Register"
    - "Risk Matrix"
    - "risk identification"
  exam_trap: true

- id: "L21203-Q16"
  topic_code: "L21203"
  item_code: "L21203"
  difficulty: 2
  question: "關於臺灣 AI 治理角色分工，下列何者最合理？"
  options:
