- id: "L21203-Q01"
  topic_code: "L21203"
  item_code: "L21203"
  difficulty: 1
  question: "依歐盟《人工智慧法案》（EU AI Act）的風險分級，以下何者屬於不可接受風險（Unacceptable Risk）的典型例子？"
  options:
    a: "政府依個人社會行為建立社會評分（social scoring）並據以限制服務"
    b: "銀行用於信用評分（credit scoring）的 AI 系統"
    c: "電商客服聊天機器人（chatbot）未先揭露為 AI"
    d: "企業內部知識搜尋工具（knowledge search）"
  correct: "a"
  explanation:
    why_correct: "社會評分（social scoring）屬於 EU AI Act 第 5 條明文禁止的作法，屬不可接受風險，不是高風險或限制風險。"
    why_not_b: "信用評分常被誤選成禁止項目，因為它影響重大權益；但法制上它通常落在 Annex III 的高風險（High-Risk），不是一律禁止。"
    why_not_c: "聊天機器人未揭露身分是常見合規問題，但通常是限制風險（Limited Risk）的透明義務，不是禁止使用。"
    why_not_d: "內部知識搜尋工具多半屬最小風險（Minimal Risk）情境，題目故意用常見企業應用混淆風險層級。"
  keywords:
    - "EU AI Act"
    - "Unacceptable Risk"
    - "social scoring"
  exam_trap: true

- id: "L21203-Q02"
  topic_code: "L21203"
  item_code: "L21203"
  difficulty: 1
  question: "截至 2026-04，關於臺灣《人工智慧基本法》（AI Basic Act）的法制狀態，下列何者正確？"
  options:
    a: "仍僅是 2024 年草案，尚未進入立法程序"
    b: "已於 2025-12-23 三讀通過，但尚待總統公布施行"
    c: "已於 2026-01-14 經總統公布，並依第 20 條自公布之日起施行；中央主管機關為國科會（NSTC）"
    d: "已由數位發展部（MODA）單獨公布並全面適用"
  correct: "c"
  explanation:
    why_correct: "截至 2026-04，《人工智慧基本法》已由總統令華總一義字第11500001671號於 2026-01-14 公布，並依第 20 條自公布之日起施行；中央主管機關為國家科學及技術委員會（NSTC，國科會）。"
    why_not_a: "很多考生沿用舊版 2024 課綱印象，以為仍停留在草案階段；這正是常見時點陷阱。"
    why_not_b: "b 描述的是「三讀通過後、尚待公布施行」的早期狀態；自 2026-01-14 公布起該描述已不再正確"
    why_not_d: "數位發展部負責風險分類框架與資料治理機制，但中央主管機關是國科會（NSTC），也不是單獨由 MODA 公布全面適用。"
  keywords:
    - "人工智慧基本法"
    - "NSTC"
    - "status"
  exam_trap: true

- id: "L21203-Q03"
  topic_code: "L21203"
  item_code: "L21203"
  difficulty: 1
  question: "金管會「金融業運用人工智慧（AI）指引」的法律性質，最適合下列何者描述？"
  options:
    a: "歐盟等級的直接適用法規（regulation）"
    b: "具刑事處罰效果的特別法"
    c: "行政指導（administrative guidance），供金融機構及公會參考"
    d: "由 ISO 發布的國際驗證標準"
  correct: "c"
  explanation:
    why_correct: "金管會指引於 2024-06-20 發布，性質是行政指導，屬實務上重要的部門治理基準，但不是直接的強制法令。"
    why_not_a: "考生常把「指引」誤聽成法規命令，但它不是像 EU Regulation 那樣直接適用的規範。"
    why_not_b: "題目用「處罰」引誘考生把監理文件想成制裁法源；研究資料明確指出其性質非強制法令。"
    why_not_d: "ISO/IEC 42001 才是國際標準；金管會指引是本土監理機關發布的部門性文件。"
  keywords:
    - "FSC"
    - "administrative guidance"
    - "金融業運用AI指引"
  exam_trap: true

- id: "L21203-Q04"
  topic_code: "L21203"
  item_code: "L21203"
  difficulty: 1
  question: "在 NIST AI 風險管理框架（NIST AI RMF）中，哪一個功能（Function）被視為跨越整個生命週期的核心？"
  options:
    a: "Map"
    b: "Measure"
    c: "Manage"
    d: "Govern"
  correct: "d"
  explanation:
    why_correct: "Govern 強調組織文化、政策、角色與問責，是 NIST AI RMF 的跨切面功能，不只發生在單一專案階段。"
    why_not_a: "Map 關注情境、使用目的與利害關係人，重要但不是跨整體治理的主軸。"
    why_not_b: "Measure 是量測可信任 AI 特性與風險指標，常被誤認為最核心，實際上其前提仍依賴治理安排。"
    why_not_c: "Manage 著重風險優先順序與處置，屬生命週期活動之一，不等於整體治理基盤。"
  keywords:
    - "NIST AI RMF"
    - "Govern"
    - "lifecycle"
  exam_trap: false

- id: "L21203-Q05"
  topic_code: "L21203"
  item_code: "L21203"
  difficulty: 1
  question: "下列關於 ISO/IEC 42001:2023 的敘述，何者正確？"
  options:
    a: "它是可驗證（certifiable）的 AI 管理系統（AIMS）標準"
    b: "它只處理資訊安全的機密性、完整性、可用性（CIA）"
    c: "它是說明 AI 風險流程的非驗證性指引，等同 ISO/IEC 23894"
    d: "它專門定義深度學習模型的數學驗證方法"
  correct: "a"
  explanation:
    why_correct: "ISO/IEC 42001 是首個可驗證的 AI Management System（AIMS）標準，重點是建立、實施、維護與持續改善 AI 管理系統。"
    why_not_b: "這是 27001 的典型範圍，不足以涵蓋模型漂移（model drift）、公平性與幻覺等 AI 特有議題。"
    why_not_c: "ISO/IEC 23894 才是 AI 風險管理流程的指引文件；42001 與 23894 常一起被考，但角色不同。"
    why_not_d: "42001 是管理系統標準，不是技術驗證方法學；題目故意把管理治理與模型技術混在一起。"
  keywords:
    - "ISO/IEC 42001"
    - "AIMS"
    - "certifiable"
  exam_trap: true

- id: "L21203-Q06"
  topic_code: "L21203"
  item_code: "L21203"
  difficulty: 1
  question: "「可信任人工智慧 7 項要求」（Trustworthy AI 7 Requirements）最常對應到哪一個發布者？"
  options:
    a: "Microsoft Responsible AI Standard"
    b: "歐盟高階專家小組（EU HLEG）"
    c: "歐盟《人工智慧法案》（EU AI Act）正式條文"
    d: "金管會（FSC）"
  correct: "b"
  explanation:
    why_correct: "7 項可信任 AI 要求出自 EU High-Level Expert Group（HLEG）2019 年文件，不是 AI Act 正式法條本身。"
    why_not_a: "Microsoft 也有責任式 AI 原則，但其清單是 6 原則，不是 HLEG 的 7 項要求。"
    why_not_c: "這是高命中率陷阱。很多人把 HLEG 的政策倫理框架誤記成 AI Act 法源，但兩者不是同一文件。"
    why_not_d: "金管會有金融業 6 核心原則，內容相近但發文機關與架構不同。"
  keywords:
    - "HLEG"
    - "Trustworthy AI"
    - "issuer"
  exam_trap: true

- id: "L21203-Q07"
  topic_code: "L21203"
  item_code: "L21203"
  difficulty: 1
  question: "依歐盟《人工智慧法案》（EU AI Act）第 27 條，基本權影響評估（Fundamental Rights Impact Assessment, FRIA）主要是在何種情況下由誰執行？"
  options:
    a: "所有 AI 開發者（provider）於模型訓練完成後一律執行"
    b: "所有資料處理者（processor）於跨境傳輸前一律執行"
    c: "特定 deployer 在啟用 Annex III 高風險 AI 前執行"
    d: "所有最小風險（Minimal Risk）系統在上市後執行"
  correct: "c"
  explanation:
    why_correct: "FRIA 是針對特定 deployer，例如公部門或提供公共服務的私部門，在使用 Annex III 高風險系統前應完成的評估。"
    why_not_a: "FRIA 不是所有 provider 一律在訓練後執行，題目故意把 provider 與 deployer 混用。"
    why_not_b: "這種描述更像 GDPR 脈絡中的資料處理議題，與 AI Act 第 27 條的適用對象和時點不一致。"
    why_not_d: "最小風險沒有此類法定義務，考題常用『所有 AI 都要做』來誤導。"
  keywords:
    - "FRIA"
    - "Article 27"
    - "deployer"
  exam_trap: true

- id: "L21203-Q08"
  topic_code: "L21203"
  item_code: "L21203"
  difficulty: 1
  question: "下列何者是 NIST 針對生成式 AI（Generative AI）所發布的 AI RMF 配套文件？"
  options:
    a: "NIST CSF 2.0"
    b: "NIST SP 800-53"
    c: "NIST AI 100-1"
    d: "NIST AI 600-1"
  correct: "d"
  explanation:
    why_correct: "NIST AI 600-1 就是 GenAI Profile，補充生成式 AI 的特定風險與對應行動。"
    why_not_a: "CSF 是網路安全框架，雖與治理相關，但不是 AI RMF 的 GenAI 專用 Profile。"
    why_not_b: "SP 800-53 是安全控制基準，常被誤認為萬用治理文件，但不是本題所問的 GenAI Profile。"
    why_not_c: "AI 100-1 是 NIST AI RMF 1.0 主文件，不是生成式 AI 的補充 Profile。"
  keywords:
    - "NIST AI 600-1"
    - "GenAI Profile"
    - "NIST AI RMF"
  exam_trap: false

- id: "L21203-Q09"
  topic_code: "L21203"
  item_code: "L21203"
  difficulty: 2
  question: "某公司上線對外客服聊天機器人（chatbot），依歐盟《人工智慧法案》（EU AI Act）最合理的理解為何？"
  options:
    a: "通常屬限制風險（Limited Risk），重點是透明揭露義務"
    b: "一律屬高風險（High-Risk），必須完成 Annex III 義務"
    c: "一律屬不可接受風險（Unacceptable Risk），不得部署"
    d: "自動落入最小風險（Minimal Risk），不需任何揭露"
  correct: "a"
  explanation:
    why_correct: "一般客服 chatbot 的核心義務是讓使用者知道正在與 AI 互動，屬限制風險的典型透明要求。"
    why_not_b: "只有特定高影響用途才會進入高風險；考生常把『有互動』誤判成高風險。"
    why_not_c: "被禁止的是特定作法，例如社會評分或某些生物辨識用途，不是一般客服互動。"
    why_not_d: "最小風險沒有明確透明義務，但 chatbot 正是常見的限制風險陷阱，不能忽略揭露。"
  keywords:
    - "Limited Risk"
    - "chatbot"
    - "transparency"
  exam_trap: true

- id: "L21203-Q10"
  topic_code: "L21203"
  item_code: "L21203"
  difficulty: 2
  question: "為何企業即使已導入 ISO/IEC 27001，仍可能需要 ISO/IEC 42001 來治理人工智慧（AI）？"
  options:
    a: "因為 27001 專門處理 AI 公平性（fairness）與可解釋性（explainability）"
    b: "因為 27001 偏重資訊安全，未完整涵蓋模型漂移、公平性與幻覺等 AI 特有風險"
    c: "因為 42001 只適用於網路安全事件通報"
    d: "因為 42001 會直接取代所有品質管理與資訊安全標準"
  correct: "b"
  explanation:
    why_correct: "27001 處理的是資訊安全管理，AI 治理還需納入模型生命週期、供應商、影響評估與可信任特性等控制。"
    why_not_a: "這是最常見的反向混淆：公平性、可解釋性與 drift 並不是 27001 的核心控制範圍。"
    why_not_c: "42001 是 AI 管理系統標準，不是專門處理通報義務的單點標準。"
    why_not_d: "42001 可與 27001/9001 整合，不是要把其他管理系統全部取代。"
  keywords:
    - "ISO/IEC 27001"
    - "ISO/IEC 42001"
    - "AI governance"
  exam_trap: true

- id: "L21203-Q11"
  topic_code: "L21203"
  item_code: "L21203"
  difficulty: 2
  question: "下列何者最能正確描述風險胃納（Risk Appetite）在 AI 風險管理中的角色？"
  options:
    a: "記錄每一筆風險控制狀態的逐項清單"
    b: "將所有風險自動降為可接受的技術方法"
    c: "由董事會或高階管理層設定各類殘餘風險可接受上限"
    d: "將風險機率乘以衝擊值的數學公式"
  correct: "c"
  explanation:
    why_correct: "風險胃納是組織對殘餘風險可接受程度的上限設定，常由董事會或高階管理層核定，用來決定何時需升級與何時可接受。"
    why_not_a: "這描述的是風險登記簿（Risk Register）的用途，不是風險胃納。"
    why_not_b: "風險胃納是治理決策基準，不是能『自動降低』風險的技術措施。"
    why_not_d: "這比較像風險矩陣或評分方法的一部分，與治理層設定可接受度不同。"
  keywords:
    - "Risk Appetite"
    - "board"
    - "residual risk"
  exam_trap: true

- id: "L21203-Q12"
  topic_code: "L21203"
  item_code: "L21203"
  difficulty: 2
  question: "依臺灣《人工智慧基本法》（AI Basic Act）已三讀通過版本的方向，第 19 條對政府機關（public agencies）的重點要求為何？"
  options:
    a: "政府機關可免做 AI 風險評估，只要委外給廠商即可"
    b: "所有 AI 一律須送交 ISO 認證後才能使用"
    c: "先由金管會核准，再由法院決定是否上線"
    d: "使用 AI 執行業務時應進行風險評估並規劃因應措施"
  correct: "d"
  explanation:
    why_correct: "研究資料指出第 19 條核心就是政府機關使用 AI 執行業務時，應先做風險評估並規劃應對措施。"
    why_not_a: "委外不會移轉治理責任，這是實務上很常見的誤解。"
    why_not_b: "基本法並未要求所有 AI 先取得 ISO 認證；ISO 標準與法律義務不能直接畫上等號。"
    why_not_c: "題目把不同機關角色混在一起，並非現行研究資料中的法制要求。"
  keywords:
    - "人工智慧基本法"
    - "Article 19"
    - "public agencies"
  exam_trap: true

- id: "L21203-Q13"
  topic_code: "L21203"
  item_code: "L21203"
  difficulty: 2
  question: "關於金管會「金融業運用人工智慧（AI）指引」的 6 核心原則，下列何者正確？"
  options:
    a: "其中包含促進永續發展（sustainability）"
    b: "其中包含強制採用差分隱私（differential privacy）公式"
    c: "其中包含禁止所有第三方供應商參與模型開發"
    d: "其中包含只有技術部門負責，無需問責機制"
  correct: "a"
  explanation:
    why_correct: "金管會 6 核心原則之一即為促進永續發展，與公平性與以人為本、隱私、安全、透明解釋等一起構成治理主軸。"
    why_not_b: "題目故意把其他單元的技術細節塞進來；指引要求的是治理原則，不是指定某個隱私數學方法。"
    why_not_c: "指引談的是第三方監督，不是全面禁止外部供應商。"
    why_not_d: "金管會原則強調治理與問責，並非將責任縮限於技術部門。"
  keywords:
    - "FSC"
    - "sustainability"
    - "金融業AI指引"
  exam_trap: false

- id: "L21203-Q14"
  topic_code: "L21203"
  item_code: "L21203"
