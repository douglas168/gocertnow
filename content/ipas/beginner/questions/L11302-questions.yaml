- id: "L11302-Q22"
  topic_code: "L11302"
  item_code: "L11302"
  difficulty: 4
  question: "下列關於「K-means」與「KNN」兩個演算法的比較，何者最正確？"
  options:
    a: "兩者都是非監督式學習演算法，差別只在 K 值意義不同"
    b: "K-means 屬於非監督式分群；KNN 屬於監督式分類（或迴歸）"
    c: "K-means 屬於監督式分類；KNN 屬於非監督式分群"
    d: "兩者都是強化式學習演算法"
  correct: "b"
  explanation:
    why_correct: "兩者只是名稱相似：K-means 是非監督式學習的分群演算法（K 代表分成幾群），KNN 則是監督式學習演算法（K 代表看最近的幾個鄰居）。"
    why_not_a: "兩者分屬不同學習典範，不是都非監督式。"
    why_not_c: "方向完全相反，KNN 是監督式，K-means 才是非監督式。"
    why_not_d: "兩者都與強化式學習無關。"
  keywords:
    - "K-means vs KNN"
    - "典範歸類"
  exam_trap: true

- id: "L11302-Q23"
  topic_code: "L11302"
  item_code: "L11302"
  difficulty: 4
  question: "下列關於「分類（Classification）」與「分群（Clustering）」的主要差異，何者最正確？"
  options:
    a: "分類屬於非監督式、分群屬於監督式"
    b: "分類事先有已知類別且有標籤；分群事先沒有類別，由模型自己把相似資料歸在一起"
    c: "分類輸出連續數值；分群輸出離散類別"
    d: "分類只能用決策樹；分群只能用 KNN"
  correct: "b"
  explanation:
    why_correct: "分類是監督式任務，事先已知類別並有標籤；分群是非監督式任務，事先沒有類別，由模型依相似度自動分群。"
    why_not_a: "方向相反：分類是監督式，分群才是非監督式。"
    why_not_c: "分類輸出的是離散類別；連續數值屬於迴歸。"
    why_not_d: "分類可用多種演算法，分群也不用 KNN（KNN 反而是監督式分類演算法）。"
  keywords:
    - "分類 vs 分群"
  exam_trap: true

