  question: "下列關於「半監督式學習」的敘述，何者正確？"
  options:
    a: "使用大量人工標註的資料與少量無標註資料進行訓練"
    b: "使用少量人工標註的資料與大量無標註的資料進行訓練"
    c: "完全不使用任何標註資料，只靠資料本身生成標籤"
    d: "完全不使用資料，只靠獎勵訊號訓練"
  correct: "b"
  explanation:
    why_correct: "半監督式學習的核心是「少量標籤 + 大量無標籤」共同訓練，用於實務上標註成本很高但未標註資料充足的情境，例如醫療影像。"
    why_not_a: "方向相反：是少量標註 + 大量未標註。"
    why_not_c: "完全不用人工標註、從資料結構自動產生標籤的是「自監督式學習」，常被與半監督混淆。"
