- id: "L11302-Q14"
  topic_code: "L11302"
  item_code: "L11302"
  difficulty: 2
  question: "下列哪一個演算法屬於「非監督式學習」？"
  options:
    a: "KNN（K近鄰）"
    b: "K-means（K均值分群）"
    c: "邏輯迴歸"
    d: "隨機森林"
  correct: "b"
  explanation:
    why_correct: "K-means 是典型的非監督式分群演算法，用來把沒有類別標籤的資料自動分成 K 個群，K 代表「要分成幾群」。"
    why_not_a: "KNN 雖然名字也有 K，但它是監督式演算法（分類或迴歸），K 指「看最近的幾個鄰居」，與 K-means 完全不同。"
    why_not_c: "邏輯迴歸雖然名字有「迴歸」，但其實是監督式的分類演算法。"
    why_not_d: "隨機森林是多棵決策樹的集成，屬於監督式學習。"
  keywords:
    - "K-means"
    - "KNN"
    - "非監督式"
  exam_trap: true

