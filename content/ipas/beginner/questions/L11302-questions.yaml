- id: "L11302-Q29"
  topic_code: "L11302"
  item_code: "L11302"
  difficulty: 5
  question: "某醫院要開發一個癌症篩檢模型，管理者問：「在評估模型時，應該優先關注哪一個分類指標？」下列答案何者最合理？"
  options:
    a: "應優先關注準確率，因為總體答對比例最重要"
    b: "應優先關注召回率，因為漏掉真正的癌症病患代價非常高"
    c: "應優先關注精確率，避免任何模型說是陽性的誤報"
    d: "三個指標無差別，挑最容易計算的即可"
  correct: "b"
  explanation:
    why_correct: "癌症篩檢屬於「漏報代價極高」的情境：漏掉真病人（FN）攸關生死，因此應優先優化召回率（Recall），寧可多幾個虛驚複檢，也不能漏掉真病人。"
    why_not_a: "癌症資料通常極度不平衡，單看準確率會陷入準確率陷阱。"
    why_not_c: "精確率優先的情境是誤報代價高的場合（如垃圾郵件過濾），癌症篩檢不是。"
    why_not_d: "不同情境對錯誤類型的容忍度不同，不能「無差別」看待。"
  keywords:
    - "癌症篩檢"
    - "召回率"
  exam_trap: false

