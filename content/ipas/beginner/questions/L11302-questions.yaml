    - "類別不平衡"
  exam_trap: false

- id: "L11302-Q32"
  topic_code: "L11302"
  item_code: "L11302"
  difficulty: 5
  question: "某金融公司要預測申請人違約「機率高或低」，資料量中等、需要高度可解釋性，且需向監理機關解釋決策。下列何者為最合理的模型選擇方向？"
  options:
    a: "優先選擇大型深度學習模型，因為越複雜越準"
    b: "選擇決策樹、邏輯迴歸等可解釋性較高的傳統監督式學習模型"
    c: "使用非監督式分群直接決定是否核准"
    d: "使用強化式學習，讓系統試錯決定每個人的申請結果"
  correct: "b"
  explanation:
    why_correct: "金融信用評估重視可解釋性與審計，傳統監督式學習模型（如決策樹、邏輯迴歸）在解釋性上明顯優於深度學習黑盒子，且中等資料量下表現穩定。"
    why_not_a: "大型深度學習在小/中等結構化資料上未必更準，還會失去可解釋性。"
    why_not_c: "分群無類別標籤，無法提供「違約或不違約」的明確判斷依據。"
    why_not_d: "在真實申請案上用試錯方式決策會傷害客戶權益，不符合金融合規要求。"
  keywords:
    - "模型選擇"
    - "可解釋性"
  exam_trap: false

- id: "L11302-Q33"
  topic_code: "L11302"
  item_code: "L11302"
  difficulty: 5
  question: "某團隊要開發一個從中文翻譯到英文的機器翻譯系統，資料量極大。下列何者為最合理的技術方向？"
  options:
    a: "使用 Apriori 關聯規則演算法處理文字翻譯"
    b: "使用以 Transformer 為代表的深度學習架構"
    c: "使用 K-means 把句子分群後作為翻譯結果"
    d: "使用線性迴歸預測翻譯結果"
  correct: "b"
  explanation:
    why_correct: "現代機器翻譯系統主流以 Transformer 架構的深度學習模型為基礎，擅長處理序列資料且可吸收超大規模語料。"
    why_not_a: "Apriori 是用來找購物籃等關聯規則的非監督式演算法，與翻譯無關。"
    why_not_c: "K-means 是非監督式分群，不產生翻譯輸出。"
    why_not_d: "線性迴歸只能預測連續數值，完全不適合序列到序列的翻譯任務。"
  keywords:
    - "機器翻譯"
    - "Transformer"
  exam_trap: false

- id: "L11302-Q34"
  topic_code: "L11302"
  item_code: "L11302"
  difficulty: 5
  question: "某主管認為：「只要一個模型同時處理翻譯與摘要兩個任務，就叫做多模態學習。」對於這個說法，下列評估何者最合理？"
  options:
    a: "完全正確，多模態和多工是同一件事"
    b: "不正確，同一個模型做多個任務應稱為「多工學習」，多模態指的是輸入資料涵蓋多種型態（如文字、圖像、音訊）"
    c: "正確，因為翻譯與摘要本質上就是不同模態"
    d: "不正確，翻譯與摘要都屬於強化式學習"
  correct: "b"
  explanation:
    why_correct: "多模態定義的軸是「輸入資料型態」（文字、圖、音訊…），而同一模型做多個任務稱為「多工學習」。翻譯與摘要都是文字→文字任務，是多工而非多模態。"
    why_not_a: "兩者是不同概念，常被混淆，是典型陷阱。"
    why_not_c: "翻譯與摘要都屬於文字模態，並非不同模態。"
    why_not_d: "兩者都屬於監督式或自監督式文字任務，與強化式學習無直接關係。"
  keywords:
    - "多模態 vs 多工"
  exam_trap: true

- id: "L11302-Q35"
  topic_code: "L11302"
  item_code: "L11302"
  difficulty: 5
  question: "某公司想從電商評論資料中同時達成三個目標：(1) 把相似評論自動分群找出抱怨主題；(2) 訓練一個能判斷「好評 / 差評」的模型；(3) 讓客服 AI 透過與真實使用者互動試錯來優化回覆策略。下列學習典範組合何者最合理？"
  options:
    a: "全部使用監督式學習"
    b: "(1) 非監督式分群、(2) 監督式分類、(3) 強化式學習"
    c: "(1) 強化式學習、(2) 非監督式分群、(3) 監督式迴歸"
    d: "(1) 半監督式、(2) 多模態、(3) 降維"
  correct: "b"
  explanation:
    why_correct: "這題是典型的「多任務典範搭配」：找抱怨主題沒有事先類別 → 非監督式分群；判斷好評/差評有標籤 → 監督式分類；客服 AI 透過與使用者互動試錯優化 → 強化式學習，三者各自對應最合適的典範。"
    why_not_a: "任務(1)沒有類別標籤、任務(3)是試錯互動，都不是監督式的典型範圍。"
    why_not_c: "任務(1)與(3)的指派方向錯誤，且任務(2)不是迴歸（輸出為類別）。"
    why_not_d: "半監督、多模態、降維都與三個任務的本質不對應。"
  keywords:
    - "多情境典範選擇"
  exam_trap: false
