- id: "L11302-Q09"
  topic_code: "L11302"
  item_code: "L11302"
  difficulty: 2
  question: "下列關於「分類（Classification）」與「迴歸（Regression）」的敘述，何者正確？"
  options:
    a: "分類的輸出是連續數值；迴歸的輸出是離散類別"
    b: "分類的輸出是離散類別；迴歸的輸出是連續數值"
    c: "兩者都屬於非監督式學習的子任務"
    d: "兩者都只能使用決策樹演算法"
  correct: "b"
  explanation:
    why_correct: "監督式學習的兩大子任務：分類輸出是離散類別（如貓/狗、垃圾/非垃圾），迴歸輸出是連續數值（如房價、氣溫）。口訣是「離散→分類，連續→迴歸」。"
    why_not_a: "定義方向剛好相反。"
    why_not_c: "兩者都屬於監督式學習，不是非監督式。"
    why_not_d: "可用的演算法非常多，例如線性迴歸、SVM、神經網路、KNN 等，不限於決策樹。"
  keywords:
    - "分類"
    - "迴歸"
  exam_trap: false

