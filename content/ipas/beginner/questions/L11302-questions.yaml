- id: "L11302-Q31"
  topic_code: "L11302"
  item_code: "L11302"
  difficulty: 5
  question: "某詐騙偵測資料集中，99% 的交易是正常、1% 是詐騙。一個工程師訓練出的模型在測試集上拿到 99% 準確率。下列評論何者最合理？"
  options:
    a: "準確率 99% 非常高，可直接部署上線"
    b: "在極度類別不平衡的情境下，單看準確率可能騙人，必須同時參考精確率、召回率或 F1 才能判斷模型是否真的抓到詐騙"
    c: "準確率越高代表召回率一定也很高，沒問題"
    d: "只要拿 99% 準確率就代表模型完美"
  correct: "b"
  explanation:
    why_correct: "類別極度不平衡時（例如 99% vs 1%），一個「全部預測為正常」的無用模型也能拿到 99% 準確率，這就是準確率陷阱。必須再看精確率、召回率或 F1 才能判斷模型是否真的能辨識詐騙。"
    why_not_a: "直接部署會忽略模型可能根本沒抓到任何詐騙的風險。"
    why_not_c: "高準確率不保證高召回率，尤其在不平衡資料中更常相反。"
    why_not_d: "單一指標無法代表模型真實能力。"
  keywords:
