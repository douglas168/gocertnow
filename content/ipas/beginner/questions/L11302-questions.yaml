- id: "L11302-Q01"
  topic_code: "L11302"
  item_code: "L11302"
  difficulty: 1
  question: "下列關於「監督式學習（Supervised Learning）」所使用的資料，何者正確？"
  options:
    a: "完全沒有標籤的資料"
    b: "有輸入特徵且已標記正確答案的資料"
    c: "只有獎勵訊號、沒有具體答案的資料"
    d: "從資料本身自動產生假標籤的資料"
  correct: "b"
  explanation:
    why_correct: "監督式學習的核心特徵是訓練資料包含「輸入 → 正確輸出」的配對，也就是有標籤（labeled）資料，像老師在旁告訴模型每題的正確答案。"
    why_not_a: "完全沒有標籤的資料是「非監督式學習」使用的資料型態。"
    why_not_c: "只有獎勵訊號的是「強化式學習」，屬於試錯學習，不是監督式。"
    why_not_d: "從資料本身自動產生標籤是「自監督式學習」的做法，雖然看起來像有標籤，但不是人工標註。"
  keywords:
    - "監督式學習"
    - "標籤資料"
  exam_trap: false

- id: "L11302-Q02"
  topic_code: "L11302"
  item_code: "L11302"
  difficulty: 1
  question: "下列何者為「非監督式學習」最典型的任務？"
  options:
    a: "分類"
    b: "迴歸"
    c: "分群"
    d: "獎勵最大化"
  correct: "c"
  explanation:
    why_correct: "非監督式學習最常見的任務是「分群（Clustering）」與「降維」，其中分群是把相似資料自動歸到同一群，不需要事先有類別標籤。"
    why_not_a: "分類需要事先已知的類別標籤，是監督式學習的任務。"
    why_not_b: "迴歸用來預測連續數值，需要標籤，屬於監督式學習。"
    why_not_d: "獎勵最大化是強化式學習的目標，不是非監督式學習。"
  keywords:
    - "非監督式學習"
    - "分群"
  exam_trap: false

- id: "L11302-Q03"
  topic_code: "L11302"
  item_code: "L11302"
  difficulty: 1
  question: "強化式學習的五大要素中，下列何者代表「做決策的那個角色」？"
  options:
    a: "環境（Environment）"
    b: "狀態（State）"
    c: "智能體（Agent）"
    d: "獎勵（Reward）"
  correct: "c"
  explanation:
    why_correct: "智能體（Agent）是強化式學習中實際做決策與行動的主體，它會在環境中觀察狀態、選擇動作，並根據獎勵調整策略。"
    why_not_a: "環境是智能體所處的世界，而不是做決策的角色。"
    why_not_b: "狀態是智能體當下看到的情境資訊，不是行動者。"
    why_not_d: "獎勵是環境回饋給智能體的訊號，用來評估動作好壞，本身不是決策者。"
  keywords:
    - "強化式學習"
    - "智能體"
    - "五元素"
  exam_trap: false

- id: "L11302-Q04"
  topic_code: "L11302"
  item_code: "L11302"
  difficulty: 1
  question: "下列關於機器學習（ML）與深度學習（DL）關係的敘述，何者正確？"
  options:
    a: "ML 與 DL 是兩個互相獨立且不相關的技術"
    b: "DL 是 ML 的一種方法，屬於 ML 的子集"
    c: "ML 是 DL 的子集，DL 涵蓋所有 ML 技術"
    d: "ML 只處理結構化資料，DL 只屬於生成式 AI"
  correct: "b"
  explanation:
    why_correct: "深度學習是機器學習的一種方法（使用多層神經網路），屬於 ML 的子集，常見的層次關係為 AI ⊃ ML ⊃ DL。"
    why_not_a: "ML 與 DL 並非獨立技術，DL 本身就是 ML 的一種方法。"
    why_not_c: "方向相反：是 DL ⊂ ML，不是 ML ⊂ DL。"
    why_not_d: "ML 不限於結構化資料，DL 也用於許多非生成式任務（例如影像分類）。"
  keywords:
    - "ML"
    - "DL"
    - "層次關係"
  exam_trap: true

- id: "L11302-Q05"
  topic_code: "L11302"
  item_code: "L11302"
  difficulty: 1
  question: "下列何者為「多模態學習（Multimodal Learning）」的定義？"
  options:
    a: "同時使用多個不同演算法的機器學習方法"
    b: "一個模型同時處理文字、圖像、音訊等多種資料型態"
    c: "同一個模型同時解決多個不同任務（如翻譯與摘要）"
    d: "使用多台電腦進行分散式訓練的方法"
  correct: "b"
  explanation:
    why_correct: "多模態學習的核心定義是模型能同時處理多種不同型態（模態）的資料，例如文字＋圖像＋音訊，代表模型有 GPT-4V、Gemini、Claude 3 等。"
    why_not_a: "同時使用多個演算法通常稱為「集成學習」，與多模態無關。"
    why_not_c: "同一個模型做多個任務稱為「多工學習（Multitask）」，與多模態是不同概念，常被混淆。"
    why_not_d: "多電腦分散式訓練屬於訓練架構議題，與模態（資料型態）無關。"
  keywords:
    - "多模態學習"
    - "定義"
  exam_trap: true

- id: "L11302-Q06"
  topic_code: "L11302"
  item_code: "L11302"
  difficulty: 1
  question: "下列何者為「召回率（Recall）」直覺上在衡量的事？"
  options:
    a: "模型總體上答對幾成的比例"
    b: "模型「說是正」的案例中，真的是正的有幾成"
    c: "所有「實際為正」的案例中，模型成功抓到幾成"
    d: "模型預測值與實際值的平均誤差"
  correct: "c"
  explanation:
    why_correct: "召回率衡量的是「實際為正」的樣本中，模型成功抓到的比例，也就是「漏報有多嚴重」。"
    why_not_a: "總體答對比例是「準確率（Accuracy）」的意義。"
    why_not_b: "模型說是正裡真的是正的比例是「精確率（Precision）」，代表「誤報有多嚴重」。"
    why_not_d: "平均誤差是迴歸指標（如 MAE）的意義，與分類召回率無關。"
  keywords:
    - "召回率"
    - "分類指標"
  exam_trap: false

- id: "L11302-Q07"
  topic_code: "L11302"
  item_code: "L11302"
  difficulty: 1
  question: "下列哪一個深度學習架構最常被用來處理「影像」相關任務？"
  options:
    a: "CNN（卷積神經網路）"
    b: "RNN（循環神經網路）"
    c: "LSTM（長短期記憶）"
    d: "Apriori"
  correct: "a"
  explanation:
    why_correct: "CNN（卷積神經網路）擅長處理具有空間結構的資料，是影像分類、人臉辨識、醫療影像等電腦視覺任務的主流架構。"
    why_not_b: "RNN 專長是序列資料（文字、語音、時間序列），不是影像。"
    why_not_c: "LSTM 是 RNN 的進階版，同樣針對長序列資料設計，不是影像。"
    why_not_d: "Apriori 是非監督式學習中的「關聯規則」演算法，根本不是深度學習。"
  keywords:
    - "CNN"
    - "深度學習架構"
  exam_trap: false

