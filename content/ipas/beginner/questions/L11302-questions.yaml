    why_not_a: "垃圾郵件過濾用人工標記好的「垃圾 / 非垃圾」訓練資料，是監督式分類。"
    why_not_c: "顧客分群沒有事先類別，是非監督式學習中的分群任務。"
    why_not_d: "X 光腫瘤良惡性分類有醫師標註的標籤，屬於監督式分類。"
