- id: "L12201-Q37"
  topic_code: "L12201"
  item_code: "L12201"
  difficulty: 4
  question: "從 AI 工具市場競爭的角度分析，下列哪個趨勢最能解釋為何 GitHub Copilot 和 Cursor 都開始支援多種 AI 模型（如 GPT-4o、Claude、Gemini）而非綁定單一模型？"
  options:
    a: "各 AI 模型在不同任務上各有優劣，多模型支援讓使用者選擇最適模型"
    b: "綁定單一模型供應商會有議價劣勢，多模型是為了降低採購成本"
    c: "單一模型的授權費用太高，多模型可以降低成本"
    d: "多模型支援主要是為了避免供應商鎖定（vendor lock-in），與模型效能無關"
  correct: "a"
  explanation:
    why_correct: "像是工具箱裡放多把螺絲起子——不同 AI 模型在程式碼補全精準度、理解複雜需求、生成速度等方面各有優勢。多模型支援讓開發者根據任務特性選擇最適模型，提升整體體驗。實際評測數據也顯示不同模型在 SWE-Bench 等基準上表現各異。"
    why_not_b: "議價劣勢是次要因素。多模型支援的主因是不同模型的效能差異化——各模型在不同任務上各有強弱，並非單純的成本談判策略。"
    why_not_c: "多模型支援的主因是效能差異化，不是為了降低授權費。實際上支援多模型可能增加整合成本。"
    why_not_d: "避免 vendor lock-in 是附帶好處，但核心驅動力是模型效能差異。如果所有模型表現相同，多模型支援就沒有產品價值。"
  keywords:
    - "多模型支援"
    - "GitHub Copilot"
    - "Cursor"
    - "市場趨勢"
  exam_trap: false

