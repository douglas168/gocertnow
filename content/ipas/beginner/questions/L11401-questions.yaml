    why_not_a: "大型資料中心提供計算力是雲端部署（Cloud Deployment）的特點。"
    why_not_c: "邊緣部署不需要搭配雲端就能獨立運作，它的優勢之一正是離線也能使用。"
    why_not_d: "邊緣部署的優勢之一就是資料不需上傳至雲端，可在本地完成處理。"
