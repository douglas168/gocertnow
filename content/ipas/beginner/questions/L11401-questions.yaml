- id: "L11401-Q01"
  topic_code: "L11401"
  item_code: "L11401"
  difficulty: 1
  question: "鑑別式AI（Discriminative AI）的核心任務是什麼？"
  options:
    a: "生成全新的文字、圖像等內容"
    b: "對輸入資料進行分類或預測"
    c: "學習資料的整體分布並模擬"
    d: "自動標註未標記的訓練資料"
  correct: "b"
  explanation:
    why_correct: "鑑別式AI的核心任務是分類（classification）和預測（prediction），它學習決策邊界來區分不同類別，例如判斷一封郵件是垃圾郵件還是正常郵件。"
    why_not_a: "生成全新內容是生成式AI的任務，不是鑑別式AI。"
    why_not_c: "學習資料的整體分布是生成式AI的學習方式，鑑別式AI學習的是如何找到最佳的決策邊界來區分不同類別。"
    why_not_d: "自動標註資料是資料預處理或自監督式學習的範疇，不是鑑別式AI的核心任務。"
  keywords:
    - "鑑別式AI基本原理"
    - "discriminative AI"
  exam_trap: false

- id: "L11401-Q02"
  topic_code: "L11401"
  item_code: "L11401"
  difficulty: 1
  question: "下列哪一個模型屬於生成式AI（Generative AI）？"
  options:
    a: "支援向量機（SVM）"
    b: "邏輯回歸（Logistic Regression）"
    c: "生成對抗網路（GAN）"
    d: "隨機森林（Random Forest）"
  correct: "c"
  explanation:
    why_correct: "GAN（Generative Adversarial Network）是經典的生成式模型，名字第一個字 Generative 就表明了它的任務是「生成」新的資料（如圖像）。"
    why_not_a: "SVM 是鑑別式模型，用於分類和回歸任務，學習決策邊界而非生成新資料。這是考試常見陷阱。"
    why_not_b: "邏輯回歸是鑑別式模型，用於二元分類問題。"
    why_not_d: "隨機森林是鑑別式模型，屬於集成學習方法，用於分類和回歸。"
  keywords:
    - "生成式AI基本原理"
    - "GAN"
  exam_trap: true

