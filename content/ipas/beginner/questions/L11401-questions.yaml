    c: "鑑別式AI：生成商品圖片；生成式AI：商品分類與標籤"
    d: "鑑別式AI：翻譯商品描述為多國語言；生成式AI：計算商品推薦分數"
  correct: "b"
  explanation:
    why_correct: "情感分析和假評論偵測都是分類任務（正面/負面、真/假），屬於鑑別式AI。自動生成個人化行銷文案是生成新文字內容，屬於生成式AI。這組搭配正確。"
    why_not_a: "搞反了。自動撰寫商品描述是生成式AI的工作，推薦系統預測使用者偏好是鑑別式AI（或其他預測模型）的工作。"
    why_not_c: "搞反了。生成商品圖片是生成式AI的工作，商品分類是鑑別式AI的工作。"
    why_not_d: "翻譯商品描述涉及文字生成，較偏生成式AI。計算推薦分數是預測任務，較偏鑑別式AI。這組也搞反了。"
  keywords:
    - "鑑別式AI基本原理"
    - "生成式AI基本原理"
    - "模型目的與特性"
  exam_trap: false

- id: "L11401-Q28"
  topic_code: "L11401"
  item_code: "L11401"
  difficulty: 4
  question: "某企業將AI模型從開發環境部署到正式環境後，需要建立完整的效能管理機制。下列哪一組指標和措施的搭配最正確？"
  options:
    a: "監控延遲 + 監控吞吐量 + 監控資料漂移 + 設定異常告警"
    b: "只監控準確率，其他指標不重要"
    c: "只監控成本，效能指標在訓練階段已確認"
    d: "監控延遲 + 監控吞吐量，不需要考慮資料漂移"
  correct: "a"
  explanation:
    why_correct: "完整的效能管理需要多維度監控：延遲（使用者體驗）、吞吐量（系統負載能力）、資料漂移（模型持續適用性）、異常告警（及時發現問題）。缺少任何一個維度都可能導致問題被忽略。"
    why_not_b: "只監控準確率忽略了系統層面的效能問題（延遲、吞吐量）和模型退化問題（資料漂移）。準確率也可能因不平衡資料而產生誤導。"
    why_not_c: "成本很重要但不是唯一指標。訓練階段確認的效能不代表部署後永遠不變，資料漂移可能導致效能下降。"
    why_not_d: "忽略資料漂移是常見的管理盲區。模型部署後，真實世界資料會隨時間改變，不監控資料漂移可能導致模型效能悄悄退化。"
  keywords:
    - "效能管理"
    - "模型部署"
    - "data drift"
  exam_trap: false

- id: "L11401-Q29"
  topic_code: "L11401"
  item_code: "L11401"
  difficulty: 5
  question: "大學資訊社團想開發一個AI專案作為成果展示品。專案需求：(1) 辨識手寫數字（0-9）、(2) 能在沒有網路的展示場地運行、(3) 用最低成本完成。下列哪個方案最適合？"
  options:
    a: "使用大型語言模型做圖像辨識，租用雲端GPU"
    b: "使用輕量鑑別式模型（如決策樹），邊緣部署在筆電上"
    c: "使用GAN生成手寫數字再進行分類，內部部署在學校伺服器"
    d: "使用擴散模型做圖像辨識，混合架構部署"
  correct: "b"
  explanation:
    why_correct: "(1) 手寫數字辨識是典型的分類任務（判斷 0-9），輕量鑑別式模型即可勝任。(2) 沒有網路 → 不能用雲端，需要本地/邊緣部署。(3) 最低成本 → 輕量模型在筆電上就能運行，不需額外硬體或雲端費用。這是鑑別式AI + 邊緣部署的經典組合。"
    why_not_a: "大型語言模型不是做圖像分類的最佳選擇，且租用雲端GPU成本高，沒有網路時也無法使用。"
    why_not_c: "GAN是生成式模型，用來「生成」手寫數字而非「辨識」。且需要學校伺服器增加了複雜度和成本。題目問的是辨識，不是生成。"
    why_not_d: "擴散模型是生成式模型，不適合做分類任務。混合架構在無網路場地也不實用。"
  keywords:
    - "鑑別式AI基本原理"
    - "模型部署"
    - "模型目的與特性"
  exam_trap: false

- id: "L11401-Q30"
  topic_code: "L11401"
  item_code: "L11401"
  difficulty: 5
  question: "某AI團隊發現部署後的推薦系統有以下問題：(1) 平均回應時間從50ms升到500ms、(2) 推薦點擊率從15%降到8%、(3) GPU使用率長期維持在95%以上。下列哪一個分析最全面地涵蓋了所有問題的根本原因和解決方向？"
  options:
    a: "三個問題互不相關，分別處理延遲、模型品質和硬體即可"
    b: "GPU過載導致延遲飆升，延遲高導致使用者體驗差，同時資料漂移導致推薦品質下降，需要同時優化算力分配和更新模型"
    c: "只是GPU不夠用，加購GPU就能解決所有問題"
    d: "推薦品質下降是唯一的真正問題，解決後延遲和GPU問題會自動消失"
  correct: "b"
  explanation:
    why_correct: "(1) 回應延遲飆升10倍 + GPU使用率95%，說明系統算力不足導致延遲問題。(2) 推薦點擊率下降可能有兩個原因：延遲高導致使用者體驗差而減少互動，以及資料漂移導致推薦內容不再精準。正確的方案需要「同時」處理效能（算力分配）和模型品質（資料漂移）兩個維度。"
    why_not_a: "三個問題可能互相關聯：GPU過載導致延遲高，延遲高影響使用者體驗進而影響點擊率。不應孤立看待。"
    why_not_c: "只加GPU可以解決延遲問題，但推薦品質下降（點擊率從15%降到8%）可能是資料漂移造成的，單純加硬體無法解決模型層面的問題。"
    why_not_d: "推薦品質改善不會讓GPU使用率自動下降，延遲問題也不會因此消失。這三個問題需要多維度處理。"
  keywords:
    - "效能管理"
    - "模型部署"
    - "data drift"
    - "latency"
    - "throughput"
  exam_trap: false
