    why_not_a: "雖然有些進階方法會用生成式模型輔助（如生成瑕疵樣本擴增資料），但核心任務本身是「分類」，不是「生成」。"
    why_not_c: "瑕疵檢測不需要學習產品的整體外觀分布來生成新圖片，只需要能區分良品和瑕疵品即可。"
    why_not_d: "瑕疵檢測是有明確標籤的分類問題，不需要透過試錯學習。鑑別式AI完全適用。"
