- id: "L11401-Q04"
  topic_code: "L11401"
  item_code: "L11401"
  difficulty: 1
  question: "在效能管理中，「延遲（Latency）」指的是什麼？"
  options:
    a: "模型在單位時間內能處理的請求數量"
    b: "從輸入到模型開始回應所需的時間"
    c: "模型訓練所需的總計算成本"
    d: "模型的預測準確率"
  correct: "b"
  explanation:
    why_correct: "延遲（Latency）是指從使用者發送輸入到模型產出回應所經過的等待時間。不論是鑑別式或生成式AI，延遲越低，使用者體驗越好。"
    why_not_a: "單位時間內能處理的請求數量是「吞吐量（Throughput）」的定義。"
    why_not_c: "訓練的總計算成本是「成本（Cost）」中的預訓練成本，不是延遲。"
    why_not_d: "預測準確率是模型品質的指標，與延遲的概念完全不同。"
  keywords:
    - "效能管理"
    - "latency"
  exam_trap: false

