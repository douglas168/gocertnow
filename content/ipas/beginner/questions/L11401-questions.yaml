- id: "L11401-Q19"
  topic_code: "L11401"
  item_code: "L11401"
  difficulty: 3
  question: "鑑別式AI學習「決策邊界」而生成式AI學習「資料分布」。在實務上，這個差異如何影響兩者的資料需求？"
  options:
    a: "鑑別式AI需要的資料量遠大於生成式AI"
    b: "兩者的資料需求完全相同"
    c: "鑑別式AI需要有標註的資料來定義類別邊界；生成式AI可利用大量未標註資料學習分布"
    d: "生成式AI不需要任何資料，完全靠演算法自行產生"
  correct: "c"
  explanation:
    why_correct: "鑑別式AI需要知道每筆資料的「正確答案」（標籤）才能學習分類邊界，所以需要有標註資料。生成式AI的目標是學習資料的整體分布，可以利用海量未標註資料（如網路上的文章、圖片）進行訓練。"
    why_not_a: "資料「量」不是關鍵差異，關鍵差異在於資料是否需要「標註」。大型語言模型確實使用海量資料，但這是模型規模的問題，不是鑑別式vs生成式的本質區別。"
    why_not_b: "兩者的資料需求有本質差異：標註方式不同，這直接影響資料準備的成本和方式。"
    why_not_d: "生成式AI仍然需要大量資料來學習，只是不需要每筆資料都有人工標註。沒有資料就不可能學習。"
  keywords:
    - "鑑別式AI基本原理"
    - "生成式AI基本原理"
    - "模型目的與特性"
  exam_trap: false

- id: "L11401-Q20"
  topic_code: "L11401"
  item_code: "L11401"
  difficulty: 4
  question: "某公司已將AI客服模型部署到正式環境三個月，發現近期模型的回答品質明顯下降，但模型本身並未更新。下列哪個原因最可能解釋這個現象？"
  options:
    a: "模型發生過擬合（Overfitting）"
    b: "資料漂移（Data Drift）：真實世界的資料分布與訓練資料不同"
    c: "模型的延遲（Latency）變高了"
    d: "雲端部署的成本增加了"
  correct: "b"
  explanation:
    why_correct: "模型未更新但效能下降，最可能的原因是資料漂移（Data Drift）。使用者的提問方式、產品內容、市場趨勢等都可能隨時間改變，導致真實世界的輸入與當初訓練資料的分布不同，模型的適用性下降。"
    why_not_a: "過擬合是訓練階段的問題，而非部署後才出現的現象。如果模型部署時表現正常，後來才下降，不是過擬合。"
    why_not_c: "延遲變高會影響回應速度，但不會影響「回答品質」。題目描述的是品質問題。"
    why_not_d: "成本增加是營運層面的問題，不會直接導致模型回答品質下降。"
  keywords:
    - "效能管理"
    - "data drift"
  exam_trap: false

- id: "L11401-Q21"
  topic_code: "L11401"
  item_code: "L11401"
  difficulty: 2
  question: "以下四個模型中，哪一個與其他三個不屬於同一類別？"
  options:
    a: "GAN（生成對抗網路）"
    b: "VAE（變分自動編碼器）"
    c: "SVM（支援向量機）"
    d: "擴散模型（Diffusion Model）"
  correct: "c"
  explanation:
    why_correct: "GAN、VAE、擴散模型都是生成式模型，目的是生成新的資料。只有SVM是鑑別式模型，用於分類任務。SVM學習決策邊界來區分不同類別，不具備生成新資料的能力。"
    why_not_a: "GAN 是經典的生成式模型，與 VAE 和擴散模型同屬一類。"
    why_not_b: "VAE 是生成式模型，能學習資料的潛在分布並生成新樣本。"
    why_not_d: "擴散模型（如 Stable Diffusion）是生成式模型，用於高品質圖像生成。"
  keywords:
    - "鑑別式AI基本原理"
    - "生成式AI基本原理"
    - "SVM"
  exam_trap: true

- id: "L11401-Q22"
  topic_code: "L11401"
  item_code: "L11401"
  difficulty: 4
  question: "在模型效能管理中，「推理成本隨使用量持續增長」而「預訓練是單次成本」。這個差異對企業的部署決策有什麼影響？"
  options:
    a: "企業應把所有預算花在預訓練上，推理成本可以忽略"
    b: "使用量越大的應用，越需要關注推理效率和成本優化"
    c: "推理成本只在雲端部署時才需要考慮，邊緣部署不產生推理成本"
    d: "推理和預訓練成本相同，不影響決策"
  correct: "b"
  explanation:
    why_correct: "預訓練是一次性投入，而推理成本是每次使用都會產生的持續性支出。對於使用量大的應用，推理的累積成本可能遠超預訓練成本，因此需要特別關注推理效率和成本優化。"
    why_not_a: "忽略推理成本是危險的決策。對高流量應用而言，推理的累積成本可能遠超預訓練成本。"
    why_not_c: "邊緣部署雖然不需支付雲端費用，但仍有硬體折舊和電力成本。推理成本存在於所有部署環境，只是形式不同。"
    why_not_d: "兩者的成本結構完全不同：預訓練是固定的一次性成本，推理是按使用量計費的變動成本。"
  keywords:
    - "效能管理"
    - "模型部署"
    - "inference cost"
  exam_trap: false

