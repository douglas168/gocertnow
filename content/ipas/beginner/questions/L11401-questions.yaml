- id: "L11401-Q09"
  topic_code: "L11401"
  item_code: "L11401"
  difficulty: 2
  question: "「吞吐量（Throughput）」與「有效吞吐量（Goodput）」的差異為何？"
  options:
    a: "吞吐量衡量總產出量，有效吞吐量只計算成功完成的請求數"
    b: "吞吐量衡量原始輸出量，有效吞吐量還需在維持目標延遲下計算"
    c: "有效吞吐量只計算輸出的文字量，吞吐量計算所有類型的輸出"
    d: "吞吐量用於雲端部署，有效吞吐量用於邊緣部署"
  correct: "b"
  explanation:
    why_correct: "吞吐量是單位時間內模型輸出的 token 量（token/秒），而有效吞吐量（Goodput）是在維持目標延遲水準下，系統實際達成的有效吞吐量，比單純吞吐量更全面地反映系統效能。"
    why_not_a: "這個說法接近但不精確。有效吞吐量的關鍵不只是「成功完成」，而是在維持目標延遲品質的前提下計算，比單純計算成功請求數更嚴格。"
    why_not_c: "這不是兩者的區別。有效吞吐量的「有效」指的是符合延遲品質要求的輸出，不是指輸出類型的差異。"
    why_not_d: "兩個指標都可以用於任何部署環境，不限定特定部署方式。"
  keywords:
    - "效能管理"
    - "throughput"
    - "goodput"
  exam_trap: false

