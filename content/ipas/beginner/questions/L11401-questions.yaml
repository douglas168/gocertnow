- id: "L11401-Q26"
  topic_code: "L11401"
  item_code: "L11401"
  difficulty: 5
  question: "一家跨國銀行要建立AI反洗錢系統，面臨以下限制：(A) 可疑交易佔比僅0.001%、(B) 各國法規要求伺服器必須實體設置於該國境內、(C) 必須在交易發生後3秒內做出判斷。下列方案何者最能同時滿足這三項限制？"
  options:
    a: "使用高精確率（Precision）的鑑別式模型，純雲端部署，集中管理所有國家的資料"
    b: "使用高召回率（Recall）的鑑別式模型，各國內部部署，確保即時判斷"
    c: "使用生成式AI直接判斷交易是否可疑，邊緣部署在ATM上"
    d: "使用高準確率（Accuracy）的鑑別式模型，混合架構部署"
  correct: "b"
  explanation:
    why_correct: "(A) 極端不平衡且漏掉可疑交易代價極高 → 優先召回率（Recall）；(B) 伺服器必須在該國境內 → 各國分別內部部署（On-Premise）；(C) 3秒內判斷 → 本地部署可確保低延遲。三項限制都被滿足。"
    why_not_a: "精確率在此場景不是首要指標（漏掉洗錢比誤報更嚴重），且純雲端集中管理違反跨境資料傳輸限制。"
    why_not_c: "反洗錢是分類任務（可疑 vs 正常），不是生成任務。用生成式AI做二元判斷不是正確的技術選擇。ATM邊緣部署也不適合此場景。"
    why_not_d: "在極端不平衡資料（0.001%）中，準確率（Accuracy）是最具誤導性的指標。把所有交易都判為正常，準確率也有99.999%。混合架構涉及雲端可能違反跨境限制。"
  keywords:
    - "技術測試與驗證"
    - "模型部署"
    - "效能管理"
    - "recall"
  exam_trap: true

- id: "L11401-Q27"
  topic_code: "L11401"
  item_code: "L11401"
  difficulty: 3
  question: "某電商平台同時使用了鑑別式AI和生成式AI。下列哪一組搭配最正確地描述了這兩種AI在電商場景中各自的角色？"
  options:
    a: "鑑別式AI：自動撰寫商品描述；生成式AI：推薦系統預測使用者偏好"
