- id: "L11401-Q14"
  topic_code: "L11401"
  item_code: "L11401"
  difficulty: 3
  question: "一家醫院要建立AI系統來篩檢罕見疾病，陽性案例僅佔所有案例的0.1%。在選擇模型評估指標時，下列何者最適合？"
  options:
    a: "準確率（Accuracy），因為它是最全面的指標"
    b: "精確率（Precision），因為要確保診斷結果不會誤報"
    c: "召回率（Recall），因為不能漏掉真正的患者"
    d: "F1 分數（F1 Score），因為它平衡了所有指標"
  correct: "c"
  explanation:
    why_correct: "在極端不平衡資料且漏掉陽性案例代價極高的場景（如醫療篩檢），應優先使用召回率（Recall）。召回率衡量的是「實際陽性中被正確找出的比例」，確保不會漏診。"
    why_not_a: "準確率在極端不平衡資料中會誤導。如果模型把所有案例都預測為陰性，準確率仍有99.9%，但完全漏掉所有患者。"
    why_not_b: "精確率關注的是「預測為陽性中真正是陽性的比例」，適合誤報成本高的場景。但醫療篩檢中，漏診比誤報更嚴重。"
    why_not_d: "F1 分數是精確率和召回率的調和平均，適合需要同時兼顧兩者的場景。但醫療篩檢中漏診的代價遠高於誤報，召回率明顯比精確率重要，用 F1 反而會「拉低」對召回率的重視。"
  keywords:
    - "技術測試與驗證"
    - "recall"
  exam_trap: true

- id: "L11401-Q15"
  topic_code: "L11401"
  item_code: "L11401"
  difficulty: 3
  question: "一家新創公司開發了語音助理AI產品，需要在使用者的智慧手機上即時回應語音指令。下列哪種部署方式最適合？"
  options:
    a: "純雲端部署，將所有語音資料上傳至雲端處理"
    b: "邊緣部署，讓模型直接在手機上運行以降低延遲"
    c: "內部部署，在公司機房架設專用伺服器"
    d: "混合架構，雲端負責語音辨識，手機只做播放"
  correct: "b"
  explanation:
    why_correct: "智慧手機上的即時語音助理需要低延遲回應，邊緣部署讓模型直接在手機端運行，不需要等待網路傳輸，且使用者的語音資料不需離開裝置，兼顧效能和隱私。"
    why_not_a: "純雲端部署需要將語音資料上傳到雲端再等回應，會增加延遲，且在網路不穩定時無法正常運作。"
    why_not_c: "內部部署是在企業自有機房運行，不適合面向消費者的手機應用場景。"
    why_not_d: "混合架構仍需將語音資料上傳雲端處理，在網路不穩定時會影響即時回應。且題目要求「即時回應」，邊緣部署在本地處理更能確保低延遲。"
  keywords:
    - "模型部署"
    - "edge deployment"
  exam_trap: false

- id: "L11401-Q16"
  topic_code: "L11401"
  item_code: "L11401"
  difficulty: 3
  question: "學長在準備行銷企劃時，想用AI工具自動產出不同風格的廣告文案供團隊挑選。這個需求最適合使用哪一類AI技術？"
  options:
    a: "鑑別式AI，因為要判斷哪個文案品質較好"
    b: "生成式AI，因為需要創作全新的文案內容"
    c: "鑑別式AI，因為要分析過去廣告的點擊率"
    d: "強化學習，因為要透過使用者反饋不斷優化"
  correct: "b"
  explanation:
    why_correct: "自動產出不同風格的廣告文案是「生成新內容」的任務，正是生成式AI的核心能力。像 ChatGPT、Claude 等工具就能根據指定風格產出多版文案。"
    why_not_a: "判斷文案品質確實是鑑別式AI的任務，但題目問的是「產出文案」，不是「評判文案」。"
    why_not_c: "分析過去的點擊率是數據分析任務，但題目的需求是「自動產出新文案」。"
    why_not_d: "雖然強化學習可以用於優化文案效果，但題目的核心需求是「生成文案」，最直接的解法是生成式AI。"
  keywords:
    - "生成式AI基本原理"
    - "模型目的與特性"
  exam_trap: false

- id: "L11401-Q17"
  topic_code: "L11401"
  item_code: "L11401"
  difficulty: 3
  question: "某金融機構希望建立信用卡詐欺偵測系統，詐欺交易佔比不到0.01%。訓練模型時，發現模型在訓練資料上表現極佳但在新資料上表現差。這最可能是什麼問題？"
  options:
    a: "欠擬合（Underfitting），模型太簡單"
    b: "過擬合（Overfitting），模型太複雜"
    c: "資料漂移（Data Drift），資料分布改變了"
    d: "延遲過高（High Latency），推論速度太慢"
  correct: "b"
  explanation:
    why_correct: "「訓練資料上表現極佳但新資料上表現差」是過擬合（Overfitting）的典型症狀。模型過度學習了訓練資料的細節和雜訊，導致無法泛化到新資料。這與偏差-變異權衡（Bias-Variance Tradeoff）有關。"
    why_not_a: "欠擬合的症狀是模型在訓練資料和新資料上都表現不好，因為模型太簡單無法捕捉資料的規律。"
    why_not_c: "資料漂移是指模型部署後真實世界資料的分布發生改變。題目描述的是訓練階段的問題，不是部署後的問題。"
    why_not_d: "延遲是效能問題，不會影響模型的預測準確度。"
  keywords:
    - "技術測試與驗證"
    - "overfitting"
  exam_trap: false

- id: "L11401-Q18"
  topic_code: "L11401"
  item_code: "L11401"
  difficulty: 3
  question: "某企業因為產業法規要求客戶資料不得離開國境，但同時需要大量GPU算力來訓練模型。下列哪種部署策略最適合？"
  options:
    a: "全部使用公有雲部署，選擇國內的雲端區域"
    b: "內部部署（On-Premise），自行建置GPU伺服器"
    c: "混合架構，用本地處理敏感資料，雲端提供額外算力"
    d: "全部使用邊緣部署，在終端裝置上訓練"
  correct: "b"
  explanation:
    why_correct: "當法規嚴格要求客戶資料不得離開國境時，內部部署（在企業自有機房內自建 GPU 伺服器）是最直接的合規方案，確保資料完全在本地處理。雖然初期投資高，但合規需求是第一優先。"
    why_not_a: "即使選擇國內雲端區域，資料仍在第三方平台上，可能不符合某些嚴格的資料主權法規。"
    why_not_c: "混合架構涉及將資料或模型在雲端與本地之間傳輸。當法規嚴格要求資料不得離開國境時，任何雲端元件都可能增加合規風險，不如純內部部署安全。"
    why_not_d: "邊緣裝置的算力有限，不適合需要大量GPU的模型訓練任務。"
  keywords:
