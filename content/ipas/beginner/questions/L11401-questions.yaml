- id: "L11401-Q07"
  topic_code: "L11401"
  item_code: "L11401"
  difficulty: 2
  question: "關於鑑別式AI和生成式AI的學習方式，下列敘述何者正確？"
  options:
    a: "兩者都必須使用有標註的資料進行訓練"
    b: "鑑別式AI通常需要有標註資料，生成式AI可以使用未標註資料"
    c: "生成式AI必須使用有標註資料，鑑別式AI可以使用未標註資料"
    d: "兩者都只能使用未標註資料"
  correct: "b"
  explanation:
    why_correct: "鑑別式AI主要採用監督式學習，需要有標註的（labeled）資料來學習分類邊界。生成式AI可使用非監督式學習，利用大量未標註資料學習資料分布。"
    why_not_a: "生成式AI的一大優勢是可以利用未標註資料訓練，不需要每筆資料都有正確答案。"
    why_not_c: "選項 C 把兩者的資料需求完全搞反了。鑑別式AI才是較依賴有標註資料的一方。"
    why_not_d: "鑑別式AI通常需要有標註資料，並非兩者都只能用未標註資料。"
  keywords:
    - "鑑別式AI基本原理"
    - "生成式AI基本原理"
  exam_trap: false

- id: "L11401-Q08"
  topic_code: "L11401"
  item_code: "L11401"
  difficulty: 2
  question: "關於模型部署方式，下列哪個敘述最能描述「雲端部署（Cloud Deployment）」的特點？"
  options:
    a: "適合延遲要求極低、資料不能離開本地的場景"
    b: "計算力強大且可擴展，但可能有較高延遲和資料離場風險"
    c: "初期投資極低，但長期維護成本最高"
    d: "只適合小型模型，無法處理大型語言模型"
  correct: "b"
  explanation:
    why_correct: "雲端部署的優勢是強大的計算力和高度可擴展性，適合大型模型訓練和計算密集任務。但缺點是延遲較高（資料需往返雲端）且資料會離開本地。"
    why_not_a: "延遲極低且資料不離場是邊緣部署（Edge）或內部部署（On-Premise）的特點，不是雲端的優勢。"
    why_not_c: "雲端部署通常是「初期投資低、按使用量付費」的模式，選項的描述不準確。內部部署才是初期投資高。"
    why_not_d: "雲端恰恰是最適合運行大型語言模型的環境，因為它提供強大的GPU/TPU資源。"
