    why_not_a: "PoC 的精神正好相反：先小規模測試，確認可行後才考慮正式部署，不是直接上線。"
    why_not_c: "PoC 的目的是驗證技術可行性，不是取代所有人工作業。AI 導入通常是輔助而非完全取代。"
    why_not_d: "PoC 是概念驗證階段，通常還不是完整的最終產品，重點在驗證核心假設是否成立。"
