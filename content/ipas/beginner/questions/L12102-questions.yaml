- id: "L12102-Q37"
  topic_code: "L12102"
  item_code: "L12102"
  difficulty: 3
  question: "某企業導入 LCNC 後，公民開發者數量從 10 人快速成長至 80 人，各部門紛紛自建應用。主管認為「公民開發者越多代表數位轉型越成功」。此觀點的最大問題是？"
  options:
    a: "公民開發者數量確實是數位轉型成功的最佳指標，此觀點正確"
    b: "公民開發者只應在 IT 部門全程監督下操作，不應有自主開發權限"
    c: "公民開發者不應超過 IT 部門人數，否則會導致 IT 部門失去存在價值"
    d: "公民開發者增加的同時若缺乏治理框架，會導致 Shadow IT 風險倍增、資料孤島與技術債失控"
  correct: "d"
  explanation:
    why_correct: "「公民開發者越多越好」是常見考試陷阱。數量成長若缺乏配套的治理框架（核准工具清單、資安審查流程、應用資產盤點），就會從「賦能」變成「失控」——80 人各自建置的應用形成 Shadow IT 叢林，資料分散在不同平台成為孤島，技術債快速累積。正確觀點是「數量 + 治理並重」。"
    why_not_a: "數量只是表面指標。沒有治理框架的公民開發者成長，可能帶來的風險大於效益。數位轉型成功應看業務價值產出而非開發者人數。"
    why_not_b: "全程監督違背公民開發者的核心價值——讓非 IT 人員自主解決標準化需求。正確做法是建立框架後授權自主，而非逐一監督。"
    why_not_c: "公民開發者與 IT 部門不是對立關係。Gartner 預測 80% LCNC 使用者來自非 IT 部門，IT 的角色是治理與賦能，不是限制人數。"
  keywords:
    - "公民開發者治理"
    - "Shadow IT"
    - "考試陷阱"
  exam_trap: true

- id: "L12102-Q38"
  topic_code: "L12102"
  item_code: "L12102"
  difficulty: 4
  question: "某企業因 Vendor Lock-in 問題想從 A 平台遷移至 B 平台。CFO 估算遷移成本為 NT$500 萬，主張「Vendor Lock-in 就是一個成本問題，只要遷移成本可接受就能解決」。此觀點忽略了什麼？"
  options:
    a: "CFO 的分析完全正確，Vendor Lock-in 本質上就是成本問題"
    b: "解決 Vendor Lock-in 的唯一方法是回歸傳統程式碼開發，不應遷移至另一個 LCNC 平台"
    c: "Vendor Lock-in 只影響技術層面，與財務無關，所以 CFO 不應介入此決策"
    d: "Vendor Lock-in 除了直接遷移成本外，還包含資料格式不相容導致的資料遺失風險、遷移期間的服務中斷、員工重新學習新平台的時間成本，以及新平台可能產生新的 Lock-in"
  correct: "d"
  explanation:
    why_correct: "「Vendor Lock-in 只影響成本」是常見考試陷阱。Lock-in 的影響是多維度的：(1) 直接遷移成本（CFO 已考慮）；(2) 資料遺失風險（格式不相容）；(3) 服務中斷（遷移期間的業務影響）；(4) 隱性成本（員工重新學習）；(5) 新的 Lock-in 風險（從 A 鎖定換成 B 鎖定）。只看金額是嚴重低估。"
    why_not_a: "成本只是 Vendor Lock-in 影響的一個面向。忽略資料風險、服務中斷、學習成本等隱性影響，會導致決策失誤。"
    why_not_b: "傳統開發不是唯一解法。可以透過選擇支援資料匯出的平台、採用開放標準 API、建立抽象層等策略來降低 Lock-in 風險，不必完全放棄 LCNC。"
    why_not_c: "Vendor Lock-in 確實影響財務（遷移成本、授權費），CFO 應該參與但不應只看成本面。此選項過度排斥財務視角。"
  keywords:
    - "Vendor Lock-in"
    - "遷移成本"
    - "考試陷阱"
  exam_trap: true
