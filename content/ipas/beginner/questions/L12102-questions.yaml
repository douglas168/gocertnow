  question: "台灣企業近年加速採用 No Code/Low Code 開發方式，下列哪個原因最為關鍵？"
  options:
    a: "LCNC 可加速 MVP 驗證，讓新產品更快進入市場測試"
    b: "43% 企業領導者認為數位轉型最大障礙是技術人才不足，LCNC 可降低開發門檻"
    c: "LCNC 可縮短 IT backlog，讓內部需求不必排隊等待開發資源"
    d: "LCNC 可降低軟體外包成本，減少對外部廠商的依賴"
  correct: "b"
  explanation:
    why_correct: "根據數位時代報導，43% 企業領導者認為數位轉型最大障礙是技術人才不足。因果鏈：人才不足 → IT backlog 與外包成本上升 → LCNC 讓業務端先解決標準化需求，是最根本的驅動力。其他選項是人才不足的下游效果，不是根因。"
    why_not_a: "加速 MVP 驗證是 LCNC 的效果之一，但不是台灣企業採用的根本原因。根因是人才不足導致企業被迫尋找替代方案。"
    why_not_c: "縮短 IT backlog 確實是 LCNC 的好處，但 backlog 本身是人才不足的結果，不是採用 LCNC 的根本驅動力。"
    why_not_d: "降低外包成本是 LCNC 帶來的間接效益，但企業之所以依賴外包，根因還是內部技術人才不足。"
