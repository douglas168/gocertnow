- id: "L12102-Q05"
  topic_code: "L12102"
  item_code: "L12102"
  difficulty: 1
  question: "「影子 IT（Shadow IT）」在 No Code/Low Code 應用情境中是指什麼現象？"
  options:
    a: "IT 部門在未獲得管理層授權下自行採購雲端服務"
    b: "駭客利用 LCNC 平台漏洞入侵企業內部系統"
    c: "非 IT 部門自行使用 LCNC 工具建置系統，但缺乏 IT 部門的監管與治理"
    d: "企業刻意隱藏 IT 支出以規避預算審查"
  correct: "c"
  explanation:
    why_correct: "Shadow IT 是指非 IT 部門的員工自行使用工具（包括 LCNC 平台）建置應用，繞過 IT 部門的治理流程，導致安全與合規風險。"
    why_not_a: "IT 部門自行採購是另一種治理問題，但不是 Shadow IT 的典型定義。Shadow IT 強調的是非 IT 部門的自主行為。"
    why_not_b: "駭客入侵屬於資安攻擊（Security Breach），不是 Shadow IT 的概念。"
    why_not_d: "隱藏 IT 支出是財務管理問題，與 Shadow IT 的技術治理概念無關。"
  keywords:
    - "Shadow IT"
    - "影子IT"
    - "治理風險"
  exam_trap: false

- id: "L12102-Q06"
  topic_code: "L12102"
  item_code: "L12102"
  difficulty: 1
  question: "下列何者不是 No Code/Low Code 的核心優勢？"
  options:
    a: "加速應用程式開發速度，縮短上線時程"
    b: "保證應用程式具備企業級的高併發擴展能力"
    c: "降低 IT 人才短缺對企業數位轉型的衝擊"
    d: "讓業務部門直接參與應用開發，減少跨部門溝通成本"
  correct: "b"
  explanation:
    why_correct: "擴展性瓶頸恰恰是 LCNC 的主要限制之一。考生容易把「快速開發」誤解為「什麼都能做」，但 LCNC 在高併發、複雜邏輯場景力不從心，無法保證企業級擴展能力。看到「保證」二字要警覺。"
    why_not_a: "加速開發速度是 LCNC 最被認可的核心優勢，Forrester 研究顯示可比傳統開發快約 20 倍。注意選項說「加速」而非「保證最快」，措辭合理。"
    why_not_c: "台灣 43% 企業領導者認為數位轉型最大障礙是技術人才不足，LCNC 降低開發門檻，正是解決人才短缺的關鍵優勢。"
    why_not_d: "業務部門直接參與開發（公民開發者模式）減少了需求傳達的來回溝通成本，是 LCNC 賦能的重要面向。"
  keywords:
    - "LCNC優勢"
    - "擴展性瓶頸"
    - "限制"
  exam_trap: true

