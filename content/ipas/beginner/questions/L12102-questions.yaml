- id: "L12102-Q12"
  topic_code: "L12102"
  item_code: "L12102"
  difficulty: 2
  question: "下列哪個選項最能說明「技術債（Technical Debt）」在 LCNC 開發中的意義？"
  options:
    a: "為了快速上線而犧牲程式品質，後續需要花費更多成本重構或修復"
    b: "LCNC 開發的應用程式比傳統開發消耗更多雲端運算資源"
    c: "使用 LCNC 平台需要支付的授權費用"
    d: "企業購買 LCNC 平台後尚未攤提完的固定資產折舊"
  correct: "a"
  explanation:
    why_correct: "技術債是指為了快速交付（如 MVP 上線）而在架構或程式品質上走捷徑，導致後續需要投入更多時間與成本來重構或修復。LCNC 因快速開發特性，特別容易累積技術債。"
    why_not_b: "雲端運算資源消耗是效能議題，與技術債的「品質欠帳」概念不同。"
    why_not_c: "授權費用是直接的營運支出（OpEx），不是技術債的概念。技術債是隱性的品質成本。"
    why_not_d: "固定資產折舊是會計概念，與軟體開發中的技術債完全無關。"
  keywords:
