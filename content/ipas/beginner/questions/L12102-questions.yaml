  explanation:
    why_correct: "三種方式各有適用場景：No Code 門檻最低、速度最快，適合標準化需求；Low Code 兼顧速度與彈性，適合需要少量客製的場景；傳統開發彈性最高、效能最好，適合複雜核心系統。選擇的關鍵在於「場景需求」而非「工具優劣」。"
    why_not_a: "No Code 雖不需寫程式碼，但仍需要邏輯思維與對工具的理解能力，並非「完全不需要任何技術知識」。此為常見誤解。"
    why_not_b: "三者的開發速度差異極大。Forrester 研究顯示 LCNC 可比傳統開發快約 20 倍，這是 LCNC 的核心優勢之一。"
    why_not_c: "Low Code 和 No Code 是不同定位的工具，並非上下位關係。某些 No Code 平台（如 Bubble）在特定場景的易用性反而優於 Low Code 平台。"
  keywords:
    - "No Code"
    - "Low Code"
    - "傳統開發"
    - "場景比較"
  exam_trap: false

- id: "L12102-Q36"
  topic_code: "L12102"
  item_code: "L12102"
  difficulty: 3
  question: "某企業有三個待開發專案：(甲) 內部請假申請表單自動化、(乙) 需符合資安稽核的供應商管理系統、(丙) 每秒處理 5,000 筆交易的支付核心系統。套用「安全選 Low、簡單選 No、核心系統選 Traditional」框架，下列配對何者最正確？"
  options:
    a: "甲 No Code、乙 Low Code、丙 Traditional"
    b: "甲 Low Code、乙 Traditional、丙 No Code"
    c: "甲 No Code、乙 No Code、丙 Low Code"
    d: "甲 Low Code、乙 Low Code、丙 Traditional"
  correct: "a"
  explanation:
    why_correct: "逐一套用框架：甲（請假表單）= 標準化流程、無特殊約束 → 「簡單選 No」；乙（供應商管理+資安稽核）= 有安全合規約束 → 「安全選 Low」；丙（5,000 TPS 支付系統）= 高效能核心系統 → 「核心系統選 Traditional」。三條規則剛好各對應一個專案。"
    why_not_b: "完全錯配：請假表單不需要 Low Code 的複雜度、供應商管理不需要從零傳統開發、支付系統用 No Code 無法處理高併發。"
    why_not_c: "乙有資安稽核需求，No Code 在合規控制上能力不足；丙的高併發需求超出 Low Code 的擴展性上限。"
    why_not_d: "甲用 Low Code 是過度設計——簡單的請假表單用 No Code 即可，不需要程式碼擴展能力。浪費開發資源。"
  keywords:
    - "場景選擇框架"
    - "安全選Low"
    - "簡單選No"
    - "核心選Traditional"
