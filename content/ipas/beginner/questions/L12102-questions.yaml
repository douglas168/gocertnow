- id: "L12102-Q10"
  topic_code: "L12102"
  item_code: "L12102"
  difficulty: 2
  question: "下列關於 No Code/Low Code 平台限制的敘述，何者正確？"
  options:
    a: "LCNC 平台支援 API 串接，但在處理多層巢狀條件邏輯時能力與傳統程式碼相當"
    b: "LCNC 平台因內建安全機制，比自行開發更不容易產生資安漏洞"
    c: "LCNC 平台的主要限制包括供應商鎖定、影子 IT 風險、擴展性瓶頸與技術債"
    d: "LCNC 平台可建置面向客戶的應用，且效能表現在高併發場景下與傳統開發相當"
  correct: "c"
  explanation:
    why_correct: "LCNC 的四大核心風險為：Vendor Lock-in（供應商鎖定）、Shadow IT（影子 IT）、擴展性瓶頸（複雜邏輯與高併發場景力不從心）、以及技術債（MVP 快速上線後缺乏重構）。"
    why_not_a: "LCNC 平台確實支援 API 串接，但在處理多層巢狀條件等複雜邏輯時能力明顯弱於傳統程式碼，這正是其限制之一。"
    why_not_b: "LCNC 內建安全機制是優點，但 Shadow IT 風險反而可能降低整體安全治理水準——非 IT 人員繞過監管建置系統，內建機制無法彌補治理缺失。"
    why_not_d: "LCNC 確實可以建置面向客戶的應用（如 Bubble），但在高併發場景下效能明顯不如傳統開發，擴展性瓶頸是其核心限制。"
  keywords:
    - "四大風險"
    - "LCNC限制"
    - "Vendor Lock-in"
  exam_trap: false

