  item_code: "L12102"
  difficulty: 2
  question: "「公民開發者（Citizen Developer）」與「影子 IT（Shadow IT）」都涉及非 IT 人員自行建置系統。下列關於兩者差異的敘述，何者正確？"
  options:
    a: "兩者本質相同，只是名稱不同"
    b: "公民開發者是在 IT 部門核可的治理框架下開發，Shadow IT 則是未經核可的自主行為"
    c: "公民開發者使用 No Code 工具，Shadow IT 使用 Low Code 工具"
    d: "公民開發者只存在於大企業，Shadow IT 只存在於中小企業"
  correct: "b"
  explanation:
    why_correct: "兩者的關鍵差異在於「是否經過 IT 部門核可」。公民開發者在企業核可的工具清單與治理框架下自主開發（核可），Shadow IT 則是繞過 IT 監管的自行建置（未核可）。記住：核可 = Citizen Dev，未核可 = Shadow IT。"
    why_not_a: "兩者本質不同。公民開發者是受鼓勵的正式角色，Shadow IT 是需要管控的風險行為。差異在於有無治理框架。"
    why_not_c: "兩者的差異不在於使用的工具類型，而在於是否經過 IT 治理流程。公民開發者和 Shadow IT 都可能使用 No Code 或 Low Code 工具。"
    why_not_d: "兩者不分企業大小。大企業同樣有 Shadow IT 問題（甚至更嚴重），中小企業也可以建立公民開發者制度。"
  keywords:
    - "Citizen Developer"
    - "Shadow IT"
    - "IT治理"
  exam_trap: false

