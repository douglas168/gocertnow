- id: "L12102-Q19"
  topic_code: "L12102"
  item_code: "L12102"
  difficulty: 4
  question: "比較 Vendor Lock-in 與 Shadow IT 兩大 LCNC 風險，下列分析何者最正確？"
  options:
    a: "Vendor Lock-in 是組織治理問題，Shadow IT 是技術架構問題"
    b: "兩者本質相同，都是因為使用 LCNC 平台而產生的安全漏洞"
    c: "Vendor Lock-in 是技術遷移困難，Shadow IT 是組織治理缺失，兩者性質不同但可能同時存在"
    d: "Vendor Lock-in 只影響大企業，Shadow IT 只影響中小企業"
  correct: "c"
  explanation:
    why_correct: "Vendor Lock-in 本質是技術層面的問題（無法匯出原始碼、遷移等於重寫），Shadow IT 本質是組織治理問題（非 IT 部門繞過監管自建系統）。兩者可以同時發生——例如非 IT 部門自建的系統（Shadow IT）又被鎖定在特定平台上（Vendor Lock-in）。"
    why_not_a: "選項顛倒了兩者的性質。Vendor Lock-in 是技術遷移問題，Shadow IT 才是組織治理問題。"
    why_not_b: "兩者性質完全不同，Vendor Lock-in 關於技術遷移，Shadow IT 關於組織治理，不應混為一談。"
    why_not_d: "兩種風險不分企業大小，大企業同樣有 Shadow IT 問題，中小企業也會遇到 Vendor Lock-in。"
  keywords:
    - "Vendor Lock-in"
    - "Shadow IT"
    - "風險比較"
  exam_trap: true

