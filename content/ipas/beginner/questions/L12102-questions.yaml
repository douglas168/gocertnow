- id: "L12102-Q02"
  topic_code: "L12102"
  item_code: "L12102"
  difficulty: 1
  question: "No Code/Low Code 平台最常被提及的核心優勢之一，是相較傳統開發方式可提升多少倍的開發速度？"
  options:
    a: "約 5 倍"
    b: "約 20 倍"
    c: "約 50 倍"
    d: "約 100 倍"
  correct: "b"
  explanation:
    why_correct: "根據 Forrester 研究，No Code/Low Code 開發方式比傳統開發方式快約 20 倍，且 95% 的領導者認為速度更快。考場遇到速度倍數題，20 倍是 Forrester 權威數據；50/100 倍多半是誇大陷阱。"
    why_not_a: "5 倍低估了 LCNC 的開發效率提升幅度，Forrester 的研究數據顯示約為 20 倍。"
    why_not_c: "50 倍過度誇大了效率提升幅度，目前無權威研究支持此數字。"
    why_not_d: "100 倍遠超任何主流研究機構的估計，不切實際。"
  keywords:
    - "Forrester"
    - "開發速度"
    - "效率提升"
  exam_trap: false

- id: "L12102-Q03"
  topic_code: "L12102"
  item_code: "L12102"
  difficulty: 1
  question: "在 No Code/Low Code 的風險討論中，「供應商鎖定（Vendor Lock-in）」是指什麼？"
  options:
    a: "平台供應商限制使用者帳號數量，導致無法擴充團隊"
    b: "使用者無法將應用與資料遷移至其他平台，因為無法匯出原始碼"
    c: "供應商要求簽訂長期合約，不允許中途解約"
    d: "平台僅支援單一瀏覽器，限制了終端使用者的存取方式"
  correct: "b"
  explanation:
    why_correct: "Vendor Lock-in 的核心問題在於 No Code/Low Code 平台通常不支援匯出原始碼，一旦決定遷移，等同於要從零重寫整個應用。"
    why_not_a: "帳號數量限制是授權方案（licensing）的問題，與 Vendor Lock-in 的概念無關。"
    why_not_c: "合約條款是商業談判的問題。Vendor Lock-in 指的是技術上的遷移困難，即使合約到期仍然存在。"
    why_not_d: "瀏覽器相容性是前端技術問題，與供應商鎖定的概念完全不同。"
  keywords:
    - "Vendor Lock-in"
    - "供應商鎖定"
    - "平台遷移"
  exam_trap: false

