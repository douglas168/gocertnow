    why_not_b: "No Code 在資安客製化上能力有限，醫療業的個資法規要求（如加密存儲、存取日誌）通常需要程式碼層級的控制，No Code 難以滿足。"
    why_not_c: "醫療業是 LCNC 採用最快的產業之一（Integrate.io 統計）。法規嚴格不代表不能用 LCNC，而是需要選擇 Low Code 以兼顧合規。"
    why_not_d: "No Code 並未被淘汰，在標準化流程與快速驗證場景仍是最佳選擇。甲的需求用 Low Code 反而過度設計，增加不必要的複雜度。"
