- id: "L12102-Q13"
  topic_code: "L12102"
  item_code: "L12102"
  difficulty: 3
  question: "一家台灣中小型電商公司（月營收 200 萬、無專職工程師）想在 1 個月內建置會員管理系統的 MVP，未來半年若驗證成功需支援 5,000 名會員。下列哪個方案最適合？"
  options:
    a: "使用 Low Code 平台（如 OutSystems），預先考慮擴展性以支撐未來成長"
    b: "外包給軟體公司以 Node.js 開發客製化系統，一步到位"
    c: "使用 No Code 平台（如 Airtable + Zapier）快速搭建 MVP，後續視成長需要再遷移"
    d: "購買現成 CRM SaaS（如 HubSpot），直接使用標準會員管理功能"
  correct: "c"
  explanation:
    why_correct: "無工程師 + 1 個月時限 → 必須選 No Code。5,000 名會員在 Airtable 的免費/Pro 方案能力範圍內，MVP 階段不需要預先投資擴展性。記住「簡單選 No」：先驗證再遷移，是精實創業的核心思維。"
    why_not_a: "Low Code（如 OutSystems）雖然擴展性較好，但學習曲線較陡、需要一定技術背景，無工程師的團隊在 1 個月內難以上手。此為「過度設計」的常見錯誤。"
    why_not_b: "外包客製化系統耗時通常 3-6 個月，成本高（月營收 200 萬的中小企業難以負擔），且不符合 1 個月的時限約束。"
    why_not_d: "CRM SaaS 月費較高（HubSpot 專業版約 NT$5,000+/月），且標準功能可能無法完全符合電商會員管理的客製化需求，彈性不如 No Code 搭建。"
