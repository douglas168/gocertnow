    why_not_a: "Mendix 是企業級 Low Code 平台，雖然功能強大但學習曲線較高、部署流程較複雜，不適合兩週內快速建構 MVP 的場景。"
    why_not_c: "Power Apps 主要面向企業內部應用，深度綁定 Microsoft 生態系，不是建構面向外部用戶的 Web App MVP 的最佳選擇。"
    why_not_d: "Zapier 是流程自動化工具，無法建構完整的 Web App 介面。它可以串接應用，但不是用來建構產品。"
