- id: "L12101-Q01"
  topic_code: "L12101"
  item_code: "L12101"
  difficulty: 1
  question: "No Code（無程式碼）開發工具的核心特點為何？"
  options:
    a: "需要撰寫少量程式碼來處理複雜邏輯"
    b: "完全不需要撰寫程式碼，透過拖放（drag-and-drop）與視覺化配置建構應用"
    c: "僅適用於機器學習模型的自動化訓練流程"
    d: "必須由專業軟體工程師操作才能使用"
  correct: "b"
  explanation:
    why_correct: "No Code 的定義就是「零程式碼」，使用者透過拖放元件與視覺化配置即可建構應用程式，無需任何程式撰寫能力。"
    why_not_a: "撰寫少量程式碼是 Low Code（低程式碼）的特徵，不是 No Code。這是考試最常見的混淆點。"
    why_not_c: "機器學習模型的自動化訓練流程是 AutoML（自動化機器學習）的範疇，與 No Code/Low Code 是不同概念。"
    why_not_d: "No Code 的目標用戶恰恰是非技術背景的業務人員，不需要專業軟體工程師才能操作。"
  keywords:
    - "No Code"
    - "無程式碼"
    - "拖放"
  exam_trap: false

- id: "L12101-Q02"
  topic_code: "L12101"
  item_code: "L12101"
  difficulty: 1
  question: "下列哪一個平台屬於 Low Code（低程式碼）開發工具？"
  options:
    a: "Zapier"
    b: "Airtable"
    c: "Bubble"
    d: "Power Apps（Microsoft）"
  correct: "d"
  explanation:
    why_correct: "Power Apps 是 Microsoft Power Platform 的一部分，屬於 Low Code 平台，可深度整合 M365/Azure/Dynamics，支援以視覺化開發為主並加入少量程式碼。"
    why_not_a: "Zapier 是 No Code 平台，專注於跨應用的流程自動化（workflow automation），不需要撰寫程式碼。"
    why_not_b: "Airtable 是 No Code 平台，提供試算表式關聯資料庫功能，主要用於內部工具與資料管理。"
    why_not_c: "Bubble 是 No Code 平台，用於建構全功能 Web App，如 MVP 和 SaaS 產品。"
  keywords:
    - "Low Code"
    - "Power Apps"
    - "平台辨認"
  exam_trap: true

- id: "L12101-Q03"
  topic_code: "L12101"
  item_code: "L12101"
  difficulty: 1
  question: "Gartner 定義的「公民開發者（Citizen Developer）」是指什麼角色？"
  options:
    a: "在 IT 部門以外，使用組織核可的 No Code/Low Code 工具建構應用的非專業開發人員"
    b: "政府機關中負責開放資料平台維運的公務員"
    c: "專門負責程式碼審查（code review）的資深工程師"
    d: "參與開源社群貢獻程式碼的志願者"
  correct: "a"
  explanation:
    why_correct: "Gartner 定義公民開發者為在 IT 部門以外，使用組織核可的 NC/LC 工具建構應用的非專業開發人員。這個角色是 NC/LC 生態的核心推動力。"
    why_not_b: "「公民」一詞容易讓人聯想到政府或公共服務，但 Citizen Developer 中的 citizen 是指「非專業的一般組織成員」，與政府無關。"
    why_not_c: "程式碼審查是傳統軟體工程的流程，公民開發者的重點恰恰是不需要深入的程式技術知識。"
    why_not_d: "開源貢獻者通常具備專業程式能力，而公民開發者的定義是「非專業開發人員」，兩者不同。"
  keywords:
    - "公民開發者"
    - "Citizen Developer"
    - "Gartner"
  exam_trap: false

- id: "L12101-Q04"
  topic_code: "L12101"
  item_code: "L12101"
  difficulty: 1
  question: "「視覺化開發（Visual Development）」在 No Code/Low Code 中扮演什麼角色？"
  options:
    a: "僅用於製作行銷用的視覺化圖表"
    b: "是一種額外的進階功能，非核心開發方式"
    c: "以圖形介面（拖放元件、流程圖、表單設計器）取代傳統程式碼撰寫的核心開發範式"
    d: "專指使用 Tableau 或 Power BI 進行資料視覺化"
  correct: "c"
  explanation:
    why_correct: "視覺化開發是 NC/LC 的核心範式，透過圖形介面取代傳統程式碼撰寫，讓非技術人員也能建構應用。即使在 No Code 背後仍有隱藏的程式碼在運行。"
    why_not_a: "視覺化開發不是指製作圖表，而是以圖形介面來「開發軟體」，兩者是完全不同的概念。"
    why_not_b: "視覺化開發不是附加功能，而是 NC/LC 平台最核心的開發方式，沒有視覺化介面就不算 NC/LC。"
    why_not_d: "Tableau 和 Power BI 是資料視覺化（data visualization）工具，與軟體開發的視覺化開發（visual development）是不同概念。考生容易混淆這兩者。"
  keywords:
    - "視覺化開發"
    - "Visual Development"
  exam_trap: true

- id: "L12101-Q05"
  topic_code: "L12101"
  item_code: "L12101"
  difficulty: 1
  question: "根據 Gartner 預測，2026 年新應用開發將使用低代碼（Low Code）技術的比例約為多少？"
  options:
    a: "25%"
    b: "50%"
    c: "75%"
    d: "95%"
  correct: "c"
  explanation:
    why_correct: "Gartner 預測 2026 年 75% 的新應用開發將使用低代碼技術。記住：75% = 主流趨勢但非完全取代，考試看到接近但非 100% 的數字就選這個。刪去法：25% 太低、95% 太極端、50% 是「保守陷阱」，75% 剛好反映高速滲透但仍有傳統開發空間。"
    why_not_a: "25% 遠低於實際預測值，低估了低代碼的市場滲透速度。"
    why_not_b: "50% 看似合理但仍低於 Gartner 的預測值。學生容易因為「保守估計」而選此。"
    why_not_d: "95% 過於極端。雖然低代碼增長迅速，但仍有大量複雜系統需要傳統開發方式。"
  keywords:
    - "市場趨勢"
    - "Gartner"
    - "低代碼市場"
  exam_trap: false

