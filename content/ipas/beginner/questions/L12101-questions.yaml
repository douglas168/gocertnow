- id: "L12101-Q16"
  topic_code: "L12101"
  item_code: "L12101"
  difficulty: 4
  question: "在企業數位轉型的脈絡下，No Code 工具較 Low Code 工具更容易引發「影子 IT（Shadow IT）」風險。下列哪個分析最能解釋這個現象？"
  options:
    a: "因為 No Code 工具的安全性設計本質上就比 Low Code 差"
    b: "因為 No Code 的目標用戶是非技術業務人員，他們更可能繞過 IT 部門自行建構未經核可的應用"
    c: "因為 Low Code 平台全部都有內建的資安審計功能，而 No Code 完全沒有"
    d: "因為 No Code 只能建構網頁，而 Low Code 可以建構行動 App"
  correct: "b"
  explanation:
    why_correct: "影子 IT 的核心風險在於「未經 IT 部門核可的應用」。No Code 讓非技術業務人員可以自行建構應用，他們更可能繞過 IT 治理流程，直接部署解決方案，這增加了影子 IT 的風險。"
    why_not_a: "影子 IT 風險不是來自工具本身的安全性設計缺陷，而是來自使用者行為（繞過 IT 審批）。把原因歸結為技術缺陷是過度簡化。"
    why_not_c: "不能一概而論說所有 LC 都有資安審計而所有 NC 都沒有。影子 IT 的重點在於使用行為和組織治理，不是平台功能有無。"
    why_not_d: "No Code 不僅限於網頁，也可建構行動 App（如 AppSheet）。這個選項混淆了平台能力，且與影子 IT 風險無關。"
  keywords:
    - "影子IT"
    - "Shadow IT"
    - "治理風險"
    - "No Code"
  exam_trap: false

- id: "L12101-Q17"
  topic_code: "L12101"
  item_code: "L12101"
  difficulty: 4
  question: "比較 No Code 平台 Bubble 與 Low Code 平台 OutSystems，以下哪個差異分析最準確？"
  options:
    a: "Bubble 適合快速建構 Web App MVP，OutSystems 強調企業級安全性、擴展性與 IT 治理"
    b: "Bubble 的視覺化程度較高但客製化受限於模板，OutSystems 雖然也有視覺化介面但主要靠程式碼開發"
    c: "兩者都是 No Code 平台，差別在於 Bubble 面向新創而 OutSystems 面向企業"
    d: "Bubble 和 OutSystems 的目標用戶相同，主要差異在於定價模式不同"
  correct: "a"
  explanation:
    why_correct: "Bubble（No Code）定位於快速建構 Web App，特別是 MVP 和 SaaS 產品；OutSystems（Low Code）定位於企業級應用，強調安全性、擴展性和 IT 治理。這反映了 NC vs. LC 的核心差異。"
    why_not_b: "這個選項的前半句接近事實但後半句有誤：OutSystems 作為 Low Code 平台，視覺化開發仍是主要方式，只在需要時加入少量程式碼，而非「主要靠程式碼開發」。NC 和 LC 都以視覺化為核心，差異在於 LC 允許程式碼擴展。"
    why_not_c: "OutSystems 是 Low Code 而非 No Code 平台，兩者的根本差異在於編碼需求和客製化程度，不僅是面向客群不同。將 OutSystems 歸為 NC 是分類錯誤。"
    why_not_d: "兩者的目標用戶有明確差異：Bubble 面向非技術創業者和設計師，OutSystems 面向有技術背景的企業開發團隊。差異遠不止定價模式。"
  keywords:
    - "Bubble"
    - "OutSystems"
    - "平台比較"
  exam_trap: false

- id: "L12101-Q18"
  topic_code: "L12101"
  item_code: "L12101"
  difficulty: 4
  question: "Gartner 預測公民開發者數量將達到專業工程師的 4 倍。從企業 IT 治理的角度分析，這個趨勢帶來的最核心挑戰為何？"
  options:
    a: "專業工程師會全部失業"
    b: "企業需要建立機制來管理大量非 IT 人員建構的應用，避免資安漏洞與資料孤島"
    c: "公民開發者太多會導致伺服器負載過重"
    d: "Gartner 的預測不準確，實際數量不會達到 4 倍"
  correct: "b"
  explanation:
    why_correct: "當非 IT 人員大量建構應用時，IT 部門面臨的核心挑戰是如何治理這些應用——包括資安管理、資料一致性、避免資料孤島、以及確保合規性。這是影子 IT 風險的直接延伸。"
    why_not_a: "公民開發者處理的是簡單的業務應用，複雜系統仍需專業工程師。NC/LC 是補充而非取代專業開發。說「全部失業」過於極端。"
    why_not_c: "伺服器負載是技術運維問題，不是公民開發者增加帶來的核心挑戰。核心挑戰在於治理和管理層面。"
    why_not_d: "質疑數據來源不是分析題的合理回答方向。題目要求分析趨勢帶來的挑戰，而非質疑趨勢是否真實。"
  keywords:
    - "公民開發者"
    - "IT治理"
    - "Gartner"
  exam_trap: false

- id: "L12101-Q19"
  topic_code: "L12101"
  item_code: "L12101"
  difficulty: 5
  question: "某科技公司面臨以下挑戰：(1) 業務團隊需要快速建立客戶管理工具，不想等 IT 排程；(2) IT 部門擔心業務自行開發會產生影子 IT 風險；(3) 未來可能需要串接現有 ERP 系統的 API。考量以上三個條件，以下哪個策略最適合？"
  options:
    a: "全面導入 No Code 平台（如 Airtable），讓業務團隊自由建構所有工具，IT 不介入"
    b: "由 IT 部門用傳統程式碼開發客戶管理系統，業務團隊提需求排隊等候"
    c: "導入 Low Code 平台（如 Power Apps），由 IT 建立治理框架與 API 整合層，業務團隊在框架內用視覺化方式建構前端工具"
    d: "先用 No Code 快速上線，等業務量成長後再全部用傳統程式碼重寫"
  correct: "c"
  explanation:
    why_correct: "Low Code 平台兼顧三個限制：業務團隊可透過視覺化方式快速建構工具（解決限制 1），IT 建立治理框架管控開發行為（解決限制 2），平台原生支援 API 串接 ERP（解決限制 3）。這是唯一同時滿足速度、治理、整合三個面向的策略。"
    why_not_a: "純 No Code 讓業務自由建構可滿足速度需求（限制 1），但 IT 不介入會直接加劇影子 IT 風險（違反限制 2），且 No Code 的 API 深度整合能力有限（無法滿足限制 3）。"
    why_not_b: "傳統開發可確保品質和整合性，但業務團隊必須排隊等候 IT 排程，完全違反「不想等 IT 排程」的需求（違反限制 1），且沒有利用 NC/LC 賦能業務團隊。"
    why_not_d: "「先上線再重寫」策略看似務實，但忽略了影子 IT 風險（限制 2）——No Code 階段沒有治理機制，且全部重寫的成本和風險極高，不如一開始就用 Low Code 兼顧三個需求。"
  keywords:
    - "NC/LC策略選擇"
    - "影子IT"
    - "API整合"
    - "多條件評估"
  exam_trap: false

- id: "L12101-Q20"
  topic_code: "L12101"
  item_code: "L12101"
  difficulty: 4
  question: "從市場發展趨勢分析，Gartner 預測 2026 年低代碼市場達 445 億美元（CAGR 19%），而 Forrester 預測 LC/NC + DPA 市場 2028 年可達 500 億美元。這兩個預測之間的差異最可能反映什麼？"
  options:
    a: "Gartner 和 Forrester 的數據完全矛盾，兩者不可能同時正確"
    b: "Forrester 的預測範圍更廣（納入 DPA 數位流程自動化），且預測時間更遠，所以金額更高"
    c: "低代碼市場在 2026 到 2028 年之間幾乎沒有成長"
    d: "Forrester 的預測一定比 Gartner 更準確"
  correct: "b"
  explanation:
    why_correct: "Gartner 聚焦低代碼市場（$44.5B, 2026），Forrester 則將 LC/NC 與 DPA（Digital Process Automation）合併計算且預測到 2028 年（$50B）。涵蓋範圍和時間點不同，導致金額差異，兩者並不矛盾。"
    why_not_a: "兩個預測並不矛盾，它們定義的市場範圍和時間點不同。直接比較數字而忽略定義差異是常見的分析錯誤。"
    why_not_c: "從 $44.5B（2026）到 $50B（2028），即使考慮 Forrester 範圍更廣，市場仍在高速成長（CAGR 19%）。「幾乎沒有成長」的判斷是錯誤的。"
    why_not_d: "不能僅因為金額不同就判斷哪個更準確。兩個研究機構的方法論和市場定義不同，沒有單一的「更準確」。"
  keywords:
    - "Gartner"
    - "Forrester"
    - "市場趨勢"
    - "LCAP"
  exam_trap: false

