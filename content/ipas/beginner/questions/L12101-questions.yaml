    a: "效率提升高度依賴場景匹配：該企業可能將 LC 套用於不適合的複雜系統開發，而非 LC 最擅長的標準化業務應用快速建構"
    b: "該企業選擇了 No Code 工具而非 Low Code 工具，導致客製化不足"
    c: "該企業的開發者對 Low Code 平台的培訓不足，仍然用傳統寫程式的思維操作 LC 工具"
    d: "該企業的 IT 治理流程過於繁瑣，每個 LC 應用都需要經過與傳統開發相同的審批週期"
  correct: "a"
  explanation:
    why_correct: "「縮短 90%」的效率數據是在最適場景（標準化業務應用、表單流程等）下的表現。如果企業將 LC 用於高度客製化或架構複雜的系統，反而可能因為平台限制而降低效率。工具選對場景才能發揮最大價值。這是「場景匹配」的核心概念。"
    why_not_b: "題目明確說該企業導入的是 Low Code 平台，不是 No Code。即使真的選錯工具類型，核心問題仍是場景匹配——什麼樣的任務適合什麼層級的工具。"
    why_not_c: "培訓不足確實可能影響效率，但這只是導入執行層面的問題。即使培訓充分，將 LC 用於錯誤場景仍然無法達到 90% 的效率提升。場景匹配才是根因，培訓是次因。"
    why_not_d: "治理流程確實可能拖慢速度，但 Forrester 的效率數據指的是「開發時間」而非「審批時間」。即使審批快速，用 LC 開發不適合的複雜系統本身就不會快。治理是組織問題，不是效率落差的主因。"
  keywords:
    - "效率評估"
    - "場景匹配"
    - "Low Code"
    - "Forrester"
  exam_trap: false

- id: "L12101-Q25"
  topic_code: "L12101"
  item_code: "L12101"
  difficulty: 5
  question: "隨著 AI 技術融入 NC/LC 平台（如自然語言轉應用、AI 輔助邏輯生成），有人認為「未來 No Code 和 Low Code 的界線將消失」。以下哪個評估最具說服力？"
  options:
    a: "同意——AI 讓所有人都能用自然語言開發，No Code 和 Low Code 將完全合併為一種工具"
    b: "不同意——No Code 和 Low Code 永遠不可能有任何交集"
    c: "界線會模糊但不會消失：AI 降低了 Low Code 的程式門檻，同時提升了 No Code 的客製化能力，但企業級治理、API 深度整合等需求仍會區分兩類工具的定位"
    d: "這個問題不重要，企業不需要區分 NC 和 LC"
  correct: "c"
  explanation:
    why_correct: "AI 確實在模糊 NC/LC 的界線（如 AI 生成程式碼讓 NC 用戶也能實現複雜功能），但企業級需求（治理、合規、深度整合、擴展性）仍需要不同層級的工具支援。界線會模糊但底層定位差異短期不會消失。"
    why_not_a: "「完全合併」過於絕對。即使 AI 降低了所有門檻，企業治理需求、系統架構複雜度、合規要求等因素仍會讓市場維持不同層級的工具。"
    why_not_b: "「永遠不可能有交集」也過於絕對。兩者已經有交集（許多 LC 平台也提供 NC 模式），且 AI 正在加速融合趨勢。"
    why_not_d: "區分 NC 和 LC 對企業的工具選型、人才配置和治理策略都有實際影響。迴避問題不是有效的評估。"
  keywords:
    - "AI融合"
    - "NC/LC趨勢"
    - "市場演進"
    - "綜合評鑑"
  exam_trap: false

