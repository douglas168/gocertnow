- id: "L12101-Q26"
  topic_code: "L12101"
  item_code: "L12101"
  difficulty: 2
  question: "有人說：「No Code 平台背後完全沒有程式碼在運行，所以叫 No Code。」這個說法正確嗎？"
  options:
    a: "不正確。No Code 平台其實需要使用者撰寫少量 Python 腳本"
    b: "正確。No Code 平台完全不涉及任何程式碼，從前端到後端都是純圖形化運算"
    c: "正確。No Code 的「No」就是指系統內部也沒有程式碼"
    d: "不正確。使用者不需要撰寫程式碼，但平台背後仍會自動生成程式碼來執行應用邏輯"
  correct: "d"
  explanation:
    why_correct: "「No Code」中的「No」是指使用者不需要撰寫程式碼，而非平台內部沒有程式碼。No Code 平台背後仍會將使用者的拖放操作和視覺化配置轉換為程式碼來執行。這是常見的誤解，也是考試陷阱。"
    why_not_a: "No Code 平台不需要使用者撰寫任何程式碼（包括 Python），這是 No Code 的核心定義。需要撰寫少量程式碼的是 Low Code。"
    why_not_b: "「純圖形化運算」不存在——所有軟體最終都需要程式碼執行。No Code 平台只是將程式碼的撰寫過程隱藏在視覺化介面之後。"
    why_not_c: "這個選項的解讀是錯誤的。No Code 的命名重點是「使用者端」不需要寫程式碼，不代表系統內部沒有程式碼在運行。"
  keywords:
    - "No Code"
    - "背後有程式碼"
    - "常見誤解"
  exam_trap: true

- id: "L12101-Q27"
  topic_code: "L12101"
  item_code: "L12101"
  difficulty: 3
  question: "小華說：「Excel 有拖放功能和圖表視覺化，Photoshop 也有圖形介面操作，所以它們都算是 No Code/Low Code 工具。」這個推論有什麼問題？"
  options:
    a: "NC/LC 工具的定義是「用視覺化方式建構軟體應用」，而 Excel 和 Photoshop 雖有視覺化操作，但它們的目的不是建構軟體應用程式"
    b: "Excel 確實是 No Code 工具，但 Photoshop 不是"
    c: "只要有拖放介面就算 NC/LC 工具，所以小華的說法完全正確"
    d: "Excel 和 Photoshop 都屬於 Low Code 工具，因為它們支援巨集和腳本擴展"
  correct: "a"
  explanation:
    why_correct: "NC/LC 的關鍵定義是「用視覺化方式建構軟體應用程式」，不是「有視覺化介面的軟體」。Excel 是試算表工具、Photoshop 是影像編輯工具，雖然都有拖放和圖形介面，但它們的目的不是讓使用者建構應用程式。不是所有視覺化工具都是 NC/LC。"
    why_not_b: "Excel 有視覺化操作但它的核心功能是試算表運算，不是建構軟體應用。不能因為 Airtable（NC）也長得像試算表就把 Excel 也歸為 NC。"
    why_not_c: "「有拖放介面就算 NC/LC」是過度簡化的推論。NC/LC 的定義核心是「建構軟體應用」，不是「有拖放功能」。很多非 NC/LC 工具都有拖放介面。"
    why_not_d: "支援巨集和腳本不等於是 Low Code 平台。Low Code 平台的核心是以視覺化方式開發應用程式並支援少量程式碼擴展，而非單純「有腳本功能的軟體」。"
  keywords:
    - "NC/LC定義"
    - "視覺化工具"
    - "常見誤解"
    - "Excel"
  exam_trap: true
