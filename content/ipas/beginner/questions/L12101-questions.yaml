- id: "L12101-Q06"
  topic_code: "L12101"
  item_code: "L12101"
  difficulty: 2
  question: "關於 No Code 與 Low Code 的差異，下列哪個敘述最正確？"
  options:
    a: "No Code 的客製化程度較低且受限於平台模板，Low Code 可透過撰寫程式碼擴展功能"
    b: "No Code 和 Low Code 完全相同，只是名稱不同"
    c: "No Code 適合建構企業級複雜應用，Low Code 只能做簡單表單"
    d: "No Code 需要在 IT 部門監督下使用，Low Code 則無需任何技術管理"
  correct: "a"
  explanation:
    why_correct: "No Code 的客製化受限於平台提供的模板和元件，而 Low Code 允許開發者撰寫程式碼來擴展功能，客製化程度更高。這是兩者的關鍵差異之一。"
    why_not_b: "兩者雖然都屬於視覺化開發，但在編碼需求、目標用戶、應用複雜度、客製化程度上都有明確差異。"
    why_not_c: "恰好相反：No Code 適合簡單的戰術型應用（表單、報表），Low Code 才適合企業級中高複雜度應用。"
    why_not_d: "恰好相反：No Code 因為非技術人員自行建構應用，容易產生「影子 IT」風險；Low Code 通常在 IT 監督下使用，治理風險較低。"
  keywords:
    - "No Code vs Low Code"
    - "客製化"
    - "差異比較"
  exam_trap: false

- id: "L12101-Q07"
  topic_code: "L12101"
  item_code: "L12101"
  difficulty: 2
  question: "為什麼公民開發者（Citizen Developer）的興起被認為能緩解軟體人才缺口？"
  options:
    a: "因為公民開發者能取代所有專業軟體工程師"
    b: "因為公民開發者使用 NC/LC 工具即可建構應用，減少對專業程式人力的依賴"
    c: "因為公民開發者都是從 IT 部門轉職而來的"
    d: "因為公民開發者開發的應用不需要維護"
  correct: "b"
  explanation:
    why_correct: "NC/LC 讓非技術背景的業務人員也能建構應用，將部分開發工作從專業程式人力轉移到業務單位，從而緩解人才缺口。美國缺少 140 萬軟體開發者，NC/LC 被視為解方之一。"
    why_not_a: "公民開發者無法取代所有專業工程師。複雜的企業級系統、底層架構、安全關鍵系統仍需專業開發者。這種說法過於極端。"
    why_not_c: "公民開發者的定義是在 IT 部門「以外」的人員，他們是業務人員而非 IT 轉職者。"
    why_not_d: "所有軟體應用都需要維護。公民開發者建構的應用同樣需要更新和管理，這也是影子 IT 風險的來源之一。"
  keywords:
    - "公民開發者"
    - "Citizen Developer"
    - "人才缺口"
  exam_trap: false

- id: "L12101-Q08"
  topic_code: "L12101"
  item_code: "L12101"
  difficulty: 2
  question: "小美想自動化她的工作流程，每當 Google 表單收到新回覆就自動寄通知信給主管。她完全沒有程式背景。以下哪個工具最適合？"
  options:
    a: "Power Apps — 建構企業級表單應用並設定通知"
    b: "Zapier — 設定 Google Forms → Gmail 的自動化流程"
    c: "OutSystems — 開發完整的表單管理系統"
    d: "Python 腳本 — 用 Google API 撰寫自動寄信程式"
  correct: "b"
  explanation:
    why_correct: "Zapier 是典型的 No Code 流程自動化工具，專門處理「當 A 事件發生 → 自動執行 B 動作」的跨應用串接。小美不需要程式背景，只要在 Zapier 介面設定觸發條件和動作即可。"
    why_not_a: "Power Apps 是 Low Code 平台，主要用於建構企業應用，對於單純的「表單觸發 → 寄信」自動化來說過於複雜，且需要一定技術背景。"
    why_not_c: "OutSystems 是企業級 Low Code 平台，用來開發完整系統，不適合單純的流程自動化需求，且學習門檻遠高於 No Code 工具。"
    why_not_d: "撰寫 Python 腳本需要程式能力，違背「完全沒有程式背景」的前提。NC/LC 的價值正是讓非技術人員免寫程式完成自動化。"
  keywords:
    - "Zapier"
    - "No Code"
    - "workflow automation"
  exam_trap: true

- id: "L12101-Q09"
  topic_code: "L12101"
  item_code: "L12101"
  difficulty: 2
  question: "關於 Low Code 的目標用戶，下列敘述何者正確？"
  options:
    a: "Low Code 主要針對無技術背景的行銷與企劃人員設計"
    b: "Low Code 專供雲端架構師進行底層基礎設施部署"
    c: "Low Code 的目標用戶是具備一定技術知識的開發者或公民開發者"
    d: "Low Code 的目標用戶與 No Code 完全相同，沒有差異"
  correct: "c"
  explanation:
    why_correct: "Low Code 的目標用戶是具備一定技術知識的開發者或公民開發者（有基礎技術能力的業務人員），他們可以透過視覺化開發並在需要時加入少量程式碼。"
    why_not_a: "無技術背景的行銷與企劃人員更適合使用 No Code 工具。Low Code 雖然降低了門檻，但仍期望使用者有基礎的程式邏輯或技術理解能力。"
    why_not_b: "雲端架構師負責的是底層基礎設施（如 AWS、Azure 架構設計），這與 Low Code 的應用層開發定位不同。Low Code 面向的是業務應用開發，不是基礎設施部署。"
    why_not_d: "No Code 面向完全非技術的業務人員，Low Code 面向有一定技術背景的人。兩者目標用戶有明確差異。"
  keywords:
    - "Low Code"
    - "目標用戶"
  exam_trap: false

- id: "L12101-Q10"
  topic_code: "L12101"
  item_code: "L12101"
  difficulty: 2
  question: "AutoML（自動化機器學習）與 No Code/Low Code 開發工具的關係為何？"
  options:
    a: "AutoML 是 No Code 工具的一種，兩者屬於同一類別"
    b: "AutoML 是 Low Code 平台的核心功能模組"
    c: "AutoML 和 No Code/Low Code 完全相同，只是應用在不同產業"
    d: "AutoML 是機器學習管線（ML pipeline）的自動化，與 NC/LC 應用開發工具是不同概念"
  correct: "d"
  explanation:
    why_correct: "AutoML 專注於自動化機器學習的流程（資料預處理、特徵工程、模型選擇、超參數調整等），而 NC/LC 是應用程式開發工具。兩者解決的問題完全不同。"
    why_not_a: "這是考試的高頻陷阱。AutoML 雖然也降低了技術門檻，但它自動化的是 ML pipeline，不是應用開發。不能因為「都不需要太多程式碼」就歸為同類。"
    why_not_b: "AutoML 不是 Low Code 平台的功能模組。部分 LC 平台可能整合 AI 功能，但 AutoML 本身是獨立的 ML 工具類別。"
    why_not_c: "兩者自動化的對象不同：AutoML 自動化 ML 管線，NC/LC 簡化應用開發。不是同一件事在不同產業的應用。"
  keywords:
    - "AutoML"
    - "No Code/Low Code"
    - "差異辨別"
  exam_trap: true

