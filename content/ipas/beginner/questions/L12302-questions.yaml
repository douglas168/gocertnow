  question: "Fallback（降級）與 Rollback（回溯）作為因應措施，兩者的主要差異為何？"
  options:
    a: "兩者完全相同"
    b: "Fallback 是「當下失效時切換到備案（如規則引擎、人工）」；Rollback 是「回滾到先前穩定版本」"
    c: "Fallback 只針對硬體；Rollback 只針對軟體"
    d: "兩者都是指模型重新訓練"
  correct: "b"
  explanation:
    why_correct: "Fallback 針對「當下」失效提供即時備援；Rollback 針對「版本升級後」出現問題回到前一個穩定版本，兩者都是因應措施四件套之一。"
    why_not_a: "機制與時機明顯不同。 Fallback ＝ 當下切備案（即時、服務不中斷）；Rollback ＝ 版本往回退（永久、回到上一穩定版），兩者目的與時機不同。"
    why_not_c: "兩者都是軟體/服務層的降級與回滾概念，非硬體軟體之分。"
    why_not_d: "因應措施與模型重訓無關。"
  keywords:
