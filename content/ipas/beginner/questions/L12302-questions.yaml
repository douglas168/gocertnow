- id: "L12302-Q15"
  topic_code: "L12302"
  item_code: "L12302"
  difficulty: 3
  question: "某 7-11 便利商店總部想導入生成式AI協助門市人員查詢促銷資訊，資料科學家做完 2 週技術可行性驗證後主管要求馬上全台 6,000 家門市上線。依本課原則，應如何建議？"
  options:
    a: "直接全台上線以搶先機"
    b: "停止此專案，因為 POC 只有 2 週"
    c: "由 IT 部門自行決定即可"
    d: "先選 5–10 家門市進行 Pilot，驗證商業價值與操作流程，再擴大規模"
  correct: "d"
  explanation:
    why_correct: "POC 只驗證技術可行性，尚未驗證真實門市的商業價值與操作流程，需先 Pilot 再 Scale。"
    why_not_a: "跳過 Pilot 直接 Scale 是常見失敗原因（陷阱 1）。"
    why_not_b: "2 週 POC 成功可以進入 Pilot，不需停止。"
    why_not_c: "門市業務流程涉及業務、訓練、法遵等部門，非 IT 單點決策。"
  keywords:
    - "導入策略"
    - "Pilot"
  exam_trap: true

- id: "L12302-Q16"
  topic_code: "L12302"
  item_code: "L12302"
  difficulty: 3
  question: "某地區醫院想導入生成式AI自動撰寫病歷摘要草稿，依本課原則，最關鍵的因應措施為何？"
  options:
    a: "強制 HITL 由醫師最終覆核並簽核，並標示 AI 生成內容"
    b: "全自動化以降低醫師負擔"
    c: "上線後觀察一年再討論覆核機制"
    d: "只要模型準確率超過 90% 即可省略人工覆核"
  correct: "a"
  explanation:
    why_correct: "醫療屬高風險領域，EU AI Act 強制要求、NIST AI RMF 建議、行政院 2023 指引規範公部門皆指向 HITL 最終覆核並清楚標示 AI 生成內容。"
    why_not_b: "高風險場景嚴禁完全自動化。"
    why_not_c: "覆核機制必須在上線前建立，不能延後。"
