  options:
    a: "技術模型不夠強，應換更大模型"
    b: "失敗主因是變革管理與跨部門協作不足；補救為強化業務/HR/法遵參與、流程再造與持續溝通"
    c: "只需增加 GPU 即可解決"
    d: "停止專案，等 AI 更成熟再說"
