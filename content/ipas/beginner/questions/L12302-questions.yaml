# L12302 生成式AI導入規劃 — 練習題庫
# Total: 38 questions
# Difficulty: D1=7, D2=12, D3=9, D4=2, D5=5, +3=D2/D3/D3
# Coverage: 目標設置, 資源分配, 導入策略, 因應措施, 測試, 退出準則 (+boundary)

- id: "L12302-Q01"
  topic_code: "L12302"
  item_code: "L12302"
  difficulty: 1
  question: "SMART 原則中的「M」在設定生成式AI（Generative AI）專案目標時代表什麼意義？"
  options:
    a: "Measurable（可衡量的）"
    b: "Meaningful（有意義的）"
    c: "Manageable（可管理的）"
    d: "Motivational（具激勵性的）"
  correct: "a"
  explanation:
    why_correct: "SMART 原則中的 M 代表 Measurable（可衡量的），目標必須能以量化數據檢視達成情況，例如「客服首次回應時間由 5 分鐘降至 2 分鐘」。"
    why_not_b: "Meaningful 是常見的誤解；SMART 強調具體可量化而非主觀的「有意義」。"
    why_not_c: "Manageable 不是 SMART 的一部分；SMART 為 Specific/Measurable/Achievable/Relevant/Time-bound。"
    why_not_d: "Motivational 常與 OKR 混淆，不屬於 SMART 框架。"
  keywords:
    - "目標設置"
    - "SMART"
  exam_trap: false

- id: "L12302-Q02"
  topic_code: "L12302"
  item_code: "L12302"
  difficulty: 1
  question: "生成式AI導入的三階段主流策略「POC → Pilot → Scale」中，Pilot（試點）階段的主要目的為何？"
  options:
    a: "驗證技術基本可行性，不追求商業價值"
    b: "全公司跨部門正式上線並建立標準作業程序"
    c: "在選定的小範圍單位實際導入並收集使用者回饋，驗證商業價值"
    d: "進行紅隊攻擊測試，找出資安漏洞"
  correct: "c"
  explanation:
    why_correct: "Pilot 階段在 1–2 個單位實際導入，真實使用者操作以驗證商業價值與流程可行性，是 POC 與 Scale 之間的關鍵驗證。"
    why_not_a: "這是 POC（Proof of Concept, 概念驗證）階段的目的。"
    why_not_b: "這是 Scale（擴大/正式上線）階段的定義。"
    why_not_d: "紅隊測試是測試方法的一種，非 Pilot 階段主要目的。"
  keywords:
    - "導入策略"
    - "Pilot"
  exam_trap: false

- id: "L12302-Q03"
  topic_code: "L12302"
  item_code: "L12302"
  difficulty: 1
  question: "HITL（Human-in-the-Loop, 人工介入迴圈）在生成式AI導入的「因應措施」中，最主要的功能為何？"
  options:
    a: "降低模型推論的延遲時間"
    b: "自動加速 AI 回覆速度"
    c: "取代模型本身的訓練過程"
    d: "在高風險決策中保留人工覆核與問責機制"
  correct: "d"
  explanation:
    why_correct: "HITL 的核心價值在於高風險場景（醫療、金融、勞動權益）中由人工最終覆核 AI 輸出並承擔問責，對應 EU AI Act 強制要求、NIST AI RMF 建議（框架性）、行政院 2023 指引規範公部門。"
    why_not_a: "HITL 反而會增加延遲（多一層人工檢查），而非降低。"
    why_not_b: "人工介入會降低而非加速回覆速度。"
    why_not_c: "HITL 與模型訓練無關，是輸出端的把關機制。"
  keywords:
    - "因應措施"
    - "HITL"
  exam_trap: false

- id: "L12302-Q04"
  topic_code: "L12302"
  item_code: "L12302"
  difficulty: 1
  question: "在生成式AI專案資源分配中，「四維度」通常不包括下列哪一項？"
  options:
    a: "人力"
    b: "外部 AI 顧問的授權方案"
    c: "預算"
    d: "資料"
  correct: "b"
  explanation:
    why_correct: "資源分配四維度為人力、預算、資料、時間。外部顧問授權方案屬採購/服務選型，不是初級資源規劃的四大維度。"
    why_not_a: "人力是四維度之一，包含 IT、業務、法遵、資安等跨部門人員。"
    why_not_b: "外部顧問授權方案屬於採購或服務選型決策（L12301 導入評估的範疇），不是初級資源規劃的四大維度。資源四維度是內部可盤點的人、錢、料、時。"
    why_not_c: "預算是四維度之一，含一次性開發費與經常性推論費。"
    why_not_d: "資料是四維度之一，且是台灣企業最常被低估的資源（AIF 2025 調查僅 5–10% 企業備妥資料）。"
  keywords:
    - "資源分配"
    - "四維度"
  exam_trap: false

- id: "L12302-Q05"
  topic_code: "L12302"
  item_code: "L12302"
  difficulty: 1
  question: "UAT（User Acceptance Test, 使用者驗收測試）在生成式AI導入中的目的是？"
  options:
    a: "由實際使用者在接近正式環境中驗收流程可用性"
    b: "讓模擬攻擊者找出 Prompt Injection 等資安漏洞"
    c: "比較兩個版本的量化效果差異"
    d: "檢查伺服器硬體規格是否達標"
  correct: "a"
  explanation:
    why_correct: "UAT 由業務真實使用者以貼近正式環境的測試資料驗收系統，確認流程符合業務需求。"
    why_not_b: "這是紅隊測試（Red Team Testing）的目的。"
    why_not_c: "這是 A/B 測試的目的。"
    why_not_d: "硬體壓測屬於效能/負載測試，不是 UAT。"
  keywords:
    - "測試"
    - "UAT"
  exam_trap: false

- id: "L12302-Q06"
  topic_code: "L12302"
  item_code: "L12302"
  difficulty: 1
  question: "下列何者屬於生成式AI導入的「因應措施」四件套？"
  options:
    a: "Fine-tuning、RAG、RLHF、Prompt Engineering"
    b: "POC、Pilot、Scale、Monitoring"
    c: "HITL、Fallback（降級）、Rollback（回溯）、幻覺偵測"
    d: "HITL、權限控管、監控儀表板、資料備份"
  correct: "c"
  explanation:
    why_correct: "業界共識的因應措施四件套為 HITL 人工覆核、Fallback 降級、Rollback 版本回溯、幻覺偵測與內容標示。"
    why_not_a: "這些屬於模型優化技術（中級範圍），不是導入因應措施。"
    why_not_b: "這些是導入策略的階段，不是因應措施。"
    why_not_d: "HITL、權限控管、監控儀表板、資料備份 雖然也是實務中常見的控制措施，但不是課程定義的『因應措施四件套』。正確四件套為 HITL、Fallback、Rollback、幻覺偵測，四者各自對應不同失效情境。"
  keywords:
    - "因應措施"
    - "四件套"
  exam_trap: false

- id: "L12302-Q07"
  topic_code: "L12302"
  item_code: "L12302"
  difficulty: 1
  question: "根據近年業界統計，GenAI 專案失敗的主因通常不是純技術問題，而是下列何者？"
  options:
    a: "模型演算法能力不足"
    b: "雲端費用過高"
    c: "GPU 算力採購不足，訓練跑不動"
    d: "變革管理（change management）與跨部門協作問題"
  correct: "d"
  explanation:
    why_correct: "Gartner 2025 指出 GenAI 失敗主因是變革管理與跨部門協作，而非技術；許多組織抱持「set it, forget it」心態導致失敗。"
    why_not_a: "主流基礎模型已足夠成熟；技術鮮少是失敗主因。 考生常因 AI 題材技術感強而誤把『模型能力不足 / 硬體不夠』當主因，但導入失敗多發生在採用、流程與跨部門協作層面。"
    why_not_b: "雲端費用是成本面議題，非主要失敗原因。"
    why_not_c: "多數 GenAI 導入使用雲端 API（ChatGPT Enterprise、Azure OpenAI 等），不需自建 GPU 訓練；算力極少是導入失敗的主因。"
  keywords:
    - "因應措施"
    - "變革管理"
  exam_trap: true

- id: "L12302-Q08"
  topic_code: "L12302"
  item_code: "L12302"
  difficulty: 2
  question: "下列哪一項目標最符合生成式AI專案的 SMART 原則？"
  options:
    a: "3 個月內將客服 FAQ 自動化率由 20% 提升至 60%，並維持滿意度不低於 4.2/5"
    b: "大幅提升客服滿意度"
    c: "讓公司變得更有 AI 競爭力"
    d: "盡快全面導入 GenAI 改變公司文化"
  correct: "a"
  explanation:
    why_correct: "選項 A 同時符合 Specific（FAQ 自動化率）、Measurable（20%→60%）、Achievable（漸進提升）、Relevant（對應客服策略）、Time-bound（3 個月內）。"
    why_not_b: "「大幅提升」主觀，未定義起始值、目標值與時限。"
    why_not_c: "「更有競爭力」缺乏量化指標與時限。"
    why_not_d: "「盡快」「全面」皆非可衡量且不具時限。"
  keywords:
    - "目標設置"
    - "SMART"
  exam_trap: false

- id: "L12302-Q09"
  topic_code: "L12302"
  item_code: "L12302"
  difficulty: 2
  question: "下列關於 POC（Proof of Concept, 概念驗證）階段的敘述，何者最正確？"
  options:
    a: "POC 成功即可直接全面推廣到全公司"
    b: "POC 以小範圍、短時間驗證技術可行性，不追求規模與UI完整度"
    c: "POC 追求完整 UI 與大規模使用者體驗"
    d: "POC 必須包含紅隊測試與 UAT"
  correct: "b"
  explanation:
    why_correct: "POC 定義是小範圍、短時間（通常數週）驗證技術可行性，UI 與規模可以簡陋。"
    why_not_a: "常見陷阱 — POC 成功只代表技術可行，仍需 Pilot 驗證商業價值才能 Scale。"
    why_not_c: "完整 UI 與使用者體驗是 Pilot/Scale 階段的工作。"
    why_not_d: "紅隊測試與 UAT 通常在 Pilot 或 Scale 前進行，不是 POC 必備。"
  keywords:
    - "導入策略"
    - "POC"
  exam_trap: true

- id: "L12302-Q10"
  topic_code: "L12302"
  item_code: "L12302"
  difficulty: 2
  question: "下列關於生成式AI導入跨部門協作的敘述，何者正確？"
  options:
    a: "AI 導入只需 IT 部門負責，其他部門配合即可"
    b: "AI 導入只需資料科學團隊即可完成"
    c: "AI 導入需業務、法遵、資安、HR 與 IT 共同參與"
    d: "AI 導入由 CEO 一人決策即可，不需部門協作"
  correct: "c"
  explanation:
    why_correct: "AI 導入是跨部門議題：業務提需求、法遵看風險、資安看資料保護、HR 做訓練與變革管理、IT 負責技術落地。"
    why_not_a: "常見陷阱 — Gartner 與台灣實務均指出「只由 IT 負責」是導入失敗主因。"
    why_not_b: "資料科學團隊無法單獨處理業務流程、法遵與變革管理。"
    why_not_d: "單點決策忽略領域需求，實務會導致導入失敗。"
  keywords:
    - "導入策略"
    - "跨部門協作"
  exam_trap: true

- id: "L12302-Q11"
  topic_code: "L12302"
  item_code: "L12302"
  difficulty: 2
  question: "下列關於「並行運行（parallel run）」的敘述，何者正確？"
  options:
    a: "並行運行等同於完全替換舊系統"
    b: "並行運行是一次性完成切換的快速方法"
    c: "並行運行是資料備份的一種技術"
    d: "並行運行指新舊系統同時運作並比對結果，再逐步切換"
  correct: "d"
  explanation:
    why_correct: "並行運行讓新舊系統同時處理相同輸入，比對差異後再決定切換時機，保留舊系統作為 fallback。"
    why_not_a: "常見陷阱 — 並行運行的精神就是「先不替換」而是比對；完全替換反而失去 fallback 能力。"
    why_not_b: "一次性切換（big bang）與並行運行相反。"
    why_not_c: "並行運行與備份技術無關，屬導入切換策略。"
  keywords:
    - "導入策略"
    - "parallel run"
  exam_trap: true

- id: "L12302-Q12"
  topic_code: "L12302"
  item_code: "L12302"
  difficulty: 2
  question: "下列關於「幻覺（hallucination）」的敘述，何者最正確？"
  options:
    a: "幻覺指模型產生看似合理但實際錯誤的內容，需事實查核與人工覆核"
    b: "幻覺是模型硬體故障造成"
    c: "幻覺只會發生在文字模型，不會發生在圖像模型"
    d: "出現幻覺代表模型訓練失敗，必須全部重訓"
  correct: "a"
  explanation:
    why_correct: "幻覺是大型語言模型的固有特性，輸出看似流暢合理但實際與事實不符；因應措施是事實查核 + HITL 覆核。"
    why_not_b: "幻覺是模型機率性生成的本質，非硬體問題。"
    why_not_c: "圖像、影片、程式碼模型也會幻覺（生成不存在的細節）。"
    why_not_d: "幻覺無法完全消除，只能降低並加上覆核，而非重訓整個模型。"
  keywords:
    - "因應措施"
    - "幻覺"
  exam_trap: true

- id: "L12302-Q13"
  topic_code: "L12302"
  item_code: "L12302"
  difficulty: 2
  question: "某公司主管正在開會討論『要買 ChatGPT Enterprise 還是自己建內部模型』。這個決策屬於 AI 導入流程的哪個階段？"
  options:
    a: "屬於規劃階段的資源分配，範圍與 L12302 相同"
    b: "屬於評估階段（L12301 導入評估），是 Build vs Buy 選型的核心決策"
    c: "屬於程式實作細節，不屬於初級規劃範圍"
    d: "屬於目標設置階段，由 SMART 原則決定"
  correct: "b"
  explanation:
    why_correct: "Build vs Buy（自建 vs 採購）屬於解決方案選型，是 L12301 導入評估的核心決策內容。本題情境描述的正是評估階段的判斷，尚未進入目標設置、資源分配、導入策略執行（即 L12302 規劃）。"
    why_not_a: "Build/Buy 是「要不要做、如何做」的評估決策，不是決定後的資源分配。"
    why_not_c: "初級都是規劃概念層級，不涉及程式實作細節。"
    why_not_d: "SMART 處理的是目標量化（L12302 規劃階段），不是 Build/Buy 選型。"
  keywords:
    - "邊界釐清"
    - "scope"
  exam_trap: false

