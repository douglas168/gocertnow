- id: "L12302-Q34"
  topic_code: "L12302"
  item_code: "L12302"
  difficulty: 3
  question: "某大型零售商在 Scale 階段（全面上線）後，發現新版 AI 推薦系統導致退貨率上升。最佳因應組合為？"
  options:
    a: "忽略並持續觀察半年"
    b: "先以 prompt 微調與人工抽查壓制風險，暫不啟動 rollback"
    c: "啟動 Rollback 回溯至穩定版本，同時調查退貨率成因，並建立持續監控指標（避免「set it, forget it」）"
    d: "只重訓模型即可"
  correct: "c"
  explanation:
    why_correct: "上線後出現問題應先 Rollback 到穩定版本保護營運，同時調查成因並建立監控指標；這呼應 Gartner 反對「set it, forget it」的原則。"
    why_not_a: "退貨率上升是營運重大警訊，不能觀察半年。"
    why_not_b: "『先做 prompt 微調 + 人工抽查』是低嚴重度問題的合理處置，但題幹的風險已經屬於結構性錯誤（如系統性幻覺或合規違反），此時 prompt 微調無法解決根因，必須 rollback 到前版並重新規劃。判斷關鍵在『是參數問題還是版本問題』。"
    why_not_d: "重訓模型無法處理短期營運風險，應先回到穩定版本。"
  keywords:
    - "因應措施"
    - "Rollback"
  exam_trap: false

- id: "L12302-Q35"
