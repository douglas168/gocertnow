- id: "L12302-Q36"
  topic_code: "L12302"
  item_code: "L12302"
  difficulty: 2
  question: "下列關於「退出準則（Exit Criteria）」的敘述，何者最正確？"
  options:
    a: "只要 POC 的準確率達到 80%，不論應用場景都可以直接進入 Scale"
    b: "退出準則應依風險等級設定——高風險場景需要更高門檻，低風險場景可接受較低門檻"
    c: "退出準則只在 Scale 階段才需要定義"
    d: "退出準則就是 SMART 目標的時程欄位（Time-bound）"
  correct: "b"
  explanation:
    why_correct: "退出準則（Exit Criteria）是判斷「目前階段是否可以進入下一階段」的客觀門檻，且必須依風險等級設定——醫療/金融/法律等高風險場景常需 95%+ 準確率與 HITL 抽查；內部 FAQ 或創意輔助場景 70–80% 即可接受。"
    why_not_a: "80% 不是通用門檻；高風險場景 80% 仍可能造成重大傷害。"
    why_not_c: "退出準則應在每一階段（POC、Pilot）都有明確定義，否則無法決定何時可前進。"
    why_not_d: "退出準則是階段推進門檻，與 SMART 的時程欄位是不同概念。"
  keywords:
    - "退出準則"
    - "Exit Criteria"
    - "風險等級"
  exam_trap: true

- id: "L12302-Q37"
  topic_code: "L12302"
  item_code: "L12302"
  difficulty: 3
  question: "某銀行 POC 階段用 GenAI 自動回覆客戶貸款問題，準確率達到 82%。主管認為「已經達 80% 門檻」想直接 Scale 推向全部分行。從退出準則角度，下列建議何者最妥當？"
  options:
    a: "82% 已過 80%，符合常見標準，可直接進入 Scale"
    b: "金融場景屬高風險，82% 不足；應進入 Pilot 階段擴大測試並補強 HITL 抽查，達 95%+ 且法遵過關再 Scale"
    c: "應退回 POC 重新設計資料集，再跑一次 POC"
    d: "只要加入 rollback 機制，82% 就可以 Scale"
  correct: "b"
  explanation:
    why_correct: "金融場景屬高風險，退出準則門檻應遠高於一般情境。82% 只代表 POC 可行性驗證通過，下一步是 Pilot（小規模真實客戶測試 + HITL 抽查），並在達到高門檻（通常 95%+）且法遵（金管會指引）檢核過關後才能 Scale。"
    why_not_a: "80% 不是通用門檻；對金融這類高風險場景嚴重不足。"
    why_not_c: "POC 結果符合可行性驗證，不需退回；直接 Pilot 才是正常路徑。"
    why_not_d: "Rollback 是出事後的補救，不能替代前置的退出準則判斷。"
  keywords:
    - "退出準則"
    - "Exit Criteria"
    - "金融風險"
    - "Pilot"
  exam_trap: false

- id: "L12302-Q38"
  topic_code: "L12302"
  item_code: "L12302"
  difficulty: 3
  question: |
    閱讀下列表格，判斷哪一欄的「主要目的」描述錯誤？

    | 測試類型 | 主要目的 |
    |---------|---------|
    | (A) UAT | 最終使用者驗收流程是否可用 |
    | (B) A/B 測試 | 比較兩個版本實務效果的差異 |
    | (C) 紅隊測試 | 最終使用者滿意度調查 |
    | (D) 並行運行 | 新舊系統同時運作以降低切換風險 |
  options:
    a: "(A) UAT"
    b: "(B) A/B 測試"
    c: "(C) 紅隊測試"
    d: "(D) 並行運行"
  correct: "c"
  explanation:
    why_correct: "紅隊測試（Red Team）是主動攻擊測試——由內部或外部專家扮演攻擊者，找出系統漏洞、prompt injection、越獄 jailbreak 等安全與倫理弱點。它不是使用者滿意度調查。"
    why_not_a: "UAT 的目的確實是最終使用者驗收流程可用性，描述正確。"
    why_not_b: "A/B 測試確實用於比較兩版效果差異，描述正確。"
    why_not_d: "並行運行確實以新舊系統同時運作降低切換風險，描述正確。"
  keywords:
    - "紅隊測試"
    - "Red Team"
    - "UAT"
    - "A/B test"
    - "並行運行"
  exam_trap: true
