  item_code: "L12302"
  difficulty: 5
  question: "某壽險公司導入 GenAI 核保輔助工具，Pilot 階段需同時檢查四項風險：(1) Prompt Injection 是否導致資料外洩；(2) 不同族群是否出現偏誤；(3) 實際核保員是否能用；(4) 和舊系統比結果是否一致。最適合的測試組合為？"
