  correct: "d"
  explanation:
    why_correct: "「生—鑑—監」閉環的核心是：生成式AI產出內容→鑑別式AI審核品質或合規性→監控系統追蹤表現並回饋改善，形成持續優化的循環。"
    why_not_a: "此模式的特色正是用鑑別式AI自動審核取代（或輔助）人工審核，提升效率和一致性。"
