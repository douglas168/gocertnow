- id: "L11402-Q08"
  topic_code: "L11402"
  item_code: "L11402"
  difficulty: 2
  question: "關於 GAN（生成對抗網路）中鑑別式AI與生成式AI的協作關係，下列敘述何者正確？"
  options:
    a: "生成器和判別器使用相同的目標函數，方向一致"
    b: "GAN 訓練完成後只保留判別器，丟棄生成器"
    c: "判別器的進步會迫使生成器產出更逼真的結果，兩者對抗式共同提升"
    d: "判別器是生成式模型，生成器是鑑別式模型"
  correct: "c"
  explanation:
    why_correct: "GAN 的核心機制是對抗式訓練——判別器越來越擅長辨別真假，迫使生成器產出越來越逼真的結果，兩者在對抗中共同提升，這是鑑別式與生成式AI整合的典範。"
    why_not_a: "生成器和判別器的目標函數是相反的（minimax博弈），生成器要騙過判別器，判別器要識破生成器。"
    why_not_b: "通常是保留生成器（用來生成新資料），丟棄判別器。考生常搞反。"
    why_not_d: "角色定義完全相反——生成器是生成式模型，判別器是鑑別式模型。"
  keywords:
    - "GAN"
    - "對抗式訓練"
    - "整合模式"
  exam_trap: true

- id: "L11402-Q09"
  topic_code: "L11402"
  item_code: "L11402"
  difficulty: 2
  question: "合成數據增強（Synthetic Data Augmentation）中，生成式AI扮演什麼角色？"
  options:
    a: "直接替代人工標註，產出最終預測結果"
    b: "完全取代真實資料，因為合成資料品質更高且無隱私問題"
    c: "生成額外的訓練資料，提升鑑別式模型在稀缺場景的辨識能力"
    d: "篩選並過濾掉品質不佳的真實訓練資料"
  correct: "c"
  explanation:
    why_correct: "合成數據增強的核心概念是利用生成式AI（如GAN）產生逼真的合成資料，補充真實資料的不足（如罕見病例、極端天候場景），讓鑑別式模型獲得更充分的訓練資料。"
    why_not_a: "合成數據的目的是擴充訓練集，不是替代人工標註或直接產出預測結果。最終預測仍由鑑別式模型負責。"
    why_not_b: "合成數據是用來「增強」而非「取代」真實資料。合成資料可能帶有生成模型的偏差，必須與真實資料混合使用。"
    why_not_d: "篩選和過濾是鑑別式AI或資料前處理的工作，不是生成式AI在合成數據增強中的角色。生成式AI的角色是「產出新資料」。"
  keywords:
    - "合成數據增強"
    - "synthetic data augmentation"
    - "GAN"
  exam_trap: false

