    why_not_a: "生成逼真假資料是「生成器（Generator）」的角色，不是判別器。這是GAN題目最常見的混淆。"
    why_not_b: "記憶體監控和效能調優屬於系統工程的範疇，不是GAN架構中判別器的AI功能角色。"
    why_not_d: "判別器不會修改或轉換生成器的輸出格式。它只做真/假的二元判斷，是評審而非格式轉換器。"
