  question: "比較「GAN協作模式」與「管線串接模式（如ASR→NLP→TTS）」，兩者在鑑別式AI與生成式AI的協作方式上有何關鍵差異？"
  options:
    a: "GAN是鑑別式和生成式同時對抗訓練；管線串接是依序接力處理不同任務"
    b: "GAN的鑑別式和生成式處理相同類型的資料；管線串接處理不同類型的資料"
    c: "GAN僅用於影像領域；管線串接僅用於語音領域"
    d: "兩者的協作方式本質相同，只是應用場景不同"
  correct: "a"
  explanation:
    why_correct: "GAN的核心是生成器和判別器在訓練階段進行對抗式博弈（同時互動），兩者的能力在對抗中共同提升；管線串接則是不同AI模組按照順序依次處理（A的輸出是B的輸入），各模組獨立訓練、推論時串聯。這是協作方式上最本質的差異。"
    why_not_b: "這雖有一定道理（GAN處理同類資料如影像，管線處理不同類如語音→文字→語音），但不是最關鍵的差異，且GAN也可用於文字等不同領域。"
    why_not_c: "GAN可用於影像、文字、音訊等多個領域；管線串接也不限於語音（例如NLP管線）。"
    why_not_d: "兩者的協作方式有本質差異——對抗式同步訓練vs.序列式接力推論。"
