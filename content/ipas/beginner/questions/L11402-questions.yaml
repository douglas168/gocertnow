  item_code: "L11402"
  difficulty: 3
  question: "某製造業工廠希望提升產品瑕疵檢測的準確率，但目前只有少量瑕疵品的影像資料。下列哪種方案最適合解決此問題？"
  options:
    a: "使用GAN生成合成瑕疵影像來擴充訓練資料集"
    b: "降低檢測模型的判斷閾值，讓更多產品被判定為瑕疵品"
    c: "直接使用預訓練的通用影像分類模型進行檢測"
    d: "增加人工檢測員取代AI系統"
  correct: "a"
  explanation:
