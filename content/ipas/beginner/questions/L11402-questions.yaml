  difficulty: 5
  question: "某醫院計畫建置AI輔助診斷系統，需求包含：(1)分析病患X光片偵測異常、(2)擴充罕見病例的訓練資料、(3)自動產出診斷報告。預算有限，只能優先導入兩個模組。院方最在意「提升診斷準確率」，但主治醫師也反映目前花大量時間手寫報告。在同時考量準確率優先與醫師負擔的情況下，最佳的導入決策與理由為何？"
  options:
    a: "先導入(1)和(2)——先用鑑別式AI偵測異常，再用生成式AI合成罕見病例擴充訓練集，因為診斷準確率取決於偵測模型的品質，而罕見病例的合成數據能直接強化偵測能力。雖然醫師報告負擔未解，但準確率是生命安全議題，應優先。"
    b: "先導入(1)和(3)——偵測異常搭配報告生成，同時解決準確率和醫師負擔兩個問題"
    c: "先導入(2)和(3)——先累積合成資料再生成報告，最後才建偵測模型"
    d: "三個同時導入——AI系統必須完整才能運作"
  correct: "a"
  explanation:
    why_correct: "此題要求在「準確率優先」與「醫師負擔」兩個目標間做取捨判斷。(1)X光片異常偵測（鑑別式AI）是核心診斷功能，(2)合成罕見病例（生成式AI/GAN）直接強化偵測模型在稀缺案例上的辨識能力。兩者形成合成數據增強的整合模式，對準確率的提升最直接。(3)報告生成雖然能減輕醫師負擔，但屬於效率議題而非安全議題，在預算受限下應讓位給生命安全優先的準確率提升。"
    why_not_b: "此選項看似兼顧兩個目標，但報告生成(3)對診斷準確率沒有貢獻。放棄(2)意味著偵測模型仍缺乏罕見病例的訓練資料，在最關鍵的準確率目標上留下缺口。"
    why_not_c: "沒有偵測模型(1)就無法進行診斷，合成資料(2)也失去訓練目標。且報告生成(3)依賴偵測結果作為輸入，邏輯順序不對。"
    why_not_d: "預算有限的條件下只能先導入兩個模組，且實務上AI系統常採分階段導入策略，不需要一次全部到位。"
  keywords:
    - "醫療AI"
    - "整合應用"
    - "多模組系統"
    - "合成數據"
    - "取捨評估"
  exam_trap: false

- id: "L11402-Q26"
  topic_code: "L11402"
  item_code: "L11402"
  difficulty: 5
  question: "某電信公司要建立「AI語音防詐系統」，來電先經過聲紋辨識確認身份，同時以Deepfake語音偵測判斷是否為AI合成語音。研發團隊爭論是否還需要加入ASR語音辨識模組。支持方認為加入ASR可以分析通話內容中的詐騙話術模式，反對方認為兩道鑑別式防線已經足夠。下列哪個評估最合理？"
  options:
    a: "反對方正確——聲紋辨識+Deepfake偵測已涵蓋所有詐騙形式，ASR是多餘的"
    b: "支持方正確——但應將ASR替換為TTS語音合成，因為TTS可以模擬詐騙者聲音來訓練系統"
    c: "支持方的方向正確——聲紋和Deepfake偵測只檢查「誰在說」和「聲音是否真實」，但無法分析「說了什麼」；加入ASR轉錄後再做內容分析，能捕捉到聲音特徵正常但話術可疑的詐騙類型"
    d: "兩方都錯——應該只用一個通用大型語言模型同時處理所有語音防詐任務"
  correct: "c"
  explanation:
    why_correct: "這是一道需要評估多個技術層面的題目。聲紋辨識檢查「是不是本人」，Deepfake偵測檢查「聲音是否AI合成」，但兩者都不分析通話內容。如果詐騙者用自己的真實聲音（非AI合成）說出詐騙話術，前兩道防線都無法攔截。加入ASR將語音轉為文字後，再用NLP分析詐騙關鍵字和話術模式，能補上這個缺口，形成更完整的三層防護。"
    why_not_a: "聲紋+Deepfake偵測無法辨識「真人聲音但內容為詐騙話術」的情境。防詐系統需要從聲音真偽和內容語意兩個維度來判斷。"
    why_not_b: "TTS是語音合成（生成式），不是語音辨識。在防詐的即時偵測管線中，需要的是ASR（鑑別式，將語音轉文字進行內容分析），而非TTS。TTS可能在離線訓練階段有用，但不能替代ASR的即時內容分析功能。"
    why_not_d: "語音防詐涉及即時性要求極高的多種專門任務（聲紋比對、Deepfake偵測、語音轉文字、話術分析），用單一通用模型處理會犧牲速度和精確度，不如專門模型分工的管線架構。"
  keywords:
    - "語音防詐"
    - "ASR"
    - "聲紋辨識"
    - "Deepfake偵測"
    - "管線架構評估"
  exam_trap: true

- id: "L11402-Q27"
  topic_code: "L11402"
  item_code: "L11402"
  difficulty: 5
  question: "某企業正在評估AI導入方案。業務需求為：「分析客戶來電內容，找出投訴熱點議題，並自動生成週報摘要給管理層。」下列哪個技術組合最完整且正確？"
  options:
    a: "ASR（語音→文字）→ 文字分類（投訴分類）→ 主題聚類（找出熱點）→ 語言模型生成週報"
    b: "TTS（語音合成）→ 情感分析 → 關鍵字抽取 → 人工撰寫週報"
    c: "語音辨識 → 直接使用語音合成（TTS）生成投訴摘要報告"
    d: "聲紋辨識 → 情緒分析 → GAN生成模擬來電 → 語言模型摘要"
  correct: "a"
  explanation:
    why_correct: "完整的管線為：ASR將語音轉為文字（鑑別式）→ 文字分類找出投訴類型（鑑別式）→ 主題聚類分析熱點議題（鑑別式/非監督）→ 語言模型自動生成週報摘要（生成式），涵蓋從鑑別到生成的完整整合流程。"
    why_not_b: "TTS是文字轉語音，不是語音轉文字——第一步就用錯了工具。且「人工撰寫週報」沒有利用生成式AI，不符合自動化需求。"
    why_not_c: "TTS是語音合成工具（文字→語音），不具備語意理解或文字生成能力，無法從文字轉錄中提取投訴主題或產出摘要報告，完全跳過了語意分析這一關鍵環節。"
    why_not_d: "聲紋辨識是識別「誰在說話」，不是理解「說了什麼」；GAN生成模擬來電與業務需求無關，是不必要的環節。"
  keywords:
    - "管線串接"
    - "ASR"
    - "文字分類"
    - "語言模型"
    - "企業應用"
  exam_trap: false

- id: "L11402-Q28"
  topic_code: "L11402"
  item_code: "L11402"
  difficulty: 5
  question: "某自駕車公司需要同時提升偵測模型的安全性與訓練效率。在資源有限的情況下，下列哪種鑑別式與生成式AI的整合策略最能同時達成這兩個目標？"
  options:
    a: "用生成式AI模擬極端駕駛場景（暴雨、逆光、行人突然出現），供鑑別式偵測模型在虛擬環境中訓練"
    b: "用鑑別式AI生成模擬場景，用生成式AI偵測場景中的障礙物"
    c: "用生成式AI合成大量一般道路場景，但不包含極端天候或罕見事故情境"
    d: "用生成式AI直接取代鑑別式偵測模型，統一處理偵測與場景模擬"
  correct: "a"
  explanation:
    why_correct: "生成式AI模擬極端場景是合成數據增強的典型應用——真實道路很難安全重現暴雨、逆光等危險情境，而生成式AI可以大量合成這些場景，讓鑑別式偵測模型「提前見過」各種罕見危險。這同時提升了安全性（覆蓋更多極端場景）和訓練效率（不需實地蒐集稀缺資料）。"
    why_not_b: "角色搞反了——場景模擬是生成式AI的工作（創造新內容），障礙物偵測是鑑別式AI的工作（分類判斷）。"
    why_not_c: "一般道路場景的真實資料通常已經充足，合成一般場景對提升安全性的邊際效益很低。資源有限時，應優先合成真實世界中難以蒐集的極端場景（暴雨、逆光、行人突衝等），這才是偵測模型的安全性瓶頸所在。"
    why_not_d: "偵測任務（即時分類路上物件）和場景模擬（合成訓練資料）是根本不同的任務，無法用單一模型取代。且鑑別式模型在即時偵測的速度和精確度上仍優於通用生成式模型。"
  keywords:
    - "自駕車"
    - "合成數據增強"
    - "場景模擬"
    - "整合策略"
  exam_trap: false

- id: "L11402-Q29"
  topic_code: "L11402"
  item_code: "L11402"
  difficulty: 5
  question: "某公司需要建立「客服品質監控系統」，需求為：(1)即時分析客服通話內容、(2)偵測客戶不滿情緒並自動分級、(3)每週自動產出品質報告。團隊爭論該採用哪種整合模式。考量到系統需要即時處理大量通話且各環節的技術成熟度不同（語音辨識和情緒分類已有成熟的專門模型，但報告生成仍在快速演進中），哪個模式最適合且理由最完整？"
  options:
    a: "應採用管線串接模式——ASR轉文字→情緒分類→報告生成，因為各環節任務明確且需依序處理，管線架構讓每個模組可獨立升級（例如報告生成模組可單獨更換更好的語言模型），不影響前面已穩定的辨識和分類模組"
    b: "應採用GAN協作模式——讓生成器模擬客訴對話，鑑別器判斷情緒，因為GAN是最強大的整合方式"
    c: "應採用RAG模式——從歷史通話中檢索相似案例，再生成品質報告"
    d: "應採用合成數據增強——先生成模擬通話資料來訓練情緒偵測模型，再部署即時系統"
  correct: "a"
  explanation:
    why_correct: "此題要求評估哪種整合模式最適合，並考量技術成熟度差異。管線串接的核心優勢是模組化：ASR（鑑別式，語音→文字）→ 情緒分類（鑑別式，分級不滿程度）→ 報告生成（生成式，產出週報）。各模組獨立運作，成熟的ASR和情緒分類模組可穩定服務，而快速演進的報告生成模組可單獨替換升級，不需要重建整個系統。這種可維護性和靈活性是其他模式難以比擬的。"
    why_not_b: "GAN協作的核心是生成器與鑑別器的對抗訓練，適用於提升生成品質（如影像生成），不適合即時分析通話內容這種管線式處理需求。不能因為GAN強大就盲目套用——選擇整合模式要基於任務特性，而非模型名氣。"
    why_not_c: "RAG適合「有問必答」的知識問答場景（如企業知識庫客服），但此需求是即時分析通話+偵測情緒+生成報告的管線流程，不是檢索+回答的模式。"
    why_not_d: "合成數據增強適合「訓練資料不足」的場景（如罕見瑕疵圖片）。若公司已有大量歷史通話錄音，則訓練資料充足，不需要合成數據作為主要解決方案。且此選項只解決模型訓練問題，未涵蓋即時處理和報告生成的完整需求。"
  keywords:
    - "整合模式評估"
    - "管線串接"
    - "模組化架構"
    - "技術成熟度"
  exam_trap: false

- id: "L11402-Q30"
  topic_code: "L11402"
  item_code: "L11402"
  difficulty: 5
  question: "某新創公司計畫開發「AI音樂製作平台」，功能包含四個步驟：(1)辨識使用者哼唱的音高節奏、(2)判斷音樂風格分類、(3)自動編曲生成完整歌曲、(4)偵測是否與既有歌曲旋律相似（版權風險）。為什麼「鑑別式→鑑別式→生成式→鑑別式」是這四個步驟最合理的排列？有人提議將步驟(4)移到步驟(2)之後（先檢查版權再生成），為什麼這個替代方案行不通？"
  options:
    a: "因為辨識和分類是「分辨」動作（鑑別式），編曲是「創造」動作（生成式），版權偵測是「比對」動作（鑑別式）；且步驟(4)必須在(3)之後，因為版權比對的對象是「AI生成的完整歌曲」——在歌曲生成之前根本沒有內容可以比對"
    b: "因為所有分析步驟都必須在生成之前完成，這是AI系統的固定規則"
    c: "因為鑑別式AI的運算速度比生成式快，所以都放在前面處理"
    d: "替代方案其實可行——先檢查哼唱旋律的版權再生成，能避免浪費運算資源"
  correct: "a"
  explanation:
    why_correct: "此題要求評估步驟順序的合理性並判斷替代方案。(1)辨識音高節奏是特徵提取（鑑別式），(2)風格判斷是分類（鑑別式），這兩步提供生成所需的輸入資訊；(3)編曲生成需要前兩步的結果才能產出符合風格的歌曲（生成式）；(4)版權偵測必須在歌曲生成之後，因為比對的是「完整生成歌曲」與「既有歌曲」的旋律相似度。替代方案（先查版權再生成）不可行，因為步驟(1)只是片段哼唱的音高節奏，不足以做可靠的版權比對——版權風險來自AI編曲後的完整旋律組合，而非使用者的原始哼唱。"
    why_not_b: "並非所有分析都必須在生成之前——步驟(4)的版權偵測也是鑑別式分析，但它必須在生成之後。順序由任務間的輸入輸出依賴決定，不存在「所有分析先於生成」的固定規則。"
    why_not_c: "步驟順序由任務邏輯（前一步的輸出是後一步的輸入）決定，不是由運算速度決定。且鑑別式不一定比生成式快。"
    why_not_d: "使用者哼唱的片段旋律與最終AI編曲生成的完整歌曲差異很大，拿片段哼唱做版權比對結果不可靠——可能漏報（哼唱不像但編曲結果像）或誤報（哼唱像但編曲結果不像）。版權風險產生在生成階段之後，必須用生成後的完整作品來比對。"
  keywords:
    - "音樂生成"
    - "多模組整合"
    - "鑑別式與生成式交替"
    - "版權偵測"
    - "順序評估"
  exam_trap: false
