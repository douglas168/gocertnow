- id: "L12301-Q41"
  topic_code: "L12301"
  item_code: "L12301-guide"
  difficulty: 2
  question: "根據《AI導入指引》的四階段框架，正確的執行順序為何？"
  options:
    a: "構想評估→方案設計→驗證/POC→實施/營運"
    b: "方案設計→構想評估→實施/營運→驗證/POC"
    c: "驗證/POC→構想評估→方案設計→實施/營運"
    d: "構想評估→驗證/POC→方案設計→實施/營運"
  correct: "a"
  explanation:
    why_correct: "四階段的正確順序是：構想評估（釐清痛點與AI適配性）→方案設計（定義KPI與規劃場景）→驗證/POC（小規模概念驗證）→實施/營運（全面部署與監控）。記憶口訣：「構方驗實」。"
    why_not_b: "方案設計不能排在構想評估之前——必須先確認業務痛點和AI適配性，才有設計方案的依據。學生容易因為「設計」聽起來像起點而選錯。"
    why_not_c: "驗證/POC不可能排在第一步——沒有經過構想評估和方案設計，根本不知道要驗證什麼。"
    why_not_d: "這個順序跳過了方案設計直接進入POC，但POC需要先有明確的KPI和場景規劃（方案設計的產出）才能進行有效驗證。"
  keywords:
    - "AI導入指引"
    - "四階段框架"
    - "構方驗實"
  exam_trap: false

- id: "L12301-Q42"
  topic_code: "L12301"
  item_code: "L12301-solution"
  difficulty: 3
  question: "在選擇AI解決方案時，企業面臨三種主要路徑：自行開發（Build）、購買現成方案（Buy）、訂閱雲端SaaS服務。下列關於這三種路徑的比較，何者最為準確？"
  options:
    a: "自行開發的客製化程度最高但前期投入最大，SaaS啟用最快但客製化受限，購買現成方案介於兩者之間"
    b: "SaaS服務的總體擁有成本一定最低，因此中小企業應一律選擇SaaS"
    c: "自行開發只適合科技公司，非科技產業應完全排除此選項"
    d: "購買現成方案和SaaS本質相同，差別僅在付費方式不同"
  correct: "a"
  explanation:
    why_correct: "Build vs Buy vs SaaS的核心差異在於「客製化程度、前期投入、啟用速度」三個維度的取捨。自行開發（Build）客製化最高但需大量人力與時間投入；SaaS啟用最快、前期成本最低但受限於供應商功能；Buy介於兩者之間，提供一定客製化空間。企業應根據自身需求、技術能力與預算選擇最適路徑。"
    why_not_b: "SaaS的月費/年費長期累積可能超過一次性購買或自建的成本，尤其在大量使用或需高度客製化的場景。「一定最低」忽略了規模和時間維度的成本分析。"
    why_not_c: "非科技公司也可以透過招聘或外包來自行開發，關鍵在於需求的獨特性和長期戰略價值，而非產業類別。學生容易將「開發」與「科技公司」畫等號。"
    why_not_d: "Buy通常是一次性購買+本地部署（資料留在企業內），SaaS是訂閱制+雲端運行（資料在供應商端）。兩者在資料控制權、維護責任、客製化空間上都有本質差異，不只是付費方式不同。"
  keywords:
    - "解決方案選擇"
    - "Build vs Buy vs SaaS"
    - "solution selection"
  exam_trap: false
