- id: "L12301-Q20"
  topic_code: "L12301"
  item_code: "L12301-cba"
  difficulty: 4
  question: "一家公司在評估導入生成式AI翻譯工具時，發現API費用為每月NT$3,000，但完整導入需要追加NT$50,000的員工培訓費和NT$30,000的資料整理費。這個案例最能說明成本效益分析（CBA）中的什麼概念？"
  options:
    a: "隱性成本（Hidden Costs）遠超顯性成本"
    b: "API費用是AI導入中最需要控制的主要成本項目"
    c: "只要選擇開源模型就能大幅降低這些額外支出"
    d: "培訓與資料整理屬於一次性投入，長期不影響總體成本"
  correct: "a"
  explanation:
    why_correct: "API費用（NT$3,000/月）是容易看到的顯性成本，但培訓費和資料整理費合計NT$80,000才是真正的大宗——這正是隱性成本遠超顯性成本的典型案例。識別隱性成本是CBA的關鍵能力。"
    why_not_b: "這是最常見的誤判——學生看到API費用是最明顯的數字就以為它是大頭，但實際上API僅佔總成本的極小比例（產業調查為5-15%）。識別「顯性成本不等於主要成本」是隱性成本分析的核心。"
    why_not_c: "開源模型免去了授權費，但員工培訓、資料整理、系統整合等隱性成本依然存在甚至更高（因為開源模型需要更多技術人力來部署和維護）。學生容易誤以為「免費模型=低總成本」。"
    why_not_d: "培訓需要隨工具更新而重複投入，資料整理更是持續性工作（新資料不斷產生）。將這些歸為「一次性」是低估隱性成本的典型思維陷阱。"
  keywords:
    - "隱性成本"
    - "hidden costs"
    - "CBA"
  exam_trap: false

