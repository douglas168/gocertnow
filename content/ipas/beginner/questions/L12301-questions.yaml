  item_code: "L12301-perf"
  difficulty: 5
  question: "某製造業公司導入AI品質檢測系統後，瑕疵檢出率（Defect Detection Rate）從85%提升至97%，但誤報率（False Positive Rate）也從2%增加到12%。綜合效能評估，下列哪一項判斷最為合理？"
  options:
    a: "檢出率提升就是成功，誤報率增加是可接受的代價"
    b: "應立即降低AI的敏感度以減少誤報"
    c: "AI品質檢測系統不可靠，應恢復人工檢測"
    d: "需要量化誤報處理的額外成本，與漏檢瑕疵的損失成本進行比較，再決定最佳靈敏度設定"
  correct: "d"
  explanation:
    why_correct: "這是經典的精確率-召回率（Precision-Recall）權衡。正確的效能評估應量化兩端的成本：誤報的額外重檢成本 vs 漏檢瑕疵流入市場的損失成本，找到經濟最優的靈敏度設定點。"
    why_not_a: "誤報率從2%到12%是6倍增長，如果每次誤報都需要人工覆核，額外成本可能很高，不能輕易忽略。"
    why_not_b: "盲目降低敏感度可能讓檢出率回落，需要先分析成本再決定，而非憑直覺調整。"
    why_not_c: "AI系統仍有97%的檢出率（優於原本的85%），放棄過於極端。問題在於找到最佳平衡點。"
  keywords:
