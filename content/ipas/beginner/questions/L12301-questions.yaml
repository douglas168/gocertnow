- id: "L12301-Q12"
  topic_code: "L12301"
  item_code: "L12301-agent"
  difficulty: 2
  question: "關於AI代理（AI Agent）的運作機制，下列哪一項描述最為準確？"
  options:
    a: "AI代理透過「觀察→決策→行動」的循環來完成多步驟任務"
    b: "AI代理只能回答問題，無法主動執行任務"
    c: "AI代理不具備記憶功能，每次互動都從零開始"
    d: "AI代理在任務完成後會自主學習並永久更新自身的推理模型"
  correct: "a"
  explanation:
    why_correct: "AI代理的核心運作機制是observe → decide → act的循環，結合LLM推理、工具呼叫與記憶保持，自主完成多步驟任務。"
    why_not_b: "AI代理的核心特徵就是「主動執行任務」，不僅是被動回答問題。"
    why_not_c: "記憶（memory）是AI代理的關鍵元件之一，使其能在多步驟任務中保持上下文。"
    why_not_d: "AI代理的記憶（memory）是工作記憶，用於當前任務的上下文保持，並非永久性的模型權重更新。學生容易將「記憶保持」誤解為「自主學習並改進模型」，但Agent不會自動重新訓練自己。"
  keywords:
    - "AI代理"
    - "AI Agent"
    - "observe-decide-act"
  exam_trap: false

