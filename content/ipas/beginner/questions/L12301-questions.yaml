  correct: "a"
  explanation:
    why_correct: "自建部署讓資料留在企業內部，適合高安全需求；雲端API免去基礎設施建置，適合快速啟用且需要彈性擴縮的場景。兩者各有適用情境。"
    why_not_b: "不一定——雲端服務商的資料可能經過多方傳輸，自建部署的資料完全不出企業反而隱私保護更強。"
    why_not_c: "事實相反——自建部署的初始成本通常較高（需購買硬體、招聘人才），但長期在大量使用下可能更經濟。"
    why_not_d: "這個描述雖然部分正確，但將選擇簡化為「客製化程度」的單一維度。實際決策的關鍵差異是「資料控制權與部署彈性」——自建部署讓資料留在企業內部且可彈性擴縮，雲端API的核心優勢是快速啟用和低前期成本，客製化只是次要考量。"
  keywords:
    - "工具評估"
