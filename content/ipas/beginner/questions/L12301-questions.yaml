- id: "L12301-Q33"
  topic_code: "L12301"
  item_code: "L12301-cba"
  difficulty: 5
  question: "某公司正在進行生成式AI翻譯系統的成本效益分析（CBA），面臨以下情境：帳面ROI為正，但隱性成本項目（資料治理、員工培訓、系統維護）尚未完全量化，且部門主管急於全面部署。下列哪一項CBA決策原則最為合理？"
  options:
    a: "帳面ROI為正即可全面部署，隱性成本可在營運後逐步釐清"
    b: "應先完成隱性成本的量化評估，建立持續性成本的追蹤機制，再決定部署規模"
    c: "隱性成本無法準確預估，因此CBA對AI專案沒有實質參考價值"
    d: "只要API呼叫費用可控，其他成本項目對整體ROI影響不大"
  correct: "b"
  explanation:
    why_correct: "CBA的核心價值在於「完整成本可視化」。帳面ROI為正但隱性成本未量化，代表決策基礎不完整。正確做法是先量化所有隱性成本（資料治理是持續性的、培訓可能需重複投入、系統維護隨規模增長），建立追蹤機制後再決定部署規模，避免全面部署後才發現成本失控。"
    why_not_a: "學生常因「ROI為正」就判斷可行，但未量化的隱性成本可能在營運後大幅侵蝕帳面效益，這是企業AI導入失敗的最常見原因。"
    why_not_c: "隱性成本確實難以精確預估，但透過產業基準、POC數據和專家估算仍可建立合理範圍，CBA仍是決策的重要依據。"
    why_not_d: "根據產業調查，API費用僅佔AI導入總成本的5-15%，人才培訓和資料治理才是大宗——忽略這些會嚴重低估總成本。"
  keywords:
    - "成本效益分析"
    - "ROI"
    - "隱性成本"
    - "決策原則"
  exam_trap: false

