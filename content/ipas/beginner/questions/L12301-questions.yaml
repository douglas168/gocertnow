    c: "暫緩部署，等到各國法規統一後再進行"
    d: "採用統一的AI平台架構，但允許各區域根據法規與語言需求選擇不同的底層模型"
  correct: "d"
  explanation:
    why_correct: "統一架構確保管理一致性和資料互通，區域化模型選擇尊重各地法規（如歐盟GDPR）和語言需求——這是「全球化思維、在地化執行」的最佳實踐。"
    why_not_a: "單一工具無法適應5國不同的法規和語言需求，強制統一可能導致某些國家違規。"
    why_not_b: "完全放任會造成工具碎片化、資料互通困難、治理成本暴增。"
    why_not_c: "各國法規統一是不現實的期望，且等待策略會失去競爭優勢。"
  keywords:
    - "工具評估"
    - "解決方案選擇"
    - "全球化部署"
    - "法規合規"
  exam_trap: false

- id: "L12301-Q40"
  topic_code: "L12301"
  item_code: "L12301-solution"
  difficulty: 5
  question: "某新創公司的CEO堅持導入最新的AI技術來提升競爭力，但CTO評估認為目前團隊技術能力不足、資料品質不佳、且預算有限。根據導入評估的完整框架，最合理的建議是什麼？"
  options:
    a: "尊重CEO的商業直覺，立即導入最新AI技術"
    b: "支持CTO的技術判斷，完全放棄AI導入計畫"
    c: "建議從小規模POC開始，同步提升團隊能力與資料品質，以漸進方式驗證AI導入價值"
    d: "聘請外部AI顧問全權處理，避免內部衝突"
  correct: "c"
  explanation:
    why_correct: "此情境結合了技術評估（能力不足）、成本效益分析（預算有限）和解決方案選擇（需求vs現實落差）。正確做法是從低風險的小規模POC切入，同步投資團隊培訓與資料治理，漸進式驗證，兼顧CEO的發展願景和CTO的風險顧慮。"
    why_not_a: "忽視技術團隊能力不足和資料品質問題，貿然導入最新技術風險極高，很可能導致失敗。"
    why_not_b: "完全放棄AI也不合理——AI是趨勢，問題在於導入方式而非是否導入。"
    why_not_d: "外部顧問可以協助，但不能「全權處理」——企業必須建立自己的AI能力，否則對外依賴是長期風險。"
  keywords:
    - "導入評估"
    - "POC"
    - "漸進式導入"
    - "技術評估"
    - "成本效益"
