- id: "L12301-Q01"
  topic_code: "L12301"
  item_code: "L12301-guide"
  difficulty: 1
  question: "經濟部產業發展署《AI導入指引》將AI導入流程分為幾個階段？"
  options:
    a: "三個階段"
    b: "四個階段"
    c: "五個階段"
    d: "六個階段"
  correct: "b"
  explanation:
    why_correct: "《AI導入指引》明確定義四個階段：構想評估、方案設計、驗證/POC、實施/營運。"
    why_not_a: "三個階段遺漏了方案設計或驗證階段，不符合官方框架的完整結構。"
    why_not_c: "五個階段是學生容易多加一個「維護」或「回饋」階段的常見錯誤，官方只有四階段。記憶口訣：「構方驗實」（構想評估→方案設計→驗證POC→實施營運）。"
    why_not_d: "六個階段過多，《AI導入指引》採用精簡的四階段框架。記憶口訣：「構方驗實」——四個字對應四個階段，多一個少一個都不對。"
