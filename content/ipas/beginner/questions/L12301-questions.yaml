  options:
    a: "技術評估關注企業端基礎設施，模型評估關注AI模型本身的性能表現"
    b: "技術評估只看硬體，模型評估只看軟體"
    c: "技術評估在POC之後進行，模型評估在POC之前進行"
    d: "技術評估由IT部門負責，模型評估由業務部門負責"
  correct: "a"
  explanation:
    why_correct: "技術評估檢視「企業端」的基礎設施（算力、網路、資料環境等能否支援AI），模型評估則檢視「AI模型本身」的性能（準確率、延遲、成本等是否符合需求），兩者觀察的對象不同。"
    why_not_b: "技術評估不僅看硬體，也看資料環境和人才；模型評估也涉及硬體需求（如模型對GPU的要求）。過度簡化的二分法不正確。"
    why_not_c: "兩者的時序沒有固定的先後關係，可以並行或在同一階段進行。"
    why_not_d: "雖然職責分工可能如此，但這不是兩種評估的「關鍵差異」，核心差異在於評估對象不同。"
