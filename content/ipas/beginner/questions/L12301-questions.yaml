- id: "L12301-Q03"
  topic_code: "L12301"
  item_code: "L12301-agent"
  difficulty: 1
  question: "AI代理（AI Agent）與傳統單次提示（Single-Prompt）生成式AI工具的最大差異是什麼？"
  options:
    a: "AI代理能自主執行多步驟任務並使用外部工具"
    b: "AI代理的核心優勢在於能產生更高品質的文字輸出"
    c: "AI代理不需要大型語言模型就能運作"
    d: "AI代理主要是透過更大的模型參數量來提升回答品質"
  correct: "a"
  explanation:
    why_correct: "AI代理的核心特徵是「自主多步驟執行 + 工具呼叫（tool-calling）+ 記憶保持」，這是它與單次提示GenAI最根本的區別。"
    why_not_b: "文字輸出品質取決於底層LLM，不是Agent架構的差異。AI代理的核心差異是「自主多步驟執行+工具呼叫」，而非輸出品質。學生容易混淆「更聰明」和「能做更多事」。"
    why_not_c: "AI代理的核心元件就是大型語言模型（LLM），沒有LLM就無法進行推理與決策。"
    why_not_d: "Agent架構與模型參數量無關——小型模型也能作為Agent的推理核心，大型模型也可能只用於單次提示。學生容易將「更強的AI」等同於「更大的模型」。"
  keywords:
    - "AI代理"
    - "AI Agent"
    - "tool-calling"
  exam_trap: false

