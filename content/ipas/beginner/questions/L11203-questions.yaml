- id: "L11203-Q19"
  topic_code: "L11203"
  item_code: "L11203"
  difficulty: 4
  question: "「去識別化（De-identification）」與「假名化（Pseudonymization）」的最主要差異為何？"
  options:
    a: "去識別化適用於結構化資料，假名化適用於非結構化資料"
    b: "去識別化是永久且不可逆地移除識別資訊；假名化只是暫時替換識別欄位，透過輔助資訊仍可重新識別"
    c: "假名化比去識別化提供更強的保護，去識別化後的資料仍屬於個人資料"
    d: "兩者在GDPR下的法律效果相同，都不再受個資法規範"
  correct: "b"
  explanation:
    why_correct: "核心差異在於「可逆性」：去識別化（廣義，含匿名化）的最終形態是永久切斷個人連結，無法重新識別；假名化則是用假名或代碼替換識別欄位，但保留可重新識別的輔助資訊，連結被「暫停」而非「切斷」。GDPR明確規定假名化資料仍屬個人資料。"
    why_not_a: "去識別化與假名化的區分不是基於資料結構類型，而是基於是否能重新識別個人。"
    why_not_c: "正好相反：真正完成去識別化（匿名化）的資料不再是個人資料；假名化資料在GDPR下仍受保護，保護程度反而是去識別化更強。"
    why_not_d: "只有真正匿名化的資料才脫離GDPR規範；假名化資料在GDPR下仍是個人資料，受法規約束。"
  keywords:
    - "去識別化"
    - "假名化"
    - "可逆性"
    - "匿名化"
  exam_trap: true

- id: "L11203-Q20"
  topic_code: "L11203"
  item_code: "L11203"
  difficulty: 4
  question: "比較OECD隱私8原則與GDPR隱私7原則，下列哪一項原則是GDPR明確列出但OECD原則中「未以同名原則出現」的？"
  options:
    a: "責任原則（Accountability）"
    b: "目的限制（Purpose Limitation）"
    c: "資料最小化（Data Minimisation）"
    d: "安全保護（Security Safeguards）"
  correct: "c"
  explanation:
    why_correct: "GDPR第5條明確將「資料最小化（Data Minimisation）」列為獨立原則，要求蒐集的資料以達成目的的必要最低限度為準。OECD 8原則中的「限制蒐集原則（Collection Limitation）」概念上接近但未以「最小化」為名，且台灣個資法是用「必要範圍」的概念體現此精神，並未採用GDPR的用語。"
    why_not_a: "責任原則（Accountability）在OECD 8原則中亦有列舉（第8項），兩者都有。"
    why_not_b: "目的限制（Purpose Limitation/Use Limitation）兩者都涵蓋，OECD稱為「限制利用原則」。"
    why_not_d: "安全保護（Security Safeguards）在OECD 8原則中亦有（第5項），GDPR稱「完整性與機密性」。"
  keywords:
    - "OECD 8原則"
    - "GDPR 7原則"
    - "資料最小化"
  exam_trap: true

