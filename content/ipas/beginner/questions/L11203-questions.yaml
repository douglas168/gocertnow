- id: "L11203-Q08"
  topic_code: "L11203"
  item_code: "L11203"
  difficulty: 2
  question: "依《個人資料保護法》第2條，「利用（Use）」與「處理（Processing）」的主要區別為何？"
  options:
    a: "利用是針對資料的內部操作，處理是提供給外部使用"
    b: "處理是蒐集之後、利用之前的內部資料操作；利用是將資料做處理以外的其他使用（含對外提供）"
    c: "兩者定義完全相同，只是法律用語的差異"
    d: "利用僅限於行銷目的，處理則涵蓋所有資料操作"
  correct: "b"
  explanation:
    why_correct: "依個資法第2條，「處理」是為建立或利用資料檔案所為的內部操作（如記錄、儲存、編輯、刪除等）；「利用」則是將蒐集之個人資料作處理以外之使用，例如對外提供、分享或用於行銷。兩者在法律上有明確區分。"
    why_not_a: "正好相反，處理是內部操作，利用才包含外部使用。"
    why_not_c: "兩者定義截然不同，法律責任認定也可能因此有所差異，不可視為相同。"
    why_not_d: "利用並不限於行銷目的，只要是蒐集後作「處理以外之使用」皆屬利用。"
  keywords:
    - "利用"
    - "處理"
    - "蒐集處理利用"
  exam_trap: false

- id: "L11203-Q09"
