- id: "L11203-Q02"
  topic_code: "L11203"
  item_code: "L11203"
  difficulty: 1
  question: "資訊安全CIA三元素中，「機密性（Confidentiality）」的定義為何？"
  options:
    a: "確保資訊只有在需要時才能被存取與使用"
    b: "確保資料的完整性，不被未授權的人員竄改"
    c: "採用適當安全機制保護資料，避免暴露於無權限人員或程式之下"
    d: "確保系統在任何時候都能持續正常運作"
  correct: "c"
  explanation:
    why_correct: "機密性（Confidentiality）是指透過適當安全機制保護資料，防止無授權人員或程式存取，核心概念是「防止未授權存取」。"
    why_not_a: "「在需要時可存取使用」是可用性（Availability）的定義，屬於CIA中的A。"
    why_not_b: "「不被未授權人員竄改」是完整性（Integrity）的定義，屬於CIA中的I。"
    why_not_d: "「系統持續正常運作」是可用性（Availability）的定義，屬於CIA中的A。"
  keywords:
    - "CIA三元素"
    - "機密性"
    - "Confidentiality"
  exam_trap: false

