- id: "L11203-Q04"
  topic_code: "L11203"
  item_code: "L11203"
  difficulty: 1
  question: "依據台灣《個人資料保護法》第2條，下列何者屬於「處理（Processing）」的具體行為？"
  options:
    a: "以任何方式取得個人資料"
    b: "將蒐集之個人資料提供給第三方行銷使用"
    c: "將個人資料進行輸入、儲存、編輯、更正或刪除"
    d: "以電話方式向資料當事人查詢個人資料"
  correct: "c"
  explanation:
    why_correct: "個資法第2條定義「處理」為：為建立或利用個人資料檔案所為資料之記錄、輸入、儲存、編輯、更正、複製、檢索、刪除、輸出、連結或內部傳送，核心是針對資料檔案的內部操作。"
    why_not_a: "「以任何方式取得個人資料」是「蒐集（Collection）」的定義。"
    why_not_b: "「將蒐集之個人資料提供給第三方」是「利用（Use）」的行為，因為是處理以外的使用。"
    why_not_d: "向當事人查詢屬於蒐集的一種方式，不是個資法定義的「處理」。"
  keywords:
    - "蒐集處理利用"
    - "個資法第2條"
    - "處理定義"
