- id: "L11203-Q26"
  topic_code: "L11203"
  item_code: "L11203"
  difficulty: 5
  question: "一家AI新創公司打算將用戶在平台上輸入的問答對話，用於微調（Fine-tuning）自家的語言模型。從個資法合規角度，下列評估何者最正確？"
  options:
    a: "只要在服務條款中載明「您的資料可能用於AI訓練」，即視為合法告知，無需額外同意"
    b: "若對話中含有可識別個人的資訊，此行為可能構成個資法第2條的「處理」及「利用」，須確認符合法定蒐集目的或取得明確同意"
    c: "因訓練後的模型已與原始資料分離，對話資料用於訓練不構成個資法所稱的「利用」"
    d: "只需確保訓練用的伺服器設置在台灣境內，即可確保個資合規"
  correct: "b"
  explanation:
    why_correct: "將用戶對話用於模型訓練是「處理」（資料記錄與操作）加上「利用」（為訓練目的之使用）的雙重行為。若對話含個資，須確認此目的是否在原始蒐集目的範圍內；若否，需取得當事人明確同意，僅在服務條款中模糊揭示不足以構成有效同意（尤其對特種個資要求書面同意）。"
    why_not_a: "個資法要求的同意需明確、具體，模糊的服務條款揭示不等同有效同意，且特種個資要求書面同意。"
    why_not_c: "訓練過程本身就是對個人資料的「處理」，不因訓練後產生新模型而免除；模型可能記憶個資也是問題。"
    why_not_d: "伺服器位置影響跨境傳輸合規，但個資法的蒐集目的、同意要件並不因伺服器位置而豁免。"
  keywords:
    - "AI訓練資料"
    - "處理利用"
    - "同意要件"
    - "個資法合規"
  exam_trap: false

- id: "L11203-Q27"
  topic_code: "L11203"
  item_code: "L11203"
  difficulty: 5
  question: "某企業資安長（CISO）正在評估是否對客戶資料庫進行假名化處理，以降低資安風險。下列評估何者最完整、最正確？"
  options:
    a: "假名化後資料已不屬個人資料，可在無任何限制的情況下自由分享和使用"
    b: "假名化是有效的安全強化措施，但資料仍屬個人資料，仍須遵守個資法，且需妥善保管可重新識別的輔助資訊"
    c: "假名化與匿名化效果相同，選擇哪種方式對合規影響相同"
    d: "假名化降低了資安風險，因此完成後不再需要其他安全管控措施"
  correct: "b"
  explanation:
    why_correct: "假名化（Pseudonymization）雖能降低直接識別風險，是GDPR第25條和第32條認可的隱私強化技術，但假名化資料仍屬個人資料，仍受個資法保護。關鍵是必須妥善保護「可重新識別的輔助資訊（如對照表）」，若輔助資訊外洩，個人仍可被重新識別，假名化的保護即告失效。"
    why_not_a: "假名化後資料仍屬個人資料（GDPR與個資法均適用），不能無限制自由使用。"
    why_not_c: "假名化與匿名化在可逆性和法律地位上有根本差異：匿名化後脫離個資法規範，假名化則不然。"
    why_not_d: "假名化是多層資安防護之一，不能取代其他安全管控（如存取控制、加密、稽核記錄等）。"
  keywords:
    - "假名化"
    - "Pseudonymization"
    - "個人資料"
    - "安全強化"
  exam_trap: false

- id: "L11203-Q28"
  topic_code: "L11203"
  item_code: "L11203"
  difficulty: 5
  question: "從OECD「責任原則（Accountability Principle）」的精神，下列哪項企業做法最能體現此原則？"
  options:
    a: "每年舉辦一次全員個資教育訓練，告知員工不得洩漏個資"
    b: "指定個資管理負責人、建立內部個資管理政策、定期稽核、記錄處理活動並能向監管機關說明合規情形"
    c: "在公司網站上公告隱私政策，讓客戶可自行查閱"
    d: "購買資安保險以轉移個資外洩的財務損失風險"
  correct: "b"
  explanation:
    why_correct: "OECD責任原則（Accountability Principle）要求資料控制者對遵守各項原則「負起實質責任」，不只是形式合規。具體作法包括：指定負責人、建立完整管理政策、定期稽核、維護處理紀錄，以及能在受查時主動向監管機關舉證合規。此精神在GDPR中進一步具體化為「問責原則」。"
    why_not_a: "教育訓練是責任原則的必要元素之一，但單一訓練活動不足以全面體現需要制度性問責的責任原則。"
    why_not_c: "公告隱私政策是「公開原則（Openness）」的體現，不是責任原則的核心。"
    why_not_d: "資安保險是財務風險管理工具，不代表企業真正建立了合規管理體系，無法體現責任原則。"
  keywords:
    - "責任原則"
    - "Accountability"
    - "OECD原則"
    - "個資管理"
  exam_trap: false

- id: "L11203-Q29"
  topic_code: "L11203"
  item_code: "L11203"
  difficulty: 5
  question: "某企業員工在未告知主管的情況下，使用ChatGPT免費版分析一份含有客戶姓名、病歷摘要的文件。以下哪個評估最完整地說明此行為的個資風險？"
  options:
    a: "只要文件不包含身分證字號，就不構成個資問題"
    b: "姓名與病歷均屬個人資料（病歷為特種個資），此行為可能同時違反個資法的蒐集目的限制與特種個資保護規定，並且免費版可能將對話用於訓練造成二次外洩"
    c: "OpenAI是美國公司，台灣個資法管轄不到，無法規風險"
    d: "只要事後刪除ChatGPT的對話記錄，就可消除所有個資風險"
  correct: "b"
  explanation:
    why_correct: "此行為涉及多重風險：①姓名是個人資料（直接識別）；②病歷是個資法第6條特種個資，未有書面同意或合法依據不得蒐集或處理；③將含個資的文件傳送給第三方（OpenAI）可能構成「利用」規定的違反；④免費版可能將對話用於訓練，造成個資進入AI訓練管線的二次風險。所有這些都屬於個資法管轄範疇。"
    why_not_a: "個資的認定不限於身分證字號，「得以直接或間接方式識別個人」的資訊均屬個資，姓名加病歷極易識別個人。"
    why_not_c: "境外服務商若對台灣居民提供服務且蒐集個資，台灣個資法仍可適用（個資法第51條涉外效力），且企業員工的「利用」行為本身在台灣發生。"
    why_not_d: "對話記錄一旦送出，資料可能已進入AI服務商系統並用於訓練，刪除前端對話記錄無法消除已傳輸的風險。"
  keywords:
    - "特種個資"
    - "病歷"
    - "AI隱私風險"
    - "ChatGPT"
    - "個資法合規"
  exam_trap: false

- id: "L11203-Q30"
  topic_code: "L11203"
  item_code: "L11203"
  difficulty: 5
  question: "一家金融科技公司正評估是否使用「差分隱私（Differential Privacy）」技術發布統計報告。下列說法中，哪個評估最符合現代隱私工程的最佳實務？"
  options:
    a: "差分隱私等同於完全匿名化，發布後不再有任何重新識別風險"
    b: "差分隱私可提供數學上可量化的隱私保護，但仍需與個資法的去識別化要求一起評估，且加入雜訊會降低統計精確度，需在隱私保護與資料效用之間取得平衡"
    c: "只要導入差分隱私，即自動符合GDPR與台灣個資法的所有規定，無需其他合規措施"
    d: "差分隱私技術複雜且成本高，對中小型企業沒有實用價值"
  correct: "b"
  explanation:
    why_correct: "差分隱私（Differential Privacy）是現代隱私工程的重要技術，透過加入數學上可量化的雜訊，讓攻擊者無法從統計輸出判斷某人是否在資料集中。然而，它並不等同於完全匿名化；加入雜訊會降低統計精確度；且技術措施需配合法律合規框架一起評估，不能單獨宣告「完全合規」。最佳實務是在隱私保護強度（ε值）與資料效用之間尋求適當平衡。"
    why_not_a: "差分隱私提供機率性保護，不保證零風險，且在較小的資料集或高重複查詢下仍存在識別風險。"
    why_not_c: "技術措施不自動等同於法律合規；GDPR和個資法有組織性、程序性要求（如告知義務、當事人權利回應），非技術措施無法替代。"
    why_not_d: "差分隱私有多種實作方式，包括輕量化的局部差分隱私（Local DP），Apple、Google等公司均已在產品中應用，中小企業也可以選擇適合規模的實作。"
  keywords:
    - "差分隱私"
    - "Differential Privacy"
    - "隱私工程"
    - "去識別化"
    - "資料效用"
  exam_trap: false
