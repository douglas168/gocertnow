    why_not_d: "因快取錯誤導致跨用戶資料洩漏屬於「跨用戶資料洩漏」，是系統隔離失敗問題。"
  keywords:
    - "提示詞注入"
    - "Prompt Injection"
    - "AI隱私風險"
