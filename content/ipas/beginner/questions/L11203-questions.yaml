  item_code: "L11203"
  difficulty: 2
  question: "下列關於「匿名化（Anonymization）」的敘述，何者正確？"
  options:
    a: "匿名化後的資料仍受個資法管轄，須符合利用目的限制"
    b: "匿名化後的資料在GDPR下仍屬個人資料"
    c: "匿名化後的資料因無法識別個人，不再屬於個人資料的範疇"
    d: "匿名化與假名化的法律效果相同，都仍受個資法保護"
  correct: "c"
  explanation:
    why_correct: "真正的匿名化（Anonymization）是指資料與個人的連結被永久且不可逆地切斷，無論透過任何合理手段都無法重新識別當事人，此時資料已不屬於「個人資料」，不受個資法或GDPR約束。"
    why_not_a: "若已真正匿名化，資料已脫離個資法範疇，不再需要符合目的限制等規定。"
    why_not_b: "GDPR明確將真正匿名化的資料排除在個人資料定義之外，不適用GDPR。"
    why_not_d: "假名化與匿名化法律效果不同：假名化資料仍可透過輔助資訊重新識別，GDPR明確規定假名化資料仍屬個人資料。"
  keywords:
    - "匿名化"
    - "去識別化"
    - "Anonymization"
  exam_trap: false

