- id: "L11203-Q13"
  topic_code: "L11203"
  item_code: "L11203"
  difficulty: 3
  question: "某醫療AI新創公司想蒐集病患的基因資料用於訓練疾病預測模型。依《個人資料保護法》，該公司首要應符合哪項規定？"
  options:
    a: "只需在公司網站上公告隱私政策即可開始蒐集"
    b: "因基因資料屬特種個資，原則上禁止蒐集，除非符合第6條明定之例外情形（如取得書面同意）"
    c: "向衛生福利部提出申請，取得書面許可後即可蒐集"
    d: "只要去識別化處理後再使用，就不需要取得同意"
  correct: "b"
  explanation:
    why_correct: "基因資料屬於個資法第6條特種個資，原則上禁止蒐集、處理或利用。例外情形包括：法律明文允許、書面同意、統計或學術研究且有適當去識別化等6種。醫療AI公司首先必須確認符合其中一項例外，最常見的是取得當事人書面同意。"
    why_not_a: "公告隱私政策僅屬告知義務的一部分，不構成蒐集特種個資的合法依據。"
    why_not_c: "個資法不要求向主管機關申請許可才能蒐集（這是舊制1995年的規定），現行法是以符合法定要件為前提。"
    why_not_d: "去識別化後使用的例外（第6條第4款）適用於統計研究或學術目的，且需有適當去識別化，商業AI訓練是否符合此例外仍有疑義，且去識別化本身也需先合法蒐集。"
  keywords:
    - "特種個資"
    - "基因資料"
    - "書面同意"
    - "個資法第6條"
  exam_trap: false

- id: "L11203-Q14"
  topic_code: "L11203"
  item_code: "L11203"
  difficulty: 3
  question: "某企業的資料庫遭受DDoS攻擊，導致客戶無法正常登入使用服務長達4小時。此事件主要破壞了CIA三元素中的哪一項？"
  options:
    a: "機密性（Confidentiality）"
    b: "完整性（Integrity）"
    c: "可用性（Availability）"
    d: "機密性與完整性同時受損"
  correct: "c"
  explanation:
    why_correct: "DDoS（分散式阻斷服務攻擊）透過大量惡意流量癱瘓系統，使合法使用者無法存取服務。此類攻擊破壞的是「可用性（Availability）」，對應DAD框架中的「Denial（阻斷）」威脅，並未直接竊取或竄改資料。"
    why_not_a: "機密性受損是指資料遭未授權存取或洩漏，DDoS攻擊的目標是阻斷服務，不是竊取資料。"
    why_not_b: "完整性受損是指資料被惡意竄改，DDoS攻擊通常不直接竄改資料。"
    why_not_d: "DDoS主要針對可用性，若無同步的資料洩漏或竄改，不能說機密性與完整性同時受損。"
  keywords:
    - "DDoS"
    - "可用性"
