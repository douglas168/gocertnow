- id: "L11203-Q06"
  topic_code: "L11203"
  item_code: "L11203"
  difficulty: 1
  question: "DAD框架中，「D」所代表的第一個威脅「Disclosure（洩漏）」對應CIA三元素的哪一項？"
  options:
    a: "完整性（Integrity）"
    b: "可用性（Availability）"
    c: "機密性（Confidentiality）"
    d: "責任性（Accountability）"
  correct: "c"
  explanation:
    why_correct: "DAD框架是CIA的對立面，描述三種主要威脅：Disclosure（洩漏）威脅機密性、Alteration（竄改）威脅完整性、Denial（阻斷）威脅可用性。資料洩漏代表未授權人員存取了本應保密的資料，直接破壞機密性。"
    why_not_a: "完整性對應的威脅是Alteration（竄改），即資料被惡意修改。"
    why_not_b: "可用性對應的威脅是Denial（阻斷），例如DDoS攻擊使系統無法使用。"
    why_not_d: "責任性不屬於CIA三元素，而是OECD和GDPR原則之一。"
  keywords:
    - "DAD框架"
    - "CIA三元素"
    - "Disclosure"
  exam_trap: false

