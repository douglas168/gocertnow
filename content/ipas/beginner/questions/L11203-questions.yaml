- id: "L11203-Q22"
  topic_code: "L11203"
  item_code: "L11203"
  difficulty: 4
  question: "資訊安全威脅中，「資料庫管理員惡意竄改交易紀錄以掩蓋財務舞弊」，此攻擊主要對應DAD框架的哪個威脅，並破壞CIA中的哪項要素？"
  options:
    a: "Disclosure（洩漏）→ 機密性（Confidentiality）"
    b: "Alteration（竄改）→ 完整性（Integrity）"
    c: "Denial（阻斷）→ 可用性（Availability）"
    d: "Disclosure（洩漏）→ 完整性（Integrity）"
  correct: "b"
  explanation:
    why_correct: "惡意竄改資料記錄是「Alteration（竄改）」攻擊，直接破壞資料的「完整性（Integrity）」。完整性要求資料只能由有授權的使用者修改，確保資料維持原來的正確狀態。管理員濫用權限修改記錄即違反此要素。"
    why_not_a: "Disclosure是指資料被未授權存取或洩漏，例如資料被外部人員偷看或竊取。"
    why_not_c: "Denial是指阻斷服務使系統無法使用，例如DDoS攻擊，與竄改無關。"
    why_not_d: "Disclosure對應的是機密性，而非完整性；竄改對應的是Alteration與完整性。"
  keywords:
    - "DAD框架"
    - "Alteration"
    - "完整性"
    - "CIA三元素"
  exam_trap: false

- id: "L11203-Q23"
  topic_code: "L11203"
  item_code: "L11203"
  difficulty: 4
  question: "研究人員發現某生成式AI模型在特定提示詞下，會完整輸出訓練集中某位用戶的真實姓名與聯絡方式。此現象最正確的技術描述為何，且涉及哪種隱私風險？"
  options:
    a: "模型幻覺（Hallucination）；對應資料完整性風險"
    b: "訓練資料記憶（Training Data Memorization）；對應模型逆向攻擊風險"
    c: "提示詞注入（Prompt Injection）；對應機密性風險"
    d: "跨用戶資料洩漏（Cross-User Leakage）；對應可用性風險"
  correct: "b"
  explanation:
    why_correct: "大型語言模型有時會「記憶」訓練資料中的特定文本，並在特定條件下重現，此稱為「訓練資料記憶（Training Data Memorization）」。攻擊者刻意設計提示詞以萃取模型記憶中的個資，稱為「模型逆向攻擊（Model Inversion Attack）」，屬於AI特有的機密性隱私風險。"
    why_not_a: "幻覺是指模型生成不實但看似合理的資訊，而本題描述的是輸出「真實」個資，是記憶問題而非幻覺。"
    why_not_c: "提示詞注入是攻擊者嵌入惡意指令改變模型行為，本題是模型洩漏訓練資料，機制不同。"
    why_not_d: "跨用戶洩漏是指某用戶的對話出現在另一用戶的session中（因快取錯誤），不是訓練資料被重現。"
  keywords:
    - "訓練資料記憶"
    - "模型逆向攻擊"
    - "AI隱私風險"
    - "Model Inversion"
  exam_trap: false

