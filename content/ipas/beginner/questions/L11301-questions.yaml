- id: "L11301-Q29"
  topic_code: "L11301"
  item_code: "L11301"
  difficulty: 5
  question: "某資料科學家觀察到：「只要把驗證集合併進訓練集，模型的驗證集表現就會大幅上升，所以我們應該這樣做。」對於這個主張，下列評估何者最合理？"
  options:
    a: "合理，合併之後分數變高就代表模型變好"
    b: "不合理，合併後的「驗證集表現」其實是用模型已看過的資料評估自己，失去驗證意義，並會掩蓋真正的泛化問題"
    c: "合理，因為驗證集本來就是訓練集的一部分"
    d: "不合理，但只要最終還有測試集就沒有影響"
  correct: "b"
  explanation:
    why_correct: "驗證集的意義在於評估模型對「沒看過資料」的表現。若把它併入訓練集，後續再拿相同資料去「驗證」就不再是獨立評估，分數會虛高並隱藏過度擬合的風險。"
    why_not_a: "分數變高不代表模型真的變好，可能只是評估基準被污染。"
    why_not_c: "驗證集必須與訓練集「不重疊」，並不是訓練集的一部分。"
    why_not_d: "即使還有測試集，驗證集被污染也會導致超參數調整失去意義，影響整體流程品質。"
  keywords:
    - "驗證集污染"
    - "資料集獨立性"
  exam_trap: true

- id: "L11301-Q30"
  topic_code: "L11301"
  item_code: "L11301"
  difficulty: 5
  question: "某公司希望把一個機器學習模型長期部署於線上服務，並維持穩定品質。下列哪一項規劃最為合理？"
  options:
    a: "模型訓練一次後直接上線，永遠不再回頭檢查或更新"
    b: "僅在使用者抱怨時才考慮重新訓練，其他時候完全不管"
    c: "部署後持續監控模型在真實資料上的表現，並在必要時用新資料重新訓練，將 ML 工作流程視為循環"
    d: "每天強制重新訓練模型一次，不論資料或表現是否改變"
  correct: "c"
  explanation:
    why_correct: "機器學習工作流程是循環性的：部署後必須持續監控表現（因為現實資料分布會隨時間改變），並在必要時用新資料重新訓練，這才是負責任的長期部署策略。"
    why_not_a: "不回頭檢查會忽略模型隨時間退化的問題（model drift），是不負責任的做法。"
    why_not_b: "等使用者抱怨才處理通常為時已晚，也違背主動監控的最佳實踐。"
    why_not_d: "無條件每日重訓會浪費大量運算資源且未必改善品質，不是合理規劃。"
  keywords:
    - "部署與監控"
    - "ML 工作流程循環"
  exam_trap: false
