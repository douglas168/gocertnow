- id: "L11301-Q07"
  topic_code: "L11301"
  item_code: "L11301"
  difficulty: 2
  question: "下列哪一個情境最適合使用機器學習，而不是傳統程式設計？"
  options:
    a: "計算員工的每月薪資與所得稅扣繳金額"
    b: "從大量歷史郵件中自動學習判斷哪些是垃圾郵件"
    c: "確認使用者輸入的 ATM PIN 碼是否正確"
    d: "在電商網站上計算購物車商品的總價與運費"
  correct: "b"
  explanation:
    why_correct: "垃圾郵件樣態變化快、規則難以完整列出，且有大量歷史標註資料可用，非常適合讓機器學習從資料中自動歸納規律。"
    why_not_a: "薪資與稅額計算規則明確、法規定義清楚，直接用 if/else 傳統程式寫最可靠。"
    why_not_c: "PIN 碼比對是固定的字串比較邏輯，不需要學習，傳統程式即可勝任。"
    why_not_d: "購物車加總只是四則運算，規則清楚，不需要機器學習。"
  keywords:
    - "ML 適用情境"
    - "傳統程式 vs ML"
  exam_trap: false

- id: "L11301-Q08"
  topic_code: "L11301"
  item_code: "L11301"
  difficulty: 2
  question: "傳統程式設計與機器學習最主要的差別為何？"
  options:
    a: "傳統程式無法處理大量資料，機器學習一定可以"
    b: "傳統程式由人類手寫規則，機器學習則由電腦從資料中自行歸納規則"
    c: "機器學習一定比傳統程式更快、更準確"
    d: "傳統程式完全不需要資料，機器學習只需要資料而不需要程式"
  correct: "b"
  explanation:
    why_correct: "這是標準的典範轉移框架：傳統程式是「規則+資料→答案」，機器學習是「資料+答案→規則」，核心差異在於「規則從哪裡來」。"
    why_not_a: "傳統程式也能處理大量資料（例如資料庫系統），速度與資料量不是本質差異。"
    why_not_c: "機器學習不保證比較快或比較準，特別是在規則明確的問題上，傳統程式反而更可靠。"
    why_not_d: "機器學習背後仍然需要程式（訓練與推論都由程式碼執行），說「不需要程式」是錯的。"
  keywords:
    - "典範轉移"
    - "傳統程式 vs ML"
  exam_trap: false

- id: "L11301-Q09"
  topic_code: "L11301"
  item_code: "L11301"
  difficulty: 2
  question: "關於「模型訓練」，下列敘述何者最正確？"
  options:
    a: "訓練就是把資料原封不動地複製到模型裡"
    b: "訓練是給模型大量範例與答案，讓模型慢慢調整內部設定值以貼近正確答案"
    c: "訓練是工程師手動替模型設定每個內部數值"
    d: "訓練是把多個模型合併成一個更大的模型"
  correct: "b"
  explanation:
    why_correct: "模型訓練的概念就是：讓模型看大量「範例＋正確答案」，透過反覆學習慢慢調整內部參數，使預測越來越接近正確答案。"
    why_not_a: "模型不是把資料複製進去，而是從資料中抽取規律，最終保存的是「規律」而非原始資料。"
    why_not_c: "模型的內部參數是模型自己學出來的，人類只決定超參數，不手動設定每個參數。"
    why_not_d: "合併模型屬於整合學習（ensemble）的概念，不是訓練的定義。"
  keywords:
    - "模型訓練"
    - "Model Training"
  exam_trap: false

- id: "L11301-Q10"
  topic_code: "L11301"
  item_code: "L11301"
  difficulty: 2
  question: "關於「擬合不足（Underfitting）」，下列敘述何者正確？"
  options:
    a: "模型在訓練集上表現很好，但在測試集上明顯變差"
    b: "模型在訓練集與測試集上的表現都很差，代表還沒學到資料中的規律"
    c: "模型的訓練時間過長導致記憶太多雜訊"
    d: "模型完全無法讀取訓練資料"
  correct: "b"
  explanation:
    why_correct: "擬合不足的核心特徵是模型能力不足或學得太少，因此「訓練集與測試集表現都差」，是與過度擬合相反的症狀。"
    why_not_a: "訓練好、測試差是「過度擬合」的典型症狀，不是擬合不足。"
    why_not_c: "訓練太久反而容易導致過度擬合，不是擬合不足。"
    why_not_d: "無法讀取資料是技術錯誤，不是擬合不足這個概念所指的現象。"
  keywords:
    - "擬合不足"
    - "Underfitting"
  exam_trap: true

- id: "L11301-Q11"
  topic_code: "L11301"
  item_code: "L11301"
  difficulty: 2
  question: "下列關於「驗證集（Validation Set）」的用途敘述，何者最正確？"
  options:
    a: "讓模型直接學習並調整內部參數"
    b: "在訓練過程中評估模型，用來調整超參數或判斷是否過度擬合"
    c: "訓練完全結束後用來打最終分數、且只能用一次"
    d: "用來向客戶展示模型訓練完成的樣子"
  correct: "b"
  explanation:
    why_correct: "驗證集在訓練過程中扮演「模擬考」的角色，幫助工程師調整超參數、判斷訓練是否應該停止，以及初步偵測過度擬合。"
    why_not_a: "直接學習並調整內部參數是「訓練集」的用途。"
    why_not_c: "訓練結束後只能用一次的是「測試集」，這是驗證集與測試集最常見的混淆點。"
    why_not_d: "向客戶展示模型不是資料集切分的意義，屬於溝通或部署議題。"
  keywords:
    - "驗證集"
    - "Validation Set"
  exam_trap: true

- id: "L11301-Q12"
  topic_code: "L11301"
  item_code: "L11301"
  difficulty: 2
  question: "下列何者最能說明「為什麼機器學習的目標是泛化能力，而不是在訓練集上拿滿分」？"
  options:
    a: "因為訓練集上的分數無法計算"
    b: "因為模型上線後要面對的是沒看過的新資料，訓練集分數高不代表真的學會規律"
    c: "因為訓練集的答案都是錯的，不值得相信"
    d: "因為法規禁止模型在訓練集上得到高分"
  correct: "b"
  explanation:
    why_correct: "機器學習的真正目的是在未來未知資料上表現好。若只在訓練集上拿滿分，可能只是把答案背下來，上線後遇到新資料就會失靈。"
    why_not_a: "訓練集上的表現是可以計算並觀察的，事實上是訓練過程的重要監控指標。"
    why_not_c: "訓練集的答案通常就是我們相信的標準答案，這個說法在邏輯上不成立。"
    why_not_d: "法規與訓練集分數無關，這是一個明顯不合理的選項。"
  keywords:
    - "泛化能力"
    - "目標"
  exam_trap: false

