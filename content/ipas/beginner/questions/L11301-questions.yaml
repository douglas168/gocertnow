- id: "L11301-Q16"
  topic_code: "L11301"
  item_code: "L11301"
  difficulty: 3
  question: "某公司希望部署一個聊天機器人，工程師正在評估「訓練」與「推論」的資源需求。關於兩者的差別，下列敘述何者正確？"
  options:
    a: "訓練與推論所需的資源相同，不必分開考慮"
    b: "訓練通常需要大量資料與算力，而推論則是上線後每次使用者查詢時都會發生，必須注重速度與成本"
    c: "推論只發生在訓練完成的那一瞬間，之後就不再需要"
    d: "推論是模型學習的階段，訓練是模型使用的階段"
  correct: "b"
  explanation:
    why_correct: "訓練是一次性（或定期）的大規模計算，使用大量資料；推論則是每次使用者輸入都會發生的即時計算，上線後大部分算力都花在推論，因此必須快、穩、便宜。"
    why_not_a: "兩者的計算需求差異非常大，必須分開考慮。"
    why_not_c: "推論是模型上線後的每次預測都會發生，而不是只發生一次。"
    why_not_d: "訓練與推論的定義被顛倒了，訓練是學習階段，推論才是使用階段。"
  keywords:
    - "訓練 vs 推論"
    - "部署"
  exam_trap: true

- id: "L11301-Q17"
  topic_code: "L11301"
  item_code: "L11301"
  difficulty: 3
  question: "下列哪一項屬於「超參數」而非模型的「參數」？"
  options:
    a: "模型內部儲存的權重數值"
    b: "模型訓練過程中自動學到的內部設定值"
    c: "人類在訓練開始前決定的「要訓練幾次」"
    d: "模型在推論時所產生的輸出結果"
  correct: "c"
  explanation:
    why_correct: "超參數的判斷關鍵是「由人類在訓練之前決定」。訓練次數、模型複雜度等都屬於超參數，因為模型自己不會決定這些值。"
    why_not_a: "內部的權重數值是模型訓練過程中自己學出來的，屬於「參數」而不是超參數。"
    why_not_b: "模型自動學到的內部設定值正是「參數」的定義。"
    why_not_d: "推論時的輸出結果是模型的預測，與超參數概念完全不同。"
  keywords:
    - "超參數"
    - "參數"
  exam_trap: true

- id: "L11301-Q18"
