  exam_trap: false

- id: "L11301-Q24"
  topic_code: "L11301"
  item_code: "L11301"
  difficulty: 4
  question: "下列關於「訓練資料的多寡與模型表現」的敘述，何者最正確？"
  options:
    a: "資料越多一定越好，越多就保證表現越佳"
    b: "只要模型夠強，資料多寡不重要"
    c: "資料的數量與品質都重要；更多但不具代表性或充滿雜訊的資料，未必會改善模型"
    d: "資料必須恰好等於某個固定比例，例如一萬筆"
  correct: "c"
  explanation:
    why_correct: "「更多資料」未必一定更好，資料的代表性與品質同樣重要。若新增的資料本身有偏差或雜訊，模型表現未必改善，這呼應了「garbage in, garbage out」的概念。"
    why_not_a: "「越多一定越好」過於絕對，忽略了品質與代表性的因素。"
    why_not_b: "模型再強也需要資料支撐，尤其機器學習本質上是資料驅動。"
    why_not_d: "並沒有所謂的固定筆數標準，資料需求依問題與模型而異。"
  keywords:
    - "資料品質"
    - "更多資料不一定更好"
  exam_trap: true

