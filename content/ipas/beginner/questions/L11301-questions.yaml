- id: "L11301-Q19"
  topic_code: "L11301"
  item_code: "L11301"
  difficulty: 4
  question: "驗證集與測試集在機器學習流程中最主要的差異為何？"
  options:
    a: "驗證集可在訓練過程中反覆使用以調整模型，測試集則理想上只用一次以衡量最終真實表現"
    b: "驗證集比測試集大，測試集永遠比驗證集小"
    c: "驗證集必須由使用者自行提供，測試集則由模型自動產生"
    d: "驗證集是訓練集的一部分，測試集是訓練集的另一半"
  correct: "a"
  explanation:
    why_correct: "兩者的關鍵差別在「使用次數與角色」：驗證集是訓練中用來調整模型的「模擬考」，可反覆使用；測試集是訓練完成後只用一次的「期末考」，用來誠實衡量泛化能力。"
    why_not_b: "大小比例不是兩者定義的差別，而是可依資料量彈性調整的實作細節。"
    why_not_c: "兩者都是由資料擁有者從原始資料切分而來，不會是模型自己產生。"
    why_not_d: "訓練集、驗證集、測試集應該是「彼此不重疊」的三份資料，而不是彼此包含。"
  keywords:
    - "驗證集 vs 測試集"
    - "最常見陷阱"
  exam_trap: true

- id: "L11301-Q20"
  topic_code: "L11301"
  item_code: "L11301"
  difficulty: 4
  question: "下列關於「過度擬合的原因」，何者描述最正確？"
  options:
    a: "訓練資料太多，導致模型記不住"
    b: "模型相對於真實規律過於複雜，或訓練資料太少、不具代表性，導致模型把雜訊也學進去"
    c: "訓練時間太短，模型還沒學到任何東西"
    d: "驗證集與測試集完全不重疊"
  correct: "b"
  explanation:
    why_correct: "過度擬合常見成因包含「模型能力相對資料過強」與「訓練資料太少或偏頗」，模型在缺乏足夠多樣範例下會把雜訊誤認為規律。"
    why_not_a: "訓練資料太多通常反而有助於降低過度擬合，這個描述與事實相反。"
    why_not_c: "訓練時間太短、模型還沒學東西其實是擬合不足的徵兆，不是過度擬合。"
    why_not_d: "驗證集與測試集不重疊是良好實踐，而非過度擬合的原因。"
  keywords:
    - "過度擬合原因"
  exam_trap: true

- id: "L11301-Q21"
  topic_code: "L11301"
  item_code: "L11301"
  difficulty: 4
  question: "下列何者最能正確描述機器學習工作流程的特性？"
  options:
    a: "是一次走完的線性流程，部署後就不需要再回頭"
    b: "是一個可迭代的循環，評估結果可能導致重新收集資料或重新訓練模型"
    c: "只要資料收集完整，後續步驟都可以跳過"
    d: "部署完成後，模型的表現會自動長期維持不變"
  correct: "b"
  explanation:
    why_correct: "機器學習工作流程是一個循環：評估結果可能促使團隊重新定義問題、收集更多資料或重新訓練，且部署後還要持續監控模型在現實資料上的表現。"
    why_not_a: "把流程視為一次性線性流程是 iPAS 常考的錯誤敘述。"
    why_not_c: "即使資料完整，後續的訓練、評估、部署仍是必要步驟，不能跳過。"
    why_not_d: "模型上線後會隨著現實資料分布變化而逐漸退化（model drift），需要持續監控與重新訓練。"
  keywords:
    - "ML 工作流程"
    - "迭代循環"
  exam_trap: true

- id: "L11301-Q22"
  topic_code: "L11301"
  item_code: "L11301"
  difficulty: 4
  question: "若一個機器學習模型在訓練集準確率 92%，在測試集準確率 90%，下列判斷何者最合理？"
  options:
    a: "明顯過度擬合，需要立刻簡化模型"
    b: "明顯擬合不足，模型幾乎沒學到東西"
    c: "訓練與測試表現接近且不低，模型的泛化能力良好"
    d: "模型偷看了測試集資料，屬於資料洩漏"
  correct: "c"
  explanation:
    why_correct: "訓練與測試表現接近（差距小）且都不低，是「剛好（Good fit）」、泛化良好的典型特徵。機器學習追求的就是這種狀態。"
    why_not_a: "訓練 92%、測試 90% 的差距很小，看不出過度擬合的典型跡象。"
    why_not_b: "兩邊都有 90% 以上的表現，不符合擬合不足「兩邊都差」的症狀。"
    why_not_d: "資料洩漏通常會讓測試集表現異常高、甚至高過訓練集，這裡並未出現此特徵。"
  keywords:
    - "泛化良好"
    - "情境判斷"
  exam_trap: false

- id: "L11301-Q23"
  topic_code: "L11301"
  item_code: "L11301"
  difficulty: 4
  question: "下列何者「不屬於」常見的預防過度擬合方法？"
  options:
    a: "收集更多具代表性的訓練資料"
    b: "提前停止（Early Stopping）訓練"
    c: "刻意減少訓練資料、讓模型僅看極少量樣本反覆學習"
    d: "在驗證集上監控表現以判斷是否該停止訓練"
  correct: "c"
  explanation:
    why_correct: "刻意減少訓練資料反而會加劇過度擬合——資料越少，模型越容易把少數樣本的雜訊當成規律，這與預防過度擬合的目標相反。"
    why_not_a: "更多具代表性的資料通常能有效降低過度擬合。"
    why_not_b: "提前停止是常見的過度擬合預防技術，在驗證表現開始變差前停止訓練。"
    why_not_d: "透過驗證集監控是否過度擬合是標準做法。"
  keywords:
