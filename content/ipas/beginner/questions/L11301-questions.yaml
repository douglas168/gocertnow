- id: "L11301-Q25"
  topic_code: "L11301"
  item_code: "L11301"
  difficulty: 5
  question: "某團隊發現模型在測試集上的表現不理想，於是用測試集的結果回頭反覆調整模型與超參數，直到測試集分數變高。這個做法最主要的問題為何？"
  options:
    a: "沒有問題，本來就應該用測試集持續調整模型"
    b: "測試集的角色被破壞，最終分數不再能誠實代表模型在未見過資料上的真實表現，等於作弊"
    c: "問題只在於調整次數不夠多"
    d: "問題是團隊應該改用驗證集的分數來當最終成績"
  correct: "b"
  explanation:
    why_correct: "測試集應該只用一次，用來誠實衡量模型的泛化能力。若反覆用它來調整模型，測試集就變成了訓練/驗證集的延伸，最終分數會高估真實表現，這是典型的資料洩漏問題。"
    why_not_a: "測試集不應該被用來持續調整模型，調整模型是驗證集的工作。"
    why_not_c: "問題不在次數，而在「不應該用」測試集調整模型這件事本身。"
    why_not_d: "驗證集的分數本就不是用來當最終成績的，真正的問題是測試集被污染了。"
  keywords:
    - "測試集污染"
    - "資料洩漏"
  exam_trap: true

- id: "L11301-Q26"
  topic_code: "L11301"
  item_code: "L11301"
  difficulty: 5
  question: "某主管主張：「機器學習本質上是在背資料，只要餵越多資料，模型就會越準。」下列對這個說法最正確的評論為何？"
  options:
    a: "完全正確，機器學習就是把資料全部記下來"
    b: "部分不正確，機器學習追求的是從資料中學到規律以泛化到新資料，而「只會背答案」其實就是過度擬合"
    c: "完全正確，而且資料量越大就一定避免過度擬合"
    d: "完全不正確，機器學習根本不需要資料"
  correct: "b"
  explanation:
    why_correct: "機器學習的真正目標是學到「可泛化」的規律，而不是背答案。一個只會死記訓練資料的模型正是過度擬合的表現，也無法在新資料上表現良好。"
    why_not_a: "把模型等同於「記資料」是錯誤的直覺，會導出過度擬合的結論。"
    why_not_c: "雖然更多資料常能抑制過度擬合，但並非一定，資料品質與代表性同樣關鍵。"
    why_not_d: "機器學習高度仰賴資料，「不需要資料」的說法顯然不成立。"
  keywords:
    - "ML 不是背答案"
    - "泛化"
  exam_trap: false

- id: "L11301-Q27"
  topic_code: "L11301"
  item_code: "L11301"
  difficulty: 5
  question: "某工程師說：「大型語言模型能回答很多問題，代表它真的理解人類語言、會思考推理。」下列對這個說法的評估何者最合理？"
  options:
    a: "完全正確，機器學習模型具備人類等級的理解力與推理能力"
    b: "不完全正確，機器學習模型是從大量資料中學到統計規律，能產生看似合理的輸出，但這與人類的理解、意識或推理本質並不相同"
    c: "完全錯誤，機器學習模型不可能產生任何有用的輸出"
    d: "正確，因為模型能通過所有考試，就代表它像人類一樣在思考"
  correct: "b"
  explanation:
    why_correct: "機器學習的本質是從資料中抽取統計規律，模型能產生流暢或看似合理的輸出，不等於它擁有人類意義下的「理解」「意識」或「推理」。這是基礎 AI 素養的重要判斷。"
    why_not_a: "把模型等同人類理解力是常見誤解，不符合 iPAS 要求的基本 AI 認知。"
    why_not_c: "模型確實能產生有用的輸出，否定它也不合理。"
    why_not_d: "考試表現好不等於具備人類式的思考，這是過度擬人化的推論。"
  keywords:
