- id: "L11301-Q01"
  topic_code: "L11301"
  item_code: "L11301"
  difficulty: 1
  question: "機器學習（Machine Learning）的英文縮寫為何？"
  options:
    a: "ML"
    b: "DL"
    c: "AI"
    d: "MR"
  correct: "a"
  explanation:
    why_correct: "Machine Learning 的常見縮寫為 ML，是人工智慧（AI）的一個子領域，專注於讓電腦從資料中自動歸納出規律。"
    why_not_b: "DL 是 Deep Learning（深度學習）的縮寫，深度學習是機器學習的一個分支，不是機器學習本身。"
    why_not_c: "AI 是 Artificial Intelligence（人工智慧）的縮寫，是比機器學習更廣的概念。"
    why_not_d: "MR 通常指 Mixed Reality（混合實境）或 Map-Reduce，與機器學習無關。"
  keywords:
    - "機器學習"
    - "ML"
    - "定義"
  exam_trap: false

- id: "L11301-Q02"
  topic_code: "L11301"
  item_code: "L11301"
  difficulty: 1
  question: "下列何者為「泛化（Generalization）」的定義？"
  options:
    a: "模型在訓練集上取得接近滿分的能力"
    b: "模型在沒看過的新資料上仍能做出正確預測的能力"
    c: "模型把所有訓練資料完整記下來的能力"
    d: "模型能自動產生新訓練資料的能力"
  correct: "b"
  explanation:
    why_correct: "泛化是指模型把從訓練資料中學到的規律，成功套用到沒看過的新資料上的能力，這是機器學習真正追求的目標。"
    why_not_a: "在訓練集取得高分只是過程指標，若無法在新資料上表現好，反而代表泛化能力差（過度擬合）。"
    why_not_c: "把訓練資料背下來是「記憶」而非泛化，這正是泛化能力差的典型表現。"
    why_not_d: "自動產生新訓練資料屬於資料擴增（Data Augmentation）技術，與泛化的定義無關。"
  keywords:
    - "泛化"
    - "Generalization"
  exam_trap: false

- id: "L11301-Q03"
  topic_code: "L11301"
  item_code: "L11301"
  difficulty: 1
  question: "在機器學習中，「訓練集（Training Set）」的主要用途為何？"
  options:
    a: "讓模型實際學習、調整內部參數"
    b: "在訓練過程中監控模型並調整超參數"
    c: "訓練結束後評估模型最終的真實表現"
    d: "用來向使用者展示模型的預測結果"
  correct: "a"
  explanation:
    why_correct: "訓練集是模型實際學習的資料來源，模型會在訓練過程中反覆從訓練集中調整內部參數，以找出資料的規律。"
    why_not_b: "監控模型並調整超參數是「驗證集」的用途，不是訓練集。"
    why_not_c: "訓練結束後評估最終表現是「測試集」的用途，且理想上只用一次。"
    why_not_d: "向使用者展示預測結果屬於模型上線後的推論階段，與訓練集無關。"
  keywords:
    - "訓練集"
    - "Training Set"
  exam_trap: false

- id: "L11301-Q04"
  topic_code: "L11301"
  item_code: "L11301"
  difficulty: 1
  question: "下列關於「超參數（Hyperparameter）」的敘述，何者正確？"
  options:
    a: "由模型在訓練過程中自己學到的內部數值"
    b: "由人類在訓練開始之前先決定的設定"
    c: "模型訓練完成後才產生的評估指標"
    d: "用來儲存訓練資料的容器"
  correct: "b"
  explanation:
    why_correct: "超參數是人類工程師在訓練開始之前就必須先決定的設定，例如訓練幾次、模型要多複雜等，模型本身不會改變這些值。"
    why_not_a: "由模型在訓練中自己學到的內部數值叫做「參數（Parameter）」，不是超參數，這是常見混淆點。"
    why_not_c: "評估指標是訓練後用來衡量模型表現的數值，與超參數定義不同。"
    why_not_d: "儲存訓練資料的概念與超參數無關。"
  keywords:
    - "超參數"
    - "Hyperparameter"
  exam_trap: true

- id: "L11301-Q05"
  topic_code: "L11301"
  item_code: "L11301"
  difficulty: 1
  question: "下列何者為「過度擬合（Overfitting）」最典型的表現？"
  options:
    a: "模型在訓練集與測試集上的表現都很差"
    b: "模型在訓練集上表現很好，但在測試集上表現明顯變差"
    c: "模型在測試集上表現比訓練集好很多"
    d: "模型在訓練過程中完全無法降低錯誤率"
  correct: "b"
  explanation:
    why_correct: "過度擬合的典型症狀就是「訓練集表現非常好、測試集表現明顯掉下來」，代表模型把訓練資料的雜訊也一併背下來，無法泛化到新資料。"
    why_not_a: "兩邊都差是「擬合不足（Underfitting）」的症狀，代表模型根本還沒學到規律。"
    why_not_c: "正常情況下測試集表現不會顯著優於訓練集，這種情況通常代表資料切分有問題。"
    why_not_d: "訓練時完全無法降低錯誤率代表模型或訓練流程有缺陷，屬於擬合不足的一種極端情況。"
  keywords:
    - "過度擬合"
    - "Overfitting"
  exam_trap: false

- id: "L11301-Q06"
  topic_code: "L11301"
  item_code: "L11301"
  difficulty: 1
  question: "在機器學習中，「推論（Inference）」一詞指的是什麼？"
  options:
    a: "用訓練資料教模型學習規律的過程"
    b: "將已訓練完成的模型拿來對新資料做預測的過程"
    c: "收集與清理原始資料的過程"
    d: "決定模型架構與超參數的過程"
  correct: "b"
  explanation:
    why_correct: "推論是指模型完成訓練後，被部署上線用來對新資料做預測的使用階段，也是模型上線後絕大多數運算發生的地方。"
    why_not_a: "用資料教模型學習規律是「訓練（Training）」階段，不是推論。"
    why_not_c: "收集與清理原始資料屬於資料準備階段，發生在訓練之前。"
    why_not_d: "決定模型架構與超參數是人類在訓練前的準備工作，不是推論。"
  keywords:
    - "推論"
    - "Inference"
  exam_trap: false

