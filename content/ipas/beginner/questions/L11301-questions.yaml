    b: "定義問題 → 資料收集與準備 → 模型訓練 → 模型評估 → 部署與監控"
    c: "資料收集與準備 → 模型評估 → 定義問題 → 模型訓練 → 部署"
    d: "部署與監控 → 模型訓練 → 模型評估 → 資料收集與準備 → 定義問題"
  correct: "b"
  explanation:
    why_correct: "台灣教材常見的 5 步驟 ML 工作流程為：定義問題 → 資料收集與準備 → 模型訓練 → 模型評估 → 部署與監控。第一步必須先釐清要解決什麼問題。"
    why_not_a: "把「定義問題」排在模型訓練之後是錯的，問題未定義就開始訓練毫無意義。"
