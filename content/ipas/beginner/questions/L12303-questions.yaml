  - id: "L12303-Q12"
    topic_code: "L12303"
    item_code: "risk-impact"
    difficulty: 2
    question: |
      某 GenAI 應用以風險矩陣（Risk Matrix）評估後，得到下列 2×2 定位，其中某情境 X 落在標示為『★』的象限：

      ```
                     | 低影響 (Low Impact) | 高影響 (High Impact)
      -------------- | ------------------- | -------------------
      高發生可能性    | 持續監控           | 最優先緩解
      低發生可能性    | 接受              | ★（本題情境 X）
      ```

      情境 X 為『極端但罕見的深偽冒名事件』。planner 最適合採取哪一類因應策略？
    options:
      a: "列為最優先、立即投入最多資源緩解"
      b: "列為次優先並以保險/合約轉移部分風險，同時建立應變計畫（Contingency Plan）並持續監控"
      c: "先降低暴露面（縮小開放範圍）後定期重新評估是否仍落在此象限"
      d: "持續監控並預先準備應變計畫（Contingency Plan）"
    correct: "d"
    explanation:
      why_correct: "低頻高衝擊型風險（如極端深偽事件）發生機率低，資源配置上不宜視為最優先，但一旦發生影響巨大，最佳策略是監控 + 應變計畫，對應風險管理的『轉移/接受配應變』思維。（補充：low-likelihood high-impact 通常走『轉移/降低 + 緊急應變計畫』，而不是立即下架功能。）"
      why_not_a: "『最優先』屬於高發生 × 高影響象限（表右上），不是低發生高影響（★位置）。"
      why_not_b: "保險/合約轉移是合理輔助手段，但本題最核心的 planner 動作仍是『持續監控 + 應變計畫』；b 只是 d 的子集且額外加上轉移，不如 d 精準對應象限標準答案。"
      why_not_c: "『降低暴露面再評估』屬於動態管理做法，適用於不確定風險位置時；本題象限已明確定位，主動作仍應為監控+應變。"
    keywords:
      - "風險矩陣"
      - "低發生高影響"
      - "應變計畫"
    exam_trap: false

  - id: "L12303-Q13"
    topic_code: "L12303"
    item_code: "compliance"
    difficulty: 2
    question: "關於『HITL（Human-in-the-Loop）人工介入』的正確理解，下列何者最恰當？"
    options:
      a: "HITL 是在『AI 產出被對外使用/做成決策之前』就介入覆核或調整，屬事前/流程中把關；若只是事後才稽核紀錄，已不是 HITL"
      b: "HITL 與『事後稽核（Post-hoc Audit）』意義相同，兩者可互相替代"
      c: "HITL 指由 AI 監控人類員工工作品質"
      d: "HITL 僅適用於訓練階段，推論階段無須介入"
    correct: "a"
    explanation:
      why_correct: "HITL 的核心是『人類在 AI 做出最終輸出/決策之前』介入把關——可以發生在輸入設計、中途審閱、最終放行等流程節點。事後稽核（post-hoc audit）雖重要但屬『問責/追溯』機制，與 HITL『事前/進行中介入』性質不同，不可混為一談。"
      why_not_b: "這是最常見的誤解——考題常以『事後檢視產出紀錄』混淆成 HITL；事後檢視只能發現問題，無法阻止 AI 錯誤產出進入實際流程。"
      why_not_c: "HITL 的『H』是人類介入 AI，不是 AI 監控人類，方向相反屬常識錯誤。"
      why_not_d: "HITL 主要用於推論/決策階段（如醫療影像覆核、信貸拒絕理由書覆核）；訓練階段的人類標註屬另一概念（Human-in-the-Loop Labeling）。"
    keywords:
      - "HITL"
      - "人工介入"
      - "事後稽核"
      - "Post-hoc Audit"
    exam_trap: true

