  - id: "L12303-Q33"
    topic_code: "L12303"
    item_code: "risk-impact"
    difficulty: 5
    question: "假設某製造業客服機器人出現『低發生可能性 × 極高影響』的 Prompt Injection 致洩漏商業機密事件。planner 應如何設計『矩陣 × 緩解 × 監控』組合？"
    options:
      a: "歸於最優先；直接關停 AI 服務永不使用"
      b: "僅記錄於風險登錄冊，不採任何動作"
      c: "風險矩陣定位『低發生 × 高影響』→ 採『轉移 + 應變』：加強 Guardrails 輸入輸出過濾、建立事件應變計畫（IRP）、導入紅隊演練、購買資安保險並規劃內部揭露流程"
      d: "把 AI 模型直接改為無網路的離線版即可解決"
    correct: "c"
    explanation:
