  - id: "L12303-Q01"
    topic_code: "L12303"
    item_code: "genai-ethical-risk"
    difficulty: 1
    question: "在生成式AI風險管理中，幻覺（Hallucination）的正確定義為何？"
    options:
      a: "模型因硬體故障而無法回應使用者輸入"
      b: "模型產出看似合理但與事實不符、甚至憑空捏造的內容"
      c: "模型被駭客植入惡意程式而輸出錯誤答案"
      d: "模型輸出帶有歧視或偏見的語句"
    correct: "b"
    explanation:
      why_correct: "幻覺（Hallucination）指生成式AI產出語法流暢、看似合理，但在事實層面錯誤或虛構的內容，肇因於機率式下一個 token 預測的本質，而非系統故障。"
      why_not_a: "硬體或系統故障是可用性問題，不是幻覺；幻覺是模型『正常運作下仍產出錯誤資訊』。"
      why_not_c: "惡意程式注入屬資安事件，非幻覺。學生常把『錯答案』都歸因於被攻擊，忽略模型本身的機率本質。"
      why_not_d: "帶有歧視/偏見屬於 Bias 偏見，與幻覺是不同的倫理風險類型。"
    keywords:
      - "幻覺"
      - "Hallucination"
      - "倫理風險"
    exam_trap: false

  - id: "L12303-Q02"
    topic_code: "L12303"
    item_code: "compliance"
    difficulty: 1
    question: "台灣《人工智慧基本法》於 2025-12-24 立法院三讀通過，依該法第 16 條，負責訂定 AI 風險分類框架與評估驗證工具的主管機關為何？"
    options:
      a: "國家科學及技術委員會（國科會）"
      b: "經濟部產業發展署"
      c: "數位發展部（moda）"
      d: "國家發展委員會（NDC）"
    correct: "c"
    explanation:
      why_correct: "《人工智慧基本法》第 16 條明定由『數位發展部（moda）』訂定風險分類框架與評估驗證工具；國科會為政策主管機關，moda 負責風險分級操作面。"
      why_not_a: "國科會是整體政策的中央主管機關，但風險分類框架的訂定權責是 moda；考生最常把兩者混為一談。"
      why_not_b: "經濟部主管產業 AI 應用推動，不負責風險分類框架訂定。"
      why_not_d: "國發會負責國家整體發展規劃與數位轉型政策協調，但《AI 基本法》§16 的風險分類框架訂定權責在 moda，NDC 並非本條主管機關。"
    keywords:
      - "人工智慧基本法"
      - "數位發展部"
      - "moda"
      - "§16 風險分級"
    exam_trap: true

  - id: "L12303-Q03"
    topic_code: "L12303"
    item_code: "genai-ethical-risk"
    difficulty: 1
    question: "下列哪一項屬於生成式AI的『倫理風險（Ethical Risk）』？"
    options:
      a: "AI 生成的內容帶有偏見或歧視"
      b: "幻覺（Hallucination）造成回覆內含錯誤資訊"
      c: "使用者將機敏資料貼入 Prompt 造成資料外洩"
      d: "攻擊者用深偽（Deepfake）冒用本人聲音進行詐騙"
    correct: "a"
    explanation:
      why_correct: "倫理風險的定義聚焦『對人與社會造成不公平、誤導或歧視』。偏見/歧視是最典型的倫理風險子類，iPAS 114 年版官方樣題亦採此立場。（鑑別口訣：倫理風險問的是『對人與社會造成不公平/誤導』，不是『系統會不會壞』。）"
      why_not_b: "幻覺屬於『可靠性/正確性』風險子類，雖然也會間接造成誤導，但本題要求辨識『最直接屬於倫理風險』——偏見是更貼近定義的選項。"
      why_not_c: "Prompt 資料外洩屬於資料安全與隱私風險，不是倫理風險。"
      why_not_d: "深偽冒用屬身份盜用/錯假訊息的『應用濫用』風險，牽涉多層法律問題；此題要求選『最單純的倫理風險典型項』。"
    keywords:
      - "倫理風險"
      - "偏見"
      - "Bias"
    exam_trap: false

  - id: "L12303-Q04"
    topic_code: "L12303"
    item_code: "data-security-privacy"
    difficulty: 1
    question: "下列哪個名詞最能描述『攻擊者在使用者輸入中藏入惡意指令，誘使 LLM 忽略系統提示或洩漏機敏資料』的攻擊手法？"
    options:
      a: "Prompt Engineering（提示工程）"
      b: "Prompt Tuning（提示微調）"
      c: "Data Augmentation（資料擴增）"
      d: "Prompt Injection（提示注入）"
    correct: "d"
    explanation:
      why_correct: "Prompt Injection（提示注入）是 OWASP LLM Top 10（2025）LLM01 排名第一的攻擊類型，以自然語言植入惡意指令繞過系統提示。"
      why_not_a: "Prompt Engineering 是合法的『使用者設計提示以取得更好輸出』的正向技巧，與攻擊無關；這是最常見的混淆點。"
      why_not_b: "Prompt Tuning 是模型調校技術（少量可訓練向量），不是攻擊。"
      why_not_c: "資料擴增屬訓練期資料處理技巧，與 Prompt 無直接關係。"
    keywords:
      - "Prompt Injection"
      - "提示注入"
      - "OWASP LLM01"
    exam_trap: true

  - id: "L12303-Q05"
    topic_code: "L12303"
    item_code: "genai-ethical-risk"
    difficulty: 1
    question: "『深偽（Deepfake）』技術最主要的風險是什麼？"
    options:
      a: "訓練資料未經授權造成的著作權爭議"
      b: "偽造真人影像、聲音，造成身份盜用與錯假訊息"
      c: "模型輸出帶有性別或種族偏見"
      d: "攻擊者以 Prompt Injection 繞過系統規則"
    correct: "b"
    explanation:
      why_correct: "深偽（Deepfake）運用生成式 AI 偽造真人音/影，產生身份盜用、詐騙與選舉操縱等社會信任風險。2024 香港 CFO 深偽視訊詐騙損失 2500 萬美元為代表案例。（記憶口訣：看到『假臉/假聲』先想身份冒用，不是模型調校。）"
      why_not_a: "訓練資料著作權爭議屬合規/智財風險，雖然深偽案例常伴隨此議題，但不是深偽技術『最主要』的風險。"
      why_not_c: "模型偏見是倫理風險的另一子類，與深偽『偽造特定真人身份』的本質不同。"
      why_not_d: "Prompt Injection 屬資安攻擊類別，與深偽（內容偽造技術）是兩條不同風險線。"
    keywords:
      - "深偽"
      - "Deepfake"
      - "錯假訊息"
    exam_trap: false

  - id: "L12303-Q06"
    topic_code: "L12303"
    item_code: "risk-impact"
    difficulty: 1
    question: "在風險矩陣（Risk Matrix）中，常用的兩個座標軸是？"
    options:
      a: "成本（Cost）與時程（Schedule）"
      b: "發生可能性（Likelihood）與影響程度（Impact）"
      c: "技術成熟度（TRL）與市場規模（TAM）"
      d: "資料量（Volume）與資料種類（Variety）"
    correct: "b"
    explanation:
      why_correct: "風險矩陣採 likelihood × impact 兩軸四象限（高發生高影響、高發生低影響、低發生高影響、低發生低影響），是 AI 專案風險管理的標準工具。"
      why_not_a: "成本/時程屬專案管理三角，不是風險矩陣座標。"
      why_not_c: "TRL/TAM 屬新創或技術評估，與風險矩陣無關。"
      why_not_d: "Volume/Variety 是 Big Data 的 3V，非風險矩陣。"
    keywords:
      - "風險矩陣"
      - "Likelihood"
      - "Impact"
    exam_trap: false

  - id: "L12303-Q07"
    topic_code: "L12303"
    item_code: "compliance"
    difficulty: 1
    question: "依經濟部智慧財產局 2023 年 6 月函釋（經授智字第 11252800520 號），下列何者正確？"
    options:
      a: "使用者僅下指令、由 AI 自主運算產出的內容，不受我國著作權法保護"
      b: "凡由 AI 產出的圖片皆自動享有著作權保護"
      c: "只要支付 ChatGPT 訂閱費，產出即享有著作權"
      d: "AI 產出內容一律歸屬 OpenAI 所有"
    correct: "a"
    explanation:
      why_correct: "智慧局 2023-06 函釋明確：著作權保護須有『人類精神創作』投入；單純下指令而由 AI 自主運算的產出，不具人類創作要件，不受著作權法保護。"
      why_not_b: "這是典型學生誤解——以為 AI 產出『只要是圖就有著作權』，忽略人類創作要件。"
      why_not_c: "訂閱費屬服務契約，不構成著作權歸屬依據。"
      why_not_d: "OpenAI 服務條款多半把著作權（若存在）讓與使用者，但台灣著作權法層次是『先問有沒有著作權』，此選項邏輯錯誤。"
    keywords:
      - "著作權法"
      - "智慧局函釋"
      - "AI 輸出"
    exam_trap: true

