    question: "下列哪一項情境最符合生成式 AI 的『濫用風險（Misuse Risk）』？"
    options:
      a: "模型對不同族群產生差別待遇"
      b: "行為人利用 LLM 大量產生擬真釣魚信模板以進行詐騙"
      c: "模型引用不存在的法條"
      d: "員工將客戶個資貼入免費版 ChatGPT"
    correct: "b"
    explanation:
      why_correct: "濫用風險（Misuse Risk）指使用者『有意地將 GenAI 用於有害目的』——大量生成擬真釣魚信、惡意程式、詐騙劇本、政治假訊息等屬典型濫用情境。"
      why_not_a: "族群差別待遇屬『偏見（Bias）』——倫理風險的另一子類，不是有意的濫用。"
      why_not_c: "模型自行虛構屬『幻覺（Hallucination）』，是機率生成本質導致的錯誤，非使用者濫用。"
      why_not_d: "員工貼入個資屬『資料外洩（Prompt Leakage）』——資料安全與隱私風險。"
    keywords:
      - "濫用風險"
      - "Misuse"
      - "釣魚信"
      - "倫理風險"
    exam_trap: false

  - id: "L12303-Q09"
    topic_code: "L12303"
    item_code: "data-security-privacy"
    difficulty: 2
    question: "為什麼『三星半導體員工將原始碼貼入 ChatGPT』會被視為 Prompt 資料外洩（Prompt Leakage）的典型案例？"
    options:
      a: "因為 ChatGPT 網站本身遭駭客入侵"
      b: "因為員工輸入的內容可能被用於模型訓練或被服務商保留，導致機敏資料脫離企業掌控"
      c: "因為員工誤以為『只要刪除聊天室訊息就不算外洩』，忽略伺服器端仍可能保留紀錄"
      d: "因為員工誤以為『只要不是個人資料（如原始碼、專案文件）就可任意貼入』，忽略營業秘密同屬機敏資料"
    correct: "b"
    explanation:
      why_correct: "三星案的核心在於使用者將機敏資料輸入第三方雲端 LLM 後，資料已離開企業控制範圍——可能被用於改善模型、被稽核人員檢視或被保留於服務商日誌，形同外洩。"
      why_not_a: "該事件並非駭客入侵，而是員工主動輸入造成的資料流出。"
      why_not_c: "此項敘述雖為常見員工錯誤心態，但不是本題被認定為『外洩』的根本原因；根本原因是 b——資料已離開企業控制範圍。"
      why_not_d: "此項也反映常見誤解，但『外洩之所以成立』的關鍵仍是 b 的服務商保留/訓練使用，而不是資料類別認定。"
    keywords:
      - "Prompt Leakage"
      - "三星"
      - "資料外洩"
    exam_trap: false

