  - id: "L12303-Q30"
    topic_code: "L12303"
    item_code: "risk-impact"
    difficulty: 5
    question: |
      某銀行規劃以 GenAI 自動產生『客戶信貸拒絕理由書』。依金管會要求，此應用屬於高風險 AI，必須同時滿足：(1) 合規（AI 基本法 §16 分級、金管會函令、個資法）、(2) 公平性（不得依受保護特徵歧視）、(3) 可解釋性（客戶有權得知拒絕理由）、(4) 成本可承擔。

      下列四種治理組合，何者最能同時達成四項目標？
    options:
      a: "HITL 徵信主管覆核 + 完整審計紀錄（Audit）——僅事後把關與紀錄，不設輸出護欄或攻防測試"
      b: "HITL + Guardrails 輸出護欄 + 完整審計——但不做 Red Team 事前紅隊測試，依賴上線後發現問題再修正"
      c: "私有化部署（不送雲端）+ 低成本——但不設可解釋性模組與公平性檢測，因『自家模型風險較低』"
      d: "四件套到位：HITL（徵信主管覆核）+ Guardrails（禁止歧視字串、強制引用政策依據以支援可解釋性）+ Red Team（事前針對公平性與規避歧視測試）+ 透明揭露（AI 標示、完整審計紀錄）；並依《AI 基本法》§16、金管會函令與個資法回報分級"
    correct: "d"
    explanation:
      why_correct: "高風險金融決策需四件套 + 三法合規回報才能『同時』覆蓋合規、公平、可解釋、成本四個限制：HITL 負責可解釋性守門、Guardrails 防歧視字串、Red Team 事前測試公平性、透明揭露滿足金管會要求。單一措施（只有 HITL、只有 Guardrails、或只靠私有部署）都會在某一限制面留下缺口。"
      why_not_a: "HITL + Audit only 缺少輸出層護欄與事前攻防測試；公平性和可解釋性容易被單點錯誤產出穿透，金管會現場稽核難過關。"
      why_not_b: "Guardrails + HITL + Audit 但沒有 Red Team，上線後才發現的歧視模式可能已造成客訴與法規處分，成本反而更高；公平性驗證需『事前』進行。"
      why_not_c: "私有部署 ≠ 可解釋與公平。把 AI 關在內部網路不能讓產出對客戶解釋得清楚，也不能確保未使用受保護特徵；把資安與 AI 風險混為一談是常見陷阱。"
    keywords:
      - "治理四件套"
      - "HITL"
      - "Guardrails"
      - "Red Team"
      - "透明揭露"
      - "金融高風險 AI"
    keywords:
      - "HITL"
      - "Guardrails"
      - "Red Team"
      - "金融高風險 AI"
    exam_trap: false

