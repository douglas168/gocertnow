  correct: "c"
  explanation:
    why_correct: "Few-shot 範例過於相似時，模型會將句型本身當作「規則」而非「參考」，導致過度模仿。解法是增加範例多樣性並加入明確指令區分「模仿風格」與「照抄格式」，這考驗學生對 Few-shot 機制的深層理解。"
    why_not_a: "Zero-shot 雖然不會過度模仿，但也失去了 Few-shot 引導風格的優勢；問題出在範例品質而非技術選擇，不需要完全放棄 Few-shot。"
    why_not_b: "範例數量不是問題的根本原因；若十個範例風格依然相似，過度模仿反而更嚴重，且更多範例會佔用更多 token。"
    why_not_d: "這是提示設計問題而非模型能力問題。即使使用更大的模型，若範例設計不當，同樣會出現過度模仿的現象。"
  keywords:
    - "few-shot prompting"
    - "提示工程陷阱"
    - "過度模仿"
  exam_trap: true

- id: "L12202-Q29"
