- id: "L12202-Q30"
  topic_code: "L12202"
  item_code: "L12202"
  difficulty: 2
  question: "思維樹（Tree-of-Thought, ToT）與思維鏈（Chain-of-Thought, CoT）的關鍵差異為何？"
  options:
    a: "ToT 只能用於數學問題，CoT 適用於所有問題"
    b: "CoT 沿單一路徑推理，ToT 允許探索多條推理路徑並選擇最佳方案"
    c: "ToT 是 CoT 的簡化版本，步驟更少"
    d: "CoT 需要微調模型，ToT 只需提示即可"
  correct: "b"
  explanation:
    why_correct: "CoT 沿著一條推理鏈逐步思考，ToT 則是 CoT 的延伸，允許模型在每個步驟分支出多條推理路徑，評估各路徑後選擇最佳方案，適合需要探索和回溯的複雜問題。"
    why_not_a: "ToT 和 CoT 都不限於數學問題，兩者都適用於需要推理的各類任務，只是複雜度不同。"
    why_not_c: "恰好相反：ToT 是 CoT 的擴展（更複雜），不是簡化版本。學生可能因為「Tree 比 Chain 簡單」的直覺而誤選。"
    why_not_d: "CoT 和 ToT 都是提示層面的技術，都不需要微調模型。"
  keywords:
