- id: "L12202-Q08"
  topic_code: "L12202"
  item_code: "L12202"
  difficulty: 1
  question: "自動提示工程（Automatic Prompt Engineering, APE）的核心概念是什麼？"
  options:
    a: "由模型自動生成、測試並優化提示詞"
    b: "由人工專家手動撰寫最佳提示詞"
    c: "將提示詞翻譯成多種語言以提升泛化能力"
    d: "使用模板固定所有提示詞的格式"
  correct: "a"
  explanation:
    why_correct: "APE 的核心是讓模型自動生成候選提示、進行測試評估，然後選出最優提示，實現提示詞的自動化優化。研究發現 APE 能找到比人工設計更有效的提示。"
    why_not_b: "人工撰寫是傳統的提示工程方式，APE 正是為了超越人工設計的局限而提出的自動化方法。"
    why_not_c: "多語言翻譯是自然語言處理的另一個領域，與 APE 的自動優化概念無關。"
    why_not_d: "模板化是一種固定格式的做法，與 APE 強調的自動搜索最優提示相反。"
  keywords:
    - "APE"
    - "Automatic Prompt Engineering"
    - "自動提示工程"
  exam_trap: false

- id: "L12202-Q09"
  topic_code: "L12202"
  item_code: "L12202"
  difficulty: 2
  question: "關於少樣本提示（Few-shot Prompting），下列敘述何者正確？"
  options:
    a: "提供的範例越多，模型表現一定越好"
    b: "範例品質比範例數量更重要，且需注意領域遷移（Domain Shift）風險"
    c: "只有 GPT 系列模型才支援 Few-shot Prompting"
    d: "Few-shot Prompting 等同於對模型進行微調（Fine-tuning）"
  correct: "b"
  explanation:
    why_correct: "Few-shot Prompting 的效果取決於範例品質而非單純數量，且研究顯示若範例與目標任務的領域不匹配（Domain Shift），反而會降低效果。"
    why_not_a: "範例過多可能導致提示過長、超出模型上下文窗口限制，且品質不佳的範例反而有害，「越多越好」是常見誤解。"
    why_not_c: "Few-shot Prompting 是一種通用的提示策略，所有大型語言模型（包括 Gemini、Claude 等）都支援。"
    why_not_d: "Few-shot 是在推論時提供範例，不修改模型參數；Fine-tuning 則需要修改模型參數，兩者是完全不同層次的技術。"
  keywords:
    - "少樣本提示"
    - "few-shot prompting"
    - "domain shift"
  exam_trap: true

- id: "L12202-Q10"
  topic_code: "L12202"
  item_code: "L12202"
  difficulty: 2
  question: "思維鏈提示（Chain-of-Thought, CoT）最適合用於以下哪種任務？"
  options:
    a: "簡單的文字翻譯"
    b: "需要多步推理的複雜問題"
    c: "固定格式的情緒分類"
    d: "大量資料的批次處理"
  correct: "b"
  explanation:
    why_correct: "CoT 的核心價值在於引導模型展示中間推理步驟，特別適合數學推理、邏輯分析等需要多步思考的複雜問題。"
    why_not_a: "簡單翻譯通常不需要多步推理，使用 Zero-shot 就能獲得良好結果，CoT 反而可能增加不必要的延遲。"
    why_not_c: "固定格式的情緒分類（如正面/負面/中立）是結構化的單步判斷任務，不需要多步推理，Zero-shot 即可勝任。"
    why_not_d: "批次處理著重效率和自動化，CoT 的逐步推理方式會增加每次推論的 token 消耗，不適合大量重複任務。"
  keywords:
    - "思維鏈"
    - "chain-of-thought"
    - "CoT"
  exam_trap: false

- id: "L12202-Q11"
  topic_code: "L12202"
  item_code: "L12202"
  difficulty: 2
  question: "關於 RAG 的工作流程，以下哪個順序是正確的？"
  options:
    a: "用戶提問 → LLM生成答案 → 檢索資料 → 驗證答案"
    b: "用戶提問 → 微調模型 → 重新訓練 → 生成答案"
    c: "資料向量化 → 用戶提問 → 檢索相關段落 → 注入提示 → LLM生成答案"
    d: "LLM生成答案 → 用戶驗證 → 回饋修正 → 重新生成"
  correct: "c"
  explanation:
    why_correct: "RAG 的標準流程是先將資料向量化建立索引，用戶提問後檢索相關段落，將檢索結果注入提示，最後由 LLM 基於這些資料生成答案。"
    why_not_a: "這個順序讓 LLM 先生成答案再檢索，失去了 RAG「先查再答」的核心精神，等同於事後驗證而非增強生成。"
    why_not_b: "微調和重新訓練是 Fine-tuning 的流程，RAG 不需要修改模型參數，學生常混淆這兩種技術。"
    why_not_d: "這是人工驗證後再重新生成的修正流程，不是先檢索外部知識再生成，因此不符合 RAG 的『先查再答』核心概念。"
  keywords:
    - "RAG流程"
    - "retrieval-augmented generation"
    - "向量化"
    - "embedding"
  exam_trap: true

- id: "L12202-Q12"
  topic_code: "L12202"
  item_code: "L12202"
  difficulty: 2
  question: "角色提示（Role Prompting）的主要作用是什麼？"
  options:
    a: "讓模型扮演特定角色，以獲得符合該領域專業風格的回應"
    b: "限制模型只能回答特定主題的問題"
    c: "提升模型的運算速度"
    d: "讓模型自動學習新的專業知識"
  correct: "a"
  explanation:
    why_correct: "Role Prompting 透過指定角色（如「你是一位資深律師」），引導模型產生符合該角色專業風格和知識深度的回應。"
    why_not_b: "Role Prompting 影響回應的風格和角度，但不會硬性限制模型的回答範圍，模型仍可回答其他主題。"
    why_not_c: "Role Prompting 不影響運算效能，它是一種提示策略，作用於輸出品質而非速度。"
    why_not_d: "Role Prompting 不會讓模型學習新知識，它只是激活模型預訓練中已有的相關知識和表達方式。"
  keywords:
    - "角色提示"
    - "role prompting"
  exam_trap: false

- id: "L12202-Q13"
  topic_code: "L12202"
  item_code: "L12202"
  difficulty: 2
  question: "以下關於 RAG 與微調（Fine-tuning）的比較，何者正確？"
  options:
    a: "RAG 需要修改模型參數，Fine-tuning 不需要"
    b: "Fine-tuning 更適合需要即時更新資料的場景"
    c: "兩者功能完全相同，只是實作方式不同"
    d: "RAG 類似開卷考試，Fine-tuning 類似閉卷考試"
  correct: "d"
  explanation:
    why_correct: "RAG 在回答時查詢外部資料（像開卷考試翻書找答案），Fine-tuning 則是將知識內化到模型參數中（像閉卷考試靠記憶作答）。這是經典的比喻。"
    why_not_a: "恰好相反：Fine-tuning 需要修改模型參數，RAG 不需要。這是最容易搞混的考點。"
    why_not_b: "RAG 更適合即時更新場景，因為只需更新外部知識庫即可；Fine-tuning 每次更新都需重新訓練模型。"
    why_not_c: "兩者解決的問題有重疊但方式截然不同：RAG 靠外部檢索，Fine-tuning 靠參數調整，各有適用場景。"
  keywords:
    - "RAG"
    - "fine-tuning"
    - "微調"
  exam_trap: true

- id: "L12202-Q14"
  topic_code: "L12202"
  item_code: "L12202"
  difficulty: 2
  question: "關於 AI Agent 的概念，下列敘述何者最為正確？"
  options:
    a: "AI Agent 能自主規劃任務、呼叫外部工具並完成多步驟目標"
    b: "AI Agent 就是 ChatGPT 的另一個名稱"
    c: "AI Agent 需要人工逐步指令才能完成每個步驟"
    d: "AI Agent 只能執行單一預設任務，無法自主規劃"
  correct: "a"
  explanation:
    why_correct: "AI Agent 的核心特徵是自主性——能夠自行規劃任務步驟、選擇並呼叫適當的外部工具、根據中間結果調整策略，以完成複雜的多步驟目標。"
    why_not_b: "ChatGPT 是一個對話式 AI 工具，AI Agent 是一種更廣泛的概念，可以基於任何 LLM 構建，不限於 ChatGPT。"
    why_not_c: "需要人工逐步指令是傳統的人機互動模式，AI Agent 的特點正是減少人工介入，能自主完成中間步驟。"
    why_not_d: "「只能執行單一任務」描述的是傳統自動化腳本，AI Agent 的價值正在於能處理多步驟、需要判斷的任務。"
  keywords:
    - "AI Agent"
    - "自主任務規劃"
    - "工具呼叫"
  exam_trap: false

- id: "L12202-Q15"
  topic_code: "L12202"
  item_code: "L12202"
  difficulty: 1
  question: "零樣本思維鏈（Zero-shot CoT）的觸發方式是什麼？"
  options:
    a: "提供多個推理範例讓模型模仿"
    b: "對模型進行專門的推理能力微調"
    c: "在提示中加入「讓我們一步一步想」等引導語"
    d: "使用特殊的 API 參數啟用推理模式"
  correct: "c"
  explanation:
    why_correct: "Zero-shot CoT 的觸發方式非常簡單，只需在提示末尾加上「Let's think step by step」（讓我們一步一步想）等引導語，就能激發模型的推理能力。"
    why_not_a: "提供推理範例的做法屬於 Few-shot CoT，不是 Zero-shot CoT。Zero-shot 的意思就是不提供範例。"
    why_not_b: "Zero-shot CoT 不需要微調模型，它是一種純粹的提示技巧，這也是它受歡迎的原因——零成本即可使用。"
    why_not_d: "Zero-shot CoT 是提示層面的技巧，不需要特殊 API 參數。學生可能誤以為需要技術設定才能啟用。"
  keywords:
    - "零樣本思維鏈"
    - "zero-shot CoT"
    - "chain-of-thought"
  exam_trap: false

- id: "L12202-Q16"
  topic_code: "L12202"
  item_code: "L12202"
  difficulty: 1
  question: "向量資料庫（Vector Database）在 RAG 架構中的主要功能是什麼？"
  options:
    a: "儲存原始的 PDF 和 Word 文件"
    b: "執行大型語言模型的推論計算"
    c: "儲存文本的向量表示（Embedding），支援語義搜尋"
    d: "管理使用者的帳號和權限"
  correct: "c"
  explanation:
    why_correct: "向量資料庫儲存文本經過 Embedding 模型轉換後的向量表示，能透過向量相似度計算實現語義搜尋，是 RAG 檢索環節的核心基礎設施。"
    why_not_a: "原始文件通常儲存在檔案系統或物件儲存中，向量資料庫儲存的是經過向量化處理後的數值表示。"
