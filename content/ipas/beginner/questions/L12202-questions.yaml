    c: "技術問題的答案通常集中在特定段落中，RAG 檢索即可找到；策略性問題需要綜合多個段落的資訊並進行推理，應結合 CoT 提示技術引導 LLM 進行多步推理"
    d: "RAG 系統不適合回答任何類型的問題，應該全部改用 Fine-tuning"
  correct: "c"
  explanation:
    why_correct: "這道題考的是 RAG 的局限性分析。技術問題通常有明確答案（一個段落即可回答），但策略性問題需要綜合多個資訊來源並進行推理判斷。結合 CoT 提示技術能引導 LLM 在檢索到的多個段落基礎上進行系統性推理。"
    why_not_a: "Embedding 模型大小主要影響檢索品質（找到相關段落），但問題不在於「找不到」而在於「無法綜合判斷」，換模型無法解決推理能力的問題。"
    why_not_b: "補充資料來源可能有幫助，但核心問題是「綜合判斷能力」而非「資料不足」，即使有足夠的策略文件，LLM 仍需要推理引導才能有效綜合。"
    why_not_d: "RAG 在技術問題上表現良好，說明系統本身有效；全部改用 Fine-tuning 是過度反應，且失去了 RAG 即時更新的優勢。"
  keywords:
    - "RAG局限性"
    - "chain-of-thought"
    - "多步推理"
    - "技術診斷"
  exam_trap: false

- id: "L12202-Q40"
  topic_code: "L12202"
  item_code: "L12202"
  difficulty: 5
  question: "某跨國企業正在規劃全公司的AI工具使用政策。以下四項政策建議中，哪一項在兼顧效率與風險管控上最為周全？"
  options:
    a: "僅允許使用企業版 AI 工具，個人版一律禁止"
    b: "允許所有員工不受限制地使用任何AI工具，以最大化生產力"
    c: "只允許IT部門使用AI工具，其他部門全部禁止"
    d: "依據資料敏感度分級：公開資料可自由使用AI工具，內部資料須使用企業版（不用於訓練），機密資料禁止輸入任何外部AI工具"
  correct: "d"
  explanation:
    why_correct: "方案D依據資料敏感度進行分級管理，在保護機密資料安全的同時最大化AI工具的使用效益。記住口訣：「公開可自由、內部用企業版、機密禁外送」——這是企業AI治理的最佳實踐。"
    why_not_a: "一律只用企業版看似安全，但對公開資料的低風險任務限制過多，員工處理一般性工作（如翻譯公開新聞、生成簡報大綱）也要受限於企業版的功能，犧牲了靈活性和效率。分級管理比一刀切更務實。"
    why_not_b: "不設限制會導致機密資料外洩風險，且可能違反資料保護法規（如 GDPR、台灣個資法），長期風險遠大於短期效率。"
    why_not_c: "只允許IT部門使用忽略了業務部門的需求，且IT部門不一定是最需要AI輔助的單位，這種政策既不公平也不高效。"
  keywords:
    - "AI工具使用政策"
    - "資料分級管理"
    - "風險管控"
    - "AI治理"
  exam_trap: false
