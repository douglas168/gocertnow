- id: "L12202-Q01"
  topic_code: "L12202"
  item_code: "L12202"
  difficulty: 1
  question: "CO-STAR 提示框架中的「S」代表什麼？"
  options:
    a: "Style（風格）"
    b: "Statement（陳述）"
    c: "Source（來源）"
    d: "Structure（結構）"
  correct: "a"
  explanation:
    why_correct: "CO-STAR 的六個維度為 Context / Objective / Style / Tone / Audience / Response，「S」代表 Style（風格），用於指定回應的寫作風格。"
    why_not_b: "Statement 是 CRISPE 框架中的元素，容易與 CO-STAR 混淆。"
    why_not_c: "Source 不屬於任何常見提示框架的核心元素，但學生可能因 RAG 中的「來源」概念而誤選。"
    why_not_d: "Structure 看似合理但並非 CO-STAR 的組成元素，它屬於提示輸出的格式控制。"
  keywords:
    - "CO-STAR"
    - "提示框架"
    - "prompt framework"
  exam_trap: false

- id: "L12202-Q02"
  topic_code: "L12202"
  item_code: "L12202"
  difficulty: 1
  question: "零樣本提示（Zero-shot Prompting）的特徵是什麼？"
  options:
    a: "需要提供大量範例讓模型學習"
    b: "需要先對模型進行微調"
    c: "需要搭配檢索增強生成（RAG）才能使用"
    d: "不提供任何範例，直接給予指令"
  correct: "d"
  explanation:
    why_correct: "Zero-shot Prompting 的核心特徵是不提供任何範例，完全依賴大型語言模型的預訓練知識來完成任務。"
    why_not_a: "提供大量範例的做法接近 Few-shot Prompting，但 Few-shot 通常只需少量（2-5個）範例，而非大量。"
    why_not_b: "微調（Fine-tuning）是修改模型參數的獨立技術，與提示策略無關，學生容易混淆這兩個層次。"
    why_not_c: "RAG 是一種獨立的知識增強方法，Zero-shot 不需要依賴外部檢索即可運作。"
  keywords:
    - "零樣本提示"
    - "zero-shot prompting"
  exam_trap: false

- id: "L12202-Q03"
  topic_code: "L12202"
  item_code: "L12202"
  difficulty: 1
  question: "檢索增強生成（Retrieval-Augmented Generation, RAG）的核心目的是什麼？"
  options:
    a: "降低幻覺（Hallucination），確保回答基於可靠資料"
    b: "加速模型的訓練過程"
    c: "減少模型的參數量以節省運算資源"
    d: "取代所有人工撰寫的知識庫"
  correct: "a"
  explanation:
    why_correct: "RAG 的核心目的是透過檢索外部知識來降低大型語言模型的幻覺問題，確保生成內容有事實依據。"
    why_not_b: "RAG 作用於推論（inference）階段而非訓練階段，學生常混淆 RAG 與 Fine-tuning 的作用時機。"
    why_not_c: "RAG 不改變模型本身的參數量，而是在提示中注入檢索到的外部資訊。"
    why_not_d: "RAG 依賴知識庫作為檢索來源，是增強而非取代知識庫。"
  keywords:
    - "RAG"
    - "檢索增強生成"
    - "幻覺"
    - "hallucination"
  exam_trap: false

- id: "L12202-Q04"
  topic_code: "L12202"
  item_code: "L12202"
  difficulty: 1
  question: "MCP（Model Context Protocol）在 AI 工具整合中的角色是什麼？"
  options:
    a: "一種訓練大型語言模型的演算法"
    b: "一種向量資料庫的查詢語言"
    c: "一種評估 AI 模型準確度的指標"
    d: "統一 AI 工具與外部資源的連接標準"
  correct: "d"
  explanation:
    why_correct: "MCP（Model Context Protocol）是一種統一的連接標準，讓 AI 模型能以標準化方式存取外部工具和資料來源。"
    why_not_a: "MCP 不涉及模型訓練，它是一種連接協議，學生可能因「Model」一詞而聯想到訓練。"
    why_not_b: "向量資料庫有自己的查詢機制，MCP 的範圍更廣，涵蓋各種外部資源連接。"
    why_not_c: "AI 模型準確度評估有專門的指標（如 F1 Score），MCP 與評估無關。"
  keywords:
    - "MCP"
    - "Model Context Protocol"
    - "AI工具整合"
  exam_trap: false

- id: "L12202-Q05"
  topic_code: "L12202"
  item_code: "L12202"
  difficulty: 1
  question: "CRISPE 提示框架中的「E」代表什麼？"
  options:
    a: "Experiment（實驗）"
    b: "Example（範例）"
    c: "Evaluation（評估）"
    d: "Execution（執行）"
  correct: "a"
  explanation:
    why_correct: "CRISPE 的五個維度為 Capacity & Role / Insight / Statement / Personality / Experiment，「E」代表 Experiment（實驗），強調迭代測試以優化輸出。"
    why_not_b: "Example 屬於 Few-shot Prompting 的概念，不是 CRISPE 框架的組成元素。"
    why_not_c: "Evaluation 雖與「實驗」概念相近，但 CRISPE 框架明確使用 Experiment 一詞，強調的是嘗試多種提示變體。"
    why_not_d: "Execution 不是 CRISPE 的元素，學生可能因「做某事」的聯想而誤選。"
  keywords:
    - "CRISPE"
    - "提示框架"
    - "prompt framework"
  exam_trap: false

- id: "L12202-Q06"
  topic_code: "L12202"
  item_code: "L12202"
  difficulty: 1
  question: "RTF 提示框架的三個組成元素是什麼？"
  options:
    a: "Role / Task / Format"
    b: "Role / Tone / Feedback"
    c: "Research / Task / Finalize"
    d: "Response / Theme / Format"
